  {tag:"Asch conformity studies",stem:"Solomon Asch's line-judgment experiments demonstrated that people will often:",choices:["Always trust their own perception over the group","Only conform when physically threatened","Give an obviously wrong answer to match a unanimous group","Conform only if paid to do so"],answer:2,rationale:"<b>Asch's line studies</b>: people conform to a unanimous group even when it's obviously wrong.",why:["The striking finding was that people abandoned correct perceptions to fit in.","No threat was needed \u2014 social pressure alone produced conformity.","Correct. Asch showed many participants conformed to a unanimous majority's clearly incorrect line judgments.","Payment wasn't the driver; the desire to fit in was."],takeaway:"Asch = conform to a unanimous wrong majority (line judgments)."},
  {tag:"Normative vs. informational influence",stem:"Conforming to gain acceptance and avoid rejection is ______ influence; conforming because you believe others have accurate information is ______ influence.",choices:["Normative; informational","Informational; normative","Coercive; referent","Central; peripheral"],answer:0,rationale:"<b>Normative</b> influence = to be accepted; <b>informational</b> influence = to be correct.",why:["Correct. Normative influence = fit in/be liked; informational influence = others as a source of correct information.","Reversed \u2014 normative is about acceptance, informational is about accuracy.","Coercive/referent are bases of power, not these two influence types.","Central/peripheral are persuasion routes."],takeaway:"Normative = fit in. Informational = they must know better."},
  {tag:"Factors increasing conformity",stem:"Conformity in Asch-type situations tends to INCREASE when:",choices:["Even one other person dissents","The task is extremely easy and certain","Responses are fully anonymous","The group is unanimous and moderately sized"],answer:3,rationale:"Conformity rises with <b>unanimity and group size</b>; a dissenting ally or anonymity lowers it.",why:["A single dissenter sharply REDUCES conformity.","Easy, certain tasks reduce conformity (less reliance on others).","Anonymity reduces normative pressure, lowering conformity.","Correct. Unanimity and group size (up to a point) increase conformity; a single ally, easy/certain tasks, and anonymity reduce it."],takeaway:"Conformity up with unanimity/size; down with an ally or anonymity."}
 ]},
{id:"ps-7b-obedience",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Social processes",categoryCode:"7B",idea:"Obedience (Milgram & Zimbardo)",
 questions:[
  {tag:"Milgram experiment",stem:"Stanley Milgram's obedience studies famously showed that ordinary people would:",choices:["Refuse any instruction that could harm another","Only obey authorities they personally admired","Deliver what they believed were dangerous shocks when instructed by an authority figure","Conform only to peers, never to authority"],answer:2,rationale:"<b>Milgram</b>: ordinary people obeyed an authority's orders to (apparently) harm another.",why:["The disturbing finding was widespread obedience despite apparent harm.","Obedience occurred toward an unfamiliar experimenter, not an admired figure.","Correct. Most Milgram participants obeyed an authority's orders to deliver seemingly harmful shocks.","Milgram studied obedience to authority, not peer conformity."],takeaway:"Milgram = obedience to authority (shock experiment)."},
  {tag:"Factors affecting obedience",stem:"Obedience in Milgram's paradigm DECREASED when:",choices:["The authority figure was distant or the victim was closer/more visible","The authority was physically present and legitimate","The participant felt no personal responsibility","The setting was a prestigious institution"],answer:0,rationale:"Obedience falls when the <b>authority is distant/illegitimate</b> or the <b>victim is closer/more visible</b>.",why:["Correct. Obedience dropped when the authority was remote, its legitimacy was questioned, or the victim's suffering was more immediate.","A present, legitimate authority INCREASED obedience.","Diffused responsibility INCREASED obedience.","A prestigious setting INCREASED obedience."],takeaway:"Obedience down: distant authority, closer victim, questioned legitimacy."},
  {tag:"Zimbardo prison study",stem:"Philip Zimbardo's Stanford Prison Experiment is used to illustrate how:",choices:["Personality alone determines cruelty","People never conform to assigned roles","Obedience requires direct orders","Assigned social roles and situational forces can powerfully shape behavior"],answer:3,rationale:"<b>Zimbardo's prison study</b>: assigned roles and situational forces shape behavior (power of the situation).",why:["It emphasized situation over fixed personality.","Participants strongly took on their assigned roles.","Role-driven behavior emerged without explicit orders.","Correct. The study suggested that situational roles (guard/prisoner) drove abusive behavior \u2014 the power of the situation over disposition."],takeaway:"Zimbardo = roles/situation drive behavior (prison study)."}
 ]},
{id:"ps-7b-group-influence",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Social processes",categoryCode:"7B",idea:"Groupthink, polarization & deindividuation",
 questions:[
  {tag:"Groupthink",stem:"When a cohesive group's desire for harmony and consensus overrides realistic appraisal of alternatives \u2014 suppressing dissent \u2014 the result is:",choices:["Group polarization","Social loafing","Groupthink","Deindividuation"],answer:2,rationale:"<b>Groupthink</b> = desire for consensus overrides realistic evaluation (dissent suppressed).",why:["Group polarization is the strengthening of a group's average view, a different process.","Social loafing is reduced individual effort in groups.","Correct. Groupthink is faulty decision-making driven by the pressure for unanimity and suppression of dissent.","Deindividuation is loss of self-awareness in a crowd."],takeaway:"Groupthink = harmony over good decisions (suppress dissent)."},
  {tag:"Group polarization",stem:"When group discussion strengthens members' pre-existing attitudes, making the group's decision MORE extreme than the average individual's, this is:",choices:["Group polarization","Groupthink","Social facilitation","Deindividuation"],answer:0,rationale:"<b>Group polarization</b> = discussion pushes the group toward a more extreme version of its initial leaning.",why:["Correct. Group polarization intensifies the initially favored position after discussion.","Groupthink is consensus-seeking that ignores alternatives, not attitude intensification per se.","Social facilitation concerns performance in the presence of others.","Deindividuation is loss of individual identity in a group."],takeaway:"Group polarization = group decision more extreme than individuals'."},
  {tag:"Deindividuation",stem:"The loss of self-awareness and self-restraint that can occur in a group or crowd, especially under anonymity, is:",choices:["Group polarization","Social facilitation","Groupthink","Deindividuation"],answer:3,rationale:"<b>Deindividuation</b> = loss of self-awareness/restraint in a group (anonymity).",why:["Group polarization is attitude intensification, not loss of self-awareness.","Social facilitation is a performance effect.","Groupthink is a decision-making distortion.","Correct. Deindividuation is reduced self-consciousness and accountability in groups, enabling impulsive/deviant behavior."],takeaway:"Deindividuation = lose self-restraint in a crowd (anonymity)."}
 ]},
{id:"ps-7b-facilitation-bystander",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Social processes",categoryCode:"7B",idea:"Social facilitation, loafing & bystander effect",
 questions:[
  {tag:"Social facilitation",stem:"The tendency to perform SIMPLE or well-practiced tasks better in the presence of others (but complex tasks worse) is:",choices:["Social loafing","Deindividuation","Social facilitation","Groupthink"],answer:2,rationale:"<b>Social facilitation</b>: others' presence \u2192 better on simple tasks, worse on complex ones.",why:["Social loafing is reduced effort in a group task, not audience-driven arousal.","Deindividuation is loss of self-awareness in crowds.","Correct. Social facilitation: the presence of others enhances performance on easy/dominant tasks and impairs it on difficult ones.","Groupthink is a decision-making failure."],takeaway:"Social facilitation = audience helps easy tasks, hurts hard ones."},
  {tag:"Social loafing",stem:"The tendency to exert LESS effort on a task when working in a group than when working alone is:",choices:["Social loafing","Social facilitation","Group polarization","Deindividuation"],answer:0,rationale:"<b>Social loafing</b> = people work less hard in a group (effort diffuses).",why:["Correct. Social loafing is reduced individual effort due to diffused responsibility in group work.","Social facilitation is an arousal/performance effect from an audience.","Group polarization is attitude intensification.","Deindividuation is loss of self-awareness."],takeaway:"Social loafing = less individual effort in a group."},
  {tag:"Bystander effect",stem:"The finding that a person is LESS likely to help a victim when more bystanders are present is the bystander effect, driven largely by:",choices:["Increased personal accountability","Informational influence only","Group polarization","Diffusion of responsibility"],answer:3,rationale:"<b>Bystander effect</b>: more witnesses \u2192 less helping, via <b>diffusion of responsibility</b>.",why:["Accountability decreases, not increases, with more bystanders.","Diffusion of responsibility (plus pluralistic ignorance) is the core driver, beyond informational cues alone.","Group polarization isn't the mechanism of the bystander effect.","Correct. With more witnesses, responsibility to act feels diffused across the group, reducing helping."],takeaway:"Bystander effect = more people, less help (responsibility diffuses)."}
 ]},
{id:"ps-7b-socialization",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Social processes",categoryCode:"7B",idea:"Socialization, norms & deviance",
 questions:[
  {tag:"Agents of socialization",stem:"The people and institutions that transmit social norms and values (family, peers, school, media) are called:",choices:["Reference groups only","Total institutions","Agents of socialization","Primary reinforcers"],answer:2,rationale:"<b>Agents of socialization</b> = family, peers, school, media, religion \u2014 they transmit norms/values.",why:["Reference groups are a narrower comparison concept, not the full set of socializing agents.","A total institution is a specific controlling setting (e.g., prison), not the general term.","Correct. Agents of socialization \u2014 family, peers, school, media, religion \u2014 shape our norms, values, and behaviors.","Primary reinforcers are an operant-conditioning concept."],takeaway:"Agents of socialization = family, peers, school, media."},
  {tag:"Folkways, mores, taboos",stem:"Ranked by the severity of reaction to violating them, from mildest to most severe, social norms go:",choices:["Folkways \u2192 mores \u2192 taboos","Taboos \u2192 mores \u2192 folkways","Mores \u2192 folkways \u2192 taboos","Folkways \u2192 taboos \u2192 mores"],answer:0,rationale:"Norms by severity: <b>folkways</b> (mild customs) \u2192 <b>mores</b> (moral) \u2192 <b>taboos</b> (strongest).",why:["Correct. Folkways are everyday customs (mild), mores carry moral weight, and taboos are the most strongly forbidden.","That's the reverse (most to least severe).","Folkways are milder than mores, so mores don't come first.","Taboos are the most severe, so they come last."],takeaway:"Folkways (mild) < mores (moral) < taboos (strongest)."},
  {tag:"Differential association",stem:"The theory that deviance is LEARNED through interaction with others who model and reinforce deviant values is:",choices:["Labeling theory","Strain theory","Functionalism","Differential association theory"],answer:3,rationale:"<b>Differential association</b>: deviance is learned through interaction with deviant others.",why:["Labeling theory focuses on how being labeled deviant shapes identity, not learning per se.","Strain theory attributes deviance to a gap between goals and legitimate means.","Functionalism is a broad theoretical perspective, not this specific mechanism.","Correct. Differential association (Sutherland): deviance is learned socially, like any behavior, from one's associations."],takeaway:"Differential association = deviance is learned from associations."},
  {tag:"Labeling vs. strain",stem:"The idea that being labeled 'deviant' can push a person into a deviant identity is ______ theory; the idea that deviance arises from a gap between cultural goals and legitimate means is ______ theory.",choices:["Strain; labeling","Labeling; strain","Conflict; functionalist","Differential association; labeling"],answer:1,rationale:"<b>Labeling</b> theory = the deviant label shapes identity; <b>strain</b> theory = goals vs. legitimate means gap.",why:["Reversed \u2014 labeling is about the label, strain about goals/means.","Correct. Labeling theory emphasizes the effect of the deviant label; strain theory (Merton) emphasizes blocked access to legitimate means.","Those are broad perspectives, not this specific pair.","Differential association is about learning deviance, not labeling."],takeaway:"Labeling = the label makes the deviant. Strain = blocked means to goals."}
 ]},
{id:"ps-7b-group-dynamics",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Social processes",categoryCode:"7B",idea:"Group dynamics",
 questions:[
  {tag:"Primary vs. secondary groups",stem:"Small, intimate, enduring groups (family, close friends) are ______ groups; larger, impersonal, goal-oriented groups (coworkers, a committee) are ______ groups.",choices:["Secondary; primary","In-group; out-group","Primary; secondary","Reference; total"],answer:2,rationale:"<b>Primary groups</b> = intimate/enduring (family); <b>secondary groups</b> = impersonal/goal-oriented.",why:["Reversed \u2014 primary is intimate, secondary is impersonal.","In-group/out-group is a different distinction (belonging).","Correct. Primary groups are close and personal; secondary groups are larger, more impersonal, and task-focused.","Reference/total groups are different concepts."],takeaway:"Primary = intimate (family). Secondary = impersonal/task (coworkers)."},
  {tag:"In-group vs. out-group",stem:"The group one identifies with and feels loyalty toward is the ______; a group one feels apart from or in competition with is the ______.",choices:["In-group; out-group","Out-group; in-group","Primary; secondary","Reference; aggregate"],answer:0,rationale:"<b>In-group</b> = 'us' (belonging/loyalty); <b>out-group</b> = 'them.'",why:["Correct. The in-group is 'us'; the out-group is 'them.'","Reversed \u2014 the in-group is the one you belong to.","Primary/secondary describe intimacy, not belonging vs. otherness.","Reference/aggregate are different concepts."],takeaway:"In-group = us. Out-group = them."},
  {tag:"Ethnocentrism",stem:"Judging another culture by the standards of one's own \u2014 assuming one's own group is superior \u2014 is:",choices:["Cultural relativism","Assimilation","Deindividuation","Ethnocentrism"],answer:3,rationale:"<b>Ethnocentrism</b> = judging other cultures by your own standards (your group as superior).",why:["Cultural relativism is the opposite \u2014 understanding a culture on its own terms.","Assimilation is adopting the dominant culture.","Deindividuation is loss of self-awareness in a group.","Correct. Ethnocentrism evaluates others through one's own cultural lens and assumes one's own group's superiority."],takeaway:"Ethnocentrism = my culture is the standard/superior."}
 ]},
{id:"ps-8a-self-concept",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Self-identity",categoryCode:"8A",idea:"Self-concept, self-esteem & self-efficacy",
 questions:[
  {tag:"Self-concept vs. identity",stem:"The sum of your beliefs about who you are is your self-concept; the specific traits, groups, and roles you use to define yourself are your:",choices:["Locus of control","Identities (self-identity)","Temperament","Reference group"],answer:1,rationale:"<b>Self-concept</b> = overall self-view; <b>identities</b> = the specific roles/groups you define yourself by.",why:["Locus of control concerns attribution of outcomes, not self-definition.","Correct. Self-concept is the overall self-view; identities are the specific components (roles, group memberships) that compose it.","Temperament is inborn emotional style.","A reference group is a comparison standard, not your identity."],takeaway:"Self-concept = who I am overall. Identity = the specific roles/groups."},
  {tag:"Social identity",stem:"The part of self-concept derived from membership in social groups (nationality, religion, profession) is:",choices:["Personal identity","Self-efficacy","The looking-glass self","Social identity"],answer:3,rationale:"<b>Social identity</b> = the part of self-concept from group memberships.",why:["Personal identity is the individual, trait-based component.","Self-efficacy is task-specific capability belief.","The looking-glass self is how we form self-image from others' views.","Correct. Social identity (Tajfel) is the group-based component of the self-concept."],takeaway:"Social identity = self-concept from group memberships."},
  {tag:"Self-esteem vs. self-efficacy",stem:"Overall sense of self-worth is ______; belief in your ability to succeed at a specific task is ______.",choices:["Self-esteem; self-efficacy","Self-efficacy; self-esteem","Locus of control; self-esteem","Identity; self-concept"],answer:0,rationale:"<b>Self-esteem</b> = global self-worth; <b>self-efficacy</b> = task-specific capability belief.",why:["Correct. Self-esteem is global self-worth; self-efficacy is task-specific competence belief.","Reversed \u2014 self-esteem is global worth, self-efficacy is task-specific.","Locus of control is a different construct (control attribution).","Identity/self-concept describe self-definition, not worth vs. capability."],takeaway:"Self-esteem = overall worth. Self-efficacy = 'can I do THIS task?'"},
  {tag:"Learned helplessness",stem:"Repeated exposure to uncontrollable aversive events can produce a passive belief that one cannot change outcomes \u2014 an external, hopeless state called:",choices:["High self-efficacy","Internal locus of control","Learned helplessness","Self-actualization"],answer:2,rationale:"<b>Learned helplessness</b> = passivity after uncontrollable adversity (external, hopeless).",why:["High self-efficacy is the opposite \u2014 belief in one's capability.","An internal locus of control is the opposite orientation.","Correct. Learned helplessness (Seligman) is giving up after uncontrollable adversity, tied to an external locus of control.","Self-actualization is Maslow's growth need."],takeaway:"Learned helplessness = give up after uncontrollable events (Seligman)."}
 ]},
{id:"ps-8a-identity-development",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Self-identity",categoryCode:"8A",idea:"Identity development (Erikson, Kohlberg, Mead, Cooley)",
 questions:[
  {tag:"Erikson's psychosocial stages",stem:"Unlike Freud, Erik Erikson proposed development across the whole lifespan through a series of:",choices:["Psychosexual stages ending in adolescence","Psychosocial crises (e.g., trust vs. mistrust, identity vs. role confusion)","Conditioning trials","Cognitive stages ending at formal operations"],answer:1,rationale:"<b>Erikson</b>: 8 lifespan <b>psychosocial crises</b> (e.g., identity vs. role confusion in adolescence).",why:["Freud's psychosexual stages end at puberty; Erikson's continue through adulthood.","Correct. Erikson's eight stages each pose a psychosocial crisis to resolve, spanning infancy to old age.","Erikson's stages aren't conditioning trials.","Cognitive stages are Piaget's, not Erikson's psychosocial crises."],takeaway:"Erikson = 8 lifespan psychosocial crises."},
  {tag:"Kohlberg's moral development",stem:"Kohlberg described moral reasoning developing through three levels:",choices:["Oral \u2192 anal \u2192 phallic","Sensorimotor \u2192 preoperational \u2192 concrete","Trust \u2192 autonomy \u2192 initiative","Preconventional \u2192 conventional \u2192 postconventional"],answer:3,rationale:"Kohlberg's moral levels: <b>preconventional \u2192 conventional \u2192 postconventional</b>.",why:["Those are Freud's psychosexual stages.","Those are Piaget's cognitive stages.","Those are Erikson's early psychosocial stages.","Correct. Kohlberg's levels: preconventional (self-interest/punishment), conventional (social rules), postconventional (abstract principles)."],takeaway:"Kohlberg: preconventional \u2192 conventional \u2192 postconventional."},
  {tag:"Cooley's looking-glass self",stem:"Charles Cooley's concept that we develop our self-image based on how we imagine others perceive us is the:",choices:["Looking-glass self","I and the Me","Dramaturgical self","Generalized other only"],answer:0,rationale:"<b>Looking-glass self</b> (Cooley): self-image forms from how we think others see us.",why:["Correct. The looking-glass self: our self-concept is shaped by our perception of how others see and judge us.","'I and the Me' is Mead's concept, related but distinct.","The dramaturgical self is Goffman's stage metaphor.","The 'generalized other' is one part of Mead's theory, not Cooley's mirror concept."],takeaway:"Looking-glass self = I see myself as I think others see me (Cooley)."},
  {tag:"Mead's 'I' and 'Me'",stem:"In George Herbert Mead's theory, the spontaneous, acting self is the ______, and the socialized self that reflects others' expectations is the ______.",choices:["'Me'; 'I'","id; ego","'I'; 'Me'","self; other"],answer:2,rationale:"Mead: the <b>'I'</b> = spontaneous self; the <b>'Me'</b> = socialized self (society's expectations).",why:["Reversed \u2014 the 'I' acts, the 'Me' is socialized.","id/ego are Freudian structures, not Mead's terms.","Correct. Mead: the 'I' is the impulsive/creative self; the 'Me' is the internalized attitudes of society (the generalized other).","'self/other' isn't Mead's specific I/Me distinction."],takeaway:"Mead: 'I' = impulsive self, 'Me' = socialized self."}
 ]},
{id:"ps-8b-attribution",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Social thinking",categoryCode:"8B",idea:"Attribution theory & biases",
 questions:[
  {tag:"Dispositional vs. situational",stem:"Explaining someone's behavior by their internal traits is a ______ attribution; explaining it by external circumstances is a ______ attribution.",choices:["Situational; dispositional","Dispositional; situational","Central; peripheral","Internal locus; external locus"],answer:1,rationale:"<b>Dispositional</b> attribution = internal traits; <b>situational</b> = external circumstances.",why:["Reversed \u2014 dispositional is internal traits, situational is external.","Correct. Dispositional (internal) attributions cite personality/traits; situational (external) attributions cite the environment.","Central/peripheral are persuasion routes.","Locus of control is a personality construct, not the attribution pair."],takeaway:"Dispositional = it's their personality. Situational = it's the circumstances."},
  {tag:"Fundamental attribution error",stem:"The tendency to OVERestimate dispositional causes and UNDERestimate situational ones when explaining OTHERS' behavior is the:",choices:["Self-serving bias","Just-world hypothesis","Halo effect","Fundamental attribution error"],answer:3,rationale:"<b>Fundamental attribution error</b>: overweight disposition, underweight situation, for others.",why:["The self-serving bias concerns attributions about one's OWN outcomes.","The just-world hypothesis is the belief that people get what they deserve.","The halo effect is a global-impression bias.","Correct. The fundamental attribution error overweights personality and underweights the situation for others' actions."],takeaway:"FAE = blame others' personality, ignore their situation."},
  {tag:"Self-serving bias",stem:"Taking personal credit for successes but blaming external factors for failures is the:",choices:["Self-serving bias","Fundamental attribution error","Actor-observer bias","Just-world hypothesis"],answer:0,rationale:"<b>Self-serving bias</b>: my successes = me; my failures = the situation.",why:["Correct. The self-serving bias attributes our own successes internally and our failures externally, protecting self-esteem.","The fundamental attribution error concerns judging others, not self-protection.","The actor-observer bias contrasts explanations for self vs. others generally.","The just-world hypothesis is about deserved outcomes."],takeaway:"Self-serving bias = credit myself for wins, blame outside for losses."},
  {tag:"Actor-observer bias",stem:"The tendency to attribute your OWN behavior to the situation but OTHERS' behavior to their disposition is the:",choices:["Halo effect","Self-serving bias","Actor-observer bias","Just-world hypothesis"],answer:2,rationale:"<b>Actor-observer bias</b>: situational for me, dispositional for others.",why:["The halo effect is a global-impression bias.","The self-serving bias is specifically about success vs. failure of the self.","Correct. Actor-observer bias: situational explanations for oneself, dispositional for others (partly because we see our own situational pressures).","The just-world hypothesis is about deserved outcomes."],takeaway:"Actor-observer = situation explains ME, disposition explains THEM."}
 ]},
{id:"ps-8b-prejudice",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Social thinking",categoryCode:"8B",idea:"Prejudice, stereotypes & discrimination",
 questions:[
  {tag:"Stereotype, prejudice, discrimination",stem:"A cognitive belief about a group is a ______, a negative attitude/feeling toward a group is ______, and unequal behavior/treatment is ______.",choices:["Prejudice; stereotype; discrimination","Stereotype; prejudice; discrimination","Discrimination; prejudice; stereotype","Stigma; prejudice; stereotype"],answer:1,rationale:"<b>Stereotype</b> = belief; <b>prejudice</b> = attitude; <b>discrimination</b> = behavior.",why:["Reversed the first two \u2014 the belief is the stereotype.","Correct. Stereotype = belief (cognitive); prejudice = attitude/feeling (affective); discrimination = unequal behavior (behavioral).","That ordering is scrambled.","Stigma is a broader devaluation concept, not the cognitive belief here."],takeaway:"Stereotype (thought) \u2192 prejudice (feeling) \u2192 discrimination (action)."},
  {tag:"Stereotype threat",stem:"When awareness of a negative stereotype about one's group impairs performance (fear of confirming it) \u2014 lowering, say, test scores \u2014 this is:",choices:["Self-fulfilling prophecy","The just-world hypothesis","Ethnocentrism","Stereotype threat"],answer:3,rationale:"<b>Stereotype threat</b>: fear of confirming a negative stereotype impairs performance.",why:["A self-fulfilling prophecy is broader \u2014 an expectation that produces its own confirmation.","The just-world hypothesis is about deserved outcomes.","Ethnocentrism is judging others by one's own culture.","Correct. Stereotype threat: anxiety about confirming a negative group stereotype undermines performance."],takeaway:"Stereotype threat = fear of confirming a stereotype hurts performance."},
  {tag:"Self-fulfilling prophecy",stem:"When a false expectation about a person leads to behavior that causes the expectation to come true, this is a:",choices:["Self-fulfilling prophecy","Halo effect","Fundamental attribution error","Cognitive dissonance"],answer:0,rationale:"<b>Self-fulfilling prophecy</b>: an expectation elicits behavior that confirms it.",why:["Correct. A self-fulfilling prophecy: an initial (false) belief elicits behavior that makes the belief come true.","The halo effect is a global-impression bias, not an expectation-confirmation loop.","The fundamental attribution error is about disposition vs. situation.","Cognitive dissonance is attitude\u2013behavior inconsistency."],takeaway:"Self-fulfilling prophecy = the expectation makes itself come true."}
 ]},
{id:"ps-8b-social-perception",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Social thinking",categoryCode:"8B",idea:"Social perception biases & stigma",
 questions:[
  {tag:"Halo effect",stem:"Assuming that a person who is attractive or good in one area is also intelligent, kind, and competent overall is the:",choices:["Just-world hypothesis","Halo effect","Primacy effect","Actor-observer bias"],answer:1,rationale:"<b>Halo effect</b>: one positive trait biases our overall impression of a person.",why:["The just-world hypothesis concerns deserved outcomes.","Correct. The halo effect lets one positive trait color our overall impression of a person.","The primacy effect is about the weight of first information.","The actor-observer bias contrasts self vs. other attributions."],takeaway:"Halo effect = one good trait \u2192 assume they're good all-around."},
  {tag:"Primacy vs. recency",stem:"In forming impressions, the tendency for EARLY information to carry the most weight is the ______ effect; for the MOST RECENT information to dominate is the ______ effect.",choices:["Recency; primacy","Halo; horn","Central; peripheral","Primacy; recency"],answer:3,rationale:"<b>Primacy</b> = first info dominates; <b>recency</b> = latest info dominates.",why:["Reversed \u2014 primacy is first, recency is latest.","Halo/horn are impression-valence effects, not order effects.","Central/peripheral are persuasion routes.","Correct. Primacy = first impressions weigh heavily; recency = latest information weighs heavily."],takeaway:"Primacy = first info wins. Recency = latest info wins."},
  {tag:"Just-world hypothesis",stem:"The belief that the world is fair, so people generally get what they deserve (leading to victim-blaming), is the:",choices:["Just-world hypothesis","Halo effect","Self-serving bias","Looking-glass self"],answer:0,rationale:"<b>Just-world hypothesis</b>: people get what they deserve (\u2192 victim-blaming).",why:["Correct. The just-world hypothesis assumes fairness in outcomes, which can lead to blaming victims for their misfortune.","The halo effect is a global-impression bias.","The self-serving bias concerns one's own successes/failures.","The looking-glass self concerns self-image formation."],takeaway:"Just-world = the world is fair, people deserve their fate (victim-blaming)."},
  {tag:"Stigma",stem:"A powerfully negative social label that devalues a person and marks them as different or discredited is a:",choices:["Reference group","Folkway","Stigma","Halo"],answer:2,rationale:"<b>Stigma</b> = a devaluing social label that discredits and sets a person apart.",why:["A reference group is a comparison standard.","A folkway is a mild social norm.","Correct. Stigma (Goffman) is a mark of social disgrace that sets a person apart and reduces their status.","A halo is a positive-impression bias."],takeaway:"Stigma = a devaluing 'mark' that discredits a person."}
 ]},
{id:"ps-8c-attraction",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Social interactions",categoryCode:"8C",idea:"Attraction",
 questions:[
  {tag:"Mere exposure effect",stem:"Simply being repeatedly exposed to a person or stimulus tends to increase liking for it. This is the:",choices:["Halo effect","Reciprocity norm","Bystander effect","Mere exposure effect"],answer:3,rationale:"<b>Mere exposure effect</b>: repeated exposure \u2192 increased liking (familiarity breeds liking).",why:["The halo effect is a global-impression bias.","The reciprocity norm is returning favors, not exposure-based liking.","The bystander effect concerns helping in groups.","Correct. The mere exposure effect: familiarity from repeated exposure increases liking (a driver of proximity-based attraction)."],takeaway:"Mere exposure = the more you see it, the more you like it."},
  {tag:"Proximity",stem:"A major, well-documented predictor of who becomes friends or partners \u2014 largely because it increases exposure \u2014 is:",choices:["Complete dissimilarity","Physical proximity (nearness)","Physical unattractiveness","Social isolation"],answer:1,rationale:"<b>Proximity</b> predicts attraction \u2014 it raises exposure and interaction.",why:["Similarity, not dissimilarity, predicts attraction.","Correct. Proximity increases the chance of interaction and exposure, strongly predicting attraction/relationship formation.","Attractiveness (not unattractiveness) increases initial attraction.","Isolation reduces the exposure that fosters attraction."],takeaway:"Proximity \u2192 attraction (more exposure/interaction)."},
  {tag:"Similarity",stem:"Contrary to 'opposites attract,' research shows relationships more often form and last between people who are:",choices:["Opposite in every major trait","Complete strangers permanently","Similar in attitudes, values, and background","Maximally different in values"],answer:2,rationale:"<b>Similarity</b> (attitudes/values/background) predicts attraction \u2014 'birds of a feather.'",why:["Opposites-attract is largely a myth; similarity predicts attraction.","Attraction requires interaction, not permanent strangeness.","Correct. Similarity (attitudes, values, background) is a strong, reliable predictor of attraction and relationship stability.","Large value differences tend to reduce, not increase, attraction."],takeaway:"Similarity predicts attraction (not 'opposites attract')."}
 ]},
{id:"ps-8c-attachment",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Social interactions",categoryCode:"8C",idea:"Attachment (Harlow & Ainsworth)",
 questions:[
  {tag:"Harlow's monkeys",stem:"Harlow's experiments with infant monkeys and wire vs. cloth 'mothers' demonstrated that attachment depends heavily on:",choices:["Only the source of food","Classical conditioning alone","Genetic imprinting only","Contact comfort, not just nourishment"],answer:3,rationale:"<b>Harlow</b>: infant monkeys chose the cloth 'mother' \u2014 attachment depends on contact comfort, not just food.",why:["Monkeys chose comfort over the food-providing wire mother.","Attachment wasn't reducible to food-based conditioning.","Harlow's work highlighted contact comfort, not imprinting.","Correct. Infant monkeys preferred the soft cloth 'mother' for comfort even when the wire 'mother' provided food \u2014 contact comfort drives attachment."],takeaway:"Harlow = contact comfort drives attachment (cloth > wire mother)."},
  {tag:"Secure attachment",stem:"An infant who explores freely when a caregiver is present, is distressed at separation, and is comforted on reunion shows ______ attachment.",choices:["Avoidant","Secure","Anxious-ambivalent","Disorganized"],answer:1,rationale:"<b>Secure attachment</b>: uses caregiver as a safe base; comforted on reunion.",why:["Avoidant infants show little distress and avoid the caregiver on reunion.","Correct. Secure attachment: the caregiver is a safe base; the child seeks and is soothed by them on reunion.","Anxious-ambivalent infants are highly distressed and hard to soothe.","Disorganized attachment shows confused, contradictory behavior."],takeaway:"Secure attachment = safe base, soothed on reunion."},
  {tag:"Insecure attachment styles",stem:"Ainsworth's Strange Situation identified insecure styles including avoidant and:",choices:["Secure","Authoritative","Anxious-ambivalent (resistant)","Assimilated"],answer:2,rationale:"Insecure attachment styles: <b>avoidant</b> and <b>anxious-ambivalent</b> (plus disorganized).",why:["Secure is the non-insecure category.","Authoritative is a parenting style, not an attachment style.","Correct. Insecure styles include avoidant and anxious-ambivalent (resistant); later work added disorganized.","'Assimilated' isn't an attachment style."],takeaway:"Insecure attachment = avoidant + anxious-ambivalent (+ disorganized)."}
 ]},
{id:"ps-8c-aggression-altruism",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Social interactions",categoryCode:"8C",idea:"Aggression & altruism",
 questions:[
  {tag:"Altruism",stem:"Helping others at a cost to oneself, with no expectation of personal reward, is:",choices:["Aggression","Egoism","Deindividuation","Altruism"],answer:3,rationale:"<b>Altruism</b> = helping others at a cost to yourself, without expecting reward.",why:["Aggression is behavior intended to harm.","Egoism is self-interested motivation, the opposite of altruism.","Deindividuation is loss of self-awareness in a group.","Correct. Altruism is selfless prosocial behavior benefiting others at a cost to the self."],takeaway:"Altruism = selfless helping at a cost to yourself."},
  {tag:"Kin selection",stem:"Helping close genetic relatives \u2014 which can promote the survival of shared genes \u2014 is explained by:",choices:["Reciprocal altruism","Kin selection (inclusive fitness)","The bystander effect","Social loafing"],answer:1,rationale:"<b>Kin selection</b>: helping relatives promotes shared genes (inclusive fitness).",why:["Reciprocal altruism involves helping non-kin who may repay later.","Correct. Kin selection: favoring relatives boosts inclusive fitness by aiding the survival of shared genes.","The bystander effect concerns helping in groups.","Social loafing is reduced effort in groups."],takeaway:"Kin selection = help relatives (shared genes / inclusive fitness)."},
  {tag:"Reciprocal altruism",stem:"Helping an unrelated individual with the implicit expectation that the favor may be returned later is:",choices:["Kin selection","Aggression","Reciprocal altruism","The mere exposure effect"],answer:2,rationale:"<b>Reciprocal altruism</b>: help non-kin who may return the favor later.",why:["Kin selection involves genetic relatives.","Aggression is intended harm.","Correct. Reciprocal altruism: helping non-kin who may reciprocate, benefiting both over time.","The mere exposure effect concerns familiarity and liking."],takeaway:"Reciprocal altruism = you scratch my back, I'll scratch yours (non-kin)."},
  {tag:"Aggression influences",stem:"Aggression is best understood as arising from:",choices:["Biological, psychological, and social factors interacting (e.g., amygdala, testosterone, frustration, learning)","Only a single 'aggression gene'","Only conscious choice with no biology","Only observational learning"],answer:0,rationale:"<b>Aggression</b> = biology (amygdala, testosterone) + situational (frustration) + learning, interacting.",why:["Correct. Aggression is multiply determined: neural (amygdala), hormonal (testosterone), situational (frustration), and learned (modeling).","No single gene determines aggression.","Biology (amygdala, hormones) clearly contributes.","Learning contributes, but so do biology and situational factors."],takeaway:"Aggression = biology + situation + learning (multiply determined)."}
 ]},
{id:"ps-8c-self-presentation",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Social interactions",categoryCode:"8C",idea:"Self-presentation, roles & discrimination",
 questions:[
  {tag:"Dramaturgical approach",stem:"Goffman's view that people manage social interaction like actors performing on a stage \u2014 with 'front stage' and 'back stage' behavior \u2014 is the:",choices:["Looking-glass self","Just-world hypothesis","Social exchange theory","Dramaturgical approach"],answer:3,rationale:"<b>Dramaturgical approach</b> (Goffman): social life as theater (front stage vs. back stage).",why:["The looking-glass self is Cooley's concept of self-image from others.","The just-world hypothesis concerns deserved outcomes.","Social exchange theory frames relationships as cost\u2013benefit trades.","Correct. The dramaturgical approach (Goffman) frames social life as theatrical performance with front- and back-stage regions."],takeaway:"Dramaturgy = life as a stage; front stage vs. back stage (Goffman)."},
  {tag:"Impression management",stem:"The process of consciously or unconsciously controlling how others perceive us is:",choices:["Deindividuation","Impression management","Cognitive dissonance","Reciprocal determinism"],answer:1,rationale:"<b>Impression management</b> = controlling how others perceive you (self-presentation).",why:["Deindividuation is loss of self-awareness in a group.","Correct. Impression management is the effort to shape the impressions others form of us (self-presentation).","Cognitive dissonance is attitude\u2013behavior inconsistency.","Reciprocal determinism is Bandura's interaction model."],takeaway:"Impression management = curate how others see you."},
  {tag:"Role strain vs. role conflict",stem:"Tension among the demands of a SINGLE role is ______; tension between the demands of TWO OR MORE different roles is ______.",choices:["Role conflict; role strain","Role exit; role set","Role strain; role conflict","Status inconsistency; role set"],answer:2,rationale:"<b>Role strain</b> = conflict WITHIN one role; <b>role conflict</b> = clash BETWEEN roles.",why:["Reversed \u2014 strain is within one role, conflict is between roles.","Role exit/role set are different concepts.","Correct. Role strain = conflicting demands within one role; role conflict = demands across different roles clash.","Status inconsistency is a different concept."],takeaway:"Role strain = within one role. Role conflict = between roles."},
  {tag:"Individual vs. institutional discrimination",stem:"Discrimination carried out by individuals is 'individual'; discrimination built into the policies and practices of organizations and society is:",choices:["Institutional discrimination","Personal prejudice","Ethnocentrism","Stereotype threat"],answer:0,rationale:"<b>Institutional discrimination</b> = unequal treatment built into institutional policies/practices.",why:["Correct. Institutional discrimination is embedded in the rules/practices of institutions, operating even without individual prejudice.","Personal prejudice is an individual attitude, not institutional practice.","Ethnocentrism is judging other cultures by one's own.","Stereotype threat is a performance-impairing phenomenon."],takeaway:"Institutional discrimination = baked into policies/systems (not just individuals)."}
 ]},
{id:"ps-8c-animal-behavior",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Social interactions",categoryCode:"8C",idea:"Animal behavior & inclusive fitness",
 questions:[
  {tag:"Inclusive fitness",stem:"An organism's total genetic contribution to future generations \u2014 including offspring AND the effect of aiding relatives \u2014 is:",choices:["Reproductive isolation","Genetic drift","Density dependence","Inclusive fitness"],answer:3,rationale:"<b>Inclusive fitness</b> = own offspring + effect on relatives' reproduction (drives kin selection).",why:["Reproductive isolation prevents interbreeding between species.","Genetic drift is random allele-frequency change.","Density dependence is a population-regulation concept.","Correct. Inclusive fitness counts an individual's own reproduction plus its effect on relatives' reproduction (basis of kin selection)."],takeaway:"Inclusive fitness = your genes via offspring + helping relatives reproduce."},
  {tag:"Foraging & communication",stem:"Behaviors like a bee's waggle dance signaling a food source illustrate that animal communication often functions to:",choices:["Serve no adaptive purpose","Convey information that benefits survival/reproduction (e.g., food location)","Occur only in humans","Reduce inclusive fitness"],answer:1,rationale:"Animal communication (e.g., the bee waggle dance) conveys adaptive information like food location.",why:["Such signaling is adaptive, not purposeless.","Correct. Animal communication (e.g., the honeybee waggle dance) transmits adaptive information such as food location.","Many animals communicate, not only humans.","Effective communication generally increases, not reduces, fitness."],takeaway:"Animal communication = adaptive signaling (e.g., bee waggle dance = food)."},
  {tag:"Game theory: altruism evolution",stem:"Evolutionary game theory (e.g., the prisoner's dilemma, tit-for-tat) helps explain how ______ can be stable even among self-interested individuals.",choices:["Only pure aggression","Random behavior","Cooperation","Reproductive isolation"],answer:2,rationale:"Evolutionary <b>game theory</b> explains how <b>cooperation</b> can be stable among self-interested agents (tit-for-tat).",why:["Game theory explains cooperation's stability, not just aggression.","It models strategic, not random, behavior.","Correct. Game theory shows cooperative strategies (like tit-for-tat) can be evolutionarily stable, explaining reciprocal altruism.","Reproductive isolation is a speciation concept, unrelated."],takeaway:"Game theory = how cooperation stays stable (tit-for-tat, prisoner's dilemma)."}
 ]},
{id:"ps-9a-sociological-theories",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Social structure",categoryCode:"9A",idea:"Sociological theories",
 questions:[
  {tag:"Functionalism",stem:"The macro-sociological perspective that views society as a system of interdependent parts each serving a function to maintain stability is:",choices:["Conflict theory","Symbolic interactionism","Functionalism (structural functionalism)","Rational choice theory"],answer:2,rationale:"<b>Functionalism</b>: society = interdependent parts working to maintain stability (Durkheim).",why:["Conflict theory emphasizes power struggles over resources, not consensus/stability.","Symbolic interactionism is micro-level, focused on meaning in interaction.","Correct. Functionalism (Durkheim) sees society as an integrated system whose parts contribute to overall stability and solidarity.","Rational choice theory models behavior as cost\u2013benefit calculation."],takeaway:"Functionalism = society's parts work together for stability."},
  {tag:"Conflict theory",stem:"The perspective (rooted in Marx) that focuses on power, inequality, and competition among groups over scarce resources is:",choices:["Conflict theory","Functionalism","Symbolic interactionism","Social exchange theory"],answer:0,rationale:"<b>Conflict theory</b> (Marx): society shaped by power struggles and inequality over resources.",why:["Correct. Conflict theory sees society as an arena of inequality and struggle between groups with competing interests.","Functionalism emphasizes consensus and stability, not struggle.","Symbolic interactionism is a micro perspective on meaning.","Exchange theory focuses on cost\u2013benefit in relationships."],takeaway:"Conflict theory = power struggles over resources (Marx)."},
  {tag:"Symbolic interactionism",stem:"The MICRO-level perspective focused on how people create and interpret shared meanings and symbols in everyday interaction is:",choices:["Functionalism","Conflict theory","Feminist theory","Symbolic interactionism"],answer:3,rationale:"<b>Symbolic interactionism</b> = micro-level meaning-making through symbols in interaction.",why:["Functionalism is a macro perspective on stability.","Conflict theory is a macro perspective on power.","Feminist theory analyzes gender-based inequality.","Correct. Symbolic interactionism (Mead, Blumer) is a micro perspective on meaning-making in face-to-face interaction."],takeaway:"Symbolic interactionism = micro; shared meanings/symbols in interaction."},
  {tag:"Social constructionism",stem:"The view that many social realities (e.g., money, race, gender roles) exist because people collectively agree to treat them as real is:",choices:["Functionalism","Social constructionism","Rational choice theory","Positivism"],answer:1,rationale:"<b>Social constructionism</b>: social realities exist through collective human agreement.",why:["Functionalism concerns the functions of social parts, not construction of meaning.","Correct. Social constructionism holds that social categories/institutions are created and maintained through shared human agreement.","Rational choice models individual cost\u2013benefit decisions.","Positivism is an epistemology emphasizing observable facts."],takeaway:"Social constructionism = society builds its 'realities' by agreement."},
  {tag:"Rational choice / exchange",stem:"The theory that individuals act to maximize benefits and minimize costs, and that relationships persist when rewards exceed costs, is:",choices:["Functionalism","Symbolic interactionism","Rational choice / social exchange theory","Feminist theory"],answer:2,rationale:"<b>Rational choice / exchange theory</b>: people maximize rewards and minimize costs.",why:["Functionalism is a macro stability perspective.","Symbolic interactionism focuses on meaning, not cost\u2013benefit.","Correct. Rational choice/exchange theory models behavior and relationships as cost\u2013benefit calculations.","Feminist theory analyzes gender inequality."],takeaway:"Rational choice/exchange = maximize rewards, minimize costs."}
 ]},
{id:"ps-9a-social-institutions",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Social structure",categoryCode:"9A",idea:"Social institutions",
 questions:[
  {tag:"Social institutions",stem:"Family, education, religion, government, and the economy are examples of:",choices:["Reference groups","Subcultures","Social institutions","Total institutions"],answer:2,rationale:"<b>Social institutions</b> = enduring structures (family, education, religion, government, economy) meeting society's needs.",why:["Reference groups are comparison standards, not society-wide structures.","A subculture is a group within a culture, not an institution.","Correct. Social institutions are enduring structures that organize and meet a society's basic needs.","A total institution is a specific controlling setting (e.g., prison)."],takeaway:"Social institutions = family, education, religion, government, economy."},
  {tag:"Medicalization",stem:"The process by which non-medical problems (e.g., shyness, aging) come to be defined and treated as medical conditions is:",choices:["Medicalization","Secularization","Assimilation","Urbanization"],answer:0,rationale:"<b>Medicalization</b> = defining/treating non-medical issues as medical conditions.",why:["Correct. Medicalization brings human conditions under medical definition and control (a key concept in health/medicine as an institution).","Secularization is the declining influence of religion.","Assimilation is adopting a dominant culture.","Urbanization is population shift to cities."],takeaway:"Medicalization = turning life problems into medical conditions."},
  {tag:"Hidden curriculum",stem:"Beyond academics, schools transmit norms, values, and social expectations (punctuality, obedience, competition) through the:",choices:["Formal syllabus only","Demographic transition","Looking-glass self","Hidden curriculum"],answer:3,rationale:"The <b>hidden curriculum</b> = implicit norms/values schools teach beyond academics.",why:["The formal syllabus is the explicit content, not the hidden lessons.","Demographic transition is a population model.","The looking-glass self concerns self-image formation.","Correct. The hidden curriculum is the implicit socialization schools provide alongside formal instruction."],takeaway:"Hidden curriculum = the unwritten social lessons of school."}
 ]},
{id:"ps-9a-culture",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Social structure",categoryCode:"9A",idea:"Culture",
 questions:[
  {tag:"Material vs. nonmaterial culture",stem:"Physical objects a society creates (tools, buildings, art) are ______ culture; its ideas, beliefs, values, and norms are ______ culture.",choices:["Nonmaterial; material","Folk; popular","Material; nonmaterial","Dominant; sub"],answer:2,rationale:"<b>Material culture</b> = physical objects; <b>nonmaterial culture</b> = beliefs, values, norms.",why:["Reversed \u2014 objects are material, ideas are nonmaterial.","Folk/popular is a different cultural distinction.","Correct. Material culture = physical artifacts; nonmaterial culture = intangible beliefs, values, and norms.","Dominant/sub describes culture prominence, not material vs. ideas."],takeaway:"Material culture = objects. Nonmaterial = ideas/beliefs/norms."},
  {tag:"Subculture vs. counterculture",stem:"A group with distinct values within a larger culture is a ______; one that actively OPPOSES the dominant culture's values is a ______.",choices:["Subculture; counterculture","Counterculture; subculture","In-group; out-group","Folkway; more"],answer:0,rationale:"<b>Subculture</b> = distinct within the mainstream; <b>counterculture</b> = opposes dominant values.",why:["Correct. A subculture differs from but coexists with the mainstream; a counterculture rejects/opposes dominant values.","Reversed \u2014 the opposing group is the counterculture.","In-group/out-group is about belonging, not cultural opposition.","Folkway/more are norm types."],takeaway:"Subculture = differs within; counterculture = opposes the mainstream."},
  {tag:"Culture shock vs. culture lag",stem:"Disorientation from encountering an unfamiliar culture is culture ______; the delay between a change in material culture (e.g., new tech) and society's adaptation is culture ______.",choices:["Lag; shock","Diffusion; assimilation","Relativism; ethnocentrism","Shock; lag"],answer:3,rationale:"<b>Culture shock</b> = disorientation in a new culture; <b>culture lag</b> = norms trailing tech change.",why:["Reversed \u2014 shock is the disorientation, lag is the delayed adaptation.","Diffusion/assimilation are different processes.","Relativism/ethnocentrism are cultural attitudes.","Correct. Culture shock = disorientation in a new culture; culture lag = nonmaterial culture lagging behind material/technological change."],takeaway:"Culture shock = disorientation abroad. Culture lag = norms lag behind tech."},
  {tag:"Cultural relativism",stem:"Understanding and evaluating another culture by ITS OWN standards, rather than one's own, is:",choices:["Ethnocentrism","Cultural relativism","Assimilation","Xenocentrism"],answer:1,rationale:"<b>Cultural relativism</b> = evaluate a culture by its own standards (opposite of ethnocentrism).",why:["Ethnocentrism judges others by one's own culture.","Correct. Cultural relativism judges a culture on its own terms \u2014 the opposite of ethnocentrism.","Assimilation is adopting a dominant culture.","Xenocentrism is preferring another culture over one's own."],takeaway:"Cultural relativism = judge a culture on its own terms."}
 ]},
{id:"ps-9a-organizations",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Social structure",categoryCode:"9A",idea:"Organizations, bureaucracy & scale",
 questions:[
  {tag:"Ideal bureaucracy",stem:"Max Weber's 'ideal bureaucracy' is characterized by hierarchy, division of labor, explicit rules, and:",choices:["Personal favoritism","Absence of any rules","Impersonality and merit-based hiring","Purely charismatic leadership"],answer:2,rationale:"Weber's <b>ideal bureaucracy</b>: hierarchy, division of labor, rules, impersonality, merit.",why:["Bureaucracy replaces favoritism with impersonal rules.","Explicit rules are a defining feature, not their absence.","Correct. Weber's ideal-type bureaucracy features hierarchy, specialization, formal rules, impersonality, and merit-based advancement.","Bureaucratic authority is rational-legal, not charismatic."],takeaway:"Ideal bureaucracy = hierarchy + rules + impersonality + merit (Weber)."},
  {tag:"McDonaldization",stem:"Ritzer's term for society adopting the efficiency, calculability, predictability, and control of fast-food restaurants is:",choices:["McDonaldization","Secularization","Globalization","Gentrification"],answer:0,rationale:"<b>McDonaldization</b> (Ritzer): efficiency, calculability, predictability, control spread through society.",why:["Correct. McDonaldization describes the spread of bureaucratic rationalization (efficiency, calculability, predictability, control) across institutions.","Secularization is the decline of religious influence.","Globalization is worldwide interconnection.","Gentrification is neighborhood change by wealthier residents."],takeaway:"McDonaldization = efficiency/calculability/predictability/control everywhere."},
  {tag:"Macro vs. micro sociology",stem:"Studying large-scale social structures and institutions is ______ sociology; studying small-scale, face-to-face interaction is ______ sociology.",choices:["Microsociology; macrosociology","Functionalism; conflict theory","Etic; emic","Macrosociology; microsociology"],answer:3,rationale:"<b>Macrosociology</b> = large structures; <b>microsociology</b> = face-to-face interaction.",why:["Reversed \u2014 macro is large-scale, micro is face-to-face.","Functionalism/conflict are theories, not the scale distinction.","Etic/emic are research-perspective terms.","Correct. Macrosociology examines broad structures; microsociology examines everyday interaction."],takeaway:"Macro = big structures. Micro = face-to-face interaction."}
 ]},
{id:"ps-9b-demographics",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Demographics",categoryCode:"9B",idea:"Demographic structure & processes",
 questions:[
  {tag:"Demographic transition",stem:"The model describing a society's shift from high birth AND death rates to low birth and death rates as it industrializes is the:",choices:["Malthusian catastrophe","Social reproduction","Demographic transition","Gentrification"],answer:2,rationale:"The <b>demographic transition</b>: high\u2192low birth and death rates as a society industrializes.",why:["The Malthusian view predicts population outstripping resources, a different idea.","Social reproduction is the passing of inequality across generations.","Correct. The demographic transition traces falling death rates then falling birth rates as societies industrialize.","Gentrification is neighborhood change by wealthier residents."],takeaway:"Demographic transition = high\u2192low birth/death rates with industrialization."},
  {tag:"Push vs. pull factors",stem:"In migration, conditions driving people to LEAVE an area (war, poverty) are ______ factors; conditions attracting them to a destination (jobs, safety) are ______ factors.",choices:["Push; pull","Pull; push","Fertility; mortality","Emigration; immigration"],answer:0,rationale:"<b>Push factors</b> drive people to leave; <b>pull factors</b> attract them to a destination.",why:["Correct. Push factors drive out-migration; pull factors attract in-migration.","Reversed \u2014 push drives leaving, pull attracts arriving.","Fertility/mortality are population rates, not migration factors.","Emigration/immigration are directions of migration, not the causal factors."],takeaway:"Push = reasons to leave. Pull = reasons to come."},
  {tag:"Sex vs. gender",stem:"In demography, ______ refers to biological/anatomical differences, while ______ refers to socially constructed roles and identities.",choices:["Gender; sex","Fertility; fecundity","Race; ethnicity","Sex; gender"],answer:3,rationale:"<b>Sex</b> = biological; <b>gender</b> = socially constructed roles/identity.",why:["Reversed \u2014 sex is biological, gender is social.","Fertility/fecundity are reproduction measures.","Race/ethnicity is a different distinction.","Correct. Sex is biological; gender is the socially constructed set of roles, behaviors, and identities."],takeaway:"Sex = biology. Gender = social roles/identity."},
  {tag:"Urbanization & globalization",stem:"The population shift from rural to urban areas is ______; the growing worldwide interconnection of economies and cultures is ______.",choices:["Globalization; urbanization","Urbanization; globalization","Gentrification; suburbanization","Assimilation; diffusion"],answer:1,rationale:"<b>Urbanization</b> = rural\u2192urban shift; <b>globalization</b> = worldwide interconnection.",why:["Reversed \u2014 urbanization is city growth, globalization is worldwide interconnection.","Correct. Urbanization is rural-to-urban migration/city growth; globalization is increasing worldwide interconnection.","Gentrification/suburbanization are narrower spatial processes.","Assimilation/diffusion are cultural processes."],takeaway:"Urbanization = move to cities. Globalization = worldwide interconnection."}
 ]},
{id:"ps-10a-poverty",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Social inequality",categoryCode:"10A",idea:"Poverty & social exclusion",
 questions:[
  {tag:"Absolute vs. relative poverty",stem:"Lacking the resources to meet basic survival needs (food, shelter) is ______ poverty; having far less than the typical standard of one's society is ______ poverty.",choices:["Relative; absolute","Absolute; relative","Structural; cyclical","Chronic; acute"],answer:1,rationale:"<b>Absolute poverty</b> = can't meet basic needs; <b>relative poverty</b> = far below the societal standard.",why:["Reversed \u2014 absolute is survival-level, relative is compared to others.","Correct. Absolute poverty is deprivation of basic necessities; relative poverty is disadvantage compared to the societal standard.","Structural/cyclical describe causes, not this definition pair.","Chronic/acute describe duration, not this pair."],takeaway:"Absolute poverty = survival deprivation. Relative poverty = below society's standard."},
  {tag:"Social reproduction",stem:"The process by which social inequality is transmitted across generations (e.g., through unequal schooling and inherited capital) is:",choices:["Social mobility","Meritocracy","Assimilation","Social reproduction"],answer:3,rationale:"<b>Social reproduction</b> = inequality passed down across generations (via schooling, capital).",why:["Social mobility is movement between social positions, not the transmission of inequality.","Meritocracy is the (often idealized) idea that position reflects merit.","Assimilation is adopting a dominant culture.","Correct. Social reproduction is how structures of inequality are passed from one generation to the next."],takeaway:"Social reproduction = inequality inherited across generations."},
  {tag:"Social exclusion",stem:"Being systematically shut out of full participation in society's economic, political, and social life is:",choices:["Social exclusion","Social facilitation","Upward mobility","Cultural relativism"],answer:0,rationale:"<b>Social exclusion</b> = systematic barring from full participation in society.",why:["Correct. Social exclusion is the systematic denial of resources and participation to certain groups.","Social facilitation is a performance effect, unrelated.","Upward mobility is rising in social position.","Cultural relativism is judging a culture on its own terms."],takeaway:"Social exclusion = shut out of society's economic/political/social life."},
  {tag:"Class vs. false consciousness",stem:"Marx's term for a group's awareness of its shared position and interests is ______; a group's mistaken beliefs that work against its own interests is ______.",choices:["False consciousness; class consciousness","Anomie; solidarity","Class consciousness; false consciousness","Stigma; prestige"],answer:2,rationale:"<b>Class consciousness</b> = awareness of shared class interests; <b>false consciousness</b> = beliefs against one's own interests (Marx).",why:["Reversed \u2014 class consciousness is accurate awareness, false consciousness is the mistaken beliefs.","Anomie/solidarity are Durkheimian concepts, not this Marxian pair.","Correct. Class consciousness = awareness of shared class interests; false consciousness = beliefs contrary to one's real interests.","Stigma/prestige are status concepts."],takeaway:"Class consciousness = aware of class interests. False consciousness = beliefs against them."}
 ]},
{id:"ps-10a-health-spatial",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Social inequality",categoryCode:"10A",idea:"Health & spatial inequality",
 questions:[
  {tag:"Health disparities",stem:"Systematic, avoidable differences in health outcomes linked to social disadvantage (race, class, geography) are:",choices:["Random individual variation","Health disparities","The demographic transition","The hidden curriculum"],answer:1,rationale:"<b>Health disparities</b> = systematic, avoidable health differences tied to social disadvantage.",why:["They are systematic and socially patterned, not random.","Correct. Health disparities are preventable differences in health that track with social and economic disadvantage.","The demographic transition is a population model.","The hidden curriculum concerns implicit school socialization."],takeaway:"Health disparities = unfair, patterned health gaps by social group."},
  {tag:"Residential segregation",stem:"The physical separation of groups (often by race or income) into different neighborhoods, concentrating disadvantage, is:",choices:["Gentrification","Suburban sprawl","Globalization","Residential segregation"],answer:3,rationale:"<b>Residential segregation</b> = groups separated into different neighborhoods, concentrating (dis)advantage.",why:["Gentrification is the influx of wealthier residents into a lower-income area.","Suburban sprawl is low-density outward city growth.","Globalization is worldwide interconnection.","Correct. Residential segregation clusters groups into separate areas, concentrating advantage or disadvantage (a form of spatial inequality)."],takeaway:"Residential segregation = separated neighborhoods concentrate disadvantage."},
  {tag:"Environmental justice",stem:"The principle that no group should bear a disproportionate share of environmental hazards (pollution, toxic sites) is:",choices:["Environmental justice","Cultural relativism","Medicalization","Social facilitation"],answer:0,rationale:"<b>Environmental justice</b> = fair distribution of environmental hazards across groups.",why:["Correct. Environmental justice addresses the unequal distribution of environmental harms across social groups.","Cultural relativism concerns evaluating cultures on their own terms.","Medicalization is defining problems as medical.","Social facilitation is a performance effect."],takeaway:"Environmental justice = no group bears unfair environmental harm."},
  {tag:"Social gradient in health",stem:"Epidemiology consistently finds a 'social gradient': as socioeconomic status rises, health tends to:",choices:["Worsen as status rises","Stay identical at all levels","Improve steadily across the whole SES range","Depend only on genetics"],answer:2,rationale:"The <b>social gradient</b>: health improves stepwise as SES rises (at every level).",why:["Health improves, not worsens, with higher SES.","Health varies by SES; it isn't identical across levels.","Correct. The social gradient: health improves stepwise with rising SES \u2014 not just poor vs. rich, but at every level.","Social factors, not genetics alone, drive the gradient."],takeaway:"Social gradient = higher SES \u2192 better health, all the way up."}
 ]},
{id:"ps-10a-intersectionality-global",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Social inequality",categoryCode:"10A",idea:"Intersectionality & global inequality",
 questions:[
  {tag:"Intersectionality",stem:"The framework (Crenshaw) recognizing that overlapping identities (race, gender, class) combine to create UNIQUE, compounded experiences of disadvantage is:",choices:["Assimilation","Intersectionality","Meritocracy","The just-world hypothesis"],answer:1,rationale:"<b>Intersectionality</b> (Crenshaw): overlapping identities combine into unique, compounded (dis)advantage.",why:["Assimilation is adopting a dominant culture.","Correct. Intersectionality analyzes how multiple social identities intersect to shape compounded, distinctive experiences of privilege or oppression.","Meritocracy is the idea that position reflects merit.","The just-world hypothesis is the belief that people get what they deserve."],takeaway:"Intersectionality = overlapping identities compound disadvantage."},
  {tag:"Global inequality",stem:"The uneven distribution of resources and opportunity BETWEEN nations \u2014 not just within them \u2014 is:",choices:["Structural mobility","Culture lag","Deindividuation","Global inequality"],answer:3,rationale:"<b>Global inequality</b> = uneven resources/opportunity between nations.",why:["Structural mobility is society-wide position change from economic shifts.","Culture lag is norms trailing technological change.","Deindividuation is loss of self-awareness in groups.","Correct. Global inequality concerns disparities in wealth, power, and well-being across countries."],takeaway:"Global inequality = disparities between countries."},
  {tag:"World-systems: core vs. periphery",stem:"Wallerstein's world-systems theory divides the global economy into wealthy, dominant ______ nations and exploited, resource-supplying ______ nations.",choices:["Core; periphery","Periphery; core","Urban; rural","Push; pull"],answer:0,rationale:"World-systems (Wallerstein): wealthy <b>core</b> nations dominate; <b>peripheral</b> nations supply cheap labor/resources.",why:["Correct. World-systems theory: core nations dominate and profit; peripheral nations supply cheap labor/resources (semi-periphery is intermediate).","Reversed \u2014 core nations are the wealthy dominant ones.","Urban/rural is a within-country distinction, not the world-systems pair.","Push/pull are migration factors."],takeaway:"World-systems: core = wealthy/dominant, periphery = exploited/supplying."}
 ]},
{id:"ps-rm-study-design",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Research methods",categoryCode:"RM",idea:"Research methods & study design",
 questions:[
  {tag:"Experimental vs. observational",stem:"The key feature that makes a study EXPERIMENTAL \u2014 and allows causal conclusions \u2014 is that the researcher:",choices:["Only observes variables without manipulating them","Surveys a large sample","Manipulates an independent variable and uses random assignment","Measures two variables' correlation"],answer:2,rationale:"<b>Experiments</b> manipulate an IV + use random assignment \u2192 can infer causation. Observational studies only measure.",why:["That describes an observational study, which can't establish causation.","Sample size alone doesn't make a study experimental.","Correct. An experiment manipulates the IV and randomly assigns subjects to conditions, supporting causal inference. Observational studies only measure what already exists.","Measuring a correlation is observational, not experimental."],takeaway:"Experiment = manipulate IV + random assignment \u2192 causation. Observational = just measure."},
  {tag:"Independent vs. dependent variable",stem:"In an experiment testing whether sleep affects test scores, the amount of sleep (manipulated) is the ______ variable and the test score (measured) is the ______ variable.",choices:["Independent; dependent","Dependent; independent","Confounding; control","Continuous; discrete"],answer:0,rationale:"<b>IV</b> = manipulated (cause); <b>DV</b> = measured (effect).",why:["Correct. The independent variable is manipulated (the presumed cause); the dependent variable is measured (the presumed effect).","Reversed \u2014 the manipulated variable is independent, the measured one is dependent.","Confounding/control describe other variable roles, not the manipulated/measured pair.","Continuous/discrete describe data types, not IV/DV roles."],takeaway:"IV = manipulated (cause). DV = measured (effect)."},
  {tag:"Confounding variable",stem:"An extraneous variable that is related to BOTH the independent and dependent variables \u2014 offering an alternative explanation for the results \u2014 is a:",choices:["Dependent variable","Operational definition","Placebo","Confounding variable"],answer:3,rationale:"A <b>confounding variable</b> is tied to both IV and DV, giving an alternative explanation for results.",why:["The dependent variable is the measured outcome, not an alternative explanation.","An operational definition specifies how a variable is measured.","A placebo is an inert treatment used as a control.","Correct. A confound is linked to both the IV and DV and can create a spurious apparent relationship; controlling confounds is essential for valid causal claims."],takeaway:"Confound = 3rd variable tied to both IV and DV (alternative explanation)."},
  {tag:"Random assignment vs. random sampling",stem:"Randomly placing participants into experimental groups supports ______; randomly selecting participants from a population supports ______.",choices:["Generalizability; causal inference","Internal validity (causal inference); external validity (generalizability)","Reliability; validity","Both the same thing"],answer:1,rationale:"Random <b>assignment</b> \u2192 internal validity (causation); random <b>sampling</b> \u2192 external validity (generalizability).",why:["Reversed \u2014 assignment aids causation, sampling aids generalizability.","Correct. Random ASSIGNMENT balances groups (internal validity/causation); random SAMPLING makes the sample representative (external validity/generalizability).","These concern validity types, not the reliability/validity distinction directly.","They are distinct procedures serving different goals."],takeaway:"Assignment = causal validity. Sampling = generalizability."},
  {tag:"Reliability vs. validity",stem:"A measure that yields consistent results on repeated use is ______; a measure that actually captures what it intends to measure is ______.",choices:["Valid; reliable","Random; systematic","Reliable; valid","Descriptive; inferential"],answer:2,rationale:"<b>Reliability</b> = consistent results; <b>validity</b> = measures what it's supposed to. Reliable \u2260 valid.",why:["Reversed \u2014 consistency is reliability, accuracy is validity.","Random/systematic describe error/bias types, not this pair.","Correct. Reliability = consistency/repeatability; validity = accuracy (measuring the intended construct). A measure can be reliable but not valid.","Descriptive/inferential describe statistics types."],takeaway:"Reliable = consistent. Valid = accurate. (Can be reliable but not valid.)"},
  {tag:"Correlation vs. causation",stem:"A correlational study finds ice-cream sales and drowning rise together. The best conclusion is:",choices:["They are associated, but a third variable (e.g., hot weather) may cause both","Ice cream causes drowning","Drowning causes ice-cream sales","There is definitely no relationship"],answer:0,rationale:"<b>Correlation \u2260 causation</b>: a third variable (confound) or reverse direction can explain an association.",why:["Correct. Correlation does not imply causation; a confound (summer heat) can drive both. Directionality and third variables remain possible.","Correlation alone can't establish that one causes the other.","Reverse causation is equally unsupported by correlation alone.","A real association exists; it's just not necessarily causal."],takeaway:"Correlation \u2260 causation (watch for confounds / reverse direction)."},
  {tag:"Selection & response bias",stem:"A survey advertised only on a fitness website over-samples health-conscious people. This threat to a study's validity is a form of:",choices:["Random error","The placebo effect","Regression to the mean","Sampling (selection) bias"],answer:3,rationale:"<b>Selection/sampling bias</b> = a non-representative sample threatens generalizability.",why:["Random error is unsystematic noise, not this systematic skew.","The placebo effect is improvement from expectation, not a sampling issue.","Regression to the mean is a statistical artifact of extreme scores, not sampling bias.","Correct. Selection/sampling bias occurs when the sample isn't representative of the target population, threatening generalizability."],takeaway:"Selection bias = unrepresentative sample (hurts generalizability)."}
 ]},
{id:"ps-rm-statistics",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Research methods",categoryCode:"RM",idea:"Statistics & data interpretation",
 questions:[
  {tag:"Mean, median, mode",stem:"In a right-skewed income distribution with a few very high earners, the measure of central tendency pulled MOST toward the high values is the:",choices:["Median","Mode","Mean","Range"],answer:2,rationale:"The <b>mean</b> is pulled toward outliers; in a right skew, mean > median > mode.",why:["The median resists outliers, staying closer to the bulk of the data.","The mode is the most frequent value, unaffected by extreme values.","Correct. The mean is sensitive to outliers, so a right (positive) skew pulls the mean above the median. The median is more robust.","The range is a measure of spread, not central tendency."],takeaway:"Right skew: mean > median > mode (mean chases the outliers)."},
  {tag:"Skew direction",stem:"A distribution with a long tail extending to the RIGHT (toward high values) is described as:",choices:["Positively (right) skewed","Negatively (left) skewed","Perfectly normal","Bimodal by definition"],answer:0,rationale:"<b>Positive/right skew</b> = long tail toward high values (mean pulled up).",why:["Correct. A right/positive skew has its tail toward high values (mean > median). Skew is named for the direction of the tail.","A left/negative skew has the tail toward low values.","A normal distribution is symmetric with no skew.","A right tail doesn't make a distribution bimodal."],takeaway:"Right skew = tail points right (high values); mean > median."},
  {tag:"Standard deviation",stem:"Standard deviation is a measure of:",choices:["The central value of the data","The most frequent score","The correlation between two variables","The spread/variability of scores around the mean"],answer:3,rationale:"<b>Standard deviation</b> = spread of scores around the mean (dispersion).",why:["The central value is captured by the mean/median, not the SD.","The most frequent score is the mode.","Correlation between variables is a separate statistic (r).","Correct. Standard deviation quantifies how dispersed scores are around the mean (larger SD = more spread)."],takeaway:"SD = how spread out scores are around the mean."},
