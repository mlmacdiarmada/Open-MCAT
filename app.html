  {tag:"Fasciculations",stem:"The small, involuntary muscle twitches seen with lower motor neuron damage are called:",choices:["Fibrillations of the retina","Fasciculations","Saccades","Tonic-clonic seizures"],answer:1,rationale:"<b>Fasciculations</b> = involuntary skeletal-muscle twitches \u2014 a hallmark lower-motor-neuron sign.",why:["Retinal fibrillations aren't a thing; fasciculations are muscle twitches.","Correct. Fasciculations are visible involuntary twitches of skeletal muscle, a hallmark LMN sign.","Saccades are rapid eye movements, not muscle twitches from LMN damage.","Tonic-clonic seizures are a generalized seizure type, not LMN twitches."],takeaway:"Fasciculations = involuntary muscle twitches (LMN sign)."}
 ]},
{id:"ps-6a-tactile-receptors",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Somatosensation",categoryCode:"6A",idea:"Tactile mechanoreceptors",
 questions:[
  {tag:"Meissner's corpuscle",stem:"The fast-adapting mechanoreceptor in the superficial skin that detects light touch and flutter with a small receptive field is the:",choices:["Pacinian corpuscle","Meissner's corpuscle","Ruffini ending","Merkel disc"],answer:1,rationale:"<b>Meissner's corpuscle</b> = fast-adapting, superficial, light touch/flutter, small receptive field.",why:["Pacinian corpuscles are deep, fast-adapting receptors for vibration, with large receptive fields.","Correct. Meissner's corpuscles are fast-adapting, superficial receptors for light touch/flutter with small receptive fields (fine spatial detail, velocity).","Ruffini endings are slow-adapting stretch receptors.","Merkel discs are slow-adapting fine-touch/pressure receptors."],takeaway:"Meissner = fast-adapting, light touch/flutter, small field (superficial)."},
  {tag:"Merkel disc",stem:"The slow-adapting mechanoreceptor that senses sustained fine touch, pressure, and edges/detail with a small receptive field is the:",choices:["Pacinian corpuscle","Meissner's corpuscle","Ruffini ending","Merkel disc (cell)"],answer:3,rationale:"<b>Merkel disc</b> = slow-adapting, sustained fine touch/pressure, small receptive field (detail).",why:["Pacinian corpuscles are fast-adapting vibration receptors.","Meissner's corpuscles are fast-adapting flutter receptors.","Ruffini endings sense skin stretch (slow-adapting, large field).","Correct. Merkel discs are slow-adapting receptors for sustained fine touch/pressure and fine spatial detail."],takeaway:"Merkel = slow-adapting, fine touch/pressure/detail (sustained)."},
  {tag:"Pacinian corpuscle",stem:"The deep, fast-adapting mechanoreceptor that detects vibration and deep pressure (responding to acceleration) with a large receptive field is the:",choices:["Pacinian corpuscle","Merkel disc","Meissner's corpuscle","Ruffini ending"],answer:0,rationale:"<b>Pacinian corpuscle</b> = deep, fast-adapting, vibration/deep pressure, large field. Mnemonic: 'Phone vibrates.'",why:["Correct. Pacinian corpuscles are deep, fast-adapting receptors for vibration/deep pressure with large receptive fields (mnemonic: Pacinian = Phone vibrates).","Merkel discs are slow-adapting fine-touch receptors.","Meissner's corpuscles are superficial flutter receptors with small fields.","Ruffini endings are slow-adapting stretch receptors."],takeaway:"Pacinian = deep, fast-adapting, vibration (Phone vibrates)."},
  {tag:"Ruffini ending",stem:"The slow-adapting mechanoreceptor in the deeper dermis that detects skin stretch, with a large receptive field, is the:",choices:["Meissner's corpuscle","Pacinian corpuscle","Ruffini ending","Merkel disc"],answer:2,rationale:"<b>Ruffini ending</b> = slow-adapting, skin stretch, large field. Mnemonic: Ruffini = stRetch.",why:["Meissner's corpuscles sense flutter (fast-adapting, small field).","Pacinian corpuscles sense vibration (fast-adapting).","Correct. Ruffini endings are slow-adapting receptors for skin stretch (mnemonic: Ruffini = stRetch), with large receptive fields.","Merkel discs sense fine touch/pressure, not stretch."],takeaway:"Ruffini = slow-adapting, skin stRetch, large field."},
  {tag:"Fast- vs. slow-adapting",stem:"Sorted by adaptation, which pairing is correct?",choices:["Fast-adapting: Merkel & Ruffini; slow-adapting: Meissner & Pacinian","Fast-adapting: Meissner & Pacinian (detect change/vibration); slow-adapting: Merkel & Ruffini (detect sustained pressure/stretch)","All four are fast-adapting","All four are slow-adapting"],answer:1,rationale:"Fast-adapting = <b>Meissner + Pacinian</b> (change/vibration); slow-adapting = <b>Merkel + Ruffini</b> (sustained pressure/stretch).",why:["Reversed \u2014 Merkel and Ruffini are the slow-adapting pair.","Correct. Fast-adapting (Meissner, Pacinian) signal change and vibration; slow-adapting (Merkel, Ruffini) signal sustained pressure and stretch.","Merkel and Ruffini are slow-adapting, not fast.","Meissner and Pacinian are fast-adapting, not slow."],takeaway:"Fast-adapting: Meissner + Pacinian. Slow-adapting: Merkel + Ruffini."},
  {tag:"Receptor classes",stem:"Mechanoreceptors sense pressure/vibration/touch, nociceptors sense pain, and thermoreceptors sense temperature. Which stimulus\u2013receptor pairing is correct?",choices:["Chemoreceptors sense light","Mechanoreceptors sense temperature","Nociceptors sense sound waves","Photoreceptors sense light (visible wavelengths)"],answer:3,rationale:"Receptor classes: <b>mechano</b> (touch/pressure/vibration), <b>noci</b> (pain), <b>thermo</b> (temperature), <b>photo</b> (light), <b>chemo</b> (chemicals).",why:["Chemoreceptors detect chemicals, not light.","Mechanoreceptors detect pressure/touch; thermoreceptors detect temperature.","Nociceptors detect pain/noxious stimuli, not sound.","Correct. Photoreceptors (rods/cones) detect light. Mechanoreceptors = pressure/touch/vibration; nociceptors = pain; thermoreceptors = temperature; chemoreceptors = chemicals (taste/smell, blood pH/CO\u2082)."],takeaway:"Mechano=touch, noci=pain, thermo=temp, photo=light, chemo=chemicals."}
 ]},
{id:"ps-6a-stretch-reflex",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Nervous system",categoryCode:"6A",idea:"The muscle stretch reflex & autonomic pathways",
 questions:[
  {tag:"Two parts of a reflex",stem:"Every reflex has two parts: an afferent limb and an efferent limb. These carry, respectively:",choices:["The motor response and the sensory stimulus","Two sensory signals","The sensory stimulus (afferent) and the motor response (efferent)","Two motor signals"],answer:2,rationale:"A reflex = <b>afferent</b> (sensory stimulus in) + <b>efferent</b> (motor response out).",why:["Reversed \u2014 afferent is sensory (in), efferent is motor (out).","A reflex arc has one sensory and one motor limb, not two sensory.","Correct. The afferent limb carries the sensory stimulus into the CNS; the efferent limb carries the motor response back out.","It has one sensory and one motor limb, not two motor."],takeaway:"Reflex = afferent (stimulus in) + efferent (response out)."},
  {tag:"Muscle stretch reflex",stem:"The knee-jerk reflex \u2014 a muscle contracting after it's stretched, as a protective response \u2014 is the:",choices:["Muscle stretch reflex (monosynaptic, ipsilateral)","Withdrawal reflex","Corneal reflex","Startle reflex"],answer:0,rationale:"The <b>muscle stretch reflex</b> (knee-jerk) is ipsilateral and monosynaptic \u2014 a stretched muscle contracts protectively.",why:["Correct. The muscle stretch (myotatic) reflex causes a stretched muscle to contract; afferent and efferent limbs are on the SAME side (ipsilateral), and it's monosynaptic.","The withdrawal reflex pulls a limb away from a painful stimulus, a different reflex.","The corneal reflex is the blink to eye stimulation.","The startle reflex is a whole-body response to a sudden stimulus."],takeaway:"Muscle stretch reflex = stretched muscle contracts (ipsilateral, monosynaptic)."},
  {tag:"Muscle spindles",stem:"The sensory receptors within a muscle that detect stretch and initiate the stretch reflex are the:",choices:["Pacinian corpuscles","Merkel discs","Cochlear hair cells","Muscle spindles"],answer:3,rationale:"<b>Muscle spindles</b> detect stretch and send afferent signals that trigger the stretch reflex.",why:["Pacinian corpuscles are skin vibration receptors, not muscle stretch sensors.","Merkel discs sense fine touch in skin, not muscle stretch.","Cochlear hair cells are for hearing.","Correct. Muscle spindles are the stretch-sensing proprioceptors whose afferent (somatosensory) neurons trigger the reflex."],takeaway:"Muscle spindles = stretch sensors that trigger the reflex."},
  {tag:"Reciprocal inhibition",stem:"For the stretch reflex to work, when the stretched muscle is excited to contract, the opposing (antagonist) muscle on the other side is:",choices:["Also strongly contracted","Inhibited (reciprocal inhibition)","Completely destroyed","Unaffected"],answer:1,rationale:"<b>Reciprocal inhibition</b>: the antagonist muscle is inhibited while the agonist contracts \u2014 required for the reflex to move the limb.",why:["If the antagonist also contracted, the limb couldn't move \u2014 it must be inhibited.","Correct. Reciprocal inhibition: the antagonist muscle is inhibited so the reflex movement isn't opposed \u2014 necessary for the reflex to occur.","The antagonist is inhibited, not destroyed.","It must be actively inhibited, not left unaffected."],takeaway:"Reciprocal inhibition = antagonist muscle inhibited so the reflex can move the limb."},
  {tag:"Sympathetic axon chain",stem:"In the autonomic nervous system, the sympathetic (fight-or-flight) division has a characteristic ganglionic pattern of:",choices:["A long preganglionic then a short postganglionic axon","A single axon straight to the target","A short preganglionic axon (ganglia near the spine) then a long postganglionic axon","No ganglia at all"],answer:2,rationale:"<b>Sympathetic</b> = short preganglionic (ganglia near spine) \u2192 long postganglionic. <b>Parasympathetic</b> = long then short.",why:["That's the parasympathetic pattern (long then short).","The autonomic pathway is a two-neuron chain with a ganglion, not one axon.","Correct. Sympathetic: SHORT preganglionic (ganglia sit close to the spinal cord) \u2192 LONG postganglionic to the target. Parasympathetic is the reverse.","There is a ganglionic synapse; both divisions have ganglia."],takeaway:"Sympathetic = short-then-long. Parasympathetic = long-then-short."},
  {tag:"Autonomic origins",stem:"The sympathetic division originates from the middle of the spinal cord (thoracolumbar), while the parasympathetic division originates from:",choices:["The brainstem and the bottom of the spinal cord (craniosacral)","The middle of the spinal cord as well","The cerebellum","The skin's free nerve endings"],answer:0,rationale:"Sympathetic = <b>thoracolumbar</b> (middle cord); parasympathetic = <b>craniosacral</b> (brainstem + sacral cord).",why:["Correct. Sympathetic = thoracolumbar (middle); parasympathetic = craniosacral (brainstem + sacral cord).","That's the sympathetic origin; parasympathetic is craniosacral.","The cerebellum coordinates movement, not autonomic outflow origin.","Free nerve endings are sensory receptors, not autonomic origins."],takeaway:"Sympathetic = thoracolumbar (middle). Parasympathetic = craniosacral (brainstem + sacral)."}
 ]},
{id:"ps-6a-gray-white-tracts",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Nervous system",categoryCode:"6A",idea:"Gray/white matter & somatosensory tracts",
 questions:[
  {tag:"Gray vs. white matter",stem:"In the CNS, gray matter and white matter are distinguished by their contents:",choices:["Gray matter = myelinated axons; white matter = somas","Both contain only axons","Gray matter = neuron cell bodies (somas); white matter = myelinated axons","Both contain only cell bodies"],answer:2,rationale:"<b>Gray matter</b> = neuron cell bodies; <b>white matter</b> = myelinated axons (myelin = white).",why:["Reversed \u2014 gray = somas, white = myelinated axons.","Gray matter contains cell bodies, not only axons.","Correct. Gray matter holds most neuron somas; white matter is made of myelinated axon tracts (myelin gives the white color).","White matter is axons, not cell bodies."],takeaway:"Gray matter = somas. White matter = myelinated axons."},
  {tag:"Cord vs. brain organization",stem:"The arrangement of gray and white matter differs between the spinal cord and the brain:",choices:["In the spinal cord gray is inside and white outside; in the brain white is inside and gray (cortex) outside","Both have gray outside and white inside","Both have gray inside and white outside","The brain has no gray matter"],answer:0,rationale:"Spinal cord: <b>gray inside, white outside</b>. Brain: <b>white inside, gray (cortex) outside</b>.",why:["Correct. Spinal cord: gray inside (butterfly), white outside. Brain: gray outside (cortex), white inside (tracts).","The spinal cord has gray INSIDE, not outside.","The brain has gray OUTSIDE (cortex), not inside.","The brain's cortex is gray matter."],takeaway:"Cord: gray in / white out. Brain: white in / gray out."},
  {tag:"Two somatosensory tract categories",stem:"Somatosensory information travels in two broad tract categories. One carries position sense, vibration, and fine touch; the other carries:",choices:["Only vision and hearing","Only motor commands","Only autonomic signals","Pain, temperature, and gross (less precise) touch"],answer:3,rationale:"Somatosensory tracts: (1) position/vibration/fine touch and (2) <b>pain/temperature/gross touch</b>.",why:["Vision and hearing aren't somatosensory tracts.","These are sensory tracts, not motor.","These carry somatosensation, not autonomic outflow.","Correct. The two categories are (1) fine touch/vibration/proprioception and (2) pain/temperature/crude touch."],takeaway:"Somatosensory tracts: fine touch/vibration/proprioception vs. pain/temp/gross touch."},
  {tag:"Decussation & contralateral",stem:"Somatosensory pathways cross to the opposite side of the body (decussate). A key consequence is that:",choices:["Each side of the brain serves the same side of the body","Injury to one side of the brain often impairs sensation on the opposite side of the body","Sensation never reaches the brain","Both sides of the brain serve only the left side"],answer:1,rationale:"Somatosensory pathways <b>decussate</b> (cross) \u2192 one hemisphere represents the opposite side of the body (contralateral).",why:["Sensory/motor representation is contralateral, not ipsilateral, due to crossing.","Correct. Because the pathways cross (decussate), one side of the brain represents the opposite side of the body \u2014 so a lesion affects the contralateral side.","Sensation does reach the brain via these tracts.","Each hemisphere serves the contralateral side, not both to one side."],takeaway:"Sensory tracts cross \u2192 brain represents the opposite side of the body (contralateral)."},
  {tag:"Fine-touch tract",stem:"Which sensations are carried by the dorsal-column (position/vibration/fine-touch) pathway?",choices:["Pain and temperature","Crude, poorly localized touch","Proprioception (position sense), vibration, and fine discriminative touch","Hearing and balance"],answer:2,rationale:"The <b>dorsal-column</b> pathway = fine touch + vibration + proprioception. Pain/temperature = the spinothalamic pathway.",why:["Pain and temperature travel in the spinothalamic (not dorsal-column) pathway.","Crude touch travels with pain/temperature, not the fine-touch pathway.","Correct. The dorsal-column pathway carries fine touch, vibration, and proprioception; pain/temperature travel in the separate spinothalamic pathway.","Hearing and balance are separate senses, not somatosensory tracts."],takeaway:"Dorsal column = fine touch, vibration, proprioception. Spinothalamic = pain, temperature."}
 ]},
{id:"ps-6a-upper-motor-neurons",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Nervous system",categoryCode:"6A",idea:"Upper motor neurons & UMN signs",
 questions:[
  {tag:"Upper motor neuron",stem:"An upper motor neuron (UMN) is a neuron that:",choices:["Synapses directly on skeletal muscle at the neuromuscular junction","Carries sensory information from skin to brain","Originates in the cerebral cortex and synapses on lower motor neurons in the brainstem or spinal cord","Regulates hormone release from the pituitary"],answer:2,rationale:"<b>Upper motor neurons</b> start in the cerebral cortex and command lower motor neurons; LMNs then drive the muscle.",why:["That's a LOWER motor neuron \u2014 the LMN contacts muscle at the NMJ.","That describes an afferent (sensory) neuron.","Correct. UMNs live in the cerebral cortex and control LMNs (in the brainstem/cord); the LMNs are the ones that contact muscle directly.","That describes hypothalamic/pituitary control, not a UMN."],takeaway:"UMN = cortex \u2192 controls LMNs (which drive muscle). UMN controls LMN."},
  {tag:"Corticospinal tract",stem:"The collection of upper-motor-neuron axons that travels from the cortex down to lower motor neurons in the spinal cord is the:",choices:["Corticospinal tract","Corticobulbar tract","Dorsal column","Spinothalamic tract"],answer:0,rationale:"<b>Corticospinal tract</b> = UMN axons to the spinal cord. <b>Corticobulbar tract</b> = UMN axons to the brainstem.",why:["Correct. The corticospinal tract carries UMN axons to the spinal cord (most decussate at the medulla). The corticobulbar tract instead goes to the brainstem.","The corticobulbar tract goes to the brainstem, not the spinal cord.","The dorsal column is a sensory (fine-touch) pathway.","The spinothalamic tract is a sensory (pain/temp) pathway."],takeaway:"Corticospinal = UMN \u2192 spinal cord. Corticobulbar = UMN \u2192 brainstem."},
  {tag:"UMN vs. LMN signs",stem:"Damage to an UPPER motor neuron produces which pattern of signs?",choices:["Atrophy, fasciculations, hypotonia, and hyporeflexia","No motor changes","Loss of sensation only","Hyperreflexia, clonus, hypertonia, and an extensor plantar (Babinski) response"],answer:3,rationale:"<b>UMN signs</b> = 'up': hyperreflexia, clonus, hypertonia, Babinski. <b>LMN signs</b> = 'down': atrophy, fasciculations, hypotonia, hyporeflexia.",why:["Those are LOWER motor neuron signs \u2014 the opposite pattern.","UMN damage clearly produces motor signs.","UMN lesions cause motor, not purely sensory, deficits.","Correct. UMN lesions cause 'up' signs: hyperreflexia, clonus, hypertonia/spasticity, and a Babinski (extensor plantar) response. LMN lesions cause the 'down' signs (atrophy, fasciculations, hypotonia, hyporeflexia)."],takeaway:"UMN = up (hyperreflexia, clonus, hypertonia, Babinski). LMN = down (atrophy, fasciculations, hypotonia, hyporeflexia)."},
  {tag:"Clonus",stem:"Rhythmic, involuntary contractions (e.g., the foot beating up and down when the ankle is dorsiflexed) \u2014 an upper-motor-neuron sign driven by hyperreflexia \u2014 are called:",choices:["Fasciculations","Clonus","Tremor at rest","Ataxia"],answer:1,rationale:"<b>Clonus</b> = rhythmic involuntary contractions from hyperreflexia \u2014 an UMN sign.",why:["Fasciculations are small twitches seen in LOWER motor neuron damage.","Correct. Clonus is rhythmic involuntary contraction from an exaggerated stretch reflex (hyperreflexia), a UMN sign.","A resting tremor is characteristic of Parkinson's (basal ganglia), not clonus.","Ataxia is uncoordinated movement, often cerebellar, not clonus."],takeaway:"Clonus = rhythmic contractions from hyperreflexia (UMN sign)."},
  {tag:"Babinski / extensor plantar",stem:"When the sole of the foot is scraped, the normal adult response is toe flexion (curling down). An extensor response \u2014 the big toe going UP \u2014 (the Babinski sign) indicates:",choices:["A completely normal adult reflex","Lower motor neuron damage specifically","Upper motor neuron damage","A sensory nerve problem only"],answer:2,rationale:"An <b>extensor plantar (Babinski) response</b> in an adult = <b>upper motor neuron</b> damage (normal response is toe flexion).",why:["Toe flexion is the normal adult response; extension is abnormal.","The Babinski sign points to UMN, not specifically LMN, damage.","Correct. An extensor plantar (Babinski) response is abnormal in adults and signals UMN pathology (it's normal only in infants).","It reflects motor-pathway (UMN) damage, not a purely sensory issue."],takeaway:"Babinski (toe up) in an adult = UMN damage. Normal adult = toes flex down."},
  {tag:"Hypertonia",stem:"Increased skeletal-muscle tone and resistance to stretch \u2014 an upper-motor-neuron sign \u2014 is called:",choices:["Hypertonia","Hypotonia","Anhedonia","Hyporeflexia"],answer:0,rationale:"<b>Hypertonia</b> (increased tone/spasticity) = UMN sign. Hypotonia (decreased tone) = LMN sign.",why:["Correct. Hypertonia (increased tone/spasticity) is a UMN sign; hypotonia (decreased tone) is a LMN sign.","Hypotonia (decreased tone) is a LOWER motor neuron sign.","Anhedonia is loss of pleasure, unrelated to muscle tone.","Hyporeflexia (reduced reflexes) is a LMN sign."],takeaway:"Hypertonia = increased tone (UMN). Hypotonia = decreased tone (LMN)."}
 ]},
{id:"ps-6a-cerebral-cortex",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Nervous system",categoryCode:"6A",idea:"The cerebral cortex & its lobes",
 questions:[
  {tag:"Four lobes",stem:"The four lobes of the cerebral cortex (mnemonic F-POT) are the:",choices:["Frontal, pontine, occipital, and thalamic lobes","Frontal, parietal, olfactory, and temporal lobes","Frontal, parietal, occipital, and temporal lobes","Cerebellar, parietal, occipital, and temporal lobes"],answer:2,rationale:"Four cortical lobes: <b>Frontal, Parietal, Occipital, Temporal</b> (F-POT).",why:["The pons and thalamus are not cortical lobes.","There is no 'olfactory lobe' among the four; it's occipital.","Correct. F-POT = Frontal, Parietal, Occipital, Temporal.","The cerebellum is not a cortical lobe."],takeaway:"Cortical lobes: Frontal, Parietal, Occipital, Temporal (F-POT)."},
  {tag:"Frontal lobe",stem:"The frontal lobe houses the motor cortex, the prefrontal cortex (executive function), and:",choices:["Broca's area (speech production)","The primary visual cortex","Wernicke's area (comprehension)","The somatosensory cortex"],answer:0,rationale:"<b>Frontal lobe</b> = motor cortex + prefrontal cortex (executive) + Broca's area (speech production).",why:["Correct. The frontal lobe contains the motor cortex, prefrontal cortex, and Broca's area (speech production).","The primary visual cortex is in the occipital lobe.","Wernicke's area is in the temporal lobe.","The somatosensory cortex is in the parietal lobe."],takeaway:"Frontal = motor cortex, prefrontal (executive), Broca's (speech production)."},
  {tag:"Parietal lobe",stem:"The lobe containing the somatosensory cortex (touch, pressure, pain from the skin) and handling spatial manipulation is the:",choices:["Occipital lobe","Temporal lobe","Frontal lobe","Parietal lobe"],answer:3,rationale:"<b>Parietal lobe</b> = somatosensory cortex (skin sensation) + spatial manipulation.",why:["The occipital lobe processes vision.","The temporal lobe processes hearing.","The frontal lobe handles motor/executive function, not somatosensation.","Correct. The parietal lobe contains the somatosensory cortex and processes spatial orientation."],takeaway:"Parietal = somatosensory cortex + spatial processing."},
  {tag:"Occipital lobe",stem:"Vision, including the primary visual ('striate') cortex, is processed in the:",choices:["Temporal lobe","Occipital lobe","Parietal lobe","Frontal lobe"],answer:1,rationale:"<b>Occipital lobe</b> = vision (primary visual / striate cortex).",why:["The temporal lobe processes hearing.","Correct. The occipital lobe houses the primary visual (striate) cortex.","The parietal lobe processes somatosensation/space.","The frontal lobe handles motor/executive function."],takeaway:"Occipital = vision (striate cortex)."},
  {tag:"Temporal lobe",stem:"Sound processing (auditory cortex) and Wernicke's area (language comprehension) are located in the:",choices:["Occipital lobe","Parietal lobe","Temporal lobe","Frontal lobe"],answer:2,rationale:"<b>Temporal lobe</b> = hearing (auditory cortex) + Wernicke's area (comprehension).",why:["The occipital lobe processes vision.","The parietal lobe processes somatosensation.","Correct. The temporal lobe contains the auditory cortex and Wernicke's area.","The frontal lobe handles motor/executive function and Broca's area."],takeaway:"Temporal = auditory cortex + Wernicke's (comprehension)."},
  {tag:"Motor vs. somatosensory cortex",stem:"The motor cortex and the somatosensory cortex sit on opposite sides of the central sulcus. Which pairing is correct?",choices:["Motor cortex in the frontal lobe; somatosensory cortex in the parietal lobe","Motor cortex in the parietal lobe; somatosensory cortex in the frontal lobe","Both in the occipital lobe","Both in the temporal lobe"],answer:0,rationale:"<b>Motor cortex</b> = frontal (precentral gyrus); <b>somatosensory cortex</b> = parietal (postcentral gyrus). They flank the central sulcus.",why:["Correct. The motor cortex (precentral gyrus) is frontal; the somatosensory cortex (postcentral gyrus) is parietal \u2014 they flank the central sulcus.","Reversed \u2014 motor is frontal, somatosensory is parietal.","Both are near the central sulcus (frontal/parietal), not occipital.","Neither is in the temporal lobe."],takeaway:"Motor cortex = frontal. Somatosensory cortex = parietal (across the central sulcus)."},
  {tag:"Cortical folding",stem:"The bumps and grooves (gyri and sulci) that fold the cerebral cortex serve to:",choices:["Decrease the number of neurons","Store cerebrospinal fluid","Generate myelin","Increase the cortical surface area (and cellular mass) that fits in the skull"],answer:3,rationale:"Cortical folding (gyri/sulci) <b>increases surface area</b> \u2014 more cortex/neurons in the same skull volume.",why:["Folding increases, not decreases, neuronal capacity.","The folds aren't CSF reservoirs.","Folding isn't a myelin-generating structure.","Correct. Cortical folding packs more surface area (and neurons) into the limited skull volume."],takeaway:"Cortical folds = more surface area (more neurons) in the skull."}
 ]},
{id:"ps-6a-hemispheres",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Nervous system",categoryCode:"6A",idea:"Hemispheric lateralization & dominance",
 questions:[
  {tag:"Contralateral control",stem:"For movement and most senses, each cerebral hemisphere controls:",choices:["The same (ipsilateral) side of the body","Both sides equally","The opposite (contralateral) side of the body","Only the head and neck"],answer:2,rationale:"The brain is <b>contralateral</b>: left hemisphere \u2194 right body (and vice versa). Smell is the ipsilateral exception.",why:["Control is contralateral, not ipsilateral (except smell).","Each hemisphere serves the opposite side, not both equally.","Correct. The brain is contralaterally organized \u2014 the left hemisphere controls the right body and vice versa (smell is the ipsilateral exception).","Hemispheric control extends to the whole contralateral body, not just head/neck."],takeaway:"Contralateral control: left brain \u2194 right body. Smell = ipsilateral exception."},
  {tag:"Left-hemisphere dominance",stem:"For the vast majority of people, the dominant hemisphere \u2014 handling language, math, and logic \u2014 is the:",choices:["Left hemisphere","Right hemisphere","Cerebellum","Brainstem"],answer:0,rationale:"<b>Left hemisphere</b> is dominant for most people: language, math, logic.",why:["Correct. The left hemisphere is dominant for most people, specializing in language, math, and logical analysis.","The right hemisphere handles prosody, music, and spatial/holistic processing.","The cerebellum coordinates movement, not language dominance.","The brainstem handles vital functions, not language."],takeaway:"Left hemisphere (dominant) = language, math, logic."},
  {tag:"Right-hemisphere functions",stem:"The non-dominant (usually right) hemisphere specializes in:",choices:["Grammar and vocabulary","Mathematical calculation","Speech production","Emotional tone (prosody), music, spatial processing, and big-picture/holistic thinking"],answer:3,rationale:"<b>Right (non-dominant) hemisphere</b>: emotional prosody, music, spatial, big-picture/holistic thinking.",why:["Grammar/vocabulary are left-hemisphere (language) functions.","Calculation is more left-hemisphere.","Speech production (Broca's) is left-hemisphere.","Correct. The right hemisphere handles the emotional tone of language (prosody), music, spatial processing, and holistic 'big-picture' thinking."],takeaway:"Right hemisphere = prosody, music, spatial, big-picture."},
  {tag:"The smell exception",stem:"Contralateral organization applies to most senses, but the exception \u2014 processed on the SAME (ipsilateral) side \u2014 is:",choices:["Vision","Smell (olfaction)","Hearing","Touch"],answer:1,rationale:"<b>Smell</b> is the ipsilateral exception (same-side); vision/hearing/touch are contralateral.",why:["Vision is contralaterally organized.","Correct. Olfaction is ipsilateral \u2014 each nostril projects to the same-side hemisphere (it also bypasses the thalamus). Vision, hearing, and touch are contralateral.","Hearing is largely contralateral.","Touch is contralateral."],takeaway:"Smell = ipsilateral exception. Vision/hearing/touch = contralateral."},
  {tag:"Interhemispheric communication",stem:"The two cerebral hemispheres communicate and share information through the:",choices:["Internal capsule","Reticular formation","Corpus callosum","Cerebellum"],answer:2,rationale:"The <b>corpus callosum</b> connects the two hemispheres, letting them communicate.",why:["The internal capsule carries tracts like the corticospinal, not interhemispheric fibers.","The reticular formation governs arousal, not hemisphere connection.","Correct. The corpus callosum is the large fiber bundle connecting the left and right hemispheres.","The cerebellum coordinates movement."],takeaway:"Corpus callosum = connects/communicates between hemispheres."}
 ]},
{id:"ps-6a-brainstem",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Nervous system",categoryCode:"6A",idea:"The brainstem & old brain",
 questions:[
  {tag:"Brainstem components",stem:"The brainstem \u2014 which connects the brain to the spinal cord and carries the cranial nerves \u2014 consists of the:",choices:["Cerebrum, cerebellum, and thalamus","Frontal, parietal, and occipital lobes","Midbrain, pons, and medulla","Hippocampus, amygdala, and hypothalamus"],answer:2,rationale:"The <b>brainstem</b> = midbrain + pons + medulla.",why:["Those are higher structures, not the brainstem.","Those are cortical lobes, not the brainstem.","Correct. The brainstem = midbrain + pons + medulla (mnemonic for the lower brainstem: Pons, Reticular formation, Medulla).","Those are limbic structures, not the brainstem."],takeaway:"Brainstem = midbrain + pons + medulla."},
  {tag:"Medulla",stem:"The lower brainstem structure that controls vital involuntary functions \u2014 heartbeat and breathing \u2014 and is the crossover (decussation) point for many nerve tracts is the:",choices:["Medulla (medulla oblongata)","Cerebellum","Thalamus","Hippocampus"],answer:0,rationale:"The <b>medulla</b> controls heartbeat and breathing (vital autonomic functions) and is a tract crossover point.",why:["Correct. The medulla regulates heart rate and breathing and is a major decussation point for tracts.","The cerebellum coordinates movement, not heartbeat/breathing.","The thalamus is a sensory relay, not the vital-function center.","The hippocampus handles memory."],takeaway:"Medulla = heartbeat + breathing (vital); tract crossover point."},
  {tag:"Reticular formation",stem:"The network of neurons running through the brainstem that governs arousal, alertness, and the sleep\u2013wake cycle \u2014 and filters incoming sensory information \u2014 is the:",choices:["Corpus callosum","Basal ganglia","Cerebellum","Reticular formation"],answer:3,rationale:"The <b>reticular formation</b> governs arousal, alertness, and the sleep\u2013wake cycle (and filters sensory input).",why:["The corpus callosum connects hemispheres, unrelated to arousal.","The basal ganglia handle motor control.","The cerebellum coordinates movement.","Correct. The reticular formation controls arousal/alertness and the sleep\u2013wake cycle, filtering sensory input to the thalamus."],takeaway:"Reticular formation = arousal/alertness + sleep\u2013wake + sensory filtering."},
  {tag:"Pons",stem:"The brainstem structure that acts as a bridge relaying signals, and plays a role in arousal and the sleep/REM cycle, is the:",choices:["Medulla","Pons","Cerebellum","Amygdala"],answer:1,rationale:"The <b>pons</b> ('bridge') relays signals and contributes to arousal and the sleep/REM cycle.",why:["The medulla controls heartbeat/breathing specifically.","Correct. The pons ('bridge') relays signals between brain regions and participates in arousal and sleep (including REM).","The cerebellum coordinates movement.","The amygdala handles fear/emotion."],takeaway:"Pons = bridge/relay; arousal + sleep/REM."},
  {tag:"Cerebellum",stem:"The structure that coordinates voluntary movement and balance \u2014 receiving proprioceptive feedback, and notably impaired by alcohol \u2014 is the:",choices:["Medulla","Thalamus","Cerebellum","Corpus callosum"],answer:2,rationale:"The <b>cerebellum</b> coordinates voluntary movement and balance (alcohol impairs it \u2192 poor coordination).",why:["The medulla controls vital autonomic functions.","The thalamus is a sensory relay.","Correct. The cerebellum coordinates voluntary movement and balance; alcohol impairs it (why intoxication disrupts coordination/balance).","The corpus callosum connects hemispheres."],takeaway:"Cerebellum = coordination + balance (alcohol impairs it)."},
  {tag:"Old vs. new brain",stem:"Your notes describe the brain as 'building on itself.' In general, the deeper/older structures handle ______, while the superficial cortex handles ______.",choices:["Basic survival functions (breathing, sleep); higher-order functions (cognition)","Higher-order cognition; basic survival","Only vision; only hearing","Only motor; only sensory"],answer:0,rationale:"Deep/old brain = survival basics (breathing, sleep); superficial cortex = higher-order cognition.",why:["Correct. Older, deeper structures manage survival basics (breathing, heartbeat, sleep); the newer, superficial cortex handles higher-order cognition.","Reversed \u2014 deep/old = survival, superficial/new = higher cognition.","The old/new distinction isn't vision vs. hearing.","It isn't a simple motor vs. sensory split."],takeaway:"Old/deep brain = survival (breathing, sleep). New/superficial cortex = higher cognition."},
  {tag:"Thalamus as relay",stem:"Within the old brain, the structure that acts as the sensory relay station \u2014 routing eye/ear and other sensory info onward \u2014 is the:",choices:["Cerebellum","Pons","Medulla","Thalamus"],answer:3,rationale:"The <b>thalamus</b> is the sensory relay station (all senses except smell).",why:["The cerebellum coordinates movement, not sensory relay.","The pons is a bridge/relay for arousal and cross-signals, but the sensory relay station is the thalamus.","The medulla controls vital autonomic functions.","Correct. The thalamus relays incoming sensory information (all senses except smell) to the appropriate cortical areas."],takeaway:"Thalamus = sensory relay (all senses but smell)."}
 ]},
{id:"ps-6a-subcortical",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Nervous system",categoryCode:"6A",idea:"Subcortical structures",
 questions:[
  {tag:"Basal ganglia",stem:"The subcortical nuclei that help refine and smooth voluntary movement (and also contribute to cognition and emotion), but contain NO upper motor neurons themselves, are the:",choices:["Corpus callosum","Reticular formation","Basal ganglia","Olfactory bulb"],answer:2,rationale:"The <b>basal ganglia</b> refine/smooth voluntary movement (and aid cognition/emotion) \u2014 they modulate motor output, without UMNs of their own.",why:["The corpus callosum connects hemispheres, not a motor-refining nucleus.","The reticular formation governs arousal.","Correct. The basal ganglia help motor areas produce smooth, proper movements (and aid cognition/emotion); they modulate rather than directly command via UMNs.","The olfactory bulb processes smell."],takeaway:"Basal ganglia = smooth/refine movement (also cognition/emotion); no UMNs."},
  {tag:"Internal capsule",stem:"The subcortical white-matter structure that carries many important pathways \u2014 including the corticospinal tract \u2014 down from the cortex is the:",choices:["Internal capsule","Corpus callosum","Basal ganglia","Cerebellum"],answer:0,rationale:"The <b>internal capsule</b> carries major pathways (including the corticospinal tract) from the cortex downward.",why:["Correct. The internal capsule is a compact white-matter bundle carrying tracts (like the corticospinal) between the cortex and lower structures.","The corpus callosum connects the two hemispheres, a different bundle.","The basal ganglia are gray-matter nuclei, not the tract-carrying capsule.","The cerebellum coordinates movement."],takeaway:"Internal capsule = white-matter bundle carrying the corticospinal tract."},
  {tag:"Corpus callosum (subcortical)",stem:"Among the subcortical structures, the one connecting the right and left cerebral hemispheres is the:",choices:["Internal capsule","Basal ganglia","Thalamus","Corpus callosum"],answer:3,rationale:"The <b>corpus callosum</b> connects the right and left hemispheres.",why:["The internal capsule carries corticospinal and other tracts, not the interhemispheric bridge.","The basal ganglia handle motor refinement.","The thalamus is the sensory relay.","Correct. The corpus callosum is the large commissure joining the two hemispheres."],takeaway:"Corpus callosum = joins the two hemispheres."},
  {tag:"Hypothalamus & pituitary",stem:"The subcortical structure that controls the pituitary gland \u2014 the 'master gland' that regulates other endocrine glands \u2014 is the:",choices:["Basal ganglia","Hypothalamus","Cerebellum","Corpus callosum"],answer:1,rationale:"The <b>hypothalamus</b> controls the pituitary (master gland), bridging the nervous and endocrine systems.",why:["The basal ganglia handle motor refinement, not endocrine control.","Correct. The hypothalamus controls the pituitary (master gland), linking the nervous and endocrine systems (and regulating hunger, thirst, temperature, etc.).","The cerebellum coordinates movement.","The corpus callosum connects hemispheres."],takeaway:"Hypothalamus controls the pituitary (master gland)."},
  {tag:"Basal ganglia disorders",stem:"Because the basal ganglia refine movement, dysfunction there is associated with movement disorders such as:",choices:["Wernicke's aphasia","Anterograde amnesia","Parkinson's disease (resting tremor, rigidity)","Anosmia"],answer:2,rationale:"Basal-ganglia dysfunction \u2192 movement disorders (e.g., <b>Parkinson's disease</b>: resting tremor, rigidity).",why:["Wernicke's aphasia is a temporal-lobe language disorder.","Anterograde amnesia is a hippocampal/memory disorder.","Correct. Basal-ganglia dysfunction (e.g., dopamine loss) produces movement disorders like Parkinson's disease.","Anosmia is loss of smell."],takeaway:"Basal ganglia dysfunction \u2192 movement disorders (Parkinson's)."}
 ]},
{id:"ps-7c-nonassociative",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Learning",categoryCode:"7C",idea:"Non-associative learning (habituation)",
 questions:[
  {tag:"Associative vs. non-associative",stem:"Learning is split into two broad types. Learning a link between two stimuli or between a behavior and its consequence is ______ learning; learning from repeated exposure to a single stimulus is ______ learning.",choices:["Non-associative; associative","Latent; observational","Associative; non-associative","Insight; procedural"],answer:2,rationale:"<b>Associative</b> learning links stimuli/behaviors (classical, operant); <b>non-associative</b> learning is response change to one repeated stimulus (habituation, sensitization).",why:["Reversed \u2014 associative links stimuli, non-associative is single-stimulus.","Latent and observational aren't the associative/non-associative split.","Correct. Associative learning (classical/operant conditioning) links stimuli or behaviors to outcomes; non-associative learning (habituation, sensitization) is a change in response to a single repeated stimulus.","Insight/procedural aren't this dichotomy."],takeaway:"Associative = link stimuli/consequences. Non-associative = single repeated stimulus."},
  {tag:"Habituation",stem:"Growing less responsive to a repeated, harmless stimulus \u2014 like ceasing to notice a ticking clock \u2014 is:",choices:["Habituation","Sensitization","Acquisition","Generalization"],answer:0,rationale:"<b>Habituation</b> = decreased response to a repeated harmless stimulus (you tune it out).",why:["Correct. Habituation is a decreased response to a repeated, non-threatening stimulus.","Sensitization is an INCREASED response, the opposite.","Acquisition is the initial learning of a conditioned association.","Generalization is responding to stimuli similar to a conditioned one."],takeaway:"Habituation = tune out a repeated harmless stimulus (response decreases)."},
  {tag:"Dishabituation",stem:"After you've habituated to a stimulus, a sudden change or new stimulus can restore the original response. This recovery is:",choices:["Sensitization","Extinction","Discrimination","Dishabituation"],answer:3,rationale:"<b>Dishabituation</b> = a habituated response returns when a new or changed stimulus is introduced.",why:["Sensitization is a heightened response to a strong stimulus, a different process.","Extinction is the fading of a conditioned response, a classical-conditioning term.","Discrimination is distinguishing a specific conditioned stimulus.","Correct. Dishabituation is the return of a habituated response when a new/changed stimulus appears."],takeaway:"Dishabituation = habituated response comes back when the stimulus changes."},
  {tag:"Sensitization",stem:"After a painful or intense stimulus, you become MORE responsive even to mild stimuli (jumpy after a scare). This is:",choices:["Habituation","Sensitization","Spontaneous recovery","Shaping"],answer:1,rationale:"<b>Sensitization</b> = increased responsiveness after a strong/aversive stimulus (heightened reactivity).",why:["Habituation is a DECREASED response, the opposite.","Correct. Sensitization is an increased response following a strong or noxious stimulus.","Spontaneous recovery is the reappearance of an extinguished conditioned response.","Shaping is reinforcing steps toward a target behavior (operant)."],takeaway:"Sensitization = more responsive after an intense stimulus (opposite of habituation)."},
  {tag:"Habituation vs. sensory adaptation",stem:"Habituation differs from sensory adaptation in that habituation is:",choices:["Purely a change in the sensory receptors","The same thing as sensory adaptation","A change in the central nervous system's response (learning), not a change in the sensory receptors themselves","A conscious decision to ignore a stimulus"],answer:2,rationale:"<b>Habituation</b> = a learned CNS-level drop in response; <b>sensory adaptation</b> = receptor-level drop in sensitivity. Different mechanisms.",why:["That's sensory adaptation (receptor-level), not habituation.","They're distinct: adaptation is receptor-level, habituation is a learned CNS response.","Correct. Habituation is a learned, CNS-level decrease in behavioral response; sensory adaptation is a receptor-level decrease in sensory signaling.","Habituation isn't a deliberate choice; it's a form of non-associative learning."],takeaway:"Habituation = learned (CNS) response drop. Sensory adaptation = receptor-level. Not the same."}
 ]},
{id:"ps-7c-classical-basics",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Learning",categoryCode:"7C",idea:"Classical conditioning: the basics",
 questions:[
  {tag:"Unconditioned stimulus/response",stem:"In Pavlov's work, food automatically makes a dog salivate. The food is the ______ and the salivation to food is the ______.",choices:["Conditioned stimulus; conditioned response","Neutral stimulus; conditioned response","Unconditioned stimulus (UCS); unconditioned response (UCR)","Conditioned stimulus; unconditioned response"],answer:2,rationale:"<b>UCS</b> = stimulus that naturally triggers a response (food); <b>UCR</b> = the automatic response (salivation to food). No learning required.",why:["The food triggers salivation automatically (unconditioned), before any learning.","Food is not neutral \u2014 it naturally elicits the response.","Correct. Food naturally triggers salivation with no learning: food = unconditioned stimulus (UCS), salivation-to-food = unconditioned response (UCR).","Food is the unconditioned (not conditioned) stimulus."],takeaway:"UCS = natural trigger (food). UCR = automatic response (salivate to food)."},
  {tag:"Neutral \u2192 conditioned stimulus",stem:"A bell initially produces no salivation. After being repeatedly paired with food, the bell alone makes the dog salivate. The bell has changed from a ______ into a ______.",choices:["Neutral stimulus (NS); conditioned stimulus (CS)","Conditioned stimulus; neutral stimulus","Unconditioned stimulus; unconditioned response","Conditioned response; conditioned stimulus"],answer:0,rationale:"A <b>neutral stimulus (NS)</b> becomes a <b>conditioned stimulus (CS)</b> after repeated pairing with the UCS.",why:["Correct. The bell starts neutral (no response), then through pairing with the UCS becomes a conditioned stimulus (CS) that elicits the response.","Reversed \u2014 it goes from neutral to conditioned, not the other way.","The bell is a stimulus that becomes conditioned, not a UCS/UCR pair.","The bell is a stimulus (CS), not a response."],takeaway:"Bell: neutral stimulus \u2192 conditioned stimulus (after pairing with food)."},
  {tag:"Conditioned response",stem:"After conditioning, the dog salivates to the bell alone. Salivation to the bell is the:",choices:["Unconditioned response (UCR)","Unconditioned stimulus (UCS)","Neutral stimulus (NS)","Conditioned response (CR)"],answer:3,rationale:"The <b>conditioned response (CR)</b> = the learned response to the conditioned stimulus (salivation to the bell).",why:["The UCR is the response to the natural stimulus (food), not the bell.","The UCS is the natural stimulus (food), not a response.","A neutral stimulus is a stimulus, not a response.","Correct. Salivation triggered by the bell (the learned trigger) is the conditioned response (CR)."],takeaway:"CR = learned response to the CS (salivate to the bell)."},
  {tag:"Acquisition",stem:"The initial stage of classical conditioning \u2014 when the neutral stimulus and unconditioned stimulus are repeatedly paired until the association is learned \u2014 is:",choices:["Extinction","Acquisition","Spontaneous recovery","Shaping"],answer:1,rationale:"<b>Acquisition</b> = the phase of learning the CS\u2013UCS association (CS ideally just before UCS).",why:["Extinction is the weakening of the response, not its establishment.","Correct. Acquisition is the phase where the CS\u2013UCS association is established (works best when the CS slightly precedes the UCS).","Spontaneous recovery is the reappearance of an extinguished response.","Shaping is an operant-conditioning procedure, not classical acquisition."],takeaway:"Acquisition = learning the CS\u2013UCS pairing."},
  {tag:"Classical = involuntary",stem:"Classical conditioning is best characterized as learning that involves:",choices:["Voluntary behaviors shaped by their consequences","Learning purely by watching others","Automatic, involuntary responses (reflexive) linked to a new stimulus","A single repeated stimulus with no pairing"],answer:2,rationale:"<b>Classical conditioning</b> = automatic/reflexive responses linked to a new (conditioned) stimulus. Operant = voluntary behavior driven by consequences.",why:["Voluntary behavior shaped by consequences is operant conditioning.","Learning by watching is observational learning.","Correct. Classical conditioning associates a new stimulus with an automatic, reflexive response (salivation, fear). Voluntary behaviors driven by consequences are operant conditioning.","A single repeated stimulus is non-associative learning."],takeaway:"Classical = involuntary/reflexive responses. Operant = voluntary behavior + consequences."},
  {tag:"Order of pairing",stem:"Classical conditioning is generally most effective when the neutral stimulus:",choices:["Comes just BEFORE the unconditioned stimulus (forward conditioning)","Comes well AFTER the unconditioned stimulus","Is never paired with the unconditioned stimulus","Replaces the unconditioned response"],answer:0,rationale:"Conditioning is strongest when the <b>CS precedes the UCS</b> (the CS predicts the UCS).",why:["Correct. Learning is strongest when the CS reliably precedes (predicts) the UCS \u2014 forward conditioning.","Presenting the NS after the UCS (backward conditioning) is weak/ineffective.","Pairing is required for classical conditioning to occur.","The NS becomes a signal for the UCS; it doesn't replace the response."],takeaway:"Best conditioning: CS just before UCS (CS predicts UCS)."}
 ]},
{id:"ps-7c-classical-extinction",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Learning",categoryCode:"7C",idea:"Classical conditioning: extinction & generalization",
 questions:[
  {tag:"Extinction",stem:"If the bell (CS) is repeatedly presented WITHOUT the food (UCS), the dog gradually stops salivating to the bell. This weakening of the conditioned response is:",choices:["Spontaneous recovery","Acquisition","Extinction","Generalization"],answer:2,rationale:"<b>Extinction</b> = the conditioned response fades when the CS is presented without the UCS.",why:["Spontaneous recovery is the RETURN of the response after a rest, not its fading.","Acquisition is the initial learning of the association.","Correct. Extinction is the fading of the CR when the CS is presented repeatedly without the UCS.","Generalization is responding to similar stimuli."],takeaway:"Extinction = CR fades when CS is shown without the UCS."},
  {tag:"Spontaneous recovery",stem:"After a conditioned response has been extinguished, it suddenly reappears (weaker) following a rest period. This is:",choices:["Spontaneous recovery","Extinction","Discrimination","Habituation"],answer:0,rationale:"<b>Spontaneous recovery</b> = an extinguished CR returns after a rest (the association was suppressed, not erased).",why:["Correct. Spontaneous recovery is the reappearance of an extinguished CR after a pause \u2014 showing the association wasn't fully erased.","Extinction is the fading of the response, not its return.","Discrimination is distinguishing the specific CS from similar stimuli.","Habituation is a non-associative decrease in response."],takeaway:"Spontaneous recovery = extinguished response comes back after a break."},
  {tag:"Stimulus generalization",stem:"After being conditioned to salivate to a specific tone, the dog also salivates to similar tones. This is:",choices:["Stimulus discrimination","Extinction","Sensitization","Stimulus generalization"],answer:3,rationale:"<b>Stimulus generalization</b> = the CR is elicited by stimuli similar to the original CS.",why:["Discrimination is the opposite \u2014 responding only to the specific CS.","Extinction is the fading of the response.","Sensitization is a non-associative increase in response.","Correct. Generalization is responding to stimuli similar to the original conditioned stimulus."],takeaway:"Generalization = respond to stimuli SIMILAR to the CS."},
  {tag:"Stimulus discrimination",stem:"With further training, the dog salivates only to the exact tone that was paired with food, not to different tones. This is:",choices:["Stimulus generalization","Stimulus discrimination","Spontaneous recovery","Acquisition"],answer:1,rationale:"<b>Stimulus discrimination</b> = responding only to the specific CS, not to similar stimuli.",why:["Generalization is responding to similar stimuli, the opposite.","Correct. Discrimination is learning to respond only to the specific CS and not to similar stimuli \u2014 the opposite of generalization.","Spontaneous recovery is the return of an extinguished response.","Acquisition is the initial learning phase."],takeaway:"Discrimination = respond ONLY to the specific CS (opposite of generalization)."},
  {tag:"Higher-order conditioning",stem:"Once a bell is a conditioned stimulus, pairing a NEW neutral stimulus (a light) with the bell can make the light elicit the response too. This is:",choices:["Extinction","Sensitization","Higher-order (second-order) conditioning","Shaping"],answer:2,rationale:"<b>Higher-order conditioning</b>: an established CS conditions a new neutral stimulus (light paired with an already-conditioned bell).",why:["Extinction is the fading of a conditioned response.","Sensitization is a non-associative increase in response.","Correct. Higher-order conditioning uses an established CS to condition a new neutral stimulus, without the original UCS.","Shaping is an operant procedure."],takeaway:"Higher-order conditioning = an existing CS conditions a new stimulus."}
 ]},
{id:"ps-7c-operant-reinforcement",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Learning",categoryCode:"7C",idea:"Operant conditioning: reinforcement & punishment",
 questions:[
  {tag:"Operant conditioning",stem:"Operant conditioning (Skinner, building on Thorndike's law of effect) is learning in which:",choices:["Reflexive responses are paired with a new stimulus","Behavior changes from watching a model","Voluntary behavior is strengthened or weakened by its consequences","Response to a single stimulus declines with repetition"],answer:2,rationale:"<b>Operant conditioning</b>: voluntary behavior is shaped by its consequences (Thorndike's law of effect; Skinner).",why:["That's classical conditioning (reflexive responses + new stimulus).","That's observational learning.","Correct. Operant conditioning changes voluntary behavior through consequences (reinforcement increases it; punishment decreases it).","That's habituation (non-associative)."],takeaway:"Operant = voluntary behavior shaped by consequences (reinforcement/punishment)."},
  {tag:"Reinforcement vs. punishment",stem:"In operant terms, reinforcement always ______ a behavior, and punishment always ______ a behavior.",choices:["Increases; decreases","Decreases; increases","Increases; increases","Decreases; decreases"],answer:0,rationale:"<b>Reinforcement</b> increases a behavior; <b>punishment</b> decreases it (independent of add/remove).",why:["Correct. Reinforcement increases the likelihood of a behavior; punishment decreases it \u2014 regardless of whether a stimulus is added or removed.","Reversed \u2014 reinforcement increases, punishment decreases.","Punishment decreases behavior, not increases.","Reinforcement increases behavior, not decreases."],takeaway:"Reinforcement \u2191 behavior. Punishment \u2193 behavior."},
  {tag:"Positive vs. negative",stem:"In operant conditioning, 'positive' and 'negative' refer to:",choices:["Whether the outcome is pleasant or unpleasant","Whether the behavior increases or decreases","Whether the learning is conscious or unconscious","Whether a stimulus is added (positive) or removed (negative) \u2014 not good vs. bad"],answer:3,rationale:"In operant terms, <b>positive = add</b> a stimulus, <b>negative = remove</b> a stimulus (not good vs. bad).",why:["Pleasant/unpleasant maps to reinforcement/punishment, not positive/negative.","Increase/decrease maps to reinforcement/punishment.","It refers to add/remove, not conscious/unconscious.","Correct. Positive = add a stimulus; negative = remove a stimulus. 'Good/bad' is captured by reinforcement vs. punishment, not by positive/negative."],takeaway:"Positive = add stimulus. Negative = remove stimulus. (Not good/bad.)"},
  {tag:"Positive reinforcement",stem:"Giving a dog a treat when it sits, which makes it sit more often, is:",choices:["Negative reinforcement","Positive reinforcement (add a pleasant stimulus \u2192 behavior increases)","Positive punishment","Negative punishment"],answer:1,rationale:"<b>Positive reinforcement</b> = add a pleasant stimulus \u2192 behavior increases (treat for sitting).",why:["Negative reinforcement removes an aversive stimulus, not adds a treat.","Correct. A pleasant stimulus is ADDED and the behavior INCREASES \u2192 positive reinforcement.","Positive punishment adds an aversive stimulus to decrease behavior.","Negative punishment removes a pleasant stimulus to decrease behavior."],takeaway:"Positive reinforcement = add something good \u2192 behavior increases."},
  {tag:"Negative reinforcement",stem:"A car beeps until you fasten your seatbelt; buckling STOPS the beep, so you buckle more. This is:",choices:["Positive punishment","Negative punishment","Negative reinforcement (remove an aversive stimulus \u2192 behavior increases)","Positive reinforcement"],answer:2,rationale:"<b>Negative reinforcement</b> = remove an aversive stimulus \u2192 behavior increases (buckle to stop the beep). Not punishment!",why:["Positive punishment adds an aversive stimulus to reduce behavior.","Negative punishment removes a pleasant stimulus to reduce behavior.","Correct. An aversive stimulus (beep) is REMOVED and the behavior (buckling) INCREASES \u2192 negative reinforcement. It is NOT punishment.","Positive reinforcement adds a pleasant stimulus."],takeaway:"Negative reinforcement = remove something aversive \u2192 behavior increases (NOT punishment)."},
  {tag:"Positive punishment",stem:"Adding a shock when a rat presses a lever, which makes it press less, is:",choices:["Positive punishment (add an aversive stimulus \u2192 behavior decreases)","Negative punishment","Positive reinforcement","Negative reinforcement"],answer:0,rationale:"<b>Positive punishment</b> = add an aversive stimulus \u2192 behavior decreases (shock for lever-press).",why:["Correct. An aversive stimulus is ADDED and the behavior DECREASES \u2192 positive punishment.","Negative punishment removes a pleasant stimulus.","Positive reinforcement adds a pleasant stimulus to increase behavior.","Negative reinforcement removes an aversive stimulus to increase behavior."],takeaway:"Positive punishment = add something aversive \u2192 behavior decreases."},
  {tag:"Negative punishment",stem:"Taking away a teen's phone for breaking curfew, which reduces curfew-breaking, is:",choices:["Positive punishment","Negative reinforcement","Positive reinforcement","Negative punishment (remove a pleasant stimulus \u2192 behavior decreases)"],answer:3,rationale:"<b>Negative punishment</b> = remove a pleasant stimulus \u2192 behavior decreases (take the phone).",why:["Positive punishment adds an aversive stimulus.","Negative reinforcement removes an aversive stimulus to INCREASE behavior.","Positive reinforcement adds a pleasant stimulus to increase behavior.","Correct. A pleasant stimulus (phone) is REMOVED and the behavior DECREASES \u2192 negative punishment."],takeaway:"Negative punishment = remove something good \u2192 behavior decreases."}
 ]},
{id:"ps-7c-operant-schedules",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Learning",categoryCode:"7C",idea:"Operant conditioning: shaping & schedules",
 questions:[
  {tag:"Shaping",stem:"Teaching a complex behavior by reinforcing successive approximations \u2014 steps that get closer and closer to the target \u2014 is:",choices:["Extinction","Generalization","Shaping","Latent learning"],answer:2,rationale:"<b>Shaping</b> = reinforcing successive approximations toward a target behavior.",why:["Extinction is the fading of a response.","Generalization is responding to similar stimuli (classical).","Correct. Shaping reinforces successive approximations toward a goal behavior.","Latent learning is learning that isn't shown until there's a reason to."],takeaway:"Shaping = reinforce successive approximations toward the goal behavior."},
  {tag:"Continuous vs. partial",stem:"A behavior reinforced only SOME of the time (partial/intermittent reinforcement), compared with every time (continuous), is:",choices:["More resistant to extinction","Faster to acquire but quickly extinguished","Impossible to extinguish ever","Learned only through classical conditioning"],answer:0,rationale:"<b>Partial (intermittent) reinforcement</b> \u2192 more resistant to extinction (continuous \u2192 faster initial learning).",why:["Correct. Continuous reinforcement produces faster initial learning, but partial (intermittent) reinforcement makes the behavior more resistant to extinction.","Continuous reinforcement gives faster acquisition; partial gives extinction resistance.","Partial reinforcement resists but doesn't prevent extinction entirely.","Reinforcement schedules are an operant, not classical, concept."],takeaway:"Partial reinforcement = harder to extinguish. Continuous = faster to learn."},
  {tag:"Fixed-ratio schedule",stem:"A factory worker paid for every 10 units produced is on which reinforcement schedule?",choices:["Fixed-interval (FI)","Variable-ratio (VR)","Variable-interval (VI)","Fixed-ratio (FR) \u2014 reinforcement after a set number of responses"],answer:3,rationale:"<b>Fixed-ratio (FR)</b> = reinforcement after a set NUMBER of responses (high rate, post-reinforcement pause).",why:["Fixed-interval reinforces the first response after a set TIME, not a set count.","Variable-ratio reinforces after an unpredictable NUMBER of responses.","Variable-interval reinforces after an unpredictable TIME.","Correct. Fixed-ratio delivers reinforcement after a set number of responses (every 10 units) \u2014 producing a high response rate with a brief post-reinforcement pause."],takeaway:"Fixed-ratio = set number of responses (e.g., pay per 10 units)."},
  {tag:"Variable-ratio schedule",stem:"A slot machine that pays out after an unpredictable number of pulls is which schedule \u2014 the one that produces the highest, steadiest response rate and greatest resistance to extinction?",choices:["Fixed-ratio (FR)","Variable-ratio (VR)","Fixed-interval (FI)","Variable-interval (VI)"],answer:1,rationale:"<b>Variable-ratio (VR)</b> = reinforcement after an unpredictable NUMBER of responses \u2192 highest, steadiest rate, most resistant to extinction (gambling).",why:["Fixed-ratio uses a set number of responses and has a post-reinforcement pause.","Correct. Variable-ratio reinforces after an unpredictable number of responses \u2014 the highest, steadiest rate and most extinction-resistant (why gambling is so persistent).","Fixed-interval reinforces after a set time (scalloped pattern).","Variable-interval reinforces after unpredictable time (slow, steady)."],takeaway:"Variable-ratio = unpredictable # of responses \u2192 highest rate, hardest to extinguish (gambling)."},
  {tag:"Fixed-interval schedule",stem:"Reinforcing the first response after a set amount of TIME (e.g., a weekly paycheck) \u2014 producing a 'scalloped' pattern where responding speeds up near the deadline \u2014 is:",choices:["Variable-interval (VI)","Fixed-ratio (FR)","Fixed-interval (FI)","Variable-ratio (VR)"],answer:2,rationale:"<b>Fixed-interval (FI)</b> = first response after a set TIME \u2192 scalloped pattern (responding accelerates near the deadline).",why:["Variable-interval uses unpredictable time and gives a slow, steady rate.","Fixed-ratio is based on a set number of responses, not time.","Correct. Fixed-interval reinforces the first response after a fixed time; responding dips after reinforcement and accelerates as the interval ends (scalloped).","Variable-ratio is based on an unpredictable number of responses."],takeaway:"Fixed-interval = set time \u2192 scalloped pattern (speed up near the deadline)."},
  {tag:"Variable-interval schedule",stem:"Checking your phone for a text that could arrive at any unpredictable time produces slow, steady responding. This is which schedule?",choices:["Variable-interval (VI)","Fixed-interval (FI)","Variable-ratio (VR)","Fixed-ratio (FR)"],answer:0,rationale:"<b>Variable-interval (VI)</b> = first response after an unpredictable TIME \u2192 slow, steady responding.",why:["Correct. Variable-interval reinforces the first response after an unpredictable time, producing a slow, steady response rate.","Fixed-interval uses a set (predictable) time and gives a scalloped pattern.","Variable-ratio is based on an unpredictable number of responses (high rate).","Fixed-ratio is based on a set number of responses."],takeaway:"Variable-interval = unpredictable time \u2192 slow, steady responding."},
  {tag:"Ratio vs. interval, fixed vs. variable",stem:"Two general rules about schedules of reinforcement are:",choices:["Interval schedules always beat ratio schedules for response rate","Fixed schedules always resist extinction better than variable ones","Schedule type has no effect on behavior","Ratio schedules produce higher response rates than interval schedules; variable schedules resist extinction better than fixed ones"],answer:3,rationale:"Rules: <b>ratio > interval</b> for response rate; <b>variable > fixed</b> for extinction resistance.",why:["Ratio schedules produce HIGHER rates than interval schedules.","VARIABLE schedules resist extinction better than fixed ones.","Schedule type strongly shapes response rate and persistence.","Correct. Ratio (response-based) schedules drive higher rates than interval (time-based) schedules; variable (unpredictable) schedules resist extinction better than fixed ones."],takeaway:"Ratio > interval (response rate). Variable > fixed (extinction resistance)."}
 ]},
{id:"ps-7c-observational",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Learning",categoryCode:"7C",idea:"Observational learning",
 questions:[
  {tag:"Observational learning",stem:"Learning a behavior by watching and imitating others, rather than through direct reinforcement, is:",choices:["Classical conditioning","Operant conditioning","Observational learning","Habituation"],answer:2,rationale:"<b>Observational learning</b> = learning by watching/imitating a model (Bandura's social cognitive theory).",why:["Classical conditioning pairs a stimulus with a reflexive response.","Operant conditioning shapes behavior through direct consequences.","Correct. Observational learning (modeling) is acquiring behavior by watching others \u2014 the basis of Bandura's social cognitive theory.","Habituation is a non-associative decrease in response."],takeaway:"Observational learning = learn by watching/imitating a model."},
  {tag:"Bandura's Bobo doll",stem:"The classic experiment showing children imitate aggression after watching an adult model attack a doll was conducted by:",choices:["Albert Bandura (the Bobo doll experiment)","Ivan Pavlov","B.F. Skinner","John Watson"],answer:0,rationale:"<b>Bandura's Bobo doll</b> experiment demonstrated observational learning \u2014 children imitated modeled aggression.",why:["Correct. Bandura's Bobo doll study demonstrated observational learning of aggression through modeling.","Pavlov studied classical conditioning (salivation), not modeling.","Skinner studied operant conditioning (reinforcement schedules).","Watson studied classical conditioning (Little Albert)."],takeaway:"Bobo doll = Bandura, observational learning of aggression."},
  {tag:"Modeling",stem:"In observational learning, the person whose behavior is watched and imitated is called the:",choices:["Conditioned stimulus","Reinforcer","Discriminative stimulus","Model"],answer:3,rationale:"The <b>model</b> is the person observed and imitated in observational learning.",why:["A conditioned stimulus is a classical-conditioning term.","A reinforcer is a consequence that increases behavior (operant).","A discriminative stimulus signals that reinforcement is available (operant).","Correct. The model is the individual being observed; imitating them is modeling."],takeaway:"Model = the person you observe and imitate."},
  {tag:"Vicarious reinforcement",stem:"Seeing someone else get rewarded for a behavior makes you more likely to do it yourself. This is:",choices:["Direct reinforcement","Vicarious reinforcement","Negative reinforcement","Extinction"],answer:1,rationale:"<b>Vicarious reinforcement</b> = you're influenced by seeing a model rewarded (or punished) for a behavior.",why:["Direct reinforcement is a consequence delivered to you, not observed in another.","Correct. Vicarious reinforcement is learning from the consequences experienced by a model \u2014 a reward to the model makes the observer more likely to imitate.","Negative reinforcement removes an aversive stimulus to increase your own behavior.","Extinction is the fading of a learned response."],takeaway:"Vicarious reinforcement = learning from what happens to the model (reward/punishment)."},
  {tag:"Four processes / mirror neurons",stem:"Bandura proposed observational learning requires attention, retention, reproduction, and motivation. A neural system often linked to imitation is the:",choices:["Reticular activating system","Vestibular system","Mirror neuron system","Endocrine system"],answer:2,rationale:"Observational learning needs <b>attention, retention, reproduction, motivation</b>; <b>mirror neurons</b> are linked to imitation.",why:["The reticular activating system governs arousal, not imitation.","The vestibular system handles balance.","Correct. Mirror neurons \u2014 which fire both when performing and when observing an action \u2014 are often linked to imitation/observational learning. Bandura's four processes: attention, retention, reproduction, motivation.","The endocrine system releases hormones."],takeaway:"Observational learning: attention, retention, reproduction, motivation. Mirror neurons = imitation."}
 ]},
{id:"ps-7c-learning-biology",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Learning",categoryCode:"7C",idea:"Biological influences on learning",
 questions:[
  {tag:"Biological constraints",stem:"The finding that animals learn some associations far more easily than others \u2014 because of evolved predispositions \u2014 is called:",choices:["Latent learning","Higher-order conditioning","Biological constraints (preparedness) on learning","Shaping"],answer:2,rationale:"<b>Biological constraints / preparedness</b>: evolution makes some associations far easier to learn than others.",why:["Latent learning is learning not shown until it's useful.","Higher-order conditioning uses an established CS to condition a new stimulus.","Correct. Biological constraints (preparedness) mean evolution readies organisms to learn certain associations more readily than others.","Shaping reinforces successive approximations."],takeaway:"Biological constraints (preparedness) = some associations learned much more easily (evolved)."},
  {tag:"Taste aversion (Garcia effect)",stem:"Getting sick hours after eating a food, then avoiding that food after a SINGLE pairing (even with a long delay), is:",choices:["Conditioned taste aversion (the Garcia effect)","Standard classical conditioning requiring many trials","Operant negative punishment","Sensitization"],answer:0,rationale:"<b>Conditioned taste aversion (Garcia effect)</b> = one-trial learning with a long delay \u2014 evolved preparedness, breaking usual conditioning rules.",why:["Correct. Conditioned taste aversion (Garcia) is learned in one trial despite a long delay \u2014 a biologically prepared exception to normal conditioning rules.","Ordinary classical conditioning needs repeated, closely-timed pairings; taste aversion needs neither.","It's a learned aversion (classical), not operant punishment.","Sensitization is a non-associative increase in response."],takeaway:"Taste aversion (Garcia) = one-trial, long-delay learning (biological preparedness)."},
  {tag:"Instinctive drift",stem:"When trained animals drift back toward innate, instinctive behaviors that interfere with a conditioned response (the Brelands' raccoons), this is:",choices:["Spontaneous recovery","Stimulus generalization","Latent learning","Instinctive drift"],answer:3,rationale:"<b>Instinctive drift</b> = trained animals revert to instinctive behaviors \u2014 a biological limit on conditioning.",why:["Spontaneous recovery is the return of an extinguished CR.","Generalization is responding to similar stimuli.","Latent learning is unexpressed learning.","Correct. Instinctive drift is the tendency to revert to instinctive behaviors, limiting what conditioning can achieve \u2014 another biological constraint."],takeaway:"Instinctive drift = revert to instinctive behavior (biological constraint)."},
  {tag:"Escape vs. avoidance learning",stem:"Learning to TERMINATE an aversive stimulus already present is escape learning; learning to PREVENT it before it starts is:",choices:["Escape learning","Avoidance learning","Latent learning","Habituation"],answer:1,rationale:"<b>Escape</b> learning ends an ongoing aversive stimulus; <b>avoidance</b> learning prevents it beforehand.",why:["Escape learning terminates an ongoing aversive stimulus, not prevents it.","Correct. Escape learning ends an ongoing aversive stimulus; avoidance learning prevents it from occurring at all (typically via a warning signal).","Latent learning is unexpressed learning shown later.","Habituation is non-associative."],takeaway:"Escape = end an ongoing aversive stimulus. Avoidance = prevent it beforehand."},
  {tag:"Latent learning",stem:"A rat that explores a maze with no reward shows it learned the layout only later, when a reward is introduced and its performance jumps. This is:",choices:["Observational learning","Shaping","Latent learning","Sensitization"],answer:2,rationale:"<b>Latent learning</b> = learning that occurs without reinforcement and isn't shown until it's useful (Tolman's cognitive maps).",why:["Observational learning is learning by watching a model.","Shaping reinforces successive approximations.","Correct. Latent learning is learning that occurs without reinforcement and stays hidden until there's a reason to demonstrate it (Tolman's cognitive maps).","Sensitization is a non-associative increase in response."],takeaway:"Latent learning = learned without reward, revealed later when useful."},
  {tag:"Instinct vs. learned behavior",stem:"An innate, fixed behavior pattern present without learning (e.g., a spider spinning a web) is an instinct, whereas a conditioned response is:",choices:["Acquired through experience (learned)","Also entirely innate","Impossible to modify","Identical to an instinct"],answer:0,rationale:"<b>Instinct</b> = innate, unlearned behavior; a <b>conditioned response</b> is acquired through experience.",why:["Correct. Instincts are innate, unlearned fixed action patterns; conditioned responses are acquired through experience.","A conditioned response is learned, not innate.","Conditioned responses can be modified (e.g., extinguished).","Instincts and conditioned responses differ in origin (innate vs. learned)."],takeaway:"Instinct = innate/unlearned. Conditioned response = learned through experience."}
 ]},
{id:"ps-7a-motivation-theories",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Motivation",categoryCode:"7A",idea:"Theories of motivation",
 questions:[
  {tag:"Instinct theory",stem:"The theory that behavior is driven by innate, fixed, unlearned patterns (like a bird building a nest) is:",choices:["Drive-reduction theory","Instinct theory","Incentive theory","Cognitive (expectancy) theory"],answer:1,rationale:"<b>Instinct theory</b>: behavior is motivated by innate, fixed, unlearned patterns.",why:["Drive-reduction theory is about reducing physiological need states, not innate instincts.","Correct. Instinct theory attributes motivation to innate, species-typical fixed action patterns.","Incentive theory explains motivation by external rewards.","Cognitive theory explains motivation by expectations and value."],takeaway:"Instinct theory = innate, fixed, unlearned behavior patterns."},
  {tag:"Drive-reduction theory",stem:"Drive-reduction theory proposes that a physiological need creates an aroused tension (a drive) that motivates us to:",choices:["Seek novelty regardless of need","Increase arousal indefinitely","Imitate a model's behavior","Act to reduce the drive and restore homeostasis"],answer:3,rationale:"<b>Drive-reduction theory</b>: a need \u2192 a drive (tension) \u2192 behavior that reduces it, restoring homeostasis.",why:["Drive-reduction is about reducing tension, not seeking novelty for its own sake.","It seeks to reduce, not endlessly increase, arousal.","Imitating a model is observational learning, not drive reduction.","Correct. A need (e.g., hunger) produces a drive that pushes behavior to satisfy the need and return the body to homeostatic balance."],takeaway:"Drive-reduction = need creates a drive \u2192 act to reduce it (restore homeostasis)."},
  {tag:"Primary vs. secondary drives",stem:"In drive-reduction theory, hunger and thirst are ______ drives, while the desire for money or approval are ______ drives.",choices:["Primary; secondary","Secondary; primary","Extrinsic; intrinsic","Cognitive; instinctive"],answer:0,rationale:"<b>Primary drives</b> = innate biological (hunger, thirst); <b>secondary drives</b> = learned (money, approval).",why:["Correct. Primary drives are innate biological needs (hunger, thirst); secondary drives are learned (money, approval).","Reversed \u2014 biological needs are primary, learned ones secondary.","Extrinsic/intrinsic describe reward source, not primary/secondary drives.","Those aren't the drive categories here."],takeaway:"Primary drives = biological (hunger). Secondary drives = learned (money)."},
  {tag:"Arousal theory",stem:"Arousal theory of motivation states that we are motivated to:",choices:["Always minimize arousal to zero","Always maximize arousal","Maintain an optimal level of arousal \u2014 seeking stimulation when under-aroused and calm when over-aroused","Reduce only biological drives"],answer:2,rationale:"<b>Arousal theory</b>: motivation to reach an <b>optimal</b> arousal level (moderate) \u2014 performance peaks there (inverted-U).",why:["We don't seek zero arousal \u2014 too little prompts stimulation-seeking.","We don't endlessly maximize arousal \u2014 too much impairs performance.","Correct. Arousal theory: people seek an optimal (moderate) arousal level; performance peaks there (Yerkes-Dodson inverted-U).","Arousal theory isn't limited to biological drives."],takeaway:"Arousal theory = seek an optimal (moderate) arousal level."},
