  {tag:"Working memory capacity",stem:"Short-term/working memory is famously limited. Miller's classic estimate of its capacity is:",choices:["About 7 \u00b1 2 items (chunks)","Essentially unlimited","Exactly 3 items","Around 50 items"],answer:0,rationale:"Working memory holds about <b>7 \u00b1 2 chunks</b> (Miller). Chunking increases how much fits per slot.",why:["Correct. Miller's 'magic number' is roughly 7 \u00b1 2 chunks; chunking can pack more information into each item.","Working memory is sharply limited, not unlimited.","The classic estimate is ~7 \u00b1 2, not a fixed 3.","50 items far exceeds working-memory capacity."],takeaway:"Working memory \u2248 7 \u00b1 2 items (Miller). Chunking helps."},
  {tag:"Baddeley \u00b7 central executive",stem:"In Baddeley's working-memory model, the component that directs attention and coordinates the other subsystems is the:",choices:["Phonological loop","Visuospatial sketchpad","Central executive","Episodic buffer"],answer:2,rationale:"Baddeley's <b>central executive</b> directs attention and coordinates the phonological loop (verbal), visuospatial sketchpad (visual), and episodic buffer.",why:["The phonological loop handles verbal/auditory information.","The visuospatial sketchpad handles visual/spatial information.","Correct. The central executive allocates attention and coordinates the phonological loop, visuospatial sketchpad, and episodic buffer.","The episodic buffer integrates information across subsystems and with long-term memory."],takeaway:"Central executive = the attention-directing 'boss' of Baddeley's working memory."},
  {tag:"Baddeley \u00b7 subsystems",stem:"In Baddeley's model, silently rehearsing a phone number by repeating the digits in your head uses the:",choices:["Visuospatial sketchpad (visual/spatial information)","Phonological loop (verbal/auditory information)","Central executive alone","Long-term episodic store"],answer:1,rationale:"<b>Phonological loop</b> = verbal/acoustic working memory (rehearsing a number). <b>Visuospatial sketchpad</b> = visual/spatial (mental map).",why:["The visuospatial sketchpad handles imagery/spatial tasks, like mentally navigating a route.","Correct. The phonological loop handles verbal and acoustic information, including subvocal rehearsal of a number.","The central executive directs attention but isn't the verbal store itself.","Rehearsing in working memory isn't the long-term store."],takeaway:"Phonological loop = verbal rehearsal. Visuospatial sketchpad = visual/spatial imagery."},
  {tag:"Serial position effect",stem:"Given a long list to recall immediately, people best remember the first and last items. The strong recall of the LAST items (from working memory) is the:",choices:["Primacy effect","Chunking effect","Von Restorff effect","Recency effect"],answer:3,rationale:"<b>Recency effect</b> = last items recalled well (still in working memory). <b>Primacy effect</b> = first items recalled well (rehearsed to long-term).",why:["The primacy effect refers to the FIRST items, not the last.","Chunking groups items to expand capacity; it's not the end-of-list boost.","The Von Restorff effect is enhanced memory for a distinctive item.","Correct. The recency effect is superior recall of the last items (still in working memory); the primacy effect is superior recall of the first items (rehearsed into long-term memory)."],takeaway:"Recency = last items (working memory). Primacy = first items (long-term)."}
 ]},
{id:"ps-7b-ltm-types",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Attention & memory",categoryCode:"7B",idea:"Long-term memory & implicit memory",
 questions:[
  {tag:"Explicit vs. implicit",stem:"Long-term memory divides into two broad types. Memories you can consciously and deliberately recall (facts, events) are ______; memories expressed through performance without conscious recall (skills, conditioning) are ______.",choices:["Implicit; explicit","Explicit (declarative); implicit (non-declarative)","Sensory; echoic","Primacy; recency"],answer:1,rationale:"<b>Explicit (declarative)</b> = consciously recalled (facts, events). <b>Implicit (non-declarative)</b> = expressed through performance (skills, conditioning) without conscious recall.",why:["Reversed \u2014 explicit is the consciously recalled type.","Correct. Explicit (declarative) memory is consciously recalled; implicit (non-declarative) memory shows up in performance without conscious awareness.","Sensory/echoic are sensory-memory terms, not the LTM division.","Primacy/recency are serial-position effects, not memory types."],takeaway:"LTM: explicit/declarative (conscious) vs. implicit/non-declarative (performance-based)."},
  {tag:"Semantic vs. episodic",stem:"Explicit memory has two subtypes. Remembering that 'Paris is the capital of France' is ______ memory; remembering your own birthday party is ______ memory.",choices:["Episodic; semantic","Procedural; priming","Iconic; echoic","Semantic; episodic"],answer:3,rationale:"Explicit subtypes: <b>semantic</b> = facts/general knowledge; <b>episodic</b> = personal events (time/place).",why:["Reversed \u2014 facts are semantic, personal events are episodic.","Procedural and priming are implicit, not explicit subtypes.","Iconic/echoic are sensory-memory types.","Correct. Semantic memory = general facts/knowledge; episodic memory = personally experienced events tied to time and place."],takeaway:"Semantic = facts. Episodic = personal events."},
  {tag:"Procedural memory",stem:"Riding a bike years after last doing it \u2014 without consciously recalling how \u2014 relies on:",choices:["Procedural memory (a type of implicit memory)","Episodic memory","Semantic memory","Sensory memory"],answer:0,rationale:"<b>Procedural memory</b> = implicit memory for skills/habits (riding a bike), shown by doing, not recalling.",why:["Correct. Procedural memory is implicit memory for skills and habits, expressed through performance rather than conscious recall.","Episodic memory is conscious recall of personal events, not a motor skill.","Semantic memory is conscious factual knowledge.","Sensory memory is a brief raw trace, not a durable skill."],takeaway:"Procedural memory = implicit skill/habit memory (bike riding)."},
  {tag:"Priming",stem:"Seeing the word 'yellow' makes you faster to then recognize 'banana,' even without consciously trying. This influence of a prior stimulus on later processing is:",choices:["Explicit recall","The recency effect","Priming (an implicit memory phenomenon)","Chunking"],answer:2,rationale:"<b>Priming</b> = a prior stimulus implicitly speeds/biases processing of a related later stimulus (no conscious effort).",why:["Priming operates without conscious recall, unlike explicit memory.","The recency effect is about recalling the last list items.","Correct. Priming is an implicit process where exposure to one stimulus influences the response to a later one, without conscious awareness.","Chunking is grouping items to expand working memory."],takeaway:"Priming = prior exposure implicitly influences later processing (implicit memory)."},
  {tag:"Negative vs. positive priming",stem:"Prior exposure to a stimulus can sometimes SLOW or inhibit the response to it later. This is called:",choices:["Positive priming","Negative priming","The primacy effect","The cocktail party effect"],answer:1,rationale:"<b>Negative priming</b> = prior exposure slows/inhibits the later response; <b>positive priming</b> = prior exposure speeds it up.",why:["Positive priming speeds up the response \u2014 the opposite.","Correct. Negative priming is when prior exposure inhibits/slows a later response (contrast positive priming, which speeds it up).","The primacy effect concerns recalling early list items.","The cocktail party effect concerns attention to one's name in noise."],takeaway:"Negative priming = prior exposure slows response. Positive priming = speeds it up."},
  {tag:"Autobiographical memory",stem:"Your personal life story \u2014 combining episodic memories of events with semantic knowledge about yourself \u2014 is called:",choices:["Procedural memory","Iconic memory","Working memory","Autobiographical memory"],answer:3,rationale:"<b>Autobiographical memory</b> = your life story, combining <b>episodic</b> (events) and <b>semantic</b> (self-knowledge) memory.",why:["Procedural memory is for skills, not one's life story.","Iconic memory is a brief visual sensory trace.","Working memory is temporary online storage, not the life narrative.","Correct. Autobiographical memory blends episodic (specific events) and semantic (general self-knowledge) components into a coherent life narrative."],takeaway:"Autobiographical memory = life story (episodic events + semantic self-knowledge)."}
 ]},
{id:"ps-7b-encoding",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Attention & memory",categoryCode:"7B",idea:"Encoding strategies",
 questions:[
  {tag:"Encoding defined",stem:"Encoding refers to:",choices:["Retrieving a stored memory back into awareness","The brief holding of raw sensory input","The gradual weakening of a memory over time","Transferring information from working memory into long-term storage"],answer:3,rationale:"<b>Encoding</b> = transferring information from working memory into long-term storage.",why:["That's retrieval, not encoding.","That's sensory memory, not encoding.","That's decay/forgetting, not encoding.","Correct. Encoding is the process of getting information into long-term memory (often requiring active effort)."],takeaway:"Encoding = getting information INTO long-term memory."},
  {tag:"Rote rehearsal",stem:"Simply repeating someone's name over and over to remember it is:",choices:["Elaborative encoding \u2014 the most effective strategy","Rote rehearsal \u2014 the least effective encoding strategy (little cognitive effort)","Chunking meaningful groups","A mnemonic device"],answer:1,rationale:"<b>Rote rehearsal</b> = plain repetition, minimal effort, least effective. Deeper strategies (elaboration, chunking) work better.",why:["Elaborative encoding (linking to existing knowledge) is more effective, and different from rote repetition.","Correct. Rote rehearsal is plain repetition; it requires little deep processing and is the least effective for durable memory.","Chunking groups items meaningfully; rote rehearsal doesn't.","Mnemonics link material to existing memory; rote repetition doesn't."],takeaway:"Rote rehearsal = repetition, least effective (shallow processing)."},
  {tag:"Chunking",stem:"Grouping a long string of items into meaningful categories you already know (fruits, grains, proteins) to remember them better is:",choices:["Rote rehearsal","The method of loci","Chunking","State-dependent memory"],answer:2,rationale:"<b>Chunking</b> = grouping items into meaningful categories/units, making them easier to hold and recall.",why:["Rote rehearsal is plain repetition, not grouping into meaningful units.","The method of loci ties items to spatial locations, not category grouping.","Correct. Chunking organizes information into meaningful groups, expanding how much fits in memory.","State-dependent memory concerns internal state at encoding/retrieval."],takeaway:"Chunking = organize into meaningful groups \u2192 remember more."},
  {tag:"Method of loci",stem:"Remembering a list in order by mentally 'placing' each item at successive spots along a familiar route (your house, a street) uses the:",choices:["Method of loci","Peg-word system","Self-referencing","Rote rehearsal"],answer:0,rationale:"<b>Method of loci</b> = tie items to locations along a familiar route \u2014 strong for remembering things in order.",why:["Correct. The method of loci links items to well-known physical locations, good for ordered recall.","The peg-word system pairs items with number-rhyme pegs, not spatial locations.","Self-referencing relates material to yourself, not to locations.","Rote rehearsal is plain repetition."],takeaway:"Method of loci = place items along a familiar route (ordered recall)."},
  {tag:"Self-referencing",stem:"Remembering new information better by relating it to your own life and experiences is called:",choices:["The peg-word system","Rote rehearsal","Decay","Self-referencing"],answer:3,rationale:"<b>Self-referencing</b> = relate new information to yourself \u2192 deeper processing \u2192 better memory.",why:["The peg-word system uses number-rhyme anchors, not personal relevance.","Rote rehearsal is shallow repetition, not personal linking.","Decay is a forgetting mechanism, not an encoding strategy.","Correct. Self-referencing links new material to yourself, producing deep processing and better retention."],takeaway:"Self-referencing = link material to yourself (deep processing)."},
  {tag:"Spacing effect",stem:"Spreading study out across several shorter sessions over time, rather than cramming it all at once, improves long-term retention. This is the:",choices:["Serial position effect","Spacing effect","Encoding specificity","Rote rehearsal"],answer:1,rationale:"<b>Spacing effect</b>: distributed study over time beats cramming for long-term retention.",why:["The serial position effect is about recall of list positions.","Correct. The spacing effect: distributed practice beats massed practice (cramming) for durable learning.","Encoding specificity is about matching cues at encoding and retrieval.","Rote rehearsal is a shallow repetition strategy, not spacing."],takeaway:"Spacing effect = spread study out (distributed) \u2192 better long-term memory than cramming."},
  {tag:"Encoding specificity",stem:"Encoding specificity is the principle that memory is best when:",choices:["Information is repeated the maximum number of times","The material is completely novel and unrelated to anything","Retrieval conditions (cues, context) match the conditions present during encoding","Encoding happens without any cues"],answer:2,rationale:"<b>Encoding specificity</b>: memory is best when retrieval cues/context match those at encoding.",why:["Repetition alone (rote) isn't the encoding-specificity principle.","Relating to existing knowledge helps; total novelty doesn't aid encoding specificity.","Correct. Encoding specificity: retrieval improves when cues at recall match those present when the memory was formed.","Cues are central to encoding specificity, not absent."],takeaway:"Encoding specificity = match retrieval cues to encoding conditions."}
 ]},
{id:"ps-7b-retrieval-cues",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Attention & memory",categoryCode:"7B",idea:"Retrieval cues (context & state)",
 questions:[
  {tag:"Retrieval",stem:"Retrieval is best defined as:",choices:["Getting new information into long-term storage","The brief sensory trace of a stimulus","The physical strengthening of synapses","Bringing information from long-term memory back into conscious (working) memory"],answer:3,rationale:"<b>Retrieval</b> = bringing stored information from long-term memory back into conscious awareness (cue-dependent).",why:["That's encoding, not retrieval.","That's sensory memory, not retrieval.","That's LTP (a storage mechanism), not the act of retrieval.","Correct. Retrieval is accessing stored information and bringing it back into awareness; it depends on effective cues."],takeaway:"Retrieval = pulling a stored memory back into awareness (needs cues)."},
  {tag:"Context-dependent memory",stem:"Scuba divers who learned words underwater recalled them better when tested underwater than on land. This is:",choices:["State-dependent memory","Context-dependent memory","Priming","The spacing effect"],answer:1,rationale:"<b>Context-dependent memory</b>: matching the external environment (place) at encoding and retrieval improves recall.",why:["State-dependent memory concerns internal state (mood, intoxication), not external setting.","Correct. Context-dependent memory: recall improves when the external environment at retrieval matches the environment at encoding.","Priming is implicit facilitation by a prior stimulus.","The spacing effect concerns distributed practice."],takeaway:"Context-dependent memory = same external environment at encoding & retrieval aids recall."},
  {tag:"State-dependent memory",stem:"Information learned while in a particular internal state (e.g., a certain mood, or intoxicated) is best recalled in that same internal state. This is:",choices:["Context-dependent memory","Encoding specificity failure","State-dependent memory","Source monitoring"],answer:2,rationale:"<b>State-dependent memory</b>: your internal state (mood, intoxication) is a cue \u2014 matching it at retrieval aids recall.",why:["Context-dependent memory concerns the external environment, not internal state.","This is an application of encoding specificity, not a failure of it.","Correct. State-dependent memory: internal state (mood, intoxication) serves as a retrieval cue; matching it at recall aids memory.","Source monitoring is tracking where a memory came from."],takeaway:"State-dependent memory = same internal state (mood/substance) at encoding & retrieval aids recall."},
  {tag:"Priming as retrieval",stem:"Reading a story about rabbits makes you more likely to later interpret the spoken word 'hair/hare' as 'hare.' This retrieval-related facilitation is:",choices:["Priming","Context-dependent memory","Rote rehearsal","Proactive interference"],answer:0,rationale:"<b>Priming</b> = prior activation of associated nodes makes related information easier to retrieve (often unconsciously).",why:["Correct. Priming is the (often unconscious) activation of associations that makes related information easier to retrieve.","Context-dependent memory involves matching external environment, not associative activation.","Rote rehearsal is a repetition encoding strategy.","Proactive interference is old memories disrupting new learning."],takeaway:"Priming = a prior stimulus activates associations \u2192 related info easier to retrieve."}
 ]},
{id:"ps-7b-recall-recognition",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Attention & memory",categoryCode:"7B",idea:"Free recall, cued recall & recognition",
 questions:[
  {tag:"Difficulty ranking",stem:"Ordered from MOST difficult to EASIEST, the three types of retrieval tasks are:",choices:["Recognition \u2192 cued recall \u2192 free recall","Cued recall \u2192 free recall \u2192 recognition","Recognition \u2192 free recall \u2192 cued recall","Free recall \u2192 cued recall \u2192 recognition"],answer:3,rationale:"Retrieval difficulty: <b>free recall (hardest) \u2192 cued recall \u2192 recognition (easiest)</b> \u2014 more cues make it easier.",why:["That's easiest-to-hardest \u2014 reversed.","Free recall is harder than cued recall, not easier.","Free recall is harder than recognition; this ordering is scrambled.","Correct. Free recall (no cues) is hardest; cued recall (with hints) is easier; recognition (choose from options) is easiest."],takeaway:"Hard\u2192easy: free recall \u2192 cued recall \u2192 recognition."},
  {tag:"Free recall",stem:"Being asked to list everything you can remember from a lecture, with no hints provided, is an example of:",choices:["Cued recall","Free recall","Recognition","Priming"],answer:1,rationale:"<b>Free recall</b> = retrieve with no cues (hardest). You generate everything yourself.",why:["Cued recall provides hints or partial cues.","Correct. Free recall provides no cues \u2014 you must generate the information yourself, making it the hardest task.","Recognition provides options to choose from.","Priming is an implicit facilitation, not a recall task type."],takeaway:"Free recall = no cues, generate it all yourself (hardest)."},
  {tag:"Cued recall",stem:"Being given the hint 'it starts with pl___' to recall the word 'planet' is an example of:",choices:["Free recall","Recognition","Cued recall","Recency effect"],answer:2,rationale:"<b>Cued recall</b> = hints/partial cues help you produce the answer (easier than free recall, harder than recognition).",why:["Free recall gives no cues.","Recognition presents the answer among options to select.","Correct. Cued recall provides retrieval cues that make recall easier than free recall but still require producing the answer.","The recency effect concerns list-position recall."],takeaway:"Cued recall = hints help you produce the answer."},
  {tag:"Recognition",stem:"A multiple-choice question, where you select which option you saw before, is a test of:",choices:["Recognition (the easiest retrieval task)","Free recall","Reconstruction","Decay"],answer:0,rationale:"<b>Recognition</b> = identify the correct item from presented options (easiest retrieval; multiple choice).",why:["Correct. Recognition presents options and asks you to identify the correct one \u2014 the easiest form of retrieval.","Free recall requires generating the answer with no options.","Reconstruction is rebuilding a memory, not selecting from options.","Decay is a forgetting mechanism."],takeaway:"Recognition = pick the right answer from options (easiest)."},
  {tag:"Serial position curve",stem:"The tendency to recall the first items (primacy) and last items (recency) of a list better than the middle produces the:",choices:["Forgetting curve","Encoding-specificity curve","Yerkes-Dodson curve","Serial position curve"],answer:3,rationale:"<b>Serial position curve</b>: primacy (first items, rehearsed to LTM) + recency (last items, in working memory) \u2192 U-shape; middle recalled worst.",why:["The forgetting curve (Ebbinghaus) plots memory loss over time, not list position.","There is no standard 'encoding-specificity curve.'","The Yerkes-Dodson curve relates arousal to performance.","Correct. The serial position (U-shaped) curve shows good recall for early (primacy) and late (recency) items, poor for the middle."],takeaway:"Serial position curve = primacy + recency, middle worst (U-shape)."}
 ]},
{id:"ps-7b-reconstruction",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Attention & memory",categoryCode:"7B",idea:"Memory reconstruction & emotional memory",
 questions:[
  {tag:"Reconstructive memory",stem:"The finding that memory is not a perfect recording but is rebuilt each time \u2014 and can be altered by goals, mood, and new information \u2014 is called:",choices:["Photographic (eidetic) memory","Sensory memory","Procedural memory","Reconstructive memory"],answer:3,rationale:"<b>Reconstructive memory</b>: recall rebuilds a memory from fragments/schemas each time, so it can be altered \u2014 not a video recording.",why:["Memory is not a perfect photographic recording \u2014 that's the point being refuted.","Sensory memory is a brief raw trace, not the reconstruction of past events.","Procedural memory is for skills, not event reconstruction.","Correct. Memory is reconstructive: we rebuild it from fragments and schemas, so it can be distorted rather than replayed verbatim."],takeaway:"Memory is reconstructive (rebuilt each time), not a perfect recording."},
  {tag:"Schema",stem:"When you fill gaps in a memory using general knowledge of how things usually go (a mental blueprint of the world), you are relying on a:",choices:["Flashbulb memory","Schema","Retrieval cue","Peg-word"],answer:1,rationale:"A <b>schema</b> = mental blueprint of how things usually are; it aids interpretation but can distort memory by filling gaps.",why:["A flashbulb memory is a vivid emotional memory, not a general knowledge framework.","Correct. A schema is an organized mental framework; it helps interpretation but can also introduce distortions when it fills gaps.","A retrieval cue triggers recall; a schema organizes/interprets information.","A peg-word is a mnemonic device."],takeaway:"Schema = mental framework of the world; fills gaps (can cause distortion)."},
  {tag:"Misinformation effect",stem:"After watching a car crash, people asked how fast cars were going when they 'smashed' later recall more broken glass than those asked about 'hit.' This is the:",choices:["Flashbulb effect","Spacing effect","Misinformation effect","Encoding specificity"],answer:2,rationale:"<b>Misinformation effect</b>: misleading information after an event (e.g., 'smashed' vs. 'hit') distorts the memory \u2014 why leading questions are problematic.",why:["A flashbulb memory is a vivid emotional memory, not memory distortion by wording.","The spacing effect concerns distributed practice.","Correct. Loftus's misinformation effect: misleading post-event information (word choice) distorts the memory, so leading questions are risky.","Encoding specificity concerns matching cues at encoding/retrieval."],takeaway:"Misinformation effect = misleading post-event info distorts memory (Loftus)."},
  {tag:"Source monitoring error",stem:"Recalling a fact but misremembering WHERE you learned it \u2014 e.g., 'remembering' a detail from a movie as something you witnessed \u2014 is a:",choices:["Source-monitoring error","Flashbulb memory","Proactive interference","Chunking failure"],answer:0,rationale:"<b>Source-monitoring error</b> = remembering information but misattributing where/when/how you learned it (vs. source amnesia = no memory of the source).",why:["Correct. Source-monitoring errors occur when you retain information but misattribute its origin (source amnesia is the inability to recall the source at all).","A flashbulb memory is a vivid emotional memory, not a source confusion.","Proactive interference is old learning disrupting new learning.","Chunking is an encoding strategy, unrelated to source confusion."],takeaway:"Source-monitoring error = right info, wrong source. (Source amnesia = no memory of source at all.)"},
  {tag:"Flashbulb memory",stem:"A vivid, emotionally charged memory of learning shocking news (e.g., where you were during 9/11) that feels as real as life is a:",choices:["Procedural memory","Iconic memory","Chunk","Flashbulb memory"],answer:3,rationale:"<b>Flashbulb memory</b> = vivid, emotionally intense memory of a shocking event; feels accurate but is still reconstructive and error-prone.",why:["Procedural memory is for skills, not vivid emotional events.","Iconic memory is a brief visual sensory trace.","A chunk is a unit of grouped information.","Correct. Flashbulb memories (Brown & Kulik) are vivid emotional memories \u2014 but, despite feeling perfectly accurate, they're still susceptible to reconstruction/error."],takeaway:"Flashbulb memory = vivid emotional 'snapshot' memory (still error-prone despite feeling real)."}
 ]},
{id:"ps-7b-ltp",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Attention & memory",categoryCode:"7B",idea:"Long-term potentiation & plasticity",
 questions:[
  {tag:"Long-term potentiation",stem:"The strengthening of a synaptic connection that results from repeated, high-frequency stimulation \u2014 a leading physical basis of learning \u2014 is:",choices:["Long-term depression only","Sensory adaptation","Rote rehearsal","Long-term potentiation (LTP)"],answer:3,rationale:"<b>Long-term potentiation (LTP)</b> = lasting synaptic strengthening from repeated stimulation \u2014 a physical basis of learning/memory.",why:["LTP is strengthening; long-term depression is the weakening counterpart.","Sensory adaptation is reduced receptor response, unrelated to synaptic strengthening.","Rote rehearsal is a behavioral study strategy, not a synaptic mechanism.","Correct. LTP is the lasting strengthening of synapses following repeated stimulation, thought to underlie learning and memory (synaptic plasticity)."],takeaway:"LTP = synapses strengthen with repeated stimulation (basis of learning)."},
  {tag:"Synaptic plasticity",stem:"The broader capacity of synapses to strengthen or weaken over time, changing the brain's structure and function with experience, is called:",choices:["Homeostasis","Synaptic (neural) plasticity","Refractoriness","Myelination"],answer:1,rationale:"<b>Synaptic/neural plasticity</b> = experience-driven changes in synaptic strength and brain structure (LTP is one instance).",why:["Homeostasis is maintaining internal stability, not changing synaptic strength with learning.","Correct. Synaptic/neural plasticity is the experience-driven change in synaptic strength and brain structure; LTP is one example.","Refractoriness is a neuron's brief inability to fire again, not plasticity.","Myelination speeds conduction but isn't the definition of plasticity."],takeaway:"Synaptic plasticity = experience changes synaptic strength/brain structure."},
  {tag:"Repeated stimulation \u2192 stronger response",stem:"In LTP, repeated presynaptic stimulation leads to a stronger postsynaptic response mainly because:",choices:["The presynaptic neuron is destroyed","Myelin is stripped from the axon","More receptors/ion channels open in the postsynaptic neuron, facilitating future firing","The synapse is permanently silenced"],answer:2,rationale:"In <b>LTP</b>, repeated stimulation increases postsynaptic responsiveness (more channels open) \u2192 easier future firing \u2192 stronger memory.",why:["Neither neuron is destroyed; the connection is strengthened.","Myelin isn't stripped; the synapse is potentiated.","Correct. LTP involves increased postsynaptic responsiveness (more open channels/receptors), so the same input more easily triggers firing later \u2014 facilitated recall.","Silencing a synapse is the opposite of potentiation."],takeaway:"LTP: repeated stimulation \u2192 more postsynaptic channels open \u2192 stronger, easier future response."}
 ]},
{id:"ps-7b-forgetting",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Attention & memory",categoryCode:"7B",idea:"Forgetting: decay & interference",
 questions:[
  {tag:"Decay",stem:"Forgetting because a memory trace fades over time when it is not used or retrieved is explained by:",choices:["Retroactive interference","Proactive interference","Encoding specificity","Decay theory"],answer:3,rationale:"<b>Decay</b>: memory traces fade over time with disuse (the pathway weakens).",why:["Retroactive interference is new learning disrupting old memory, not passive fading.","Proactive interference is old learning disrupting new, not passive fading.","Encoding specificity concerns cue matching, not fading.","Correct. Decay: an unused memory trace weakens over time, making the neurons harder to re-activate."],takeaway:"Decay = memory fades over time from disuse."},
  {tag:"Ebbinghaus forgetting curve",stem:"Ebbinghaus's forgetting curve, measured with nonsense syllables, showed that:",choices:["Forgetting is slow at first, then accelerates","Forgetting is fastest right after learning, then levels off over time","Nothing is ever forgotten","Memory improves steadily with time"],answer:1,rationale:"<b>Ebbinghaus's forgetting curve</b>: rapid initial forgetting that then levels off \u2014 most loss happens soon after learning.",why:["It's the reverse \u2014 forgetting is fastest early, then slows.","Correct. The forgetting curve drops steeply soon after learning, then flattens \u2014 most forgetting happens early.","A great deal is forgotten, especially early on.","Memory declines (not improves) without review."],takeaway:"Ebbinghaus curve = fast forgetting at first, then it levels off."},
  {tag:"Savings (relearning)",stem:"Even when you can't recall something, relearning it is faster than the first time. Ebbinghaus called this measurable benefit:",choices:["Interference","Decay","Savings","Priming"],answer:2,rationale:"<b>Savings</b> = relearning is faster than first learning \u2014 evidence a memory trace persists even when recall fails.",why:["Interference is memories disrupting each other, not the relearning benefit.","Decay is the fading of memory, not the relearning savings.","Correct. Savings: relearning takes less time than original learning, showing some trace remains even when recall fails.","Priming is implicit facilitation by a prior stimulus, a different phenomenon."],takeaway:"Savings = relearning is faster than original learning (a trace remains)."},
  {tag:"Retroactive interference",stem:"Getting a new phone number makes it hard to recall your OLD number. New learning disrupting an older memory is:",choices:["Retroactive interference","Proactive interference","Decay","State-dependent forgetting"],answer:0,rationale:"<b>Retroactive interference</b>: NEW learning disrupts recall of OLDER memories (new number \u2192 forget old).",why:["Correct. Retroactive interference: newer information interferes with the recall of older information.","Proactive interference is the reverse \u2014 OLD learning disrupting NEW.","Decay is passive fading, not interference from other learning.","State-dependent forgetting concerns mismatched internal states."],takeaway:"Retroactive interference = new info disrupts OLD memory."},
  {tag:"Proactive interference",stem:"Your OLD password keeps interfering with learning your NEW one. Older learning disrupting NEW learning is:",choices:["Retroactive interference","Savings","Chunking","Proactive interference"],answer:3,rationale:"<b>Proactive interference</b>: OLD learning disrupts NEW learning/recall (old password \u2192 hard to learn new one).",why:["Retroactive interference is the reverse \u2014 NEW disrupting OLD.","Savings is faster relearning, not interference.","Chunking is an encoding strategy.","Correct. Proactive interference: previously learned information interferes with acquiring or recalling new information."],takeaway:"Proactive interference = old info disrupts NEW learning. (Pro = prior/forward.)"}
 ]},
{id:"ps-7b-aging-disorders",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Attention & memory",categoryCode:"7B",idea:"Aging & memory disorders",
 questions:[
  {tag:"What stays stable with age",stem:"With normal aging, which memory abilities tend to remain relatively STABLE?",choices:["Processing speed and divided attention","Forming new episodic memories","Prospective memory (remembering future intentions)","Implicit (procedural) memory and recognition"],answer:3,rationale:"With aging: <b>implicit/procedural memory and recognition stay stable</b>; recall, episodic formation, processing speed, and divided attention decline.",why:["Processing speed and divided attention typically DECLINE with age.","Forming new episodic memories tends to decline.","Prospective memory typically declines with age.","Correct. Implicit/procedural memory (e.g., riding a bike) and recognition tend to hold up with age."],takeaway:"Aging stable: procedural memory + recognition. Declines: recall, new episodic, speed, divided attention."},
  {tag:"What improves with age",stem:"Which cognitive ability tends to IMPROVE (or peak later) with age?",choices:["Processing speed","Semantic memory and crystallized intelligence (accumulated knowledge/vocabulary)","Divided attention","Forming new episodic memories"],answer:1,rationale:"With aging, <b>semantic memory and crystallized intelligence</b> (knowledge, vocabulary) improve, even as speed and fluid abilities decline.",why:["Processing speed declines with age.","Correct. Semantic memory (facts, vocabulary) and crystallized intelligence often improve into older adulthood; fluid abilities/speed decline.","Divided attention declines with age.","New episodic memory formation declines with age."],takeaway:"Aging improves: semantic memory + crystallized IQ (knowledge/vocab)."},
  {tag:"Alzheimer's disease",stem:"Alzheimer's disease, the most common cause of dementia, is characterized by progressive memory loss and, in the brain, a buildup of:",choices:["Excess dopamine in the striatum","Thiamine crystals","Amyloid plaques (with cortical shrinkage)","Myelin overgrowth"],answer:2,rationale:"<b>Alzheimer's disease</b> = progressive dementia with <b>amyloid plaques</b> and cortical shrinkage; earliest signs are trouble with recent memories.",why:["Dopamine loss in the striatum characterizes Parkinson's, not Alzheimer's plaques.","Thiamine deficiency characterizes Korsakoff's, not Alzheimer's.","Correct. Alzheimer's involves amyloid plaques (and tau tangles), progressive neuron death, and cerebral cortex shrinkage; early symptoms are trouble retrieving recent memories.","Alzheimer's involves neurodegeneration, not myelin overgrowth."],takeaway:"Alzheimer's = amyloid plaques + progressive memory loss (recent memories first)."},
  {tag:"Korsakoff's syndrome",stem:"Korsakoff's syndrome, marked by severe memory loss and confabulation (filling gaps with invented memories), is caused by a deficiency of:",choices:["Vitamin B1 (thiamine) \u2014 often from chronic alcoholism","Dopamine","Vitamin C","Amyloid protein"],answer:0,rationale:"<b>Korsakoff's syndrome</b> = thiamine (B1) deficiency (often from alcoholism) \u2192 severe memory loss + confabulation. Wernicke's encephalopathy is the acute precursor.",why:["Correct. Korsakoff's results from thiamine (B1) deficiency, commonly due to alcoholism; confabulation is a hallmark. (Wernicke's encephalopathy is the acute precursor.)","Dopamine loss relates to Parkinson's, not Korsakoff's.","Vitamin C deficiency causes scurvy, not Korsakoff's.","Amyloid buildup characterizes Alzheimer's, not Korsakoff's."],takeaway:"Korsakoff's = thiamine (B1) deficiency (alcoholism) \u2192 memory loss + confabulation."},
  {tag:"Anterograde vs. retrograde amnesia",stem:"After brain damage, a patient can recall their childhood but cannot form any NEW long-term memories. This is:",choices:["Retrograde amnesia","Source amnesia","Proactive interference","Anterograde amnesia"],answer:3,rationale:"<b>Anterograde amnesia</b> = can't form NEW memories after injury (past intact). <b>Retrograde amnesia</b> = lost memories from BEFORE the injury.",why:["Retrograde amnesia is loss of PRE-injury memories, but here childhood memory is intact.","Source amnesia is forgetting where information was learned, not an inability to form new memories.","Proactive interference is old learning disrupting new, not an amnesia from brain damage.","Correct. Anterograde amnesia is the inability to form NEW memories after the injury (old memories are intact). Retrograde amnesia is loss of memories from BEFORE the injury."],takeaway:"Anterograde = no NEW memories after injury. Retrograde = lost OLD memories before injury."},
  {tag:"Dementia defined",stem:"Dementia is best defined as:",choices:["A normal, expected part of healthy aging","A decline in memory and other cognitive functions severe enough to interfere with daily life","A brief, fully reversible memory lapse","A deficiency of vitamin B1 specifically"],answer:1,rationale:"<b>Dementia</b> = cognitive decline (memory + other functions) severe enough to disrupt daily life \u2014 not normal aging.",why:["Dementia is not a normal part of aging \u2014 it's pathological.","Correct. Dementia is a significant cognitive decline (memory plus other domains) that disrupts daily functioning \u2014 beyond normal aging; Alzheimer's is the most common cause.","Dementia is progressive and impairing, not a brief reversible lapse.","B1 deficiency causes Korsakoff's; dementia has many causes, most commonly Alzheimer's."],takeaway:"Dementia = cognitive decline disrupting daily life (not normal aging). Most common cause: Alzheimer's."}
 ]},
{id:"ps-7b-semantic-networks",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Cognition",categoryCode:"7B",idea:"Semantic networks & spreading activation",
 questions:[
  {tag:"Semantic networks",stem:"A semantic network models how concepts are stored in the mind as:",choices:["A single unstructured list with no connections","Brief raw sensory traces","Interconnected nodes, with closely related ideas linked more tightly","Separate isolated facts with no links"],answer:2,rationale:"A <b>semantic network</b> stores concepts as interconnected nodes; closer-related ideas are more tightly linked.",why:["A semantic network is highly interconnected, not an unstructured list.","Sensory traces are a memory-store concept, not the semantic network structure.","Correct. In a semantic network, concepts are represented as nodes connected by links; closely related ideas have shorter/stronger links.","The whole point is that concepts are linked, not isolated."],takeaway:"Semantic network = concepts as connected nodes (closer ideas = stronger links)."},
  {tag:"Hierarchical model",stem:"The FIRST semantic-network model proposed that concepts are organized:",choices:["Hierarchically \u2014 from higher-order (broad) categories down to lower-order (specific) ones","Randomly, with no organization","Only by emotional valence","In a single flat list"],answer:0,rationale:"The first model was <b>hierarchical</b>: broad categories at higher nodes, specifics below; shared traits stored at the highest level (cognitive economy).",why:["Correct. The hierarchical model organizes concepts from broad superordinate categories to specific ones, storing shared traits at the highest applicable node.","The hierarchical model is highly organized, not random.","It organizes by category level, not emotion.","It's a multi-level hierarchy, not a flat list."],takeaway:"Hierarchical model = concepts from broad (top) to specific (bottom)."},
  {tag:"Cognitive economy",stem:"Storing a shared property like 'can breathe' only once at the highest node ('animal') rather than repeating it for every specific animal reflects the:",choices:["Spreading activation principle","Availability heuristic","Serial position effect","Cognitive economy principle"],answer:3,rationale:"<b>Cognitive economy</b>: store a shared property once at the highest applicable node (efficient, non-redundant storage).",why:["Spreading activation is about activation flowing across links, not efficient storage.","The availability heuristic is a decision-making shortcut, unrelated.","The serial position effect concerns list-position recall.","Correct. Cognitive economy stores properties at the highest applicable level to avoid redundancy \u2014 making storage efficient."],takeaway:"Cognitive economy = store shared traits at the highest node (no redundancy)."},
  {tag:"Verification-time evidence",stem:"Evidence for the hierarchical model comes from the finding that verifying 'a canary is an animal' takes LONGER than 'a canary is a bird' because:",choices:["Animals are less common than birds","More nodes/links must be traversed for the more distant category","The word 'animal' is longer","People dislike canaries"],answer:1,rationale:"Verification time rises with <b>semantic distance</b>: more nodes to traverse (canary\u2192bird\u2192animal) = slower verification.",why:["Frequency of the category isn't the model's explanation; distance is.","Correct. Greater semantic distance (more links to traverse) means longer verification time \u2014 the hierarchical model's key prediction.","Word length isn't the mechanism.","Preference is irrelevant to verification time."],takeaway:"More links between concepts \u2192 longer verification time (hierarchical model evidence)."},
  {tag:"Hierarchical model's problem",stem:"A problem for the strict hierarchical model is that people verify 'a pig is an animal' FASTER than 'a pig is a mammal,' which the model can't explain. This helped motivate the:",choices:["Cognitive economy principle","Serial position curve","Modified (non-hierarchical) semantic network with spreading activation","Method of loci"],answer:2,rationale:"The pig-animal/pig-mammal reversal breaks strict hierarchy \u2192 the <b>modified spreading-activation network</b> (link strength by experience) fits better.",why:["Cognitive economy is part of the hierarchical model being challenged, not the fix.","The serial position curve concerns list recall, not category verification.","Correct. Such reversals (and individual differences) led to the modified spreading-activation network, where link strength varies by experience rather than strict hierarchy.","The method of loci is a mnemonic device."],takeaway:"Hierarchy fails for some pairs (pig\u2192animal faster than pig\u2192mammal) \u2192 modified spreading-activation model."},
  {tag:"Spreading activation",stem:"Thinking of 'fire engine' automatically makes 'truck,' 'red,' and 'fire' easier to retrieve, because activating one node activates connected ones. This is:",choices:["Spreading activation","Cognitive economy","Proactive interference","Chunking"],answer:0,rationale:"<b>Spreading activation</b>: activating one node spreads to connected nodes, making related concepts easier to retrieve (and can cause related-memory errors).",why:["Correct. Spreading activation: activating one concept spreads to linked concepts, easing their retrieval (and it can explain false/related-memory errors).","Cognitive economy concerns efficient storage, not activation spreading.","Proactive interference is old learning disrupting new.","Chunking is grouping items to expand memory."],takeaway:"Spreading activation = activating one concept primes connected ones."},
  {tag:"Node link strength",stem:"In a spreading-activation network, the strength of the link between two nodes is largely a function of:",choices:["The alphabetical order of the words","Random assignment at birth","The number of letters in each word","Exposure \u2014 more experience strengthens the link (and speeds processing)"],answer:3,rationale:"<b>Node link strength</b> grows with exposure/experience; stronger links speed processing \u2014 which is why learning reduces retrieval time.",why:["Alphabetical order doesn't set associative strength.","Links are shaped by experience, not fixed randomly at birth.","Word length doesn't determine link strength.","Correct. Repeated exposure strengthens node links; stronger links transmit more activation and reduce processing time (learning speeds retrieval)."],takeaway:"Link strength grows with exposure \u2192 stronger links = faster processing (learning speeds retrieval)."}
 ]},
{id:"ps-7b-piaget",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Cognition",categoryCode:"7B",idea:"Piaget's stages of cognitive development",
 questions:[
  {tag:"Sensorimotor \u00b7 object permanence",stem:"In Piaget's first stage, a hallmark achievement is object permanence \u2014 understanding that objects still exist when out of sight. This stage is:",choices:["Preoperational (2\u20137 years)","Concrete operational (7\u201311 years)","Sensorimotor (birth\u20132 years)","Formal operational (12+ years)"],answer:2,rationale:"<b>Sensorimotor</b> (0\u20132): learning via senses/motor action; key milestone = <b>object permanence</b>.",why:["Preoperational children already have object permanence; it develops earlier.","Concrete operational is far later; object permanence is achieved by then.","Correct. In the sensorimotor stage, infants learn through senses/motor action and develop object permanence (why peek-a-boo works before it's mastered).","Formal operational is adolescence \u2014 well past object permanence."],takeaway:"Sensorimotor (0\u20132) = senses/motor; object permanence develops here."},
  {tag:"Preoperational \u00b7 egocentrism",stem:"A 4-year-old assumes you can see exactly what she sees and can't take another's viewpoint. This egocentrism (and symbolic thinking) is characteristic of the:",choices:["Preoperational stage (2\u20137 years)","Sensorimotor stage","Concrete operational stage","Formal operational stage"],answer:0,rationale:"<b>Preoperational</b> (2\u20137): symbolic thought, but <b>egocentrism</b> (can't take another's perspective) and magical thinking.",why:["Correct. Preoperational children use symbols/language and show egocentrism (can't take others' perspectives) and magical thinking.","Sensorimotor is the infant sensory/motor stage, before symbolic egocentrism.","Concrete operational children have overcome egocentrism.","Formal operational is abstract adolescent reasoning."],takeaway:"Preoperational (2\u20137) = symbols + egocentrism (no perspective-taking)."},
  {tag:"Concrete operational \u00b7 conservation",stem:"A child now understands that pouring water into a taller, thinner glass doesn't change the amount \u2014 grasping conservation. This marks the:",choices:["Preoperational stage","Sensorimotor stage","Formal operational stage","Concrete operational stage (7\u201311 years)"],answer:3,rationale:"<b>Concrete operational</b> (7\u201311): logical reasoning about concrete things; masters <b>conservation</b> and reversibility.",why:["Preoperational children typically FAIL conservation tasks.","Sensorimotor is infancy, far before conservation.","Formal operational adds abstract reasoning beyond concrete conservation.","Correct. Concrete operational children master conservation (and reversibility) and can reason logically about concrete objects."],takeaway:"Concrete operational (7\u201311) = conservation + logical thinking about concrete objects."},
  {tag:"Formal operational \u00b7 abstract reasoning",stem:"The ability to reason abstractly and hypothetically, consider consequences, and engage in moral reasoning emerges in Piaget's final stage, the:",choices:["Concrete operational stage","Formal operational stage (12+ years)","Preoperational stage","Sensorimotor stage"],answer:1,rationale:"<b>Formal operational</b> (12+): abstract and hypothetical reasoning, consequences, and moral reasoning.",why:["Concrete operational reasoning is tied to concrete objects, not abstract hypotheticals.","Correct. Formal operational thought (adolescence onward) enables abstract, hypothetical, and moral reasoning.","Preoperational thought is pre-logical and egocentric.","Sensorimotor is infancy."],takeaway:"Formal operational (12+) = abstract/hypothetical + moral reasoning."},
  {tag:"Stage order",stem:"Piaget's four stages, in the correct developmental order, are:",choices:["Preoperational \u2192 sensorimotor \u2192 formal operational \u2192 concrete operational","Sensorimotor \u2192 concrete operational \u2192 preoperational \u2192 formal operational","Sensorimotor \u2192 preoperational \u2192 concrete operational \u2192 formal operational","Formal operational \u2192 concrete operational \u2192 preoperational \u2192 sensorimotor"],answer:2,rationale:"Piaget's order: <b>sensorimotor \u2192 preoperational \u2192 concrete operational \u2192 formal operational</b>.",why:["Sensorimotor comes first, not preoperational.","Preoperational precedes concrete operational, not the reverse.","Correct. The order is sensorimotor \u2192 preoperational \u2192 concrete operational \u2192 formal operational.","That's the reverse order."],takeaway:"Piaget order: sensorimotor \u2192 preoperational \u2192 concrete operational \u2192 formal operational."},
  {tag:"Critique of Piaget",stem:"Later research modified Piaget's theory by showing that:",choices:["Children don't always develop these abilities in a rigid, predictable timeline (some abilities appear earlier)","The stages occur in reverse order","Cognitive development never occurs","Only adults have schemas"],answer:0,rationale:"Modern view: Piaget's stages aren't as rigid/fixed in timing as proposed \u2014 some abilities appear earlier, development is more continuous.",why:["Correct. Development is less rigidly staged than Piaget claimed; some abilities emerge earlier and progress is more continuous \u2014 though his framework remains foundational.","The stages don't reverse; the critique is about timing/rigidity.","Cognitive development clearly occurs; the critique is about its pace/rigidity.","Children have schemas too \u2014 that's central to Piaget."],takeaway:"Critique: development is less rigidly staged/timed than Piaget claimed (but framework is foundational)."}
 ]},
{id:"ps-7b-schemas",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Cognition",categoryCode:"7B",idea:"Schemas, assimilation & accommodation",
 questions:[
  {tag:"Schema",stem:"In Piaget's theory, a schema is:",choices:["A brief raw sensory trace","A physical brain region","A mental framework used to organize and interpret new information","A type of forgetting"],answer:2,rationale:"A <b>schema</b> = a mental framework for organizing and interpreting information; development is the growth/change of schemas.",why:["A raw sensory trace is sensory memory, not a schema.","A schema is a cognitive structure, not an anatomical region.","Correct. A schema is a cognitive framework/model that organizes knowledge and guides interpretation of new experiences.","A schema is a framework for understanding, not a forgetting mechanism."],takeaway:"Schema = mental framework to organize/interpret information."},
  {tag:"Assimilation",stem:"Fitting a new experience into an existing schema without changing the schema \u2014 e.g., a child calling a new small dog 'doggie' \u2014 is:",choices:["Assimilation","Accommodation","Conservation","Equilibrium"],answer:0,rationale:"<b>Assimilation</b> = fit new info into an existing schema (no change). Mnemonic: 'ss' = Same Schema.",why:["Correct. Assimilation interprets new information using current schemas (mnemonic: assimilation has 'ss' = same schema).","Accommodation changes the schema; assimilation keeps it the same.","Conservation is understanding quantity is unchanged despite appearance.","Equilibrium is the balanced end-state, not the process of fitting in new info."],takeaway:"Assimilation = fit new info into existing schema (same schema, 'ss')."},
  {tag:"Accommodation",stem:"Adjusting or creating a new schema because new information doesn't fit existing ones \u2014 e.g., learning a whale is not a fish \u2014 is:",choices:["Assimilation","Egocentrism","Object permanence","Accommodation"],answer:3,rationale:"<b>Accommodation</b> = change or create a schema to fit new info. Mnemonic: 'cc' = Change/Create.",why:["Assimilation fits info into an existing schema without change \u2014 the opposite.","Egocentrism is failing to take another's perspective.","Object permanence is knowing objects exist unseen.","Correct. Accommodation changes or creates schemas to fit new information (mnemonic: 'cc' = change/create)."],takeaway:"Accommodation = change/create a schema for new info ('cc' = change/create)."},
  {tag:"Equilibrium",stem:"In Piaget's model, when new information can be assimilated smoothly, the child returns to a balanced cognitive state called:",choices:["Disequilibrium (permanent)","Equilibrium","Egocentrism","Fixation"],answer:1,rationale:"<b>Equilibrium</b> = the balanced cognitive state reached by assimilating/accommodating new information (equilibration drives development).",why:["Disequilibrium is the temporary imbalance that drives accommodation, not the resolved state.","Correct. Development moves through equilibrium: assimilate/accommodate new info to restore a balanced state (equilibration).","Egocentrism is a preoperational limitation, not the balanced state.","Fixation is getting stuck on a wrong problem-solving approach."],takeaway:"Equilibrium = balanced state after assimilating/accommodating new info."}
 ]},
{id:"ps-7b-problem-solving",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Cognition",categoryCode:"7B",idea:"Problem solving",
 questions:[
  {tag:"Well- vs. ill-defined",stem:"A problem with a clear starting point and clear criteria for success (e.g., 'turn on the light') is ______; one with an ambiguous goal (e.g., 'live a happy life') is ______.",choices:["Ill-defined; well-defined","Algorithmic; heuristic","Well-defined; ill-defined","Trial-and-error; insight"],answer:2,rationale:"<b>Well-defined</b> = clear start, end, and success criteria. <b>Ill-defined</b> = ambiguous goal or missing information.",why:["Reversed \u2014 clear criteria = well-defined.","Algorithm/heuristic are solution METHODS, not the problem-clarity distinction.","Correct. Well-defined problems have clear start/end and success criteria; ill-defined problems have ambiguous goals or lack information.","Trial-and-error/insight are approaches, not the definition of the problem."],takeaway:"Well-defined = clear goal/criteria. Ill-defined = ambiguous goal."},
  {tag:"Algorithm",stem:"A step-by-step procedure that systematically tries options and is guaranteed to eventually find the correct solution (though possibly slow) is a(n):",choices:["Algorithm","Heuristic","Insight","Fixation"],answer:0,rationale:"An <b>algorithm</b> = a systematic step-by-step method guaranteed to find the solution (but can be slow).",why:["Correct. An algorithm is a methodical, exhaustive procedure that guarantees a solution but can be inefficient.","A heuristic is a shortcut that's faster but not guaranteed.","Insight is a sudden solution, not a systematic procedure.","Fixation is getting stuck on a wrong approach."],takeaway:"Algorithm = systematic, guaranteed, but can be slow."},
  {tag:"Heuristic",stem:"A mental shortcut that reduces the number of options considered \u2014 faster than an algorithm but not guaranteed to find the correct answer \u2014 is a(n):",choices:["Algorithm","Conservation strategy","Confabulation","Heuristic"],answer:3,rationale:"A <b>heuristic</b> = a mental shortcut: faster than an algorithm but not guaranteed correct.",why:["An algorithm is exhaustive and guaranteed, not a shortcut.","Conservation is a Piagetian concept, unrelated to problem-solving shortcuts.","Confabulation is filling memory gaps with invented information.","Correct. A heuristic trims the search space for speed, trading the algorithm's guarantee for efficiency."],takeaway:"Heuristic = shortcut (fast, not guaranteed). Algorithm = exhaustive (guaranteed, slow)."},
  {tag:"Means-end analysis",stem:"Breaking a big problem into subgoals and repeatedly reducing the difference between your current state and the goal state is the heuristic called:",choices:["Working backwards","Means-end analysis","Trial and error","Fixation"],answer:1,rationale:"<b>Means-end analysis</b>: break the problem into subgoals, reducing the difference between current and goal states (current \u2192 goal).",why:["Working backwards starts from the goal and reasons toward the current state \u2014 the reverse direction.","Correct. Means-end analysis reduces the gap between the current and goal states step by step (current state \u2192 goal state).","Trial and error tries options at random, without subgoal structure.","Fixation is getting stuck on a wrong approach."],takeaway:"Means-end analysis = reduce the gap between current state and goal (via subgoals)."},
  {tag:"Working backwards",stem:"Starting from the goal and reasoning back toward the current state \u2014 common in math proofs and mazes \u2014 is the heuristic called:",choices:["Means-end analysis","Trial and error","Working backwards","Insight"],answer:2,rationale:"<b>Working backwards</b>: start at the goal and reason back to the current state (goal \u2192 current). Useful in proofs and mazes.",why:["Means-end analysis works forward from the current state toward the goal.","Trial and error tries options without a directional strategy.","Correct. Working backwards begins at the goal and finds connections back to the starting point (goal state \u2192 current state).","Insight is a sudden realization, not a stepwise strategy."],takeaway:"Working backwards = start at the goal, reason back to the start."},
  {tag:"Fixation & insight",stem:"Getting stuck approaching a problem the wrong way is fixation; the sudden 'aha!' realization that often breaks it is:",choices:["Insight","An algorithm","Assimilation","The recency effect"],answer:0,rationale:"<b>Fixation</b> = stuck on a wrong approach; <b>insight</b> = sudden 'aha' solution (may follow incubation).",why:["Correct. Fixation is being stuck on an unproductive approach; insight is the sudden solution that overcomes it (sometimes after incubation).","An algorithm is a systematic procedure, not a sudden realization.","Assimilation is a Piagetian schema process.","The recency effect concerns list recall."],takeaway:"Fixation = stuck; insight = sudden 'aha' solution (may follow incubation)."},
  {tag:"Type I vs. Type II error",stem:"In decision terms, a Type I error is a ______ and a Type II error is a ______.",choices:["False negative; false positive","Correct hit; correct rejection","Algorithm; heuristic","False positive; false negative"],answer:3,rationale:"<b>Type I error = false positive</b>; <b>Type II error = false negative</b>.",why:["Reversed \u2014 Type I is a false positive.","Those are correct outcomes, not errors.","Algorithm/heuristic are problem-solving methods, not error types.","Correct. Type I = false positive (detecting something that isn't there); Type II = false negative (missing something that is there)."],takeaway:"Type I = false positive. Type II = false negative."}
 ]},
{id:"ps-7b-decision-making",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Cognition",categoryCode:"7B",idea:"Decision making & heuristics",
 questions:[
  {tag:"Availability heuristic",stem:"After seeing news coverage of shark attacks, people overestimate their risk (though firework accidents kill more). Judging probability by how easily examples come to mind is the:",choices:["Representativeness heuristic","Anchoring heuristic","Availability heuristic","Confirmation bias"],answer:2,rationale:"<b>Availability heuristic</b>: judge probability by how easily examples come to mind (vivid/publicized events seem more likely).",why:["The representativeness heuristic judges by similarity to a prototype, not ease of recall.","Anchoring adjusts from an initial reference value.","Correct. The availability heuristic estimates likelihood by how easily instances are recalled \u2014 so vivid, publicized events feel more probable than they are.","Confirmation bias is seeking confirming evidence, not estimating frequency."],takeaway:"Availability heuristic = judge likelihood by how easily examples come to mind."},
  {tag:"Representativeness heuristic",stem:"Judging that 'Linda' is more likely a feminist bank teller than a bank teller, because she matches a prototype, illustrates the:",choices:["Representativeness heuristic","Availability heuristic","Anchoring heuristic","Framing effect"],answer:0,rationale:"<b>Representativeness heuristic</b>: judge probability by resemblance to a prototype (can override actual base rates).",why:["Correct. The representativeness heuristic judges probability by how well something matches a prototype \u2014 here overriding base rates.","The availability heuristic uses ease of recall, not prototype match.","Anchoring adjusts from a starting value.","Framing concerns how options are worded."],takeaway:"Representativeness heuristic = judge by match to a prototype (ignores base rates)."},
  {tag:"Conjunction fallacy",stem:"Believing 'Linda is a bank teller AND a feminist' is more probable than 'Linda is a bank teller' alone is the:",choices:["Availability heuristic","Framing effect","Belief perseverance","Conjunction fallacy"],answer:3,rationale:"<b>Conjunction fallacy</b>: judging two conditions together as MORE likely than one alone (impossible) \u2014 a product of representativeness.",why:["The availability heuristic concerns ease of recall, not this probability error.","Framing concerns wording of options.","Belief perseverance is clinging to beliefs despite disconfirmation.","Correct. The conjunction fallacy: thinking two conditions together are more likely than one alone \u2014 statistically impossible \u2014 driven by representativeness."],takeaway:"Conjunction fallacy = thinking A+B is more likely than A alone (impossible)."},
  {tag:"Anchoring",stem:"When negotiating, the first number mentioned strongly shapes the final figure because people adjust from that reference point. This is the:",choices:["Availability heuristic","Anchoring-and-adjustment heuristic","Representativeness heuristic","Framing effect"],answer:1,rationale:"<b>Anchoring-and-adjustment</b>: an initial anchor value biases later judgments, which are adjusted (often too little) from it.",why:["The availability heuristic uses ease of recall, not a reference anchor.","Correct. Anchoring: an initial value (anchor) biases subsequent estimates, which are adjusted \u2014 usually insufficiently \u2014 from it.","Representativeness uses prototype match, not an anchor value.","Framing concerns how options are described."],takeaway:"Anchoring = an initial value biases later estimates (adjust from the anchor)."},
  {tag:"Confirmation bias",stem:"Only reading news stories that support your preferred candidate, while avoiding critical ones, is:",choices:["Belief perseverance","Overconfidence","Confirmation bias","Framing effect"],answer:2,rationale:"<b>Confirmation bias</b> = actively seeking/favoring information that confirms what you already believe.",why:["Belief perseverance is clinging to a belief after it's been disconfirmed, not seeking confirming info.","Overconfidence is overestimating the accuracy of one's judgments.","Correct. Confirmation bias is actively seeking (and favoring) information that confirms existing beliefs.","Framing concerns how choices are worded."],takeaway:"Confirmation bias = seek only confirming evidence."},
  {tag:"Belief perseverance",stem:"Continuing to hold a belief even after the evidence supporting it has been discredited is:",choices:["Belief perseverance","Confirmation bias","Availability heuristic","Anchoring"],answer:0,rationale:"<b>Belief perseverance</b>: holding onto a belief even after its supporting evidence is discredited.",why:["Correct. Belief perseverance is maintaining a belief despite contradicting/discrediting evidence (rationalizing or ignoring it).","Confirmation bias is seeking confirming info; belief perseverance is clinging after disconfirmation.","The availability heuristic estimates frequency by recall ease.","Anchoring biases estimates from a reference value."],takeaway:"Belief perseverance = keep a belief after evidence is discredited."},
  {tag:"Framing effect",stem:"People choose differently between 'save 200 of 600' and 'let 400 of 600 die' even though the outcomes are identical. This is the:",choices:["Availability heuristic","Conjunction fallacy","Anchoring","Framing effect"],answer:3,rationale:"<b>Framing effect</b>: wording (gain vs. loss framing) changes decisions even when outcomes are identical (risk-averse for gains, risk-seeking for losses).",why:["The availability heuristic concerns ease of recall.","The conjunction fallacy is a probability error about combined events.","Anchoring biases estimates from a reference value.","Correct. The framing effect: how options are worded (gains vs. losses) changes choices even when the underlying outcomes are the same \u2014 people are risk-averse for gains, risk-seeking for losses."],takeaway:"Framing effect = how a choice is worded changes decisions (same outcome)."},
  {tag:"Overconfidence",stem:"Walking into a test sure you know the material \u2014 partly because it felt easy to study \u2014 only to overestimate your actual ability, is:",choices:["Belief perseverance","Overconfidence","Confirmation bias","Anchoring"],answer:1,rationale:"<b>Overconfidence</b> = overestimating the accuracy of your own knowledge/judgments (fluency can inflate it).",why:["Belief perseverance is clinging to a discredited belief.","Correct. Overconfidence is overestimating the accuracy of one's knowledge or judgments (sometimes fueled by fluency during study).","Confirmation bias is seeking confirming evidence.","Anchoring biases numeric estimates from a reference."],takeaway:"Overconfidence = overestimating your own accuracy/ability."}
 ]},
{id:"ps-7b-intelligence-theories",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Cognition",categoryCode:"7B",idea:"Intelligence: theories & types",
 questions:[
  {tag:"Spearman's g factor",stem:"Spearman used factor analysis to argue that a single underlying factor accounts for people doing well across many mental tasks. This is:",choices:["Emotional intelligence","General intelligence (the g factor)","Crystallized intelligence","The representativeness heuristic"],answer:1,rationale:"Spearman's <b>g factor</b> = a single general intelligence underlying performance across many domains (found via factor analysis).",why:["Emotional intelligence is perceiving/managing emotions, not Spearman's general factor.","Correct. Spearman's g factor is a single general intelligence underlying performance across diverse cognitive tasks (people strong in one area tend to be strong in others).","Crystallized intelligence is one type (accumulated knowledge), not the overarching g.","The representativeness heuristic is a decision-making shortcut, unrelated."],takeaway:"Spearman = general intelligence (g factor): one factor across domains."},
  {tag:"Sternberg's triarchic theory",stem:"Sternberg proposed three types of intelligence: analytical (academic problem-solving), creative (novel ideas/adapting), and:",choices:["Emotional intelligence","Crystallized intelligence","Fluid intelligence","Practical intelligence (solving everyday, ill-defined problems)"],answer:3,rationale:"<b>Sternberg's triarchic theory</b>: analytical (academic), creative (novel/adaptive), practical (everyday problem-solving).",why:["Emotional intelligence is Goleman/Salovey-Mayer's construct, not part of Sternberg's triarchic theory.","Crystallized intelligence is from the Cattell fluid/crystallized distinction.","Fluid intelligence is also from Cattell, not Sternberg's three types.","Correct. Sternberg's triarchic theory: analytical, creative, and practical ('street smarts') intelligence."],takeaway:"Sternberg = analytical + creative + practical intelligence (triarchic)."},
  {tag:"Gardner's multiple intelligences",stem:"Howard Gardner argued that intelligence isn't a single 'book smarts' but several independent intelligences (musical, bodily-kinesthetic, interpersonal, etc.). A common criticism is that:",choices:["It's hard to test empirically, and some 'intelligences' may be better called talents/abilities","It has been definitively proven by research","It reduces all intelligence to one g factor","It denies that any mental abilities exist"],answer:0,rationale:"<b>Gardner's multiple intelligences</b>: several independent intelligences \u2014 but hard to test, and some may be talents rather than intelligences.",why:["Correct. Gardner's multiple intelligences expanded the concept, but critics note it's difficult to test and may relabel talents as intelligences.","It is criticized precisely because it lacks strong empirical support.","Gardner argues AGAINST a single g factor, positing many independent intelligences.","It affirms many abilities \u2014 it doesn't deny them."],takeaway:"Gardner = multiple independent intelligences (criticized as untestable / talents)."},
  {tag:"Emotional intelligence",stem:"The ability to perceive, understand, manage, and use emotions in oneself and interactions with others is:",choices:["Fluid intelligence","The g factor","Emotional intelligence","Analytical intelligence"],answer:2,rationale:"<b>Emotional intelligence</b> = perceiving, understanding, managing, and using emotions (in self and others).",why:["Fluid intelligence is abstract reasoning with novel problems, not emotion management.","The g factor is general cognitive ability, not emotional skill.","Correct. Emotional intelligence is the capacity to perceive, understand, and manage emotions.","Analytical intelligence is academic problem-solving in Sternberg's theory."],takeaway:"Emotional intelligence = perceive/understand/manage emotions."},
  {tag:"Fluid vs. crystallized \u00b7 fluid",stem:"Reasoning quickly and abstractly to solve a brand-new logic problem, independent of prior knowledge, draws on:",choices:["Crystallized intelligence","Fluid intelligence","Practical intelligence","The g factor by definition"],answer:1,rationale:"<b>Fluid intelligence</b> = fast, abstract reasoning on novel problems (independent of experience); declines with age.",why:["Crystallized intelligence is accumulated knowledge/vocabulary, not novel reasoning.","Correct. Fluid intelligence (Cattell) is on-the-spot abstract reasoning with novel problems; it tends to decline with age.","Practical intelligence is everyday 'street smarts' in Sternberg's theory.","Fluid/crystallized is a distinct framework from Spearman's g."],takeaway:"Fluid intelligence = novel abstract reasoning (declines with age)."},
  {tag:"Fluid vs. crystallized \u00b7 crystallized",stem:"Accumulated knowledge, facts, and vocabulary \u2014 which tends to grow or stay stable into older adulthood \u2014 is:",choices:["Fluid intelligence","Creative intelligence","Emotional intelligence","Crystallized intelligence"],answer:3,rationale:"<b>Crystallized intelligence</b> = accumulated knowledge/vocabulary; grows or stays stable with age (unlike fluid, which declines).",why:["Fluid intelligence is novel reasoning that declines with age \u2014 the opposite trend.","Creative intelligence (Sternberg) is generating novel ideas, not accumulated knowledge.","Emotional intelligence concerns emotions, not accumulated facts.","Correct. Crystallized intelligence (Cattell) is accumulated knowledge and verbal skill; it increases or holds steady with age."],takeaway:"Crystallized intelligence = accumulated knowledge/vocab (stable/improves with age)."}
 ]},
{id:"ps-7b-intelligence-testing",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Cognition",categoryCode:"7B",idea:"Measuring intelligence & nature/nurture",
 questions:[
  {tag:"IQ score mean & SD",stem:"On standardized IQ tests, scores are scaled so that the average (mean) is ____ and the standard deviation is ____.",choices:["50; 10","100; 15","0; 1","120; 30"],answer:1,rationale:"IQ scores: <b>mean = 100, standard deviation = 15</b>. A score reflects your position relative to the population.",why:["The mean is 100 and SD is 15, not 50/10.","Correct. IQ tests are standardized to a mean of 100 and a standard deviation of 15.","That's a z-score scale, not the IQ scale.","The SD is 15, not 30."],takeaway:"IQ: mean = 100, SD = 15."},
  {tag:"Mental age",stem:"Binet's concept of 'mental age' referred to:",choices:["The child's actual age in years","The age at which the brain stops growing","A measure of emotional maturity","The chronological age that matches a child's level of intellectual performance"],answer:3,rationale:"Binet's <b>mental age</b> = the age level of a child's intellectual performance (vs. average for that age).",why:["Mental age is about performance level, not literal chronological age.","It isn't about physical brain-growth cutoff.","It concerns cognitive, not emotional, performance.","Correct. Mental age is the age level at which a child is performing intellectually, compared with average performance for that age."],takeaway:"Mental age = performance level expressed as an age (Binet)."},
  {tag:"Binet vs. Stanford-Binet",stem:"Alfred Binet developed the first intelligence test (to identify French schoolchildren needing help). Lewis Terman's revision, standardized for U.S. use and extended to adults, became the:",choices:["Stanford-Binet Intelligence Test","Wechsler Adult Intelligence Scale","MMPI personality inventory","Rorschach test"],answer:0,rationale:"Binet made the first intelligence test; Terman's revision = the <b>Stanford-Binet</b> (standardized for the U.S., includes adults).",why:["Correct. Terman (Stanford) revised Binet's test into the Stanford-Binet, incorporating teens and adults.","The WAIS is a separate Wechsler test, not Terman's revision of Binet.","The MMPI is a personality inventory, not an intelligence test.","The Rorschach is a projective personality test."],takeaway:"Binet = first test; Terman's revision = Stanford-Binet."},
  {tag:"Twin studies & heritability",stem:"Twin and adoption studies of intelligence find the strongest IQ correlation for:",choices:["Fraternal twins raised apart","Unrelated children raised together","Identical twins raised together \u2014 with identical twins raised apart still more similar than fraternal twins","Adoptive parents and their adopted children"],answer:2,rationale:"IQ correlations are highest for <b>identical twins</b> (raised together), and identical-apart > fraternal-together \u2014 pointing to strong genetic influence plus some environmental.",why:["Fraternal twins share only ~50% of genes and correlate less than identical twins.","Unrelated children raised together share environment but not genes, correlating less.","Correct. Identical twins (especially raised together) show the highest IQ correlations; identical twins raised apart still correlate more than fraternal twins \u2014 evidence of a genetic component, with some environmental influence.","Adoptive relationships show weaker IQ correlations than genetic ones."],takeaway:"Twin studies: identical twins most similar in IQ (genetic component) + some environmental influence."},
  {tag:"Environment & intelligence",stem:"Regarding environment's effect on intelligence, the evidence best supports which statement?",choices:["There is a proven recipe to raise any child to genius","Deprived environments can impair intellectual development, though enrichment beyond adequate levels doesn't reliably create genius","Environment has no effect on intelligence at all","Only genes matter; exposure is irrelevant"],answer:1,rationale:"Deprived environments impair intelligence, but enrichment beyond adequate levels doesn't reliably create genius \u2014 nature AND nurture both contribute.",why:["No such reliable 'recipe' for genius exists.","Correct. Impoverished/deprived environments harm cognitive development, but there's no reliable formula to manufacture genius \u2014 both nature and nurture contribute.","Environment clearly affects development (e.g., deprivation impairs it).","Both genes and environment contribute; exposure matters."],takeaway:"Environment: deprivation harms intelligence; no recipe guarantees genius. Nature + nurture."},
  {tag:"Growth vs. fixed mindset",stem:"A student who believes intelligence can improve with effort and learning has a ______ mindset, which is associated with greater achievement over time.",choices:["Fixed","Convergent","Egocentric","Growth"],answer:3,rationale:"<b>Growth mindset</b>: intelligence is changeable with effort (linked to achievement). <b>Fixed mindset</b>: intelligence is innate/unchangeable.",why:["A fixed mindset sees intelligence as innate/unchangeable \u2014 the opposite.","Convergent thinking is a problem-solving style, not a mindset about ability.","Egocentric refers to Piaget's perspective-taking limitation.","Correct. A growth mindset (Dweck) treats intelligence as changeable with effort; a fixed mindset treats it as innate and unchangeable."],takeaway:"Growth mindset = ability improves with effort. Fixed mindset = ability is innate."}
 ]},
{id:"ps-7b-language-brain",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Language",categoryCode:"7B",idea:"Language & the brain (aphasia, split-brain)",
 questions:[
