  {tag:"Environment & intelligence",stem:"Regarding environment's effect on intelligence, the evidence best supports which statement?",choices:["There is a proven recipe to raise any child to genius","Deprived environments can impair intellectual development, though enrichment beyond adequate levels doesn't reliably create genius","Environment has no effect on intelligence at all","Only genes matter; exposure is irrelevant"],answer:1,rationale:"Deprived environments impair intelligence, but enrichment beyond adequate levels doesn't reliably create genius \u2014 nature AND nurture both contribute.",why:["No such reliable 'recipe' for genius exists.","Correct. Impoverished/deprived environments harm cognitive development, but there's no reliable formula to manufacture genius \u2014 both nature and nurture contribute.","Environment clearly affects development (e.g., deprivation impairs it).","Both genes and environment contribute; exposure matters."],takeaway:"Environment: deprivation harms intelligence; no recipe guarantees genius. Nature + nurture."},
  {tag:"Growth vs. fixed mindset",stem:"A student who believes intelligence can improve with effort and learning has a ______ mindset, which is associated with greater achievement over time.",choices:["Fixed","Convergent","Egocentric","Growth"],answer:3,rationale:"<b>Growth mindset</b>: intelligence is changeable with effort (linked to achievement). <b>Fixed mindset</b>: intelligence is innate/unchangeable.",why:["A fixed mindset sees intelligence as innate/unchangeable \u2014 the opposite.","Convergent thinking is a problem-solving style, not a mindset about ability.","Egocentric refers to Piaget's perspective-taking limitation.","Correct. A growth mindset (Dweck) treats intelligence as changeable with effort; a fixed mindset treats it as innate and unchangeable."],takeaway:"Growth mindset = ability improves with effort. Fixed mindset = ability is innate."}
 ]},
{id:"ps-7b-language-brain",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Language",categoryCode:"7B",idea:"Language & the brain (aphasia, split-brain)",
 questions:[
  {tag:"Broca's aphasia",stem:"Damage to Broca's area (frontal lobe) produces an aphasia in which the person understands language but struggles to produce fluent speech \u2014 speaking in broken, halting words. This is:",choices:["Wernicke's (fluent) aphasia","Broca's (non-fluent/expressive) aphasia","Conduction aphasia","Global aphasia"],answer:1,rationale:"<b>Broca's aphasia</b> (frontal): non-fluent/expressive \u2014 comprehension intact, but broken, effortful speech. 'Broca's = Broken.'",why:["Wernicke's aphasia is fluent but meaningless, with impaired comprehension \u2014 the opposite pattern.","Correct. Broca's aphasia is non-fluent: comprehension is relatively intact but speech production is effortful and broken. Mnemonic: Broca's = Broken speech.","Conduction aphasia impairs repetition, from arcuate fasciculus damage.","Global aphasia impairs both production and comprehension (both areas damaged)."],takeaway:"Broca's aphasia = broken/non-fluent speech, comprehension intact (frontal lobe)."},
  {tag:"Wernicke's aphasia",stem:"Damage to Wernicke's area (temporal lobe) produces an aphasia in which the person speaks fluently and grammatically but the speech is meaningless, and comprehension is impaired. This is:",choices:["Broca's (non-fluent) aphasia","Global aphasia","Conduction aphasia","Wernicke's (fluent/receptive) aphasia"],answer:3,rationale:"<b>Wernicke's aphasia</b> (temporal): fluent but meaningless speech + impaired comprehension. 'Wernicke's = What?' (comprehension wrecked).",why:["Broca's aphasia is non-fluent with intact comprehension \u2014 the reverse.","Global aphasia impairs both production and comprehension.","Conduction aphasia specifically impairs repetition.","Correct. Wernicke's aphasia is fluent but nonsensical, with poor comprehension (mnemonic: Wernicke's = 'What?' \u2014 comprehension is wrecked)."],takeaway:"Wernicke's aphasia = fluent but meaningless speech, poor comprehension (temporal lobe)."},
  {tag:"Conduction aphasia",stem:"Damage to the arcuate fasciculus, which connects Broca's and Wernicke's areas, produces an aphasia mainly characterized by:",choices:["Impaired repetition, despite relatively intact comprehension and fluent speech","No language deficit at all","Total loss of both comprehension and production","Inability to see written words only"],answer:0,rationale:"<b>Conduction aphasia</b> = arcuate fasciculus damage disconnecting Broca's and Wernicke's \u2192 impaired repetition (comprehension/fluency relatively intact).",why:["Correct. Conduction aphasia results from disconnecting Broca's and Wernicke's areas (arcuate fasciculus), impairing the ability to repeat while comprehension and fluency are relatively preserved.","There is a deficit \u2014 specifically in repetition.","That's global aphasia (both areas damaged), not conduction.","That describes a visual/reading deficit, not conduction aphasia."],takeaway:"Conduction aphasia = arcuate fasciculus damage \u2192 can't repeat (comprehension/fluency intact)."},
  {tag:"Split-brain & the corpus callosum",stem:"In split-brain patients, the structure that has been severed (often to treat severe epilepsy), preventing the two hemispheres from communicating, is the:",choices:["Arcuate fasciculus","Broca's area","Corpus callosum","Optic chiasm"],answer:2,rationale:"The <b>corpus callosum</b> connects the two hemispheres; severing it (for epilepsy) produces split-brain phenomena.",why:["The arcuate fasciculus connects language areas within a hemisphere, not the two hemispheres broadly.","Broca's area is a language-production region, not the interhemispheric bridge.","Correct. The corpus callosum is the large bundle of fibers connecting the hemispheres; cutting it produces split-brain effects.","The optic chiasm is where optic nerves partially cross."],takeaway:"Split-brain = severed corpus callosum (hemispheres can't communicate)."},
  {tag:"Left hemisphere & language",stem:"For most people, language is predominantly processed in the:",choices:["Right hemisphere","Left hemisphere","Cerebellum","Both hemispheres equally"],answer:1,rationale:"Language is predominantly <b>left-hemisphere</b> (dominant for ~90%+). The right hemisphere handles more spatial/emotional-prosody aspects.",why:["The right hemisphere is more associated with spatial/holistic and emotional prosody, not core language.","Correct. In about 90%+ of people (especially right-handers), language is left-hemisphere dominant.","The cerebellum coordinates movement, not language.","Language is typically left-lateralized, not equally split."],takeaway:"Language = left hemisphere (dominant in most people)."},
  {tag:"Contralateral & split-brain vision",stem:"Because vision is contralateral, in a split-brain patient an object shown ONLY in the LEFT visual field is processed by the right hemisphere \u2014 which usually cannot ______, so the patient can't name it aloud.",choices:["See the object at all","Feel the left hand","Control breathing","Produce language (the language centers are in the left hemisphere)"],answer:3,rationale:"Split-brain: left visual field \u2192 right hemisphere, but language is in the LEFT hemisphere \u2192 the patient sees but can't <b>name</b> the object aloud.",why:["The right hemisphere does perceive the object; it just can't verbalize it.","This concerns naming, not loss of touch in the left hand.","Breathing control is a brainstem function, unrelated.","Correct. The left visual field projects to the right hemisphere, but language is left-lateralized \u2014 so a split-brain patient sees the object but can't verbally name it (though the left hand can point to it)."],takeaway:"Split-brain: left-field object \u2192 right hemisphere \u2192 can't name it (language is left-hemisphere)."}
 ]},
{id:"ps-7b-language-development",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Language",categoryCode:"7B",idea:"Theories of language development",
 questions:[
  {tag:"Nativist theory",stem:"The view that humans are born with an innate, biological capacity for language \u2014 including a 'language acquisition device' (LAD) and universal grammar \u2014 is associated with:",choices:["B.F. Skinner (behaviorist theory)","Noam Chomsky (nativist theory)","Lev Vygotsky (interactionist theory)","Jean Piaget"],answer:1,rationale:"<b>Nativist theory (Chomsky)</b>: an innate language acquisition device (LAD) and universal grammar make language capacity biological.",why:["Skinner's behaviorist theory says language is learned via operant conditioning, not innate.","Correct. Chomsky's nativist theory posits an innate LAD and universal grammar underlying all human languages.","Vygotsky is linked to the interactionist/social view, not the pure nativist LAD.","Piaget tied language to cognitive development, not an innate LAD."],takeaway:"Nativist = Chomsky: innate LAD + universal grammar."},
  {tag:"Learning/behaviorist theory",stem:"The view that children acquire language purely through operant conditioning \u2014 reinforcement and imitation \u2014 is associated with:",choices:["Noam Chomsky","Lev Vygotsky","The critical period hypothesis","B.F. Skinner (learning/behaviorist theory)"],answer:3,rationale:"<b>Behaviorist theory (Skinner)</b>: language is learned via operant conditioning (reinforcement/imitation) \u2014 but struggles to explain novel sentences.",why:["Chomsky's nativist view opposes the purely learned account.","Vygotsky emphasized social interaction (interactionist), not pure conditioning.","The critical period is a nativist concept, not the behaviorist mechanism.","Correct. Skinner's behaviorist theory: language is learned through reinforcement (e.g., praising 'mama'). A key criticism is it can't easily explain novel, never-heard sentences."],takeaway:"Behaviorist = Skinner: language learned by conditioning/reinforcement."},
  {tag:"Interactionist theory",stem:"The view that biological readiness AND social interaction together drive language \u2014 children's desire to communicate with others motivates learning \u2014 is associated with:",choices:["Lev Vygotsky (interactionist / social interactionist theory)","B.F. Skinner","Noam Chomsky alone","Alfred Binet"],answer:0,rationale:"<b>Interactionist theory (Vygotsky)</b>: biology + social interaction together \u2014 the drive to communicate motivates language learning.",why:["Correct. The interactionist approach (Vygotsky) blends biological and social factors: social interaction motivates and shapes language learning.","Skinner's is the pure behaviorist account, not the interactionist blend.","Chomsky's nativist view emphasizes innate mechanisms, not the social-interaction blend.","Binet developed intelligence testing, unrelated to language theory."],takeaway:"Interactionist = Vygotsky: biology + social interaction drive language."},
  {tag:"Critical period",stem:"The idea that there is an early window (roughly up to about age 8\u20139) during which language is most easily acquired, after which it becomes much harder, is the:",choices:["Refractory period","Serial position effect","Critical (sensitive) period","Object permanence"],answer:2,rationale:"<b>Critical (sensitive) period</b>: an early window (up to ~8\u20139) when language is most readily acquired; harder afterward.",why:["The refractory period is a neuron's brief recovery phase, unrelated to language.","The serial position effect concerns list recall.","Correct. The critical/sensitive period is an early window when the LAD is most effective for language acquisition.","Object permanence is a Piagetian infant milestone."],takeaway:"Critical period = early window (~to age 8\u20139) for easiest language learning."},
  {tag:"Acquisition timeline",stem:"Which correctly matches a typical language-development milestone?",choices:["Full grammar mastery at birth","Babbling around 9\u201312 months; first words around 12\u201318 months; word combinations by ~18\u201320 months","First words at 5 years, babbling at 4 years","No language milestones until age 10"],answer:1,rationale:"Timeline: babbling ~9\u201312 mo \u2192 first words ~12\u201318 mo \u2192 word 'explosion'/combining ~18\u201320 mo \u2192 sentences 2\u20133 yr \u2192 rules mastered ~5 yr.",why:["Grammar is not mastered at birth; it develops over years.","Correct. The rough timeline: babbling ~9\u201312 months, ~one word/month at 12\u201318 months, a word 'explosion'/combining by ~18\u201320 months, longer sentences by 2\u20133 years, rules largely mastered by ~5 years.","Babbling precedes first words and both occur in infancy, not at 4\u20135 years.","Language milestones begin in infancy, not at age 10."],takeaway:"Language timeline: babble (~9\u201312mo) \u2192 first words (~12\u201318mo) \u2192 combine (~18\u201320mo) \u2192 rules by ~5yr."}
 ]},
{id:"ps-7b-language-thought",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Language",categoryCode:"7B",idea:"Language & thought theories",
 questions:[
  {tag:"Linguistic determinism (Whorf)",stem:"The strong linguistic-determinism view (the Sapir-Whorf hypothesis) claims that:",choices:["Thought determines language completely","Language determines thought \u2014 you can only think in ways your language allows","Language and thought are entirely unrelated","Thought exists only in infants"],answer:1,rationale:"<b>Strong linguistic determinism (Sapir-Whorf)</b>: language determines thought \u2014 you can only think what your language allows.",why:["That's the universalist view (thought \u2192 language), the opposite direction.","Correct. Strong linguistic determinism (Sapir-Whorf) holds that the structure of one's language determines/shapes what one can think.","Whorf argued language strongly influences thought, not that they're unrelated.","Thought isn't limited to infants; that's unrelated."],takeaway:"Strong Whorf = language DETERMINES thought."},
  {tag:"Weak linguistic relativism",stem:"The weaker, more widely accepted version of the Whorfian idea holds that:",choices:["Language has no effect on thought","Thought fully determines language","Language and cognition are identical","Language influences (but does not fully determine) thought"],answer:3,rationale:"<b>Weak linguistic relativism</b>: language <b>influences</b> thought (but doesn't fully determine it) \u2014 the more accepted version.",why:["The weak version says language does influence thought, not that it has no effect.","That's the universalist direction, not linguistic relativism.","Language and cognition are related but not identical.","Correct. Weak linguistic relativism: language influences habitual thought without rigidly determining it \u2014 the more supported version."],takeaway:"Weak Whorf/relativism = language INFLUENCES thought (doesn't fully determine)."},
  {tag:"Universalism",stem:"The view that thought shapes language \u2014 human cognition comes first and language is built from universal semantic distinctions \u2014 is:",choices:["Universalism (thought determines language)","Strong linguistic determinism","Behaviorism","The critical period hypothesis"],answer:0,rationale:"<b>Universalism</b>: thought determines language \u2014 cognition comes first, language built from universal semantic distinctions.",why:["Correct. Universalism reverses Whorf: underlying thought/cognition determines language, which is built from universal conceptual distinctions.","Strong determinism is the opposite claim (language \u2192 thought).","Behaviorism concerns learning via conditioning, not the thought/language direction.","The critical period concerns timing of acquisition, not the thought/language relationship."],takeaway:"Universalism = thought DETERMINES language (reverse of Whorf)."},
  {tag:"Piaget & Vygotsky on language",stem:"On the language\u2013thought relationship, Piaget and Vygotsky differed in that:",choices:["Both said language is entirely innate from birth","Both denied any link between language and thought","Piaget said cognitive development drives language (thought first); Vygotsky said social interaction and language converge with development","Piaget said language determines all thought"],answer:2,rationale:"<b>Piaget</b>: cognition drives language (thought first). <b>Vygotsky</b>: language + thought converge through social interaction.",why:["Neither claimed language is fully innate from birth (that's closer to Chomsky).","Both saw a link between language and thought.","Correct. Piaget: thought/cognitive development leads, and language reflects it. Vygotsky: language and thought develop through social interaction and eventually converge.","Piaget emphasized thought driving language, not language determining thought."],takeaway:"Piaget = thought drives language. Vygotsky = social interaction converges language & thought."}
 ]},
{id:"ps-7b-language-components",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Language",categoryCode:"7B",idea:"Language components",
 questions:[
  {tag:"Phonemes",stem:"The smallest distinct units of SOUND in a language (English has about 40) are called:",choices:["Morphemes","Phonemes","Lexemes","Syntax units"],answer:1,rationale:"<b>Phonemes</b> = smallest units of sound (English ~40). Mnemonic: Phone = sound.",why:["Morphemes are the smallest units of MEANING, not sound.","Correct. Phonemes are the smallest units of sound (mnemonic: Phone = sound). Categorical perception lets us distinguish them.","'Lexeme' refers to a vocabulary item, not a sound unit.","Syntax concerns sentence structure, not individual sound units."],takeaway:"Phonemes = smallest sound units (~40 in English). Phone = sound."},
  {tag:"Morphemes",stem:"The smallest units of MEANING in a language (e.g., 'cat,' 're-,' '-s') are called:",choices:["Phonemes","Prosody markers","Semantic fields","Morphemes"],answer:3,rationale:"<b>Morphemes</b> = smallest units of meaning (word stems, prefixes, suffixes); morphology studies their combination.",why:["Phonemes are the smallest units of sound, not meaning.","Prosody is the rhythm/intonation of speech, not a meaning unit.","A semantic field is a group of related meanings, not the smallest meaning unit.","Correct. Morphemes are the smallest meaningful units; morphology studies how they combine into words."],takeaway:"Morphemes = smallest MEANING units. (Phonemes = smallest SOUND units.)"},
  {tag:"Semantics",stem:"The component of language concerned with the MEANING of words, phrases, and sentences is:",choices:["Semantics","Syntax","Phonology","Pragmatics"],answer:0,rationale:"<b>Semantics</b> = the meaning of words/phrases/sentences (meaning violations \u2192 N400 response).",why:["Correct. Semantics is the study of meaning; violations of meaning produce an N400 brain response.","Syntax concerns grammatical structure/word order, not meaning per se.","Phonology concerns the sound system.","Pragmatics concerns language use in context."],takeaway:"Semantics = meaning. (Meaning violation \u2192 N400.)"},
  {tag:"Syntax",stem:"The component of language governing how words are arranged into grammatically correct sentences is:",choices:["Semantics","Phonology","Syntax","Prosody"],answer:2,rationale:"<b>Syntax</b> = rules for arranging words into grammatical sentences (grammar violations \u2192 P600 response).",why:["Semantics concerns meaning, not word-order rules.","Phonology concerns the sound system.","Correct. Syntax is the set of rules for arranging words into sentences; syntactic (grammatical) violations produce a P600 brain response.","Prosody is intonation/rhythm, not grammatical structure."],takeaway:"Syntax = word arrangement/grammar. (Grammar violation \u2192 P600.)"},
  {tag:"Pragmatics",stem:"The component of language dealing with how context and pre-existing knowledge affect meaning \u2014 including tone, sarcasm, and social use \u2014 is:",choices:["Phonology","Pragmatics","Morphology","Syntax"],answer:1,rationale:"<b>Pragmatics</b> = how context and prior knowledge shape meaning (tone, sarcasm, social use); affected by prosody.",why:["Phonology is the sound system, not contextual use.","Correct. Pragmatics concerns language use in context (and is affected by prosody \u2014 rhythm, cadence, intonation).","Morphology concerns units of meaning within words.","Syntax concerns grammatical arrangement, not contextual/social meaning."],takeaway:"Pragmatics = language in context (tone, sarcasm, social use)."},
  {tag:"Prosody",stem:"The rhythm, stress, cadence, and intonation of speech \u2014 which can change meaning (e.g., signaling sarcasm or a question) \u2014 is called:",choices:["Phonics","Syntax","A morpheme","Prosody"],answer:3,rationale:"<b>Prosody</b> = the rhythm, stress, and intonation of speech (conveys emphasis, emotion, sarcasm) \u2014 shapes pragmatic meaning.",why:["'Phonics' refers to sound-letter relationships in reading, not speech melody.","Syntax is grammatical structure, not intonation.","A morpheme is a unit of meaning, not the rhythm/intonation of speech.","Correct. Prosody is the melodic/rhythmic quality of speech that conveys emphasis, emotion, and intent, shaping pragmatic meaning."],takeaway:"Prosody = speech rhythm/intonation (conveys emphasis, emotion, sarcasm)."}
 ]},
{id:"ps-6c-limbic",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Emotion",categoryCode:"6C",idea:"The limbic system",
 questions:[
  {tag:"HAT Hippo",stem:"The limbic system's core structures can be recalled with 'HAT Hippo.' These are the:",choices:["Hippocampus, Adrenal gland, Thalamus","Hypothalamus, Auditory cortex, Tectum","Hindbrain, Amygdala, Tegmentum","Hypothalamus, Amygdala, Thalamus, and Hippocampus"],answer:3,rationale:"Limbic system ('HAT Hippo'): <b>Hypothalamus, Amygdala, Thalamus, Hippocampus</b> \u2014 emotion and memory.",why:["The adrenal gland is an endocrine organ, not a limbic brain structure.","The auditory cortex/tectum aren't the limbic core.","The hindbrain/tegmentum aren't the HAT-Hippo structures.","Correct. 'HAT Hippo' = Hypothalamus, Amygdala, Thalamus, Hippocampus \u2014 the key limbic structures for emotion and memory."],takeaway:"Limbic system = Hypothalamus, Amygdala, Thalamus, Hippocampus (HAT Hippo)."},
  {tag:"Amygdala",stem:"Stimulating the amygdala produces anger, aggression, and fear/anxiety; destroying it produces a 'mellowing' effect. The amygdala is best described as the:",choices:["Sensory relay station","Aggression/fear center","Memory-formation center","Hunger/thirst regulator"],answer:1,rationale:"The <b>amygdala</b> = aggression/fear center. Stimulation \u2192 anger/fear; bilateral destruction \u2192 mellowing (Kluver-Bucy).",why:["The thalamus is the sensory relay station, not the amygdala.","Correct. The amygdala drives aggression and fear responses; bilateral damage produces Kluver-Bucy syndrome (docility, hyperorality, hypersexuality).","The hippocampus forms new memories.","The hypothalamus regulates hunger/thirst."],takeaway:"Amygdala = fear/aggression center."},
  {tag:"Kluver-Bucy syndrome",stem:"Bilateral destruction of the amygdala can produce a syndrome of hyperorality, hypersexuality, and disinhibited behavior, called:",choices:["Korsakoff's syndrome","Wernicke's aphasia","Kluver-Bucy syndrome","Broca's aphasia"],answer:2,rationale:"<b>Kluver-Bucy syndrome</b> = bilateral amygdala destruction \u2192 hyperorality, hypersexuality, disinhibition (a 'mellowing').",why:["Korsakoff's is thiamine-deficiency amnesia, not amygdala damage.","Wernicke's aphasia is a fluent language disorder.","Correct. Kluver-Bucy syndrome results from bilateral amygdala damage: hyperorality, hypersexuality, disinhibition, and docility.","Broca's aphasia is non-fluent speech."],takeaway:"Kluver-Bucy = bilateral amygdala damage \u2192 hyperorality + hypersexuality + disinhibition."},
  {tag:"Thalamus",stem:"Within the limbic/sensory system, the structure that acts as a relay station \u2014 routing incoming sensory information to the appropriate cortical areas \u2014 is the:",choices:["Thalamus","Amygdala","Hippocampus","Hypothalamus"],answer:0,rationale:"The <b>thalamus</b> = sensory relay station (all senses except smell, which bypasses it).",why:["Correct. The thalamus is the sensory relay station for all senses except smell (which bypasses it and goes toward the amygdala).","The amygdala processes fear/aggression, not general sensory relay.","The hippocampus forms new memories.","The hypothalamus regulates homeostasis and the ANS."],takeaway:"Thalamus = sensory relay (all senses but smell bypasses it)."},
  {tag:"Hippocampus",stem:"The limbic structure essential for converting short-term memories into long-term memories \u2014 whose destruction causes anterograde amnesia \u2014 is the:",choices:["Amygdala","Thalamus","Hypothalamus","Hippocampus"],answer:3,rationale:"The <b>hippocampus</b> converts short-term \u2192 long-term memory; damage \u2192 anterograde amnesia (can't form new memories).",why:["The amygdala handles emotional processing, not memory consolidation broadly.","The thalamus relays sensory information.","The hypothalamus regulates homeostasis/ANS.","Correct. The hippocampus consolidates new long-term memories; its destruction leaves old memories intact but prevents forming new ones (anterograde amnesia)."],takeaway:"Hippocampus = STM \u2192 LTM consolidation; damage \u2192 anterograde amnesia."},
  {tag:"Hypothalamus",stem:"The tiny structure below the thalamus that regulates the autonomic nervous system, triggers hormone release, and controls hunger, thirst, sleep, and sex is the:",choices:["Hippocampus","Hypothalamus","Amygdala","Thalamus"],answer:1,rationale:"The <b>hypothalamus</b> regulates the ANS and endocrine system \u2014 hunger, thirst, sleep, sex (homeostasis).",why:["The hippocampus forms new memories.","Correct. The hypothalamus regulates the ANS and endocrine system (hunger, thirst, sleep, sex, temperature) \u2014 the 'homeostasis' hub.","The amygdala is the fear/aggression center.","The thalamus relays sensory information."],takeaway:"Hypothalamus = regulates ANS + hormones (hunger, thirst, sleep, sex)."}
 ]},
{id:"ps-6c-cortex-emotion",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Emotion",categoryCode:"6C",idea:"Cortical lateralization of emotion",
 questions:[
  {tag:"Left hemisphere & positive emotion",stem:"EEG studies find that positive, joyful emotions are associated with increased activity in which hemisphere?",choices:["The right hemisphere","The cerebellum","Neither \u2014 emotion isn't lateralized","The left hemisphere"],answer:3,rationale:"<b>Positive emotions</b> \u2192 more <b>left</b>-hemisphere activity; <b>negative emotions</b> \u2192 more <b>right</b>-hemisphere activity.",why:["The right hemisphere is linked to negative emotions (fear, sadness).","The cerebellum coordinates movement, not emotional valence.","Emotional valence does show lateralization in EEG studies.","Correct. Positive emotions (joy, enthusiasm) show more left-hemisphere activity; negative emotions show more right-hemisphere activity."],takeaway:"Positive emotion = left hemisphere; negative emotion = right hemisphere."},
  {tag:"Right hemisphere & negative emotion",stem:"Timid, fearful, and depressed states, and negative emotions, are associated with increased activity in:",choices:["The left hemisphere","The right hemisphere","The brainstem only","The occipital lobe"],answer:1,rationale:"<b>Negative emotions</b> (fear, sadness) \u2192 more <b>right</b>-hemisphere activity.",why:["The left hemisphere is linked to positive emotions.","Correct. Negative emotions correspond to greater right-hemisphere activity (positive emotions to the left).","Emotional valence involves cortical hemispheres, not just the brainstem.","The occipital lobe processes vision, not emotional valence."],takeaway:"Negative emotion = right hemisphere activity."},
  {tag:"Prefrontal cortex",stem:"The cortical region responsible for executive control \u2014 higher-order planning, decision-making, and appropriate social behavior \u2014 is the:",choices:["Occipital cortex","Primary auditory cortex","Prefrontal cortex","Cerebellum"],answer:2,rationale:"The <b>prefrontal cortex</b> = executive control (planning, decisions, social behavior); undergoes prolonged development.",why:["The occipital cortex processes vision.","The auditory cortex processes sound.","Correct. The prefrontal cortex handles executive function and social/emotional regulation; it undergoes the most development from birth.","The cerebellum coordinates movement."],takeaway:"Prefrontal cortex = executive function + social/emotional regulation."},
  {tag:"Phineas Gage",stem:"The famous case of Phineas Gage \u2014 who became rude and behaved inappropriately after a rod penetrated his brain \u2014 demonstrated the role of the ______ in personality and social behavior.",choices:["Prefrontal cortex","Hippocampus","Cerebellum","Occipital lobe"],answer:0,rationale:"<b>Phineas Gage</b>'s prefrontal-cortex injury \u2192 personality/social-behavior changes \u2014 classic evidence of PFC's role.",why:["Correct. Gage's prefrontal damage altered his personality/social conduct, illustrating that region's role in behavior regulation.","The hippocampus is for memory, not the personality change Gage showed.","The cerebellum coordinates movement.","The occipital lobe processes vision."],takeaway:"Phineas Gage = prefrontal cortex damage \u2192 personality/social change."}
 ]},
{id:"ps-6c-ans",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Emotion",categoryCode:"6C",idea:"The autonomic nervous system",
 questions:[
  {tag:"Two ANS branches",stem:"The autonomic nervous system, which controls involuntary responses, has two branches:",choices:["Somatic and central","Sensory and motor","Broca's and Wernicke's","Sympathetic (fight or flight) and parasympathetic (rest and digest)"],answer:3,rationale:"The ANS has two branches: <b>sympathetic</b> (fight-or-flight) and <b>parasympathetic</b> (rest-and-digest).",why:["Somatic/central refer to other nervous-system divisions, not the ANS branches.","Sensory/motor describe neuron types, not ANS branches.","Broca's/Wernicke's are language areas.","Correct. The ANS divides into the sympathetic (fight-or-flight) and parasympathetic (rest-and-digest) branches, with opposing effects."],takeaway:"ANS: sympathetic (fight/flight) + parasympathetic (rest/digest)."},
  {tag:"Sympathetic effects",stem:"Which set of changes is produced by the SYMPATHETIC (fight-or-flight) response?",choices:["Pupils constrict, heart rate down, digestion up","Pupils dilate, heart rate up, respiration up, digestion down, adrenaline up","Salivation up, heart rate down, glucose stored","Pupils constrict, adrenaline down, digestion up"],answer:1,rationale:"<b>Sympathetic</b>: pupils DILATE, \u2191heart rate, \u2191respiration, \u2191adrenaline/glucose, \u2193digestion/salivation (get ready to act).",why:["Those are parasympathetic (rest-and-digest) effects.","Correct. Sympathetic activation dilates pupils, raises heart/respiration rate, releases glucose and adrenaline, and suppresses digestion/salivation.","Increased salivation and glucose storage are parasympathetic.","Pupil constriction and increased digestion are parasympathetic."],takeaway:"Sympathetic (fight/flight): pupils dilate, HR/respiration up, digestion down, adrenaline up."},
  {tag:"Parasympathetic effects",stem:"Which set of changes is produced by the PARASYMPATHETIC (rest-and-digest) response?",choices:["Pupils dilate, heart rate up, digestion down","Adrenaline up, respiration up, glucose released","Pupils constrict, heart rate down, salivation up, digestion up","Pupils dilate, salivation down, heart rate up"],answer:2,rationale:"<b>Parasympathetic</b>: pupils CONSTRICT, \u2193heart rate, \u2191salivation, \u2191digestion, \u2193adrenaline (return to rest).",why:["Those are sympathetic (fight-or-flight) effects.","Increased adrenaline/glucose release is sympathetic.","Correct. Parasympathetic activation constricts pupils, slows the heart, and increases salivation/digestion (returning to calm).","Pupil dilation and raised heart rate are sympathetic."],takeaway:"Parasympathetic (rest/digest): pupils constrict, HR down, digestion up, adrenaline down."},
  {tag:"Involuntary control",stem:"The ANS is distinguished from the somatic nervous system because the ANS controls:",choices:["Involuntary responses (heart rate, digestion, pupil size) not under conscious control","Voluntary skeletal muscle movement","Conscious decision-making","Language production"],answer:0,rationale:"The <b>ANS</b> controls involuntary responses (heart rate, digestion, pupils) \u2014 the somatic system controls voluntary movement.",why:["Correct. The ANS governs involuntary physiological responses; the somatic system controls voluntary movement.","Voluntary skeletal movement is the somatic nervous system's job.","Conscious decision-making is a cortical/executive function.","Language production involves Broca's area, not the ANS."],takeaway:"ANS = involuntary responses (not conscious control). Somatic = voluntary movement."}
 ]},
{id:"ps-6c-emotion-components",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Emotion",categoryCode:"6C",idea:"Emotion: components & universal emotions",
 questions:[
  {tag:"Three components of emotion",stem:"Emotion is composed of three interrelated components:",choices:["Sensory, motor, and reflexive","Conscious, unconscious, and preconscious","Sympathetic, parasympathetic, and somatic","Physiological, behavioral, and cognitive"],answer:3,rationale:"Emotion = <b>physiological</b> (arousal) + <b>behavioral</b> (expression) + <b>cognitive</b> (appraisal) components.",why:["Sensory/motor/reflexive describe nervous-system functions, not emotion's components.","Those are Freudian levels of consciousness, not emotion components.","Those are nervous-system divisions, not emotion components.","Correct. Emotion has a physiological component (bodily arousal), a behavioral component (expressions), and a cognitive component (appraisal/interpretation)."],takeaway:"Emotion components: physiological + behavioral + cognitive."},
  {tag:"Cognitive component",stem:"The component of emotion involving your interpretation, appraisal, and thoughts about a situation is the:",choices:["Physiological component","Cognitive component","Behavioral component","Reflexive component"],answer:1,rationale:"The <b>cognitive component</b> = your appraisal/interpretation and thoughts about the situation.",why:["The physiological component is bodily arousal (heart rate, muscle tension).","Correct. The cognitive component is the mental appraisal/interpretation of the situation (and it varies person to person).","The behavioral component is outward expression (facial/body language).","'Reflexive' isn't one of the three emotion components."],takeaway:"Cognitive component = appraisal/interpretation of the situation."},
  {tag:"Emotions vs. moods",stem:"How do emotions differ from moods?",choices:["Emotions last for weeks; moods are instantaneous","They are identical concepts","Emotions are relatively brief and often have a clear trigger; moods last much longer and are more diffuse","Only moods can be positive or negative"],answer:2,rationale:"<b>Emotions</b> = brief, often triggered; <b>moods</b> = longer-lasting and diffuse.",why:["Reversed \u2014 emotions are brief, moods are prolonged.","They are distinct in duration and specificity.","Correct. Emotions are temporary responses (often to a specific cause); moods are longer-lasting, less targeted affective states.","Both emotions and moods can be positive or negative."],takeaway:"Emotions = brief/triggered. Moods = long-lasting/diffuse."},
  {tag:"Ekman's universal emotions",stem:"Paul Ekman identified six basic emotions with facial expressions recognizable across all cultures. They are:",choices:["Happiness, sadness, fear, disgust, anger, and surprise","Love, hate, joy, envy, pride, and shame","Trust, anticipation, boredom, awe, guilt, and hope","Only happiness and sadness"],answer:0,rationale:"Ekman's <b>six universal emotions</b>: happiness, sadness, fear, disgust, anger, surprise (FAHDSS) \u2014 recognized across cultures.",why:["Correct. Ekman's six universal emotions (FAHDSS): fear, anger, happiness, disgust, sadness, surprise \u2014 with consistent cross-cultural facial expressions.","Those are complex/social emotions, not Ekman's six universal ones.","Those aren't Ekman's six basic universal emotions.","Ekman identified six, not two."],takeaway:"Ekman's 6 universal emotions: happiness, sadness, fear, disgust, anger, surprise (FAHDSS)."},
  {tag:"Why universal",stem:"Darwin's explanation for why basic emotional expressions are recognized worldwide is that:",choices:["They are entirely learned from one's culture","They appear only in adulthood","They are unique to each individual","They are innate and adaptive \u2014 they gave a survival advantage (newborns and blind individuals show them too)"],answer:3,rationale:"Basic emotional expressions are <b>innate and adaptive</b> (Darwin) \u2014 shown even by newborns and congenitally blind people.",why:["Their cross-cultural universality argues for innateness, not pure learning.","Newborns show them, so they aren't adulthood-only.","They're species-typical and universal, not individually unique.","Correct. Darwin argued emotional expression is an innate, adaptive ability aiding survival \u2014 supported by newborns and congenitally blind people showing the same expressions."],takeaway:"Universal emotions = innate/adaptive (Darwin); shown by newborns + blind individuals."}
 ]},
{id:"ps-6c-emotion-theories",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Emotion",categoryCode:"6C",idea:"Theories of emotion",
 questions:[
  {tag:"James-Lange theory",stem:"The James-Lange theory of emotion proposes that:",choices:["Emotion and physiological response occur simultaneously and independently","We consciously label our arousal to produce emotion","The situation must be cognitively appraised before any arousal","A stimulus triggers a physiological response first, and our interpretation of that bodily response IS the emotion"],answer:3,rationale:"<b>James-Lange</b>: event \u2192 physiological response \u2192 emotion (you feel afraid because your heart is already racing).",why:["Simultaneous-and-independent is Cannon-Bard, not James-Lange.","Labeling arousal is Schachter-Singer's two-factor theory.","Appraisal-first is Lazarus's theory.","Correct. James-Lange: event \u2192 physiological arousal \u2192 emotion (we feel afraid BECAUSE our heart races). Emotion follows from the bodily reaction."],takeaway:"James-Lange: arousal FIRST, then emotion (feel afraid because heart races)."},
  {tag:"Cannon-Bard theory",stem:"The Cannon-Bard theory of emotion proposes that:",choices:["The emotion is simply an interpretation of bodily arousal","The physiological response and the emotional experience occur at the same time, independently","Cognitive appraisal always precedes arousal","Emotion requires labeling the arousal"],answer:1,rationale:"<b>Cannon-Bard</b>: event \u2192 physiological response AND emotion at the same time (simultaneous, independent).",why:["Arousal-then-interpretation is James-Lange.","Correct. Cannon-Bard: a stimulus triggers physiological arousal AND the conscious emotion simultaneously and independently.","Appraisal-first is Lazarus.","Labeling arousal is Schachter-Singer."],takeaway:"Cannon-Bard: arousal and emotion happen SIMULTANEOUSLY (independently)."},
  {tag:"Schachter-Singer two-factor",stem:"The Schachter-Singer (two-factor) theory proposes that emotion results from:",choices:["Physiological arousal alone, with no cognition","A cognitive appraisal with no bodily arousal","Physiological arousal PLUS a cognitive label identifying the reason for the arousal","Simultaneous but independent arousal and emotion"],answer:2,rationale:"<b>Schachter-Singer (two-factor)</b>: emotion = physiological arousal + a cognitive LABEL for its cause.",why:["Arousal alone (no label) isn't sufficient in two-factor theory.","Two-factor theory requires physiological arousal, not appraisal alone.","Correct. Two-factor theory: you experience arousal, then cognitively label its cause, and the label determines the specific emotion.","Simultaneous-and-independent is Cannon-Bard."],takeaway:"Schachter-Singer: emotion = arousal + cognitive label (reason for the arousal)."},
  {tag:"Lazarus theory",stem:"The Lazarus theory of emotion holds that the FIRST step in an emotional response is:",choices:["A cognitive appraisal (labeling) of the situation, which then triggers both the emotion and the physiological response","An automatic physiological response with no thought","A facial expression that creates the feeling","Simultaneous arousal and emotion with no appraisal"],answer:0,rationale:"<b>Lazarus</b>: cognitive appraisal comes FIRST \u2192 then emotion + physiological response together.",why:["Correct. Lazarus: appraisal comes first \u2014 you label the event, and that appraisal produces both the emotion and the bodily response.","A thoughtless physiological-first response is James-Lange.","Facial-feedback isn't the core Lazarus claim.","No-appraisal simultaneity is Cannon-Bard."],takeaway:"Lazarus: appraisal FIRST \u2192 then emotion + physiological response."},
  {tag:"Yerkes-Dodson law",stem:"The Yerkes-Dodson law describes the relationship between arousal and performance as:",choices:["Linear \u2014 more arousal always improves performance","Flat \u2014 arousal has no effect on performance","U-shaped \u2014 performance is best at the extremes","An inverted-U \u2014 performance peaks at moderate arousal and declines when arousal is too low or too high"],answer:3,rationale:"<b>Yerkes-Dodson law</b>: inverted-U \u2014 moderate arousal maximizes performance; too little or too much impairs it.",why:["Performance doesn't rise indefinitely with arousal \u2014 too much hurts.","Arousal does affect performance (the inverted-U).","It's an inverted-U (best in the middle), not best at the extremes.","Correct. Yerkes-Dodson: an inverted-U \u2014 moderate arousal is optimal; too little or too much impairs performance (and hard tasks need lower optimal arousal)."],takeaway:"Yerkes-Dodson = inverted-U: moderate arousal is best for performance."}
 ]},
{id:"ps-6b-stress-appraisal",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Stress",categoryCode:"6C",idea:"Stress & appraisal",
 questions:[
  {tag:"Stressor vs. stress reaction",stem:"The threatening or challenging EVENT itself is the ______; the body's subsequent physical and emotional response is the ______.",choices:["Stress reaction; stressor","Appraisal; stressor","Coping; stressor","Stressor; stress reaction"],answer:3,rationale:"<b>Stressor</b> = the threatening event; <b>stress reaction</b> = the body's response to it.",why:["Reversed \u2014 the event is the stressor, the response is the reaction.","Appraisal is the interpretation, not the event itself.","Coping is how one manages stress, not the event.","Correct. The stressor is the triggering event; the stress reaction is the physical/emotional response to it."],takeaway:"Stressor = the event. Stress reaction = the body's response."},
  {tag:"Lazarus appraisal theory",stem:"Lazarus's appraisal theory of stress holds that stress arises less from events themselves and more from:",choices:["The physical intensity of the event alone","Our cognitive appraisal (interpretation) of those events","Genetic predisposition only","Random chance"],answer:1,rationale:"Lazarus: stress comes from our <b>appraisal</b> of events, in primary and secondary stages \u2014 not the events alone.",why:["The event's physical intensity matters less than its appraisal, per Lazarus.","Correct. Lazarus: stress depends on how we appraise/interpret an event, in two stages (primary and secondary appraisal).","Genetics isn't the core of Lazarus's appraisal theory.","Appraisal, not chance, drives the stress response."],takeaway:"Lazarus appraisal theory: stress depends on how you INTERPRET the event."},
  {tag:"Primary appraisal",stem:"In Lazarus's model, primary appraisal is:",choices:["Evaluating your resources and ability to cope","The physical stress response itself","Deciding whether an event is irrelevant, benign/positive, or stressful/negative","The long-term health consequence of stress"],answer:2,rationale:"<b>Primary appraisal</b> = judging whether an event is irrelevant, benign/positive, or stressful/negative.",why:["Assessing coping ability is SECONDARY appraisal.","Primary appraisal is a cognitive judgment, not the physiological response.","Correct. Primary appraisal assesses the situation (irrelevant, benign/positive, or stressful); if stressful, one proceeds to secondary appraisal.","Health consequences follow the stress response, not the appraisal step."],takeaway:"Primary appraisal = is it irrelevant, benign, or stressful?"},
  {tag:"Secondary appraisal",stem:"Secondary appraisal (following a stressful primary appraisal) evaluates:",choices:["Your ability and resources to cope \u2014 appraising harm, threat, and challenge","Whether the event is relevant at all","The exact cortisol level in the blood","How to relax the muscles"],answer:0,rationale:"<b>Secondary appraisal</b> = evaluating your resources/ability to cope (harm, threat, challenge).",why:["Correct. Secondary appraisal assesses one's capacity to cope \u2014 harm already done, potential threat, and the challenge of overcoming it.","Judging relevance is primary appraisal.","Cortisol level is a physiological measure, not the appraisal.","Muscle relaxation is a coping technique, not the appraisal step."],takeaway:"Secondary appraisal = can I cope? (harm/threat/challenge)."},
  {tag:"Categories of stressors",stem:"Which correctly identifies a category of stressor and an example?",choices:["Catastrophic events \u2014 minor daily annoyances","Ambient stressors \u2014 a single major life change like marriage","Significant life changes \u2014 background pollution and noise","Daily hassles \u2014 minor recurring irritations (traffic, spam, lost keys), often considered a major source of stress"],answer:3,rationale:"Four stressor types: <b>significant life changes, catastrophic events, daily hassles</b> (minor recurring), and <b>ambient stressors</b> (pollution/noise/crowding).",why:["Catastrophic events are large-scale disasters, not minor annoyances.","Ambient stressors are background environmental factors (pollution/noise), not a single life change.","Significant life changes are major personal events, not background pollution.","Correct. Daily hassles are minor recurring irritations; many researchers consider them a major source of chronic stress. (Others: significant life changes, catastrophic events, ambient stressors.)"],takeaway:"Stressors: life changes, catastrophes, daily hassles, ambient stressors."}
 ]},
{id:"ps-6b-stress-response",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Stress",categoryCode:"6C",idea:"The stress response (physiology)",
 questions:[
  {tag:"Fight-or-flight",stem:"Walter Cannon's term for the sympathetic-nervous-system response to a threat \u2014 raising heart rate and respiration and diverting blood to vital organs \u2014 is:",choices:["The tend-and-befriend response","General adaptation syndrome","Homeostasis","The fight-or-flight response"],answer:3,rationale:"<b>Fight-or-flight</b> (Cannon) = acute sympathetic response: \u2191heart rate, \u2191respiration, blood to vital organs, digestion/immune down.",why:["Tend-and-befriend is an alternative social response, not the sympathetic mobilization itself.","GAS (Selye) is the three-phase stress model, not this acute term.","Homeostasis is the balanced baseline the response departs from.","Correct. Cannon's fight-or-flight is the acute sympathetic response mobilizing the body to confront or flee a threat."],takeaway:"Fight-or-flight (Cannon) = sympathetic threat response (HR/respiration up, blood to core)."},
  {tag:"Adrenal medulla \u00b7 catecholamines",stem:"In the endocrine stress response, the adrenal MEDULLA releases catecholamines \u2014 namely:",choices:["Cortisol and aldosterone","Epinephrine (adrenaline) and norepinephrine","Insulin and glucagon","Melatonin and oxytocin"],answer:1,rationale:"Adrenal <b>medulla</b> \u2192 catecholamines: <b>epinephrine + norepinephrine</b> (fast stress response).",why:["Cortisol/aldosterone come from the adrenal CORTEX, not the medulla.","Correct. The adrenal medulla secretes epinephrine and norepinephrine (catecholamines, tyrosine derivatives) in the fast stress response.","Insulin/glucagon are pancreatic hormones.","Melatonin (pineal) and oxytocin (posterior pituitary) aren't adrenal catecholamines."],takeaway:"Adrenal medulla = epinephrine + norepinephrine (catecholamines)."},
  {tag:"Adrenal cortex \u00b7 cortisol",stem:"The adrenal CORTEX releases a glucocorticoid steroid hormone that redistributes glucose and suppresses the immune system during stress. This is:",choices:["Epinephrine","Norepinephrine","Cortisol","Oxytocin"],answer:2,rationale:"Adrenal <b>cortex</b> \u2192 <b>cortisol</b> (glucocorticoid): raises glucose, suppresses immunity. 'COTisol from the CORTex.'",why:["Epinephrine is a catecholamine from the medulla, not the cortex.","Norepinephrine is a catecholamine from the medulla.","Correct. Cortisol is the glucocorticoid from the adrenal cortex (mnemonic: COTisol from the CORTex); it raises available glucose and suppresses immunity.","Oxytocin is a bonding hormone, not an adrenal glucocorticoid."],takeaway:"Adrenal cortex = cortisol (glucocorticoid; raises glucose, suppresses immunity)."},
  {tag:"Tend-and-befriend",stem:"An alternative stress response \u2014 seeking social support and bonding \u2014 linked to oxytocin and often stronger in women, is:",choices:["Tend-and-befriend","Fight-or-flight","General adaptation syndrome","The alarm phase"],answer:0,rationale:"<b>Tend-and-befriend</b> = coping by seeking social support/bonding (oxytocin-linked; often stronger in women).",why:["Correct. Tend-and-befriend involves nurturing and social bonding (oxytocin-linked); oxytocin ties to estrogen, which may explain the stronger effect in women.","Fight-or-flight is the confront/flee sympathetic response, not social bonding.","GAS is the three-phase physiological model.","The alarm phase is the first stage of GAS, not the social-support response."],takeaway:"Tend-and-befriend = social-support stress response (oxytocin, often stronger in women)."},
  {tag:"General adaptation syndrome",stem:"Hans Selye's General Adaptation Syndrome (GAS) describes the body's response to prolonged stress in three phases, in order:",choices:["Resistance \u2192 alarm \u2192 exhaustion","Exhaustion \u2192 resistance \u2192 alarm","Alarm \u2192 exhaustion \u2192 resistance","Alarm \u2192 resistance \u2192 exhaustion"],answer:3,rationale:"Selye's <b>GAS</b>: <b>alarm \u2192 resistance \u2192 exhaustion</b> (mobilize \u2192 sustained coping \u2192 depletion/illness).",why:["Alarm comes first (the initial reaction), not resistance.","That's reversed \u2014 alarm is first, exhaustion last.","Resistance precedes exhaustion, not the reverse.","Correct. GAS: alarm (mobilize for fight-or-flight) \u2192 resistance (sustained coping, high cortisol) \u2192 exhaustion (resources depleted, illness risk)."],takeaway:"GAS (Selye): alarm \u2192 resistance \u2192 exhaustion."},
  {tag:"Chronic stress & immunity",stem:"A key documented effect of chronic stress on the immune system is that it:",choices:["Permanently strengthens immunity","Suppresses immune function, making a person more susceptible to illness (e.g., slower wound healing)","Has no effect on the immune system","Instantly cures infections"],answer:1,rationale:"Chronic stress <b>suppresses immunity</b> (via cortisol) \u2192 slower healing, more infections. (Acute stress can transiently overactivate/inflame.)",why:["Chronic stress weakens, not strengthens, immunity.","Correct. Chronic stress (via sustained cortisol) suppresses immune function \u2014 studies show slower wound healing and greater susceptibility to infection.","It clearly affects immunity (suppression).","Stress doesn't cure infections; it raises susceptibility."],takeaway:"Chronic stress suppresses immunity \u2192 slower healing, more illness."}
 ]},
{id:"ps-6c-stress-behavioral",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Stress",categoryCode:"6C",idea:"Emotional & behavioral effects of stress",
 questions:[
  {tag:"Glucocorticoid receptor sites",stem:"The two brain areas with the highest density of glucocorticoid (cortisol) receptors \u2014 and thus most vulnerable to stress-induced atrophy \u2014 are the:",choices:["Cerebellum and pons","Hippocampus and frontal cortex","Occipital and temporal poles","Adrenal medulla and cortex"],answer:1,rationale:"Cortisol receptors are densest in the <b>hippocampus</b> (memory) and <b>frontal cortex</b> (judgment/planning) \u2014 both atrophy with chronic stress.",why:["The cerebellum and pons aren't the main glucocorticoid-receptor sites.","Correct. The hippocampus (memory/learning) and frontal cortex (impulse control, judgment, planning) are dense in cortisol receptors and show atrophy under chronic stress.","These aren't the highest-density cortisol-receptor regions.","The adrenal glands release cortisol; they aren't the brain targets that atrophy."],takeaway:"Most glucocorticoid receptors: hippocampus + frontal cortex (both atrophy under chronic stress)."},
  {tag:"Anhedonia",stem:"A major emotional effect of chronic stress is depression, whose core feature \u2014 the inability to experience pleasure \u2014 is called:",choices:["Anosmia","Alexithymia","Anhidrosis","Anhedonia"],answer:3,rationale:"<b>Anhedonia</b> = inability to experience pleasure \u2014 a core feature of stress-related depression.",why:["Anosmia is loss of smell.","Alexithymia is difficulty identifying/describing emotions, not loss of pleasure.","Anhidrosis is the inability to sweat.","Correct. Anhedonia (loss of pleasure) is central to depression; it can make a person perceive even more events as stressors."],takeaway:"Anhedonia = can't feel pleasure (core of depression)."},
  {tag:"Anterior cingulate & serotonin",stem:"Part of the biological backing for stress-related depression is that, under chronic stress, the anterior cingulate cortex:",choices:["Stops responding normally to serotonin","Overproduces dopamine","Becomes hypersensitive to serotonin","Shuts down all sensory input"],answer:0,rationale:"Under stress, the <b>anterior cingulate cortex</b> stops responding normally to <b>serotonin</b> \u2014 a biological link to depression.",why:["Correct. The anterior cingulate (anterior frontal cortex) reduces its serotonin responsiveness under stress, contributing to depression.","The mechanism described is reduced serotonin responsiveness, not dopamine overproduction.","It becomes LESS, not more, responsive to serotonin.","It doesn't shut down sensory input; the issue is serotonin signaling."],takeaway:"Chronic stress \u2192 anterior cingulate stops responding to serotonin \u2192 depression link."},
  {tag:"Learned helplessness",stem:"After repeatedly experiencing uncontrollable stress, a person comes to believe they have no control and stops trying to cope \u2014 spiraling toward depression. This is:",choices:["Proactive coping","Cognitive flexibility","Learned helplessness","Tend-and-befriend"],answer:2,rationale:"<b>Learned helplessness</b>: repeated uncontrollable stress \u2192 belief that nothing can be done \u2192 loss of coping \u2192 depression.",why:["Proactive coping is anticipating and preparing for stressors \u2014 the opposite.","Cognitive flexibility is reappraising a stressor adaptively.","Correct. Learned helplessness (Seligman): repeated loss of control teaches the belief that outcomes are uncontrollable, eroding coping and driving depression.","Tend-and-befriend is a social stress response."],takeaway:"Learned helplessness = learning you have no control \u2192 stop coping \u2192 depression (Seligman)."},
  {tag:"The three A's",stem:"Beyond depression, your notes group the emotional/behavioral effects of stress as three A's:",choices:["Apathy, ambition, and altruism","Anger, anxiety, and addiction","Attention, arousal, and aggression only","Anhedonia, amnesia, and aphasia"],answer:1,rationale:"Stress's three A's: <b>anger, anxiety, addiction</b>.",why:["Those aren't the three stress A's.","Correct. The 'three A's' of stress responses: anger, anxiety, and addiction.","Aggression relates to anger, but the trio is anger/anxiety/addiction.","Those are unrelated clinical terms, not the stress trio."],takeaway:"Three A's of stress: Anger, Anxiety, Addiction."},
  {tag:"Type A vs. Type B",stem:"Friedman and Rosenman linked heart disease to a personality type. The type at higher risk \u2014 competitive, easily angered, and hostile \u2014 is:",choices:["Type B","Type C","Type D exclusively","Type A"],answer:3,rationale:"<b>Type A</b> (competitive, hostile, easily angered) \u2192 higher heart-disease risk (Friedman & Rosenman); the toxic ingredient is hostility. Anger accompanies the 'fight' response.",why:["Type B is easygoing and at lower risk.","'Type C' isn't the Friedman-Rosenman category tied to heart disease here.","Type D isn't the pair studied by Friedman and Rosenman.","Correct. Type A (competitive, hostile, easily angered) was linked to greater heart-disease risk; the toxic component is specifically hostility/anger. Type B is easygoing."],takeaway:"Type A (hostile/competitive) = heart-disease risk; toxic part = hostility. Type B = easygoing."},
  {tag:"Anxiety & the amygdala",stem:"Among the stress responses, anxiety centers on which brain structure \u2014 the one handling fears and phobias?",choices:["The amygdala","The cerebellum","The hippocampus","The pons"],answer:0,rationale:"<b>Anxiety</b> centers on the <b>amygdala</b> (fears/phobias) and accompanies the 'flight' aspect of the stress response.",why:["Correct. Anxiety is centered on the amygdala (fears/phobias); it accompanies the 'flight' aspect of the sympathetic response.","The cerebellum coordinates movement, not fear/anxiety.","The hippocampus handles memory, not the fear center.","The pons is a hindbrain relay, not the fear center."],takeaway:"Anxiety = amygdala (fear/phobia); accompanies flight."},
  {tag:"Stress & addiction",stem:"Your notes explain that stress raises addiction risk partly because impaired functioning of the ______ worsens judgment and coping choices.",choices:["Cerebellum (coordination)","Occipital cortex (vision)","Frontal cortex (reasoning/judgment)","Cochlea (hearing)"],answer:2,rationale:"Stress impairs the <b>frontal cortex</b> (reasoning) \u2192 worse judgment \u2192 higher risk of addictive/maladaptive coping.",why:["The cerebellum coordinates movement, not judgment.","The occipital cortex processes vision.","Correct. Stress impairs the frontal cortex (reasoning/judgment), so a person is more likely to choose maladaptive coping like alcohol or tobacco.","The cochlea is a hearing organ."],takeaway:"Stress impairs frontal cortex (reasoning) \u2192 poor coping choices \u2192 addiction risk."}
 ]},
{id:"ps-6c-coping",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Stress",categoryCode:"6C",idea:"Coping with stress",
 questions:[
  {tag:"Perceived control",stem:"A robust finding (Sapolsky's baboons, the Whitehall studies) is that a major buffer against stress is:",choices:["A complete lack of any responsibility","A sense of perceived control over one's situation","Higher physiological arousal","Social isolation"],answer:1,rationale:"<b>Perceived control</b> buffers stress \u2014 low control/status is tied to higher stress (Sapolsky, Whitehall).",why:["Lack of control raises, not lowers, stress.","Correct. Greater perceived control is associated with lower stress; low control (low rank/status) is linked to higher stress.","Higher arousal is part of the stress response, not a buffer.","Isolation tends to worsen stress; social support buffers it."],takeaway:"Perceived control lowers stress; low control (low status) raises it."},
  {tag:"Social support",stem:"Confiding in others, feeling understood, and belonging to a supportive community reduces stress. This coping resource is:",choices:["Proactive coping","Overcompensation","Learned helplessness","Social support"],answer:3,rationale:"<b>Social support</b> = confiding in and belonging to others \u2192 lower stress and healthier habits.",why:["Proactive coping is anticipating a future stressor, a different mechanism.","Overcompensation is a maladaptive coping category.","Learned helplessness is a route into depression, not a coping resource.","Correct. Social support lets us share difficult feelings and feel less alone, and is linked to healthier eating/sleep/exercise and lower stress."],takeaway:"Social support = sharing/belonging \u2192 lower stress."},
  {tag:"Problem- vs. emotion-focused",stem:"Coping that targets the stressor itself \u2014 acting to master, minimize, or eliminate it \u2014 is ______ coping; coping that manages the emotional reaction instead is ______ coping.",choices:["Problem-focused; emotion-focused","Emotion-focused; problem-focused","Proactive; reactive","Maladaptive; adaptive"],answer:0,rationale:"<b>Problem-focused</b> coping changes the stressor; <b>emotion-focused</b> coping manages your reaction to it.",why:["Correct. Problem-focused coping addresses the stressor; emotion-focused coping manages the feelings it produces.","Reversed \u2014 problem-focused targets the stressor.","Proactive/reactive describe timing, not the problem-vs-emotion target.","Both problem- and emotion-focused coping can be adaptive."],takeaway:"Problem-focused = fix the stressor. Emotion-focused = manage the feelings."},
  {tag:"Proactive coping",stem:"Anticipating a difficult upcoming challenge and preparing for how you'll handle it BEFORE it happens is:",choices:["Reactive coping","Avoidance coping","Proactive coping (anticipation)","Emotion-focused coping"],answer:2,rationale:"<b>Proactive coping</b> = anticipate a future stressor and prepare before it arrives (reduces its impact).",why:["Reactive coping responds after the stressor has already hit.","Avoidance coping evades the stressor rather than preparing for it.","Correct. Proactive coping reduces a stressor's impact by anticipating and preparing for it in advance.","Emotion-focused coping manages feelings, not advance preparation."],takeaway:"Proactive coping = anticipate + prepare before the stressor hits."},
  {tag:"Meaning-focused coping",stem:"Coping by finding personal significance or growth in a stressful experience \u2014 drawing meaning from it \u2014 is:",choices:["Problem-focused coping","Meaning-focused coping","Overcompensation","Sensitization"],answer:1,rationale:"<b>Meaning-focused coping</b> = deriving meaning/growth from the stressful experience.",why:["Problem-focused coping acts on the stressor itself, not its meaning.","Correct. Meaning-focused coping concentrates on deriving meaning from the stressful experience.","Overcompensation is a maladaptive category.","Sensitization is a maladaptive rehearsal of fearful events."],takeaway:"Meaning-focused coping = find meaning in the stressor."},
  {tag:"Cognitive flexibility",stem:"Changing how you interpret a stressful situation \u2014 reappraising it so it feels less threatening \u2014 draws on:",choices:["Learned helplessness","Anhedonia","Fasciculation","Cognitive flexibility"],answer:3,rationale:"<b>Cognitive flexibility</b> = reappraising a stressor so it feels less threatening (perception shapes stress).",why:["Learned helplessness is the opposite \u2014 rigid belief in no control.","Anhedonia is loss of pleasure, not reappraisal.","Fasciculation is a muscle twitch, unrelated.","Correct. Cognitive flexibility lets you reframe a stressor; perception of the situation strongly shapes how stressful it is."],takeaway:"Cognitive flexibility = reframe the stressor (perception drives stress)."},
  {tag:"Exercise & meditation",stem:"Regular exercise and meditation reduce stress in part through measurable physiological changes, including:",choices:["Lower heart rate and blood pressure (and, for exercise, neurogenesis)","Higher resting cortisol","Increased blood pressure","Reduced immune function"],answer:0,rationale:"<b>Exercise and meditation</b> lower heart rate/BP (exercise also drives neurogenesis) \u2192 less stress, lower cardiovascular risk.",why:["Correct. Exercise and meditation lower heart rate/BP (and exercise promotes neurogenesis), reducing stress and cardiovascular risk.","They lower, not raise, stress hormones over time.","They lower blood pressure.","They support, rather than reduce, healthy immune function."],takeaway:"Exercise/meditation \u2192 lower HR/BP (exercise: neurogenesis) \u2192 less stress."},
  {tag:"Humor as coping",stem:"Using humor \u2014 finding things to laugh about \u2014 to master a painful situation and reduce its sting is a form of:",choices:["Maladaptive avoidance","Overcompensation","Positive (adaptive) coping","Surrender"],answer:2,rationale:"<b>Humor</b> is a positive, adaptive coping method \u2014 mastering a painful situation by finding lightness in it.",why:["Humor here is constructive, not avoidance.","Overcompensation is a maladaptive category (e.g., aggression, dominance).","Correct. Humor is one of the most positive coping methods \u2014 it helps you master painful situations by turning them into something bearable.","Surrender is a maladaptive category (compliance, dependence)."],takeaway:"Humor = adaptive coping (master pain by finding the funny)."}
 ]},
{id:"ps-6c-maladaptive-coping",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Stress",categoryCode:"6C",idea:"Maladaptive coping mechanisms",
 questions:[
  {tag:"Adaptive vs. maladaptive",stem:"The key difference between adaptive and maladaptive coping is that maladaptive coping:",choices:["Reliably lowers stress and resolves the problem","Reduces symptoms short-term but maintains the disorder long-term (stress often stays or rises)","Is always more effective than adaptive coping","Only occurs in people without any stress"],answer:1,rationale:"<b>Maladaptive coping</b> eases symptoms short-term but maintains the disorder long-term; <b>adaptive</b> coping genuinely reduces stress.",why:["That describes adaptive coping, not maladaptive.","Correct. Maladaptive coping can relieve symptoms briefly but sustains the underlying problem; adaptive/constructive coping actually reduces stress.","Maladaptive coping is generally less effective long-term.","Maladaptive coping is a response to stress, not an absence of it."],takeaway:"Maladaptive coping = short-term relief, long-term problem persists. Adaptive = truly reduces stress."},
  {tag:"Three maladaptive categories",stem:"Your notes group maladaptive coping into three broad categories:",choices:["Alarm, resistance, and exhaustion","Primary, secondary, and tertiary appraisal","Fight, flight, and freeze","Overcompensation, surrender, and avoidance"],answer:3,rationale:"Maladaptive coping categories: <b>overcompensation, surrender, avoidance</b>.",why:["Alarm/resistance/exhaustion are the GAS phases, not coping categories.","Those are appraisal stages, not maladaptive-coping categories.","Fight/flight/freeze are acute stress responses, not the coping categories.","Correct. Maladaptive coping falls into overcompensation, surrender, and avoidance."],takeaway:"Maladaptive coping: overcompensation, surrender, avoidance."},
  {tag:"Overcompensation",stem:"Coping with a threat by counterattacking \u2014 aggression, dominance, manipulation, or excessive status-seeking \u2014 is the maladaptive category of:",choices:["Overcompensation","Surrender","Avoidance","Proactive coping"],answer:0,rationale:"<b>Overcompensation</b> = counterattacking the threat: aggression, dominance, manipulation, status-seeking.",why:["Correct. Overcompensation fights the threat through aggression, control, dominance, recognition-seeking, or manipulation.","Surrender is giving in \u2014 compliance and dependence.","Avoidance is withdrawing or escaping, not counterattacking.","Proactive coping is an adaptive, anticipatory strategy."],takeaway:"Overcompensation = counterattack (aggression, dominance, manipulation)."},
  {tag:"Surrender",stem:"Coping by giving in to the threat \u2014 excessive compliance, dependence, clinging, and people-pleasing \u2014 is the maladaptive category of:",choices:["Overcompensation","Avoidance","Surrender","Meaning-focused coping"],answer:2,rationale:"<b>Surrender</b> = giving in: compliance, dependence, clinging, people-pleasing.",why:["Overcompensation counterattacks the threat, the opposite of giving in.","Avoidance evades rather than submits.","Correct. Surrender means submitting to the threat through compliance and dependence.","Meaning-focused coping is an adaptive strategy."],takeaway:"Surrender = give in (compliance, dependence, people-pleasing)."},
  {tag:"Avoidance",stem:"Coping by escaping the threat \u2014 social withdrawal, compulsive distraction, addictive self-soothing, or retreating into fantasy \u2014 is the maladaptive category of:",choices:["Overcompensation","Avoidance","Surrender","Cognitive flexibility"],answer:1,rationale:"<b>Avoidance</b> = escaping the threat: withdrawal, compulsive distraction, addictive self-soothing, fantasy.",why:["Overcompensation counterattacks; it doesn't evade.","Correct. Avoidance evades the threat via withdrawal, compulsive stimulation-seeking, addictive self-soothing, or psychological escape (dissociation, fantasy).","Surrender submits to the threat rather than escaping it.","Cognitive flexibility is an adaptive reappraisal strategy."],takeaway:"Avoidance = escape (withdrawal, distraction, self-soothing, fantasy)."},
  {tag:"Dissociation & PTSD",stem:"A maladaptive avoidance strategy in which the mind separates or compartmentalizes thoughts, memories, and emotions \u2014 often associated with post-traumatic stress \u2014 is:",choices:["Sensitization","Overcompensation","Proactive coping","Dissociation"],answer:3,rationale:"<b>Dissociation</b> = mentally separating/compartmentalizing thoughts and emotions; often linked to PTSD.",why:["Sensitization is rehearsing/anticipating fearful events, not compartmentalizing.","Overcompensation is counterattacking, not mental separation.","Proactive coping is an adaptive strategy.","Correct. Dissociation compartmentalizes distressing thoughts/emotions and is often associated with PTSD."],takeaway:"Dissociation = compartmentalize thoughts/emotions (linked to PTSD)."}
 ]},
{id:"ps-6a-nervous-system-structure",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Nervous system",categoryCode:"6A",idea:"Structure of the nervous system",
 questions:[
  {tag:"CNS vs. PNS",stem:"The central nervous system (CNS) consists of the brain and spinal cord. The peripheral nervous system (PNS) consists of:",choices:["Only the cerebral hemispheres","Everything else \u2014 the nerves and ganglia outside the brain and spinal cord","Only the spinal cord","The brain and cerebellum"],answer:1,rationale:"<b>CNS</b> = brain + spinal cord. <b>PNS</b> = everything else (nerves, ganglia; 12 cranial + 31 spinal nerve pairs).",why:["The cerebral hemispheres are part of the CNS (brain).","Correct. CNS = brain + spinal cord; PNS = all the nerves and ganglia outside it (afferent + efferent neurons; 12 cranial + 31 spinal nerve pairs).","The spinal cord is part of the CNS.","The brain and cerebellum are CNS structures."],takeaway:"CNS = brain + spinal cord. PNS = nerves/ganglia outside it."},
  {tag:"Afferent vs. efferent",stem:"Neurons that carry sensory information TOWARD the central nervous system are ______; neurons that carry motor commands AWAY from it are ______.",choices:["Efferent; afferent","Sympathetic; parasympathetic","Upper; lower","Afferent; efferent"],answer:3,rationale:"<b>Afferent</b> = sensory, toward CNS (Approach); <b>Efferent</b> = motor, away from CNS (Exit).",why:["Reversed \u2014 afferent is toward, efferent is away.","Sympathetic/parasympathetic are autonomic branches, not the afferent/efferent distinction.","Upper/lower describe motor neurons, not the sensory/motor direction.","Correct. Afferent = sensory, toward the CNS ('Approach'); efferent = motor, away from the CNS ('Exit')."],takeaway:"Afferent = toward CNS (sensory). Efferent = away (motor). A=approach, E=exit."},
  {tag:"Three primary brain divisions",stem:"The developing brain is organized into three primary divisions:",choices:["Forebrain, midbrain, and hindbrain","Cerebrum, cerebellum, and spinal cord","Cortex, thalamus, and medulla","Left brain, right brain, and brainstem"],answer:0,rationale:"Three primary brain divisions: <b>forebrain, midbrain, hindbrain</b>.",why:["Correct. The three primary divisions are forebrain, midbrain, and hindbrain.","The spinal cord isn't one of the three brain divisions.","These are individual structures, not the three primary divisions.","Hemispheres and brainstem aren't the three developmental divisions."],takeaway:"Brain divisions: forebrain, midbrain, hindbrain."},
  {tag:"Forebrain \u2192 cerebrum",stem:"The forebrain develops into the ______, which includes the cerebral hemispheres and handles higher functions like cognition and emotion.",choices:["Pons","Medulla","Cerebrum","Cerebellum"],answer:2,rationale:"<b>Forebrain \u2192 cerebrum</b> (cerebral hemispheres): higher functions \u2014 cognition, emotion.",why:["The pons develops from the hindbrain.","The medulla develops from the hindbrain.","Correct. The forebrain becomes the cerebrum (cerebral hemispheres) \u2014 cognition, emotion, voluntary action.","The cerebellum develops from the hindbrain."],takeaway:"Forebrain \u2192 cerebrum (higher functions)."},
  {tag:"Hindbrain structures",stem:"The hindbrain develops into which set of structures?",choices:["The cerebrum and thalamus","The pons, medulla, and cerebellum","The cerebral hemispheres","The hypothalamus and amygdala"],answer:1,rationale:"<b>Hindbrain \u2192 pons, medulla, cerebellum</b> (vital autonomic functions + movement coordination).",why:["The cerebrum and thalamus are forebrain-derived.","Correct. The hindbrain becomes the pons, medulla, and cerebellum (vital functions and movement coordination).","The cerebral hemispheres come from the forebrain.","The hypothalamus and amygdala are forebrain structures."],takeaway:"Hindbrain \u2192 pons + medulla + cerebellum."},
  {tag:"Cranial vs. spinal nerves",stem:"The peripheral nervous system includes how many pairs of cranial nerves and spinal nerves?",choices:["31 cranial and 12 spinal","10 cranial and 20 spinal","24 cranial and 33 spinal","12 cranial and 31 spinal nerve pairs"],answer:3,rationale:"PNS: <b>12 cranial</b> + <b>31 spinal</b> nerve pairs.",why:["Reversed \u2014 12 cranial, 31 spinal.","These counts are incorrect.","These counts are incorrect.","Correct. There are 12 pairs of cranial nerves and 31 pairs of spinal nerves."],takeaway:"12 cranial nerve pairs, 31 spinal nerve pairs."}
 ]},
{id:"ps-6a-motor-unit",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Nervous system",categoryCode:"6A",idea:"The motor unit & lower motor neurons",
 questions:[
  {tag:"Motor unit",stem:"A motor unit is defined as:",choices:["A single muscle fiber and all neurons touching it","A single motor neuron together with all the skeletal muscle fibers it innervates","The brain region that plans movement","A cluster of sensory receptors in muscle"],answer:1,rationale:"A <b>motor unit</b> = one motor neuron + all the muscle fibers it innervates.",why:["It's one neuron to many fibers, not one fiber to many neurons.","Correct. A motor unit = one motor neuron plus every muscle fiber it controls \u2014 the functional unit of muscle contraction.","The motor unit is peripheral, not a brain planning region.","Those would be proprioceptors (e.g., muscle spindles), not a motor unit."],takeaway:"Motor unit = one motor neuron + all fibers it controls."},
  {tag:"Lower motor neuron",stem:"A lower motor neuron (LMN) is the efferent neuron that:",choices:["Carries sensory information from the skin to the brain","Connects two regions of the cerebral cortex","Relays pain signals to the thalamus","Synapses directly on skeletal muscle at the neuromuscular junction"],answer:3,rationale:"A <b>lower motor neuron (LMN)</b> is the efferent neuron that synapses on skeletal muscle at the <b>neuromuscular junction</b>.",why:["That describes an afferent (sensory) neuron.","That describes cortical association fibers, not an LMN.","That describes a sensory pain pathway, not the motor LMN.","Correct. The LMN is the final efferent neuron, contacting skeletal muscle at the neuromuscular junction (NMJ) to trigger contraction."],takeaway:"LMN = efferent neuron \u2192 skeletal muscle at the NMJ."},
  {tag:"Neuromuscular junction",stem:"The synapse where a motor neuron meets and signals a skeletal muscle fiber is the:",choices:["Neuromuscular junction (NMJ)","Node of Ranvier","Glomerulus","Optic chiasm"],answer:0,rationale:"The <b>neuromuscular junction (NMJ)</b> = the motor neuron\u2013skeletal muscle synapse (acetylcholine).",why:["Correct. The neuromuscular junction is the motor neuron\u2013muscle synapse (using acetylcholine).","A node of Ranvier is a gap in myelin along an axon, not a neuron\u2013muscle synapse.","A glomerulus is an olfactory bulb structure.","The optic chiasm is where optic nerves cross."],takeaway:"NMJ = motor neuron \u2194 muscle synapse."},
  {tag:"Lower motor neuron signs",stem:"Damage to a lower motor neuron produces a characteristic set of signs. Which set is correct?",choices:["Hypertonia, hyperreflexia, and spasticity","Increased muscle tone and brisk reflexes","Atrophy, fasciculations, hypotonia, and hyporeflexia","No motor changes at all"],answer:2,rationale:"<b>LMN signs</b>: atrophy, fasciculations, hypotonia, hyporeflexia (everything DOWN/loose). UMN signs are the opposite (hypertonia, hyperreflexia).",why:["Hypertonia, hyperreflexia, and spasticity are UPPER motor neuron signs.","Increased tone and brisk reflexes are upper motor neuron signs.","Correct. LMN lesions cause muscle atrophy, fasciculations (involuntary twitches), hypotonia (low tone), and hyporeflexia (reduced reflexes). (Upper motor neuron lesions instead cause hypertonia/hyperreflexia.)","LMN damage clearly produces motor changes (weakness, atrophy)."],takeaway:"LMN damage = atrophy, fasciculations, hypotonia, hyporeflexia (all 'down'). UMN = 'up' (hyper)."},
