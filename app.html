<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Open MCAT — question bank</title>
<style>
  :root{
    --font:-apple-system,BlinkMacSystemFont,"SF Pro Text","Inter","Segoe UI",system-ui,sans-serif;
    --mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace;
  }
  html[data-theme="dark"]{
    --bg:#0a0f17; --panel:#0d131d; --raise:#141d2a; --raise2:#1a2534;
    --border:#1b2634; --border2:#26323f;
    --text:#e9edf3; --text2:#93a1b6; --text3:#5c6b80;
    --accent:#5182ff; --accent2:#3a5fbf; --accent-bg:rgba(81,130,255,.13);
    --ok:#43b581; --ok-bg:rgba(67,181,129,.13); --ok-bd:rgba(67,181,129,.4);
    --no:#e5645f; --no-bg:rgba(229,100,95,.13); --no-bd:rgba(229,100,95,.4);
    --track:#1b2634; --shadow:0 8px 30px rgba(0,0,0,.4);
  }
  html[data-theme="light"]{
    --bg:#ffffff; --panel:#f7f9fc; --raise:#eef2f8; --raise2:#e6ecf4;
    --border:#e4e9f1; --border2:#d7deea;
    --text:#0e1725; --text2:#53617a; --text3:#8592a6;
    --accent:#2f5fe0; --accent2:#2f5fe0; --accent-bg:rgba(47,95,224,.08);
    --ok:#1a9d68; --ok-bg:rgba(26,157,104,.09); --ok-bd:rgba(26,157,104,.35);
    --no:#d6483f; --no-bg:rgba(214,72,63,.08); --no-bd:rgba(214,72,63,.35);
    --track:#e6ecf4; --shadow:0 10px 34px rgba(20,40,70,.12);
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;
    line-height:1.5;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
  ::selection{background:var(--accent-bg);}
  button{font-family:inherit;}
  .app{display:grid;grid-template-columns:264px 1fr;height:100vh;overflow:hidden;}
  .scrim{display:none;}

  /* ---------- sidebar ---------- */
  .side{background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;
    overflow:hidden;}
  .side .brand{display:flex;align-items:center;gap:9px;padding:16px 16px 12px;cursor:pointer;}
  .side .brand .m{width:24px;height:24px;border-radius:6px;background:var(--accent);color:#fff;
    display:grid;place-items:center;font-weight:700;font-size:13px;}
  .side .brand .n{font-weight:600;font-size:15px;letter-spacing:-.01em;}
  .search{margin:2px 12px 10px;position:relative;}
  .search input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;
    color:var(--text);font-size:13px;padding:8px 10px 8px 30px;outline:none;transition:border-color .12s;}
  .search input:focus{border-color:var(--accent);}
  .search svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);width:14px;height:14px;
    fill:none;stroke:var(--text3);stroke-width:2;}
  .search .kbd{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-family:var(--mono);
    font-size:10px;color:var(--text3);border:1px solid var(--border);border-radius:4px;padding:1px 5px;}

  .navscroll{flex:1;overflow-y:auto;padding:4px 8px 8px;}
  .navlabel{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;
    color:var(--text3);padding:12px 8px 6px;}
  .grp{margin-bottom:2px;}
  .grphead{display:flex;align-items:center;gap:7px;width:100%;background:none;border:none;color:var(--text2);
    font-size:12.5px;font-weight:600;padding:6px 8px;border-radius:6px;cursor:pointer;text-align:left;}
  .grphead:hover{background:var(--raise);color:var(--text);}
  .grphead .car{width:9px;height:9px;fill:none;stroke:var(--text3);stroke-width:2;transition:transform .12s;}
  .grphead.open .car{transform:rotate(90deg);}
  .grphead .sc{font-family:var(--mono);font-size:10px;color:var(--text3);font-weight:500;}
  .grphead .ct{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--text3);}
  .items{display:none;padding:2px 0 4px 6px;}
  .items.open{display:block;}
  .navitem{display:flex;align-items:center;gap:9px;width:100%;background:none;border:none;color:var(--text2);
    font-size:13px;padding:6px 8px 6px 16px;border-radius:6px;cursor:pointer;text-align:left;position:relative;}
  .navitem:hover{background:var(--raise);color:var(--text);}
  .navitem.active{background:var(--accent-bg);color:var(--text);}
  .navitem.active::before{content:"";position:absolute;left:5px;top:8px;bottom:8px;width:2px;
    background:var(--accent);border-radius:2px;}
  .navitem .nm{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .navitem .mb{width:26px;height:3px;background:var(--track);border-radius:2px;overflow:hidden;flex:0 0 26px;}
  .navitem .mb i{display:block;height:100%;background:var(--accent);border-radius:2px;}
  .navitem.done .mb i{background:var(--ok);}
  .navempty{font-size:12px;color:var(--text3);padding:5px 8px 5px 16px;font-style:italic;}

  .side .foot{border-top:1px solid var(--border);padding:8px;}
  .footlink{display:flex;align-items:center;gap:9px;width:100%;background:none;border:none;color:var(--text2);
    font-size:13px;padding:7px 8px;border-radius:6px;cursor:pointer;text-align:left;text-decoration:none;}
  .footlink:hover{background:var(--raise);color:var(--text);}
  .footlink.active{color:var(--text);background:var(--raise);}
  .footlink svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:1.8;}
  .statline{display:flex;gap:14px;padding:9px 10px 4px;font-family:var(--mono);font-size:11px;color:var(--text3);}
  .statline b{color:var(--text2);font-weight:600;}

  /* ---------- main ---------- */
  .main{overflow-y:auto;position:relative;}
  .topbar{position:sticky;top:0;z-index:5;background:color-mix(in srgb,var(--bg) 88%,transparent);
    backdrop-filter:blur(8px);border-bottom:1px solid var(--border);display:flex;align-items:center;
    justify-content:space-between;padding:0 22px;height:52px;gap:14px;}
  .topbar .crumb{font-size:13px;color:var(--text2);display:flex;align-items:center;gap:7px;}
  .topbar .crumb b{color:var(--text);font-weight:600;}
  .topbar .crumb button{background:none;border:none;color:var(--text2);cursor:pointer;font-size:13px;padding:0;}
  .topbar .crumb button:hover{color:var(--accent);}
  .topbar .tools{display:flex;align-items:center;gap:6px;}
  .iconbtn{width:32px;height:32px;border-radius:7px;border:1px solid var(--border);background:var(--panel);
    color:var(--text2);display:grid;place-items:center;cursor:pointer;transition:all .12s;}
  .iconbtn:hover{color:var(--text);border-color:var(--border2);background:var(--raise);}
  .iconbtn svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:1.8;}
  .tipbtn{font-size:12.5px;color:var(--text2);border:1px solid var(--border);background:var(--panel);
    border-radius:7px;padding:6px 11px;cursor:pointer;text-decoration:none;transition:all .12s;display:inline-flex;align-items:center;gap:6px;}
  .tipbtn:hover{color:var(--text);border-color:var(--border2);}

  .pane{padding:24px 26px 60px;max-width:920px;}
  .pane.narrow{max-width:760px;}

  /* list / table */
  .h-row{display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin:6px 0 4px;}
  .h-row h1{font-size:21px;font-weight:600;letter-spacing:-.02em;margin:0;}
  .h-row .sub{font-size:12.5px;color:var(--text3);font-family:var(--mono);}
  .tbl{width:100%;border-collapse:collapse;margin-top:14px;}
  .tbl thead th{font-family:var(--mono);font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;
    color:var(--text3);font-weight:600;text-align:left;padding:0 12px 8px;border-bottom:1px solid var(--border);}
  .tbl thead th.r{text-align:right;}
  .tbl tbody tr{cursor:pointer;border-bottom:1px solid var(--border);transition:background .1s;}
  .tbl tbody tr:hover{background:var(--raise);}
  .tbl tbody tr.hi{background:var(--accent-bg);}
  .tbl td{padding:11px 12px;vertical-align:middle;}
  .tbl .code{font-family:var(--mono);font-size:11px;color:var(--text2);background:var(--raise2);
    border:1px solid var(--border);border-radius:5px;padding:2px 6px;white-space:nowrap;}
  .tbl .idea{font-size:14px;font-weight:550;color:var(--text);}
  .tbl .catn{font-size:12px;color:var(--text3);margin-top:1px;}
  .tbl .qn{font-family:var(--mono);font-size:12px;color:var(--text2);text-align:right;white-space:nowrap;}
  .tbl .mastery{display:flex;align-items:center;gap:9px;justify-content:flex-end;min-width:120px;}
  .tbl .mastery .mt{width:64px;height:5px;background:var(--track);border-radius:3px;overflow:hidden;}
  .tbl .mastery .mt i{display:block;height:100%;background:var(--accent);border-radius:3px;}
  .tbl .mastery.full .mt i{background:var(--ok);}
  .tbl .mastery .pc{font-family:var(--mono);font-size:11.5px;color:var(--text2);width:34px;text-align:right;}
  .tbl .arw{color:var(--text3);}
  .tbl tbody tr:hover .arw{color:var(--accent);}

  /* quiz */
  .qmeta{display:flex;align-items:center;gap:10px;margin:2px 0 4px;}
  .qmeta .code{font-family:var(--mono);font-size:11px;color:var(--text2);background:var(--raise2);
    border:1px solid var(--border);border-radius:5px;padding:2px 7px;}
  .qmeta .cat{font-size:12px;color:var(--text3);}
  .qmeta .prog{margin-left:auto;font-family:var(--mono);font-size:12px;color:var(--text2);}
  .qmeta .prog b{color:var(--text);}
  .qtitle{font-size:20px;font-weight:600;letter-spacing:-.02em;margin:2px 0 14px;}
  .pbar{height:4px;background:var(--track);border-radius:3px;overflow:hidden;margin-bottom:24px;}
  .pbar i{display:block;height:100%;background:var(--accent);border-radius:3px;transition:width .3s ease;}
  .qtag{font-family:var(--mono);font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:var(--text3);margin-bottom:12px;}
  .stem{font-size:16.5px;line-height:1.6;color:var(--text);margin:0 0 22px;}
  .stem b{color:var(--text);font-weight:650;}
  ul.choices{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:8px;}
  .choice{display:flex;gap:13px;align-items:flex-start;border:1px solid var(--border);border-radius:9px;
    padding:13px 15px;cursor:pointer;background:var(--panel);transition:border-color .1s,background .1s;font-size:14.5px;}
  .choice:hover{border-color:var(--accent2);background:var(--raise);}
  .choice .k{font-family:var(--mono);font-weight:600;font-size:12px;width:23px;height:23px;flex:0 0 23px;
    border-radius:6px;background:var(--raise2);border:1px solid var(--border);color:var(--text2);
    display:grid;place-items:center;margin-top:1px;}
  .choice.sel{border-color:var(--accent);background:var(--accent-bg);}
  .choice.sel .k{background:var(--accent);color:#fff;border-color:var(--accent);}
  .choice.correct{border-color:var(--ok-bd);background:var(--ok-bg);}
  .choice.correct .k{background:var(--ok);color:#fff;border-color:var(--ok);}
  .choice.incorrect{border-color:var(--no-bd);background:var(--no-bg);}
  .choice.incorrect .k{background:var(--no);color:#fff;border-color:var(--no);}
  .choice.locked{cursor:default;}
  .actionbar{display:flex;align-items:center;justify-content:space-between;margin-top:20px;}
  .khint{font-family:var(--mono);font-size:11px;color:var(--text3);display:flex;gap:12px;}
  .khint kbd{border:1px solid var(--border);border-radius:4px;padding:1px 5px;color:var(--text2);background:var(--panel);}
  .btn{font-weight:600;font-size:13.5px;border:none;border-radius:8px;padding:10px 20px;cursor:pointer;
    background:var(--accent);color:#fff;transition:background .12s,opacity .12s;}
  .btn:hover{background:var(--accent2);}
  .btn:disabled{opacity:.4;cursor:not-allowed;}
  .btn.ghost{background:transparent;color:var(--text2);border:1px solid var(--border);}
  .btn.ghost:hover{color:var(--text);border-color:var(--border2);background:var(--raise);}

  .exp{margin-top:26px;border-top:1px solid var(--border);padding-top:20px;display:none;}
  .exp.show{display:block;animation:fade .25s ease;}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .verdict{font-family:var(--mono);font-size:12px;letter-spacing:.04em;text-transform:uppercase;font-weight:600;margin-bottom:12px;}
  .verdict.ok{color:var(--ok);} .verdict.no{color:var(--no);}
  .exp p{margin:0 0 10px;font-size:14.5px;color:var(--text2);line-height:1.6;}
  .exp h4{font-family:var(--mono);font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--text3);margin:18px 0 9px;}
  .why{font-size:13.5px;color:var(--text2);margin:0 0 8px;padding-left:16px;position:relative;line-height:1.55;}
  .why b{color:var(--text);font-family:var(--mono);font-size:12px;}
  .why::before{content:"";position:absolute;left:0;top:8px;width:6px;height:6px;border-radius:2px;background:var(--border2);}
  .why.r::before{background:var(--ok);} .why.w::before{background:var(--no);}
  .takeaway{background:var(--raise);border:1px solid var(--border);border-radius:9px;padding:13px 15px;
    font-size:13.5px;color:var(--text2);margin-top:16px;line-height:1.55;}
  .takeaway b{font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;
    display:block;margin-bottom:5px;color:var(--accent);}

  .result{padding:20px 0;}
  .result .score{display:flex;align-items:baseline;gap:14px;}
  .result .score .big{font-size:46px;font-weight:600;letter-spacing:-.02em;}
  .result .score .pc{font-family:var(--mono);font-size:14px;color:var(--text2);}
  .result p{color:var(--text2);max-width:56ch;font-size:14px;margin:12px 0 0;line-height:1.6;}
  .rev{margin-top:22px;border:1px solid var(--border);border-radius:10px;overflow:hidden;}
  .rev .rr{display:flex;gap:12px;align-items:center;padding:10px 14px;border-bottom:1px solid var(--border);
    font-size:13px;font-family:var(--mono);color:var(--text2);}
  .rev .rr:last-child{border-bottom:none;}
  .rev .mk{font-weight:700;width:14px;} .mk.ok{color:var(--ok);} .mk.no{color:var(--no);}
  .result .actionbar{margin-top:22px;justify-content:flex-start;gap:10px;}

  /* schedules + anki content */
  .tabs{display:flex;gap:2px;background:var(--raise);border:1px solid var(--border);border-radius:9px;
    padding:3px;width:fit-content;margin:14px 0 22px;}
  .tab{font-size:13px;font-weight:500;background:none;border:none;padding:7px 14px;border-radius:6px;
    cursor:pointer;color:var(--text2);transition:all .1s;}
  .tab:hover{color:var(--text);}
  .tab.on{background:var(--bg);color:var(--text);font-weight:600;box-shadow:0 1px 2px rgba(0,0,0,.15);}
  .schmeta{display:flex;gap:28px;flex-wrap:wrap;margin-bottom:8px;}
  .schmeta div{display:flex;flex-direction:column;}
  .schmeta b{font-size:17px;font-weight:600;}
  .schmeta span{font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);margin-bottom:3px;}
  .schwho{font-size:14.5px;color:var(--text2);margin:6px 0 18px;max-width:62ch;line-height:1.55;}
  .builder{border:1px solid var(--border);border-radius:12px;background:var(--panel);padding:22px 24px;margin:18px 0;}
  .fld{margin-bottom:18px;}
  .fld>label{display:block;font-family:var(--mono);font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--text3);margin-bottom:8px;}
  .ctrl{display:flex;gap:10px;flex-wrap:wrap;}
  input[type=date],select,input[type=number]{background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);
    font-family:var(--font);font-size:14px;padding:9px 12px;outline:none;transition:border-color .12s;}
  input[type=date]:focus,select:focus,input[type=number]:focus{border-color:var(--accent);}
  input[type=date]{color-scheme:dark;}
  html[data-theme="light"] input[type=date]{color-scheme:light;}
  .chips{display:flex;flex-wrap:wrap;gap:8px;}
  .chip{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--border);border-radius:9px;padding:9px 13px;
    cursor:pointer;font-size:13.5px;color:var(--text2);transition:all .12s;user-select:none;}
  .chip:hover{border-color:var(--border2);color:var(--text);}
  .chip.on{border-color:var(--accent);background:var(--accent-bg);color:var(--text);}
  .chip .bx{width:15px;height:15px;border-radius:4px;border:1.5px solid var(--text3);display:grid;place-items:center;flex:0 0 15px;}
  .chip.on .bx{background:var(--accent);border-color:var(--accent);}
  .chip.on .bx::after{content:"✓";color:#fff;font-size:10px;font-weight:700;}
  .genrow{display:flex;align-items:center;gap:14px;margin-top:6px;flex-wrap:wrap;}
  .filtrow{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin:12px 0 2px;}
  .filtlbl{font-family:var(--mono);font-size:10.5px;letter-spacing:.04em;text-transform:uppercase;color:var(--text3);margin-right:2px;}
  .chip{font-family:var(--mono);font-size:11.5px;font-weight:500;color:var(--text2);background:var(--raise2);
    border:1px solid var(--border);border-radius:999px;padding:4px 11px;cursor:pointer;transition:all .12s;line-height:1;display:inline-flex;align-items:center;gap:5px;}
  .chip:hover{border-color:var(--border2);color:var(--text);}
  .chip.on{background:var(--accent);border-color:var(--accent);color:#fff;}
  .chip .cn{font-size:10px;opacity:.7;}
  .chip.on .cn{opacity:.85;}
  .chip.clr{background:transparent;color:var(--text3);}
  .chip.clr:hover{color:var(--text);}
  .sortbar{display:flex;align-items:center;gap:6px;margin-left:auto;}
  .sortbar span{font-family:var(--mono);font-size:10.5px;letter-spacing:.04em;text-transform:uppercase;color:var(--text3);}
  .sortsel{font-family:var(--mono);font-size:11.5px;color:var(--text2);background:var(--bg);
    border:1px solid var(--border);border-radius:7px;padding:5px 9px;cursor:pointer;}
  .sortsel:hover{border-color:var(--border2);color:var(--text);}
  .planout{margin-top:8px;}
  .flag{background:var(--no-bg);border:1px solid var(--no-bd);border-radius:9px;padding:12px 15px;font-size:13.5px;color:var(--text);margin:10px 0;line-height:1.5;}
  .flag b{font-family:var(--mono);font-size:10px;letter-spacing:.05em;text-transform:uppercase;display:block;margin-bottom:4px;color:var(--no);}
  .flag.warn{background:rgba(226,170,70,.12);border-color:rgba(226,170,70,.4);} .flag.warn b{color:#d99a2e;}
  .cal{margin-top:18px;}
  .callegend{display:flex;gap:16px;flex-wrap:wrap;font-family:var(--mono);font-size:10.5px;color:var(--text3);margin-bottom:14px;}
  .callegend span{display:inline-flex;align-items:center;gap:5px;}
  .callegend i{width:9px;height:9px;border-radius:3px;display:inline-block;}
  .calmonth{font-family:var(--font);font-size:15px;font-weight:600;margin:20px 0 9px;letter-spacing:-.01em;}
  .calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;}
  .caldow{font-family:var(--mono);font-size:9.5px;letter-spacing:.04em;text-transform:uppercase;color:var(--text3);text-align:center;padding-bottom:2px;}
  .calcell{min-height:80px;border:1px solid var(--border);border-radius:8px;padding:6px 7px;background:var(--panel);overflow:hidden;}
  .calcell.blank{background:transparent;border:1px solid transparent;}
  .calcell.blank .caldate{color:var(--text3);opacity:.5;}
  .caldate{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--text2);}
  .caltag{display:inline-block;font-family:var(--mono);font-size:8.5px;letter-spacing:.02em;text-transform:uppercase;padding:1px 5px;border-radius:4px;margin-left:5px;}
  .caltask{color:var(--text2);font-size:10px;line-height:1.35;margin-top:5px;}
  .calcell.k-content{border-left:2px solid var(--accent);} .k-content .caltag{background:var(--accent-bg);color:var(--accent);}
  .calcell.k-app{border-left:2px solid var(--accent);} .k-app .caltag{background:var(--accent-bg);color:var(--accent);}
  .calcell.k-fl{border-left:2px solid #d99a2e;} .k-fl .caltag{background:rgba(226,170,70,.16);color:#d99a2e;}
  .calcell.k-review{border-left:2px solid #d99a2e;} .k-review .caltag{background:rgba(226,170,70,.10);color:#d99a2e;}
  .calcell.k-taper{border-left:2px solid var(--text3);} .k-taper .caltag{background:var(--raise2);color:var(--text2);}
  .calcell.k-rest{opacity:.72;} .k-rest .caltag{background:var(--raise2);color:var(--text3);}

<script>
const DONATE_URL="https://ko-fi.com/makenzimcdermott";

/* ==================== DATA (add a quiz = append one object; keep it ORIGINAL) ==================== */
const BANK=[
{id:"ps-6a-visual-cues",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Sensory processing",categoryCode:"6A",idea:"Visual depth cues",
 questions:[
  {tag:"Monocular vs. binocular · applied",stem:`A patient sustains a penetrating injury resulting in complete, permanent loss of vision in the right eye; the left eye remains normal. Months later the patient reports trouble with certain depth judgments. Which depth cue is the patient now <b>unable</b> to use?`,choices:["Interposition","Retinal (binocular) disparity","Relative size","Motion parallax"],answer:1,rationale:"Retinal disparity is a <b>binocular</b> cue: the brain compares the two slightly different retinal images to compute depth. With one eye there is no second image, so it is lost. Every other option is <b>monocular</b>.",why:["Interposition is monocular — one eye suffices to see a near object occlude a far one.","Correct. Disparity needs two eyes producing two images.","Relative size is monocular.","Motion parallax is monocular — differential sweep of near vs. far objects during self-motion."],takeaway:"Only two cues are binocular: retinal disparity and convergence. A one-eyed patient loses exactly those two."},
  {tag:"Oculomotor cues · the classic trap",stem:`As an object moves toward a person's face, both eyes rotate inward toward the nose, and the brain reads the muscular rotation to gauge distance. This cue is best classified as:`,choices:["Accommodation, a monocular cue","Convergence, a binocular cue","Retinal disparity, a binocular cue","Motion parallax, a monocular cue"],answer:1,rationale:"<b>Convergence</b> is the inward rotation of both eyes to fixate a near object; because it depends on both eyes it is binocular. The distractor to beat is accommodation — the other oculomotor cue — which is monocular.",why:["Accommodation is oculomotor but is the ciliary muscle changing <b>lens shape</b> in one eye — monocular, and not the rotation described.","Correct. Both eyes rotating inward = binocular oculomotor cue.","Disparity is binocular but refers to the <b>difference between the two images</b>, not muscular rotation.","Motion parallax is object motion during observer movement, not eye rotation, and is monocular."],takeaway:"Accommodation = lens shape, MONOcular; convergence = eyes rotating inward, BINocular. Both signal 'near.'"},
  {tag:"Motion parallax · scenario",stem:`A passenger gazing out the side window of a moving train sees fence posts beside the track streak past rapidly, while distant mountains drift by slowly. The cue producing this depth impression is:`,choices:["Linear perspective","Texture gradient","Motion parallax","Convergence"],answer:2,rationale:"<b>Motion parallax</b>: objects at different distances appear to move at different speeds as the observer moves — near fast, far slow. Monocular, and it requires observer motion.",why:["Linear perspective is apparent convergence of parallel lines in a static scene.","Texture gradient is a static change in surface grain with distance.","Correct. Differential apparent speed during self-motion.","Convergence is an oculomotor cue, unrelated to external object motion."],takeaway:"Observer moving + near things moving faster than far things = motion parallax, the one monocular cue that needs motion."},
  {tag:"Pictorial cues · what a flat canvas can't do",stem:`A painter wants a convincing illusion of depth on a flat canvas. Which cue is the painter fundamentally <b>unable</b> to employ?`,choices:["Linear perspective","Interposition","Retinal disparity","Relative size"],answer:2,rationale:"A flat canvas presents essentially the <b>same image to both eyes</b>, so it cannot generate retinal disparity (which needs a real 3-D scene giving each eye a different image). The others are pictorial/monocular cues.",why:["Linear perspective is a pictorial cue.","Interposition is a pictorial cue.","Correct. Disparity needs a true 3-D scene; a flat image can't produce it.","Relative size is a pictorial cue."],takeaway:"'Pictorial cues' ARE the monocular cues — those that survive on a 2-D surface. Binocular cues are exactly what a flat image loses."},
  {tag:"Texture gradient vs. relative size",stem:`At the edge of a cobblestone plaza, an observer sees stones look large and distinct near their feet but progressively smaller, finer, and denser toward the far side. The <b>primary</b> monocular cue here is:`,choices:["Relative size","Texture gradient","Interposition","Relative height"],answer:1,rationale:"A continuous surface whose <b>texture becomes finer and denser with distance</b> is a texture gradient. The cue is the graded change in one uniform surface's grain, not a comparison of separate objects.",why:["Relative size compares <b>separate objects of known size</b>; here it's one continuous surface.","Correct. Progressive fining of a surface = texture gradient.","Interposition needs one object <b>overlapping</b> another; nothing is occluded.","Relative height concerns vertical position near the horizon, not texture density."],takeaway:"Texture gradient = one continuous surface getting finer with distance. Relative size = separate known objects imaged smaller."},
  {tag:"Interposition · cue + its limit",stem:`In a photograph, a car partially blocks a building behind it, and the viewer judges the car to be closer. Which cue is operating, and what is its key limitation vs. binocular cues?`,choices:["Interposition; it yields only relative depth order, not absolute distance","Retinal disparity; it yields precise absolute distance","Linear perspective; it requires input from both eyes","Accommodation; it operates only for objects several meters away"],answer:0,rationale:"<b>Interposition</b>: an occluding object is seen as nearer. It reliably tells you the <b>order</b> of objects but not how far apart they are — relative, not absolute, depth. Monocular.",why:["Correct. Overlap establishes near/far ordering only.","The cue described is overlap, not disparity; disparity is binocular.","Linear perspective is monocular and isn't described here.","Accommodation is monocular and works for <b>near</b> objects, opposite of the claim."],takeaway:"Interposition ranks objects front-to-back without quantifying the gap. Disparity is prized because it approaches absolute depth up close."}
 ]},
{id:"ps-9b-social-stratification",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Social stratification",categoryCode:"9B",idea:"Social stratification & mobility",
 questions:[
  {tag:"Ascribed vs. achieved status",stem:`A sociologist studies two attributes of a person: the caste they were born into, and the profession they later entered through training. These are best described, respectively, as:`,choices:["Both ascribed statuses","An ascribed status and an achieved status","An achieved status and an ascribed status","Both achieved statuses"],answer:1,rationale:"An <b>ascribed status</b> is assigned at birth or involuntarily (caste, sex, race). An <b>achieved status</b> is earned through one's own actions (a profession entered via training).",why:["Caste is ascribed, but a trained profession is earned.","Correct. Caste = ascribed; trained profession = achieved.","Reversed.","Caste is not achieved; it's assigned at birth."],takeaway:"Ascribed = given to you (birth, involuntary). Achieved = earned. Occupation and education are the classic achieved statuses."},
  {tag:"Caste vs. class systems",stem:`A society allows essentially no movement between strata; position is fixed at birth and endogamy is enforced. Compared with a class system, this caste system is best characterized as:`,choices:["An open system with high social mobility","A closed system with little to no social mobility","A meritocracy based on achieved status","A system defined primarily by economic capital"],answer:1,rationale:"A <b>caste system is closed</b>: strata are fixed at birth, mobility is essentially impossible, membership is ascribed. A class system is open, permitting mobility partly on achieved status.",why:["Open, mobile systems are class systems.","Correct. Caste = closed, ascribed, minimal mobility.","Meritocracy rewards achieved status; caste is ascribed.","Caste is defined by birth-ascribed rank, not primarily economic capital."],takeaway:"Caste = closed/ascribed/no mobility. Class = open/allows mobility. 'Closed vs. open' is the core contrast."},
  {tag:"Forms of capital · Bourdieu",stem:`A first-generation student is comfortable with academic norms, formal speech, and cultural references that ease their way through elite institutions, despite modest family income. This asset is best labeled:`,choices:["Economic capital","Cultural capital","Social capital","Human capital"],answer:1,rationale:"<b>Cultural capital</b> is the non-financial social assets — education, tastes, speech, cultural knowledge — that promote mobility and ease within institutions. Distinct from money (economic) and networks (social).",why:["Economic capital is financial resources; the stem specifies modest income.","Correct. Norms, speech, cultural fluency = cultural capital.","Social capital is the value of one's <b>networks</b>, not cultural fluency.","Human capital (skills for labor markets) is close, but the stem describes cultural fluency — Bourdieu's cultural capital."],takeaway:"Bourdieu: economic = money; cultural = knowledge/tastes; social = networks. 'Fits in at elite institutions' → cultural capital."},
  {tag:"Types of mobility",stem:`A woman born to working-class parents becomes a physician. Over her own career she is later promoted from resident to department chief. These two changes illustrate, respectively:`,choices:["Intragenerational then intergenerational mobility","Intergenerational then intragenerational mobility","Horizontal then vertical mobility","Structural then exchange mobility"],answer:1,rationale:"Working-class parents to physician is <b>intergenerational</b> mobility (relative to the prior generation). Resident to chief within her own working life is <b>intragenerational</b>.",why:["Reversed.","Correct. Between generations first, then within her own lifetime.","Both moves are vertical (upward).","Structural mobility refers to whole groups moving due to societal change."],takeaway:"Intergenerational = across generations (parent→child). Intragenerational = within one lifetime/career."},
  {tag:"Structural mobility",stem:`During rapid industrialization, a large share of a nation's population moves from agricultural labor into factory and clerical jobs as the occupational structure shifts. This population-level upward movement is best termed:`,choices:["Individual meritocratic mobility","Structural mobility","Horizontal mobility","Downward mobility"],answer:1,rationale:"<b>Structural mobility</b> is movement of many people caused by changes in society's structure (industrialization creating new job categories), not individual effort.",why:["The stem describes a society-wide shift, not individual merit.","Correct. Economy-driven movement of many people.","Horizontal mobility is same-rank change; this is upward.","The movement is upward, not downward."],takeaway:"Structural mobility = society changes and moves whole groups. Contrast with individual mobility from personal effort."},
  {tag:"Explaining persistent inequality",stem:`A theorist argues that schools transmit the dominant group's cultural capital, so children of advantaged families are rewarded for norms they already possess, quietly reproducing the class structure across generations. This reflects:`,choices:["The Davis–Moore (functionalist) view that stratification is beneficial","Social reproduction, a conflict-theory perspective","Meritocracy operating as intended","Symbolic interactionism at the societal level"],answer:1,rationale:"<b>Social reproduction</b> — associated with conflict theory and Bourdieu — holds that institutions like schools transmit advantage across generations, perpetuating inequality rather than rewarding pure merit.",why:["Davis–Moore argues stratification is functional; this stem critiques inequality.","Correct. Institutions reproducing class advantage = social reproduction.","The argument is that merit is NOT what's rewarded — it opposes meritocracy.","Symbolic interactionism is micro-level meaning-making, not macro reproduction."],takeaway:"Social reproduction = inequality perpetuated through institutions (esp. schools). Conflict-theory idea; contrast Davis–Moore."}
 ]},
{id:"ps-6a-sensory-adaptation",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Sensory processing",categoryCode:"6A",idea:"Sensory adaptation",
 questions:[
  {tag:"Acoustic reflex · timing",stem:`A loud sound triggers a small muscle in the ear to contract and dampen the vibrations reaching the inner ear (the acoustic reflex). Because this reflex takes up to a fraction of a second to engage, it:`,choices:["Protects hearing during sustained loud noise, like a concert, but not a sudden gunshot","Protects against a sudden gunshot but not sustained noise","Works equally well for sudden and sustained sounds","Makes the ear more sensitive to loud sounds"],answer:0,rationale:"The acoustic reflex is too <b>slow</b> to react to an abrupt, impulsive sound like a gunshot, but it can dampen <b>sustained</b> loud noise once engaged — which is why a prolonged concert is attenuated while a sudden blast is not.",why:["Correct. Slow onset → useless for an instantaneous blast, useful for prolonged loud sound.","Reversed — the delay means it can't protect against a sudden gunshot.","Its latency makes it selective for sustained sound, not equal for both.","It dampens vibration to protect the ear; it doesn't increase sensitivity."],takeaway:"The acoustic reflex is protective but slow — it guards against sustained loud noise, not sudden impulse sounds like a gunshot."},
  {tag:"Adaptation vs. habituation",stem:`After a few minutes in a room with a strong smell, a person stops noticing it even though the odor concentration is unchanged and the olfactory receptors in the nose are desensitizing over time. This fading perception is best described as:`,choices:["Sensory adaptation","Habituation","Sensitization","A raised absolute threshold"],answer:0,rationale:"<b>Sensory adaptation</b> is the reduced responsiveness of the receptors themselves to a constant stimulus — exactly the olfactory desensitization described.",why:["Correct. The receptors desensitize to the ongoing odor — receptor-level adaptation.","Habituation is a <b>learned, central</b> decrease in behavioral response to a repeated stimulus, not receptor desensitization.","Sensitization is an <b>increase</b> in response — the opposite.","The absolute threshold is the minimum detectable stimulus; it isn't what changes as receptors adapt to a strong, ongoing odor."],takeaway:"Sensory adaptation = the receptors themselves fire less to a CONSTANT stimulus. Habituation = a learned, central drop in response to a REPEATED stimulus."},
  {tag:"Light adaptation · down-regulation",stem:`Stepping outdoors into bright sunlight, a person is briefly dazzled, then vision normalizes as the pupils constrict and the photoreceptors become less responsive to light. This rapid adjustment is:`,choices:["Light adaptation (down-regulation of sensitivity)","Dark adaptation (up-regulation of sensitivity)","Sensitization of the rods","Regeneration of rhodopsin"],answer:0,rationale:"In bright light the eye <b>down-regulates</b> sensitivity: the pupil constricts to admit less light and the photoreceptors desensitize. This is light adaptation, and it's fast.",why:["Correct. Bright light → pupil constriction + photoreceptor desensitization = light adaptation.","Dark adaptation is the opposite — increasing sensitivity in dim conditions.","Sensitization would increase responsiveness; here the receptors become <i>less</i> responsive.","Rhodopsin regenerates during <i>dark</i> adaptation; in bright light it's bleached."],takeaway:"Light adaptation = down-regulate: pupils constrict, photoreceptors desensitize (fast). Dark adaptation = up-regulate: pupils dilate, pigment regenerates (slow)."},
  {tag:"Dark adaptation · up-regulation",stem:`Entering a dark theater, a person can barely see at first but gradually regains vision over about 20–30 minutes as the pupils dilate and the rods synthesize light-sensitive molecules. The slow phase of this dark adaptation is mainly due to:`,choices:["Regeneration of photopigment (rhodopsin) in the rods, raising sensitivity","Constriction of the pupils","Desensitization of the rods","Conversion of cones into rods"],answer:0,rationale:"Dark adaptation's slow phase is the <b>regeneration of rhodopsin</b> in the rods (bleached in the prior bright light), which steadily increases sensitivity. Pupil dilation helps but is fast; the 20–30-minute course is the pigment rebuilding.",why:["Correct. Rods resynthesize light-sensitive pigment, and sensitivity climbs over ~20–30 min.","Pupils <i>dilate</i> in the dark; and that's a fast effect, not the slow phase.","Sensitivity <i>increases</i> during dark adaptation — the rods become more, not less, responsive.","Rods and cones are separate receptors; one doesn't convert into the other."],takeaway:"Dark adaptation (up-regulation): pupils dilate + rods regenerate rhodopsin → sensitivity rises over ~20–30 min."},
  {tag:"Perceptual adaptation · inverting goggles",stem:`A volunteer wears goggles that flip the visual field upside-down. Disoriented at first, after several days they navigate normally and the world even begins to look upright again. This illustrates that the nervous system:`,choices:["Adapts to persistently altered sensory input by recalibrating perception","Permanently loses the ability to perceive true orientation","Increases the absolute threshold for vision","Stops transducing visual signals at the retina"],answer:0,rationale:"Given continuously altered input, the brain <b>recalibrates</b> — perceptual adaptation — so behavior and eventually perception normalize. Remove the goggles and there's a brief after-effect until it recalibrates back.",why:["Correct. Sustained altered input → the nervous system adapts and re-normalizes perception.","It's reversible — removing the goggles produces a temporary after-effect, then normal perception returns.","Absolute threshold (minimum detectable light) isn't what's changing; orientation processing is recalibrating.","The retina keeps transducing normally; the adaptation is central/perceptual."],takeaway:"Perceptual adaptation: with sustained altered input (inverting goggles), the brain recalibrates so perception normalizes — and shows an after-effect when the input is removed."},
  {tag:"Thermoreceptor adaptation",stem:`A hot bath feels almost unbearably hot for the first few seconds, then comfortable within a minute — even though the water temperature hasn't changed. The fading of the intense heat sensation is best explained by:`,choices:["Adaptation of temperature receptors to the constant stimulus","A drop in the water's temperature","Sensitization of thermoreceptors","An increase in the difference threshold"],answer:0,rationale:"The <b>thermoreceptors</b> adapt to the constant temperature, reducing their firing so the sensation fades — classic sensory adaptation to an unchanging stimulus.",why:["Correct. Constant temperature → thermoreceptors reduce firing → the sensation fades.","The stem states the water temperature is unchanged; the change is in the receptors, not the water.","Sensitization would <i>intensify</i> the sensation, the opposite of what happens.","The difference threshold (smallest detectable change) isn't what drives the fading of a constant sensation."],takeaway:"Temperature receptors adapt to constant warmth or cold — why a hot bath or a cold pool feels extreme at first, then normal."},
  {tag:"Adaptation = down-regulation",stem:"You feel a shirt when you first put it on, but minutes later you don't, though the fabric still touches you. In terms of receptor regulation, this sensory adaptation is:",choices:["Up-regulation of the receptor's response","Down-regulation \u2014 the receptor reduces its response to a constant stimulus","Amplification of the signal","Transduction of a new stimulus"],answer:1,rationale:"Sensory adaptation is <b>down-regulation</b>: the receptor fires less to a constant, unchanging stimulus.",why:["Up-regulation would increase the response \u2014 the opposite of adaptation.","Correct. Adaptation is down-regulation: a receptor progressively reduces its firing to an unchanging stimulus.","Amplification strengthens a signal; adaptation weakens the response.","Transduction is converting a stimulus to a neural signal, not the fading response."],takeaway:"Sensory adaptation = down-regulation (reduced response to a constant stimulus)."},
  {tag:"Why adaptation helps",stem:"One reason sensory adaptation is useful is that it:",choices:["Amplifies weak signals for the brain","Increases sensitivity to constant stimuli","Prevents transduction from occurring","Filters out constant, unchanging stimuli \u2014 and can protect receptors from damaging overexcitation"],answer:3,rationale:"Adaptation filters out unchanging stimuli so we notice <i>change</i>, and protects receptors from damaging overexcitation.",why:["Amplification (up-regulation) does that \u2014 not adaptation.","Adaptation decreases, not increases, response to a constant stimulus.","Adaptation modulates the ongoing response; it doesn't stop transduction.","Correct. Adaptation lets us ignore constant, uninformative input and spares receptors from overexcitation (persistent intense signaling can damage cells)."],takeaway:"Adaptation = ignore constant stimuli + protect receptors from overexcitation."},
  {tag:"Amplification = up-regulation",stem:"The opposite of sensory adaptation \u2014 in which a signal is strengthened rather than reduced \u2014 is called:",choices:["Amplification (up-regulation)","Habituation","Further down-regulation","Accommodation"],answer:0,rationale:"<b>Amplification</b> = up-regulation: the signal is strengthened, the opposite of adaptation's down-regulation.",why:["Correct. Amplification is up-regulation \u2014 strengthening a signal \u2014 the opposite of adaptation's down-regulation.","Habituation is a learned decrease in response, not signal strengthening.","Down-regulation is adaptation, the opposite of amplification.","Accommodation is the lens focusing in the eye, unrelated."],takeaway:"Amplification = up-regulation (strengthen the signal). Adaptation = down-regulation."},
  {tag:"Amplification mechanism",stem:"How can a single photoreceptor firing produce a much stronger signal by the time it reaches the brain?",choices:["The receptor keeps firing forever on its own","Adaptation boosts the signal along the way","One activated cell can excite several downstream cells, which each excite more \u2014 amplifying the signal","The stimulus physically grows stronger inside the eye"],answer:2,rationale:"Amplification works by <b>divergence</b>: one cell activates several downstream cells, each activating more \u2014 so the signal grows before reaching the brain.",why:["Receptors don't fire indefinitely; amplification is about spreading the signal.","Adaptation reduces responses; it doesn't boost the signal.","Correct. Signal amplification comes from divergence: one cell activates several, which each activate more, so the signal grows en route to the brain.","The stimulus doesn't grow \u2014 the neural signal is amplified by divergence."],takeaway:"Amplification = one cell activates many downstream (divergence) \u2192 signal grows."}
 ]},
{id:"ps-6a-webers-law",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Sensory processing",categoryCode:"6A",idea:"Weber's law",
 questions:[
  {tag:"JND scales with intensity",stem:`A person can just detect the difference between a 2.0 lb and a 2.2 lb weight. Assuming Weber's law holds, the smallest weight reliably distinguishable from a 5.0 lb weight is about:`,choices:["5.2 lb","5.5 lb","5.05 lb","7.0 lb"],answer:1,rationale:"Weber's law says the JND is a constant <b>fraction</b> of the baseline: k = ΔI/I = 0.2/2 = 0.1. At 5.0 lb, ΔI = kI = 0.1 × 5 = 0.5 lb → about 5.5 lb.",why:["5.2 assumes a constant <i>absolute</i> JND (0.2 lb), exactly the misconception Weber's law corrects.","Correct. ΔI = 0.1 × 5 = 0.5 → 5.5 lb.","5.05 uses far too small a change; the JND grows with the baseline.","7.0 (a 2 lb change) is much larger than the proportional JND requires."],takeaway:"JND is a constant proportion of the baseline (ΔI = kI), not a fixed amount. Heavier start → larger absolute change to notice."},
  {tag:"Proportion, not absolute",stem:`According to Weber's law, as the intensity of a baseline stimulus increases, the just-noticeable difference (JND):`,choices:["Grows in absolute terms while staying a constant proportion of the baseline","Stays the same fixed absolute amount","Shrinks in absolute terms","Drops to zero"],answer:0,rationale:"The JND is a fixed <b>ratio</b> (ΔI/I = k). A bigger baseline means a bigger absolute JND, but the same fraction.",why:["Correct. Constant fraction → the absolute JND grows as the baseline rises.","A fixed absolute JND is precisely the misconception Weber's law corrects.","The absolute JND grows, not shrinks, with baseline.","It never reaches zero — there's always some detectable proportional change."],takeaway:"Weber's law: the JND is a constant fraction of the stimulus, so the absolute difference needed grows with intensity."},
  {tag:"ΔI = kI · the graph",stem:`Weber's law can be written ΔI = kI, where ΔI is the difference threshold and I is the background intensity. A graph of ΔI (y-axis) against I (x-axis) is:`,choices:["A straight line through the origin with slope k","A horizontal (flat) line","A curve that levels off at high I","A vertical line"],answer:0,rationale:"ΔI = kI is linear through the origin: as background intensity rises, the difference threshold rises proportionally. The <b>ratio</b> ΔI/I is constant (k) — but the plotted line itself is not flat; it climbs with slope k.",why:["Correct. ΔI = kI → straight line, through the origin, slope k.","A flat line would mean a constant absolute JND regardless of intensity — the opposite of Weber's law. It's the ratio that's constant, not ΔI itself.","A leveling curve resembles Fechner's log relationship for <i>perceived magnitude</i>, not Weber's difference threshold.","ΔI is a function of I, so the relationship isn't vertical."],takeaway:"ΔI = kI plots as a straight line through the origin (slope k). The constant thing is the RATIO ΔI/I — not the value of ΔI."},
  {tag:"Interpreting the Weber fraction",stem:`Two sensory dimensions have Weber fractions of k = 0.02 and k = 0.10. A smaller Weber fraction indicates:`,choices:["Greater sensitivity — a smaller proportional change can be detected","Lower sensitivity to change","A higher absolute threshold","No difference in sensitivity"],answer:0,rationale:"k is the fraction of the baseline needed to notice a change. A <b>smaller</b> k means a smaller relative change is detectable — finer discrimination, greater sensitivity.",why:["Correct. k = 0.02 means a 2% change is noticeable; k = 0.10 needs 10% — the 0.02 dimension is more sensitive.","Smaller k is more sensitive, not less.","The Weber fraction concerns the <i>difference</i> threshold, not the absolute threshold.","The two fractions differ fivefold in sensitivity."],takeaway:"Smaller Weber fraction (k) = finer discrimination = more sensitive to proportional change."},
  {tag:"Difference vs. absolute threshold",stem:`Weber's law describes the difference threshold. This is distinct from the absolute threshold, which is:`,choices:["The minimum stimulus intensity a person can detect 50% of the time","The constant ratio ΔI/I","The largest change a person can tolerate","The point at which receptors stop adapting"],answer:0,rationale:"The <b>absolute threshold</b> is the smallest amount of a stimulus detectable 50% of the time. Weber's law instead concerns the <b>difference threshold</b> (JND) — how much change is needed to notice a difference.",why:["Correct. Absolute threshold = minimum detectable intensity (50% detection).","ΔI/I = k is Weber's law itself (the difference threshold), not the absolute threshold.","Weber's law isn't about tolerance limits.","That describes sensory adaptation, a different concept."],takeaway:"Absolute threshold = can you detect it at all (minimum intensity). Difference threshold / JND (Weber's law) = can you tell two stimuli apart."},
  {tag:"Applying ΔI = kI",stem:`Adding 1 candle to a room lit by 10 candles produces a just-noticeable increase in brightness. To produce a just-noticeable increase in a room lit by 100 candles, one must add about:`,choices:["10 candles","1 candle","2 candles","100 candles"],answer:0,rationale:"k = ΔI/I = 1/10 = 0.1. At 100 candles, ΔI = kI = 0.1 × 100 = 10 candles — the same <i>proportional</i> change is required.",why:["Correct. 0.1 × 100 = 10 candles.","1 candle worked at 10 candles (10%); at 100 candles it's only 1% — below the JND.","2 candles is 2% of 100 — still below the 10% needed.","100 candles is far more than the proportional JND requires."],takeaway:"Same Weber fraction across intensities: 1/10 at ten candles = 10/100 at a hundred. The proportional change is what's fixed."}
 ]},
{id:"ps-6a-absolute-threshold",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Sensory processing",categoryCode:"6A",idea:"Absolute threshold & signal detection",
 questions:[
  {tag:"Definition · the 50% rule",stem:`The absolute threshold of sensation is best defined as:`,choices:["The minimum stimulus intensity a person can detect 50% of the time","The smallest detectable difference between two stimuli","The maximum intensity a person can tolerate","The intensity at which a stimulus becomes painful"],answer:0,rationale:"The <b>absolute threshold</b> is the minimum intensity of a stimulus needed to detect it 50% of the time. Detection is probabilistic, so it's pinned to the 50% point, not an all-or-nothing cutoff.",why:["Correct. Minimum intensity detected on half of trials.","That's the <i>difference</i> threshold (JND) — a related but distinct concept.","Absolute threshold is the lower limit of detection, not an upper tolerance limit.","Pain onset is a separate phenomenon, not the absolute threshold."],takeaway:"Absolute threshold = the minimum intensity detectable 50% of the time. The '50%' is the whole point — detection is probabilistic."},
  {tag:"Why 50% · the psychometric curve",stem:`When percent-correct detections are plotted against stimulus intensity, the result is an S-shaped (sigmoidal) curve rather than a sharp step. This shape reflects that:`,choices:["Detection is probabilistic — near threshold, the same faint stimulus is sometimes detected and sometimes missed","The absolute threshold is a fixed, unvarying value","Stronger stimuli are detected less often","Detection is impossible below the threshold and certain above it"],answer:0,rationale:"Near the threshold, a faint stimulus is detected on some trials and missed on others (and it varies across people), so detection rises gradually with intensity — an S-curve. The threshold is defined at the 50%-detection point.",why:["Correct. Trial-to-trial and person-to-person variability makes detection gradual, not all-or-nothing.","A fixed value would give a sharp step, not an S-curve.","Stronger stimuli are detected <i>more</i> often — the curve rises.","A true step function (impossible below, certain above) is exactly what the gradual S-curve contradicts."],takeaway:"Detection near threshold is probabilistic → a sigmoidal curve. The threshold is the 50% point, not a hard cutoff."},
  {tag:"Absolute vs. difference threshold",stem:`A quality-control worker must (1) notice whether a faint tone is present at all, and (2) tell whether one tone is slightly louder than another. These two tasks measure, respectively:`,choices:["Absolute threshold, then difference threshold","Difference threshold, then absolute threshold","Absolute threshold for both","Difference threshold for both"],answer:0,rationale:"Detecting whether a stimulus is present at all = <b>absolute threshold</b>. Detecting a change or difference between two stimuli = <b>difference threshold</b> (JND).",why:["Correct. Present-or-not = absolute; tell-them-apart = difference.","Reversed.","The second task discriminates two stimuli — a difference threshold.","The first task detects presence — an absolute threshold."],takeaway:"Absolute threshold = can you detect it at all? Difference threshold (JND) = can you tell two stimuli apart?"},
  {tag:"Not a fixed number",stem:`A person waiting anxiously for an important text notices a faint phone buzz they would normally miss. This best illustrates that the absolute threshold:`,choices:["Is not fixed — it's influenced by psychological states like expectation and motivation","Is a constant, unchanging property of the sensory receptors","Has been permanently lowered by the experience","Is the same thing as the difference threshold"],answer:0,rationale:"Absolute thresholds shift with <b>expectation, motivation, experience, and alertness</b>. Anticipating the text makes the person more likely to detect a faint signal — the threshold is state-dependent, not fixed.",why:["Correct. Expectation and motivation lower the effective threshold in the moment.","If it were fixed at the receptor level, the buzz wouldn't be noticed only when anticipated.","The shift is temporary and state-dependent, not a permanent recalibration.","That's a different concept — detecting a change between two stimuli."],takeaway:"Absolute threshold isn't a fixed number — expectation, motivation, experience, and alertness move it."},
  {tag:"Signal detection theory",stem:`Two people have identical hearing, but the one told to expect a faint tone reports detecting it far more often than the one who isn't. Signal detection theory explains this by proposing that detection depends on:`,choices:["Both sensory sensitivity and a decision criterion shaped by expectation and motivation","Sensory sensitivity alone","A fixed absolute threshold with no role for expectation","The difference threshold between the two listeners"],answer:0,rationale:"Signal detection theory holds that detecting a weak signal depends on <b>sensitivity</b> plus a <b>response criterion</b> — how much evidence you require before saying 'yes.' Expectation and motivation shift the criterion, so identical ears give different detection rates.",why:["Correct. Detection = sensitivity + a criterion influenced by expectation, motivation, and payoffs.","Sensitivity alone can't explain it — their hearing is identical.","A fixed threshold with no role for expectation is exactly what signal detection theory replaces.","The difference threshold is unrelated; this is about detecting a single faint signal."],takeaway:"Signal detection theory: detecting a weak signal = sensory sensitivity + a decision criterion (shifted by expectation, motivation, rewards). It's why the absolute threshold isn't fixed."},
  {tag:"Subliminal stimuli",stem:`A stimulus presented below a person's absolute threshold of sensation is described as:`,choices:["Subliminal — below the level of conscious detection","Supraliminal — above the detection threshold","At the difference threshold","At the just-noticeable difference"],answer:0,rationale:"By definition, a <b>subliminal</b> stimulus falls <b>below</b> the absolute threshold — it isn't consciously detected (whether it can influence behavior is a separate, debated question).",why:["Correct. Subliminal = below the absolute threshold, not consciously perceived.","Supraliminal is <i>above</i> threshold — consciously detectable.","The difference threshold concerns telling two stimuli apart, not detecting one faint stimulus.","The JND is the difference threshold, not a below-detection stimulus."],takeaway:"Subliminal = below the absolute threshold (not consciously detected). Supraliminal = above it."},
  {tag:"Alertness shifts it",stem:"A drowsy night-shift worker repeatedly fails to notice a faint alarm that they easily detect when fully alert. This shift illustrates that the absolute threshold is influenced by:",choices:["Their difference threshold","Alertness (arousal state)","The stimulus's wavelength","Sensory adaptation of the receptors"],answer:1,rationale:"The absolute threshold isn't fixed \u2014 <b>alertness</b> (with expectation, motivation, and experience) shifts it. A drowsy observer needs a stronger signal to reach the 50%-detection point.",why:["The difference threshold concerns telling two stimuli apart, not detecting a faint one.","Correct. Arousal/alertness is one of the psychological states that shift the absolute threshold.","Wavelength is a property of the stimulus, not the reason detection changed with drowsiness.","Adaptation is reduced response to a <i>constant</i> stimulus; here detection varies with the worker's state."],takeaway:"Alertness moves the absolute threshold: drowsy = higher threshold, alert = lower."},
  {tag:"Experience & familiarity",stem:"A new parent wakes to their own baby's faintest cry but sleeps through louder, unfamiliar street noise. Detecting the faint but familiar sound reflects the influence of what on the absolute threshold?",choices:["The just-noticeable difference","Weber's constant","Experience and familiarity","Bottom-up processing alone"],answer:2,rationale:"<b>Experience and familiarity</b> (a top-down factor) lower the absolute threshold for meaningful stimuli \u2014 why a parent detects their own baby's faint cry over louder but irrelevant noise.",why:["The JND is a difference threshold, not the detection of one faint sound.","Weber's constant governs difference thresholds, not this effect.","Correct. Familiarity with a meaningful stimulus lowers the effective threshold for detecting it.","Pure bottom-up processing can't explain why a <i>familiar, meaningful</i> sound is favored \u2014 that's top-down influence."],takeaway:"Familiar, meaningful stimuli are detected at lower intensities \u2014 experience shifts the absolute threshold (top-down)."},
  {tag:"A classic magnitude",stem:"In classic psychophysics, the absolute threshold for vision is often illustrated as a candle flame seen from about 30 miles away on a clear, dark night. This figure represents:",choices:["The maximum light a person can tolerate","The smallest change in brightness detectable","The point of complete dark adaptation","The minimum light intensity detectable 50% of the time"],answer:3,rationale:"The candle-at-30-miles figure classically illustrates the <b>absolute threshold</b> \u2014 the minimum stimulus intensity detectable 50% of the time.",why:["Absolute threshold is a lower limit of detection, not an upper tolerance.","That's the difference threshold (JND), not the absolute threshold.","Dark adaptation is a separate process; the candle example illustrates the detection floor.","Correct. A vivid illustration of an absolute threshold \u2014 the least intense stimulus detectable half the time."],takeaway:"Absolute threshold = the faintest detectable stimulus (50% of the time), e.g., a candle ~30 miles off on a dark night."},
  {tag:"Subliminal vs. supraliminal",stem:"A stimulus presented so briefly that a viewer cannot consciously report seeing it still slightly biases a later choice. The stimulus was:",choices:["Supraliminal \u2014 consciously perceived","Subliminal \u2014 below the absolute threshold, yet capable of weak priming effects","At the difference threshold","Above the terminal threshold"],answer:1,rationale:"A <b>subliminal</b> stimulus is below the absolute threshold \u2014 not consciously perceived \u2014 yet may produce weak, short-lived priming. Contrast <b>supraliminal</b>: consciously detected.",why:["Supraliminal means consciously detected \u2014 but the viewer couldn't report seeing it.","Correct. Below the absolute (conscious) threshold = subliminal; such stimuli can produce limited priming effects without awareness.","The difference threshold concerns discriminating two stimuli, not conscious detection of one.","'Terminal threshold' is the upper limit of sensation, unrelated here."],takeaway:"Subliminal = below conscious detection (can weakly prime). Supraliminal = consciously perceived."}
 ]},
{id:"ps-6a-somatosensation",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Sensory processing",categoryCode:"6A",idea:"Somatosensation",
 questions:[
  {tag:"Submodalities · the terms",stem:`A person can sense the position of their arm in space without looking at it. This submodality of somatosensation is:`,choices:["Nociception","Thermoception","Proprioception","Mechanoreception"],answer:2,rationale:"<b>Proprioception</b> is the sense of the position and movement of the body in space — how you know where your arm is with your eyes closed.",why:["Nociception is the sense of pain, not body position.","Thermoception senses temperature, not position.","Correct. Proprioception is the sense of body and limb position.","Mechanoreception senses pressure and touch, not limb position."],takeaway:"Somatosensory submodalities: temperature = thermoception, pressure/touch = mechanoreception, pain = nociception, body position = proprioception."},
  {tag:"Intensity · rate coding",stem:`In the somatosensory system, the intensity of a stimulus is encoded primarily by:`,choices:["The specific receptor type activated","The neuron's firing rate — faster firing signals a more intense stimulus","The location on the body where it occurs","How long the receptor takes to adapt"],answer:1,rationale:"Stimulus intensity is <b>rate-coded</b>: a more intense stimulus makes the sensory neuron fire more rapidly. Slow firing = low intensity, fast firing = high intensity.",why:["Receptor type encodes the <i>modality</i> (touch vs. pain vs. temperature), not intensity.","Correct. Intensity is signaled by firing rate — stronger stimulus, faster firing.","Location tells the brain <i>where</i>, not how intense.","Adaptation encodes <i>timing</i> (onset/offset), not intensity."],takeaway:"Intensity = firing RATE (faster = stronger). Modality = which receptor. Location = where. Timing = adaptation pattern."},
  {tag:"Fast-adapting · change detector",stem:`A fast-adapting mechanoreceptor fires a burst when a stimulus begins, falls silent during steady stimulation, then fires again when the stimulus is removed. This makes it best suited to detect:`,choices:["Changes in stimulation — its onset and its offset","The constant intensity of a sustained stimulus","The exact temperature of an object","The body location of an injury"],answer:0,rationale:"<b>Fast-adapting</b> receptors fire at the <b>onset</b> and again at the <b>offset</b> of a stimulus, staying silent in between — ideal for detecting <i>change</i> rather than steady state (feeling a watch go on and come off, but not while it sits still).",why:["Correct. Firing at onset and offset makes it a change detector — it flags when stimulation starts and stops.","A constant, sustained stimulus is exactly what a fast-adapting receptor stops responding to.","Temperature is thermoception; a fast-adapting mechanoreceptor isn't a thermometer.","Localizing injury depends on dermatomes and pain pathways, not adaptation pattern."],takeaway:"Fast-adapting = change detector: fires when a stimulus starts and when it stops, silent during steady stimulation."},
  {tag:"Non-adapting · continuous monitoring",stem:`Proprioceptors must continuously report joint position, and nociceptors must keep signaling ongoing injury. For these functions, the most useful firing pattern is:`,choices:["Fast-adapting, firing only at onset and offset","Rapidly adapting to silence within milliseconds","Firing only once the stimulus is removed","Non-adapting — steady firing that tracks the ongoing stimulus"],answer:3,rationale:"Functions that must be monitored <b>continuously</b> — joint position, ongoing tissue damage — are best served by <b>non-adapting (tonic)</b> receptors that keep firing for as long as the stimulus lasts.",why:["Fast-adapting would go silent during the sustained stimulus — you'd lose track of position or ongoing pain.","Rapid adaptation to silence is the opposite of what continuous monitoring needs.","Firing only at offset gives no signal during the stimulus itself.","Correct. Non-adapting (tonic) firing continuously reports the ongoing stimulus — essential for position sense and persistent pain."],takeaway:"Non-adapting (tonic) keeps firing throughout → good for things you must track continuously (position, ongoing pain). Fast-adapting = change only."},
  {tag:"Location · dermatomes",stem:`The nervous system localizes where on the body a touch occurred largely because each spinal nerve carries sensation from a specific region of skin. These regions are called:`,choices:["Myotomes","Dermatomes","The sensory homunculus","Receptive ganglia"],answer:1,rationale:"The body surface is divided into <b>dermatomes</b> — each a strip of skin whose sensory input travels through a single spinal nerve. This organization lets the brain localize where a stimulus occurred.",why:["Myotomes are the <i>muscle</i> groups innervated by a spinal nerve — the motor analog, not the skin map.","Correct. A dermatome is the area of skin whose sensation is carried by one spinal nerve.","The homunculus is the body map in the <i>cortex</i>, not the skin regions of spinal nerves.","Not a standard term; dorsal root ganglia house cell bodies but aren't the skin map."],takeaway:"Dermatome = skin region mapped to one spinal nerve (sensory). Myotome = muscle analog. Homunculus = cortical body map."},
  {tag:"Identify the timing class",stem:`A somatosensory neuron fires strongly when a stimulus begins, gradually reduces its firing during continued stimulation, but keeps firing at a lower rate for as long as the stimulus is present. This timing pattern is:`,choices:["Non-adapting","Fast-adapting","Slow-adapting","Non-responsive"],answer:2,rationale:"<b>Slow-adapting</b> receptors respond strongly at onset, then reduce firing but <b>continue</b> at a lower rate for the stimulus's duration — between non-adapting (constant) and fast-adapting (onset/offset only).",why:["Non-adapting fires at a <i>constant</i> rate — it wouldn't gradually decline.","Fast-adapting goes <i>silent</i> during steady stimulation, then fires again at offset — not a maintained lower rate.","Correct. Slow-adapting fires strongly at onset, then declines but continues while the stimulus lasts.","The neuron is clearly responding, so 'non-responsive' is wrong."],takeaway:"Three timing classes: non-adapting (constant), slow-adapting (declines but continues), fast-adapting (onset + offset only, silent between)."},
  {tag:"Two-point acuity",stem:"A person can tell two closely spaced points apart on a fingertip but feels only one point when the same two are applied to the back. This difference in spatial acuity is because the fingertip has:",choices:["Faster-adapting receptors","A lower absolute threshold for pain","Non-adapting receptors only","A higher density of receptors with smaller receptive fields"],answer:3,rationale:"Spatial acuity (the <b>two-point threshold</b>) depends on receptor density and receptive-field size: fingertips have dense receptors with small fields \u2192 fine discrimination; the back has the opposite.",why:["Adaptation speed governs timing, not spatial resolution.","Pain threshold is unrelated to two-point spatial acuity.","Receptor adaptation class doesn't set spatial resolution.","Correct. Fingertips pack many receptors with small receptive fields (fine discrimination); the back has sparse receptors with large fields."],takeaway:"Two-point discrimination is finest where receptors are dense with small receptive fields (fingertips, lips), poorest where sparse (back)."},
  {tag:"Modality coding",stem:"Whether a somatosensory stimulus is felt as warmth, pressure, or pain is determined primarily by:",choices:["How fast the neuron fires","Which type of receptor and pathway is activated (a 'labeled line')","Where on the body it occurs","How long the receptor takes to adapt"],answer:1,rationale:"The <b>modality</b> (warmth vs. pressure vs. pain) is set by <b>which receptor type and pathway</b> is activated \u2014 the 'labeled line' principle.",why:["Firing rate codes intensity, not which modality is felt.","Correct. Modality is coded by <i>which</i> receptor/pathway carries the signal \u2014 a labeled line.","Location codes <i>where</i>, not <i>what kind</i> of sensation.","Adaptation codes timing, not modality."],takeaway:"Somatosensory coding: modality = which receptor (labeled line), intensity = firing rate, location = dermatome, timing = adaptation."},
  {tag:"Warm vs. cold receptors",stem:"Grasping a hot mug and later an ice cube activates different receptors for each. This reflects that thermoreception uses:",choices:["A single receptor that encodes temperature by firing rate alone","Nociceptors only","Separate populations of warm and cold receptors","The same receptors as proprioception"],answer:2,rationale:"Thermoreception relies on <b>separate warm and cold receptor</b> populations tuned to different ranges (with nociceptors signaling painful extremes) \u2014 not one receptor rate-coding all temperatures.",why:["Temperature isn't handled by one rate-coding receptor; there are separate warm and cold types.","Nociceptors signal painful extremes, but normal warm/cold sensing uses dedicated thermoreceptors.","Correct. Distinct warm and cold thermoreceptors respond to different temperature ranges.","Proprioceptors sense body position, not temperature."],takeaway:"Temperature is sensed by distinct warm and cold receptors; painful heat/cold additionally recruits nociceptors."},
  {tag:"Proprioceptor location",stem:"Proprioceptive information about muscle length and limb position comes largely from specialized receptors located in:",choices:["The skin's outer layer","The cochlea","The otolithic organs","The muscles and tendons (e.g., muscle spindles and Golgi tendon organs)"],answer:3,rationale:"<b>Proprioception</b> draws on receptors within muscles and tendons \u2014 <b>muscle spindles</b> (stretch/length) and <b>Golgi tendon organs</b> (tension) \u2014 to report limb position and movement.",why:["Skin receptors handle touch/temperature/pain, not muscle length.","The cochlea is for hearing.","Otolithic organs sense head linear acceleration (vestibular), not limb proprioception.","Correct. Muscle spindles (length/stretch) and Golgi tendon organs (tension) supply proprioceptive signals."],takeaway:"Proprioceptors live in muscle/tendon: muscle spindles (length/stretch) + Golgi tendon organs (tension)."}
 ]},
{id:"ps-6a-vestibular",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Sensory processing",categoryCode:"6A",idea:"The vestibular system",
 questions:[
  {tag:"Semicircular canals · rotation",stem:`A person shakes their head "no," rotating it side to side. Which structure detects this rotational movement?`,choices:["The otolithic organs, via calcium carbonate crystals","The semicircular canals, as shifting endolymph bends hair cells","The cochlea, via the basilar membrane","The saccule, via linear acceleration"],answer:1,rationale:"The <b>semicircular canals</b> detect rotational (angular) acceleration. As the head rotates, the <b>endolymph</b> inside lags behind, bending hair cells and signaling the direction and speed of rotation.",why:["Otolithic organs detect <i>linear</i> acceleration and head tilt, not rotation.","Correct. The canals sense rotation: head rotation makes the endolymph lag and bend hair cells.","The cochlea is for hearing, not balance.","The saccule detects linear (vertical) acceleration, not rotation."],takeaway:"Semicircular canals = ROTATION (angular acceleration), sensed by endolymph movement bending hair cells."},
  {tag:"Otolithic organs · linear acceleration",stem:`A car suddenly accelerates forward, pressing you back into the seat. Which structures detect this linear acceleration?`,choices:["The otolithic organs (utricle and saccule), via CaCO₃ crystals pulling on hair cells","The semicircular canals, via endolymph","The cochlea, via hair cells on the basilar membrane","The dermatomes of the neck"],answer:0,rationale:"The <b>otolithic organs</b> — the <b>utricle and saccule</b> — detect linear acceleration and head tilt. They contain calcium carbonate crystals (otoliths) in a gel; when you accelerate or tilt, the crystals shift and pull on hair cells, triggering action potentials.",why:["Correct. Otolithic organs sense linear acceleration and head position; their CaCO₃ otoliths shift and pull on hair cells.","Semicircular canals sense rotation, not straight-line acceleration.","The cochlea handles hearing, not acceleration.","Dermatomes are skin regions for touch localization, unrelated to acceleration."],takeaway:"Otolithic organs (utricle + saccule) = LINEAR acceleration + head tilt, via CaCO₃ otoliths pulling hair cells."},
  {tag:"Division of labor",stem:`Which correctly pairs the vestibular structures with what they sense?`,choices:["Semicircular canals → linear acceleration; otolithic organs → rotation","Both detect rotation only","Semicircular canals → rotational acceleration; otolithic organs → linear acceleration and head tilt","Both detect linear acceleration only"],answer:2,rationale:"Division of labor: the <b>semicircular canals</b> detect <b>rotational (angular)</b> acceleration, while the <b>otolithic organs</b> detect <b>linear</b> acceleration and head position relative to gravity.",why:["Reversed — canals do rotation, otolithic organs do linear.","The otolithic organs detect linear acceleration, not rotation.","Correct. Canals = rotation; otolithic organs = linear acceleration + tilt.","The semicircular canals detect rotation, not linear acceleration."],takeaway:"Canals = rotation. Otoliths = linear + tilt. That split is the core of the vestibular system."},
  {tag:"Otoliths need gravity",stem:`The otolithic organs depend on gravity pulling their calcium-carbonate crystals against hair cells. In the microgravity of orbit, an astronaut would most likely experience:`,choices:["Total loss of hearing","Improved balance","Failure of the semicircular canals to sense rotation","Impaired sensing of head position and linear acceleration, causing spatial disorientation"],answer:3,rationale:"Otoliths work because <b>gravity</b> pulls the dense CaCO₃ crystals against the hair cells. In microgravity there's no such pull, so head-position and linear-acceleration sensing is degraded — a major cause of space-related spatial disorientation. The rotation-sensing canals, which rely on fluid inertia, still function.",why:["Hearing (cochlea) isn't affected this way by microgravity.","Balance is impaired, not improved, without gravity acting on the otoliths.","The semicircular canals sense rotation via endolymph inertia and still work in microgravity.","Correct. Without gravity to pull the otoliths, head-position and linear-acceleration cues degrade → disorientation."],takeaway:"Otoliths need gravity; microgravity degrades linear/tilt sensing → disorientation. Semicircular canals (fluid inertia) still work."},
  {tag:"Post-rotatory dizziness",stem:`After spinning rapidly on a chair and abruptly stopping, a person feels as if they are still spinning. The best explanation is that:`,choices:["The endolymph in the semicircular canals keeps moving after the head stops, signaling rotation that is no longer occurring","The otoliths detached from the hair cells","The cochlea was overstimulated by the spinning","Gravity reversed on the otolithic organs"],answer:0,rationale:"Endolymph has <b>inertia</b>: when you suddenly stop spinning, the fluid keeps moving for a moment, continuing to bend the hair cells. The brain reads this as ongoing rotation — the post-rotatory dizziness/vertigo effect.",why:["Correct. Endolymph continues to move briefly after you stop, bending hair cells and falsely signaling rotation.","Otoliths don't detach; and they sense linear acceleration, not spinning.","The cochlea is for hearing and isn't the source of spinning dizziness.","Gravity doesn't reverse; the effect is endolymph inertia."],takeaway:"Post-spin dizziness = endolymph keeps moving after you stop, so the canals falsely signal rotation."},
  {tag:"Cochlea vs. vestibular organs",stem:`The inner ear houses both the vestibular organs and one structure devoted to hearing rather than balance. That structure is the:`,choices:["Utricle","Cochlea","Semicircular canals","Saccule"],answer:1,rationale:"The <b>cochlea</b> is the organ of <b>hearing</b>. The semicircular canals, utricle, and saccule are all <b>vestibular</b> (balance) structures. They share the inner ear but serve different senses.",why:["The utricle is a vestibular (balance) organ — linear acceleration and tilt.","Correct. The cochlea is the auditory organ; the others are vestibular (balance).","The semicircular canals are vestibular — rotational sensing.","The saccule is a vestibular organ — vertical linear acceleration."],takeaway:"Inner ear: cochlea = HEARING; semicircular canals + utricle + saccule = BALANCE (vestibular)."},
  {tag:"Utricle vs. saccule",stem:"Within the otolithic organs, the utricle and saccule specialize for different directions of linear acceleration. Which pairing is correct?",choices:["Utricle \u2192 vertical; saccule \u2192 horizontal","Utricle \u2192 horizontal acceleration; saccule \u2192 vertical acceleration","Both detect only rotation","Both detect only vertical acceleration"],answer:1,rationale:"The otolithic organs split linear motion by axis: the <b>utricle</b> detects <b>horizontal</b> acceleration and head tilt; the <b>saccule</b> detects <b>vertical</b> acceleration (like an elevator).",why:["Reversed.","Correct. The utricle senses horizontal linear acceleration (and head tilt); the saccule senses vertical (e.g., an elevator).","Rotation is the semicircular canals' job, not the otolithic organs'.","They cover different axes \u2014 one horizontal, one vertical \u2014 not both vertical."],takeaway:"Utricle = horizontal linear acceleration + tilt. Saccule = vertical linear acceleration (elevator)."},
  {tag:"Hair cells transduce motion",stem:"Both the semicircular canals and the otolithic organs convert motion into neural signals using the same basic mechanism:",choices:["Bleaching of photopigment","Release of calcium carbonate into the blood","Bending of hair-cell stereocilia opens ion channels, depolarizing the cell","Constriction of the pupil"],answer:2,rationale:"The vestibular system uses <b>hair cells</b> as its transducer: whether by endolymph (canals) or shifting otoliths, the <b>stereocilia bend</b>, opening ion channels and depolarizing the cell to fire action potentials.",why:["Photopigment bleaching is vision (photoreceptors), not the vestibular system.","Otoliths are CaCO\u2083 crystals that pull on hair cells; they aren't released into blood.","Correct. In both, fluid or otolith movement bends hair-cell stereocilia, opening channels and depolarizing the cell \u2192 APs.","Pupil constriction is a visual reflex, unrelated to vestibular transduction."],takeaway:"Vestibular transduction = bending hair-cell stereocilia \u2192 depolarization. Same mechanism in canals and otolith organs."},
