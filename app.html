  {tag:"Incentive theory",stem:"Incentive theory explains motivation as behavior driven by:",choices:["Only innate instincts","External rewards that pull us toward a goal (rather than internal drives pushing us)","Only the reduction of biological needs","A conflict between two beliefs"],answer:1,rationale:"<b>Incentive theory</b>: external rewards <b>pull</b> behavior toward goals (vs. drives that push).",why:["That's instinct theory, not incentive theory.","Correct. Incentive theory emphasizes external incentives (rewards) that 'pull' behavior, complementing the internal 'push' of drives.","That's drive-reduction; incentive theory adds external rewards.","That describes cognitive dissonance, not motivation by incentives."],takeaway:"Incentive theory = external rewards pull behavior (drives push, incentives pull)."},
  {tag:"Intrinsic vs. extrinsic",stem:"Doing an activity for its own inherent satisfaction is ______ motivation; doing it for an external reward or to avoid punishment is ______ motivation.",choices:["Extrinsic; intrinsic","Primary; secondary","Central; peripheral","Intrinsic; extrinsic"],answer:3,rationale:"<b>Intrinsic</b> motivation = for its own sake; <b>extrinsic</b> = for external reward/consequences.",why:["Reversed \u2014 intrinsic is internal, extrinsic is external.","Primary/secondary are drive types, not the intrinsic/extrinsic split.","Central/peripheral are persuasion routes, not motivation types.","Correct. Intrinsic motivation comes from internal satisfaction; extrinsic motivation comes from external rewards/consequences."],takeaway:"Intrinsic = internal satisfaction. Extrinsic = external reward."},
  {tag:"Overjustification effect",stem:"Rewarding someone for an activity they already enjoy can REDUCE their intrinsic motivation for it. This is the:",choices:["Overjustification effect","Yerkes-Dodson law","Foot-in-the-door effect","Drive-reduction principle"],answer:0,rationale:"<b>Overjustification effect</b>: an external reward can undermine existing intrinsic motivation.",why:["Correct. The overjustification effect: an external reward can undermine pre-existing intrinsic motivation (the person re-attributes their behavior to the reward).","Yerkes-Dodson relates arousal to performance, not reward undermining interest.","Foot-in-the-door is a compliance technique, not about intrinsic motivation.","Drive-reduction is about need states, not reward undermining interest."],takeaway:"Overjustification = rewarding an already-enjoyed activity lowers intrinsic motivation."}
 ]},
{id:"ps-7a-maslow",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Motivation",categoryCode:"7A",idea:"Maslow's hierarchy of needs",
 questions:[
  {tag:"Maslow's hierarchy order",stem:"Maslow's hierarchy of needs, from the base upward, is:",choices:["Self-actualization \u2192 esteem \u2192 safety \u2192 physiological","Physiological \u2192 safety \u2192 love/belonging \u2192 esteem \u2192 self-actualization","Esteem \u2192 love \u2192 safety \u2192 physiological \u2192 self-actualization","Safety \u2192 physiological \u2192 esteem \u2192 love \u2192 self-actualization"],answer:1,rationale:"Maslow (base\u2192top): <b>physiological \u2192 safety \u2192 love/belonging \u2192 esteem \u2192 self-actualization</b>.",why:["That's the reverse order.","Correct. The pyramid rises: physiological \u2192 safety \u2192 love/belonging \u2192 esteem \u2192 self-actualization.","Physiological needs are the base, below esteem and love.","Physiological needs come before safety, and love before esteem."],takeaway:"Maslow: physiological \u2192 safety \u2192 love/belonging \u2192 esteem \u2192 self-actualization."},
  {tag:"Lower needs first",stem:"A central claim of Maslow's hierarchy is that:",choices:["Higher needs must be met before lower ones","All needs are pursued equally at once","Only physiological needs ever motivate people","Lower (more basic) needs must be reasonably met before higher needs strongly motivate behavior"],answer:3,rationale:"Maslow: <b>lower needs</b> are generally satisfied first, then <b>higher needs</b> motivate behavior.",why:["Reversed \u2014 basic needs generally come first.","The hierarchy implies a general priority order, not equal simultaneous pursuit.","Higher needs (esteem, self-actualization) also motivate once basics are met.","Correct. Maslow proposed a prepotent hierarchy: basic needs generally take priority until reasonably satisfied, then higher needs emerge."],takeaway:"Maslow: meet basic needs first, then higher needs motivate."},
  {tag:"Self-actualization",stem:"The need at the top of Maslow's pyramid \u2014 realizing one's full potential and becoming the most one can be \u2014 is:",choices:["Self-actualization","Safety","Esteem","Physiological needs"],answer:0,rationale:"<b>Self-actualization</b> = the top need: realizing your full potential.",why:["Correct. Self-actualization is the highest need: fulfilling one's unique potential.","Safety is a lower (deficiency) need.","Esteem sits below self-actualization.","Physiological needs are the base of the pyramid."],takeaway:"Self-actualization = realize your full potential (top of the pyramid)."},
  {tag:"Deficiency vs. growth needs",stem:"In Maslow's model, the lower four levels are called ______ needs, while self-actualization is a ______ need.",choices:["Growth; deficiency","Primary; secondary","Deficiency; growth","Intrinsic; extrinsic"],answer:2,rationale:"Maslow: the lower four are <b>deficiency</b> needs; self-actualization is a <b>growth</b> need.",why:["Reversed \u2014 the lower four are deficiency needs.","Primary/secondary are drive terms, not Maslow's categories.","Correct. The lower four (physiological, safety, love, esteem) are deficiency needs; self-actualization is a growth (being) need.","Intrinsic/extrinsic describe motivation source, not Maslow's need types."],takeaway:"Maslow: lower four = deficiency needs; self-actualization = growth need."},
  {tag:"Esteem needs",stem:"In Maslow's hierarchy, the need for achievement, competence, recognition, and respect from others is the level of:",choices:["Physiological needs","Esteem needs","Safety needs","Self-actualization"],answer:1,rationale:"<b>Esteem needs</b> = achievement, competence, recognition, respect (just below self-actualization).",why:["Physiological needs are basic biological requirements.","Correct. Esteem needs \u2014 achievement, status, respect \u2014 sit just below self-actualization.","Safety needs concern security and stability.","Self-actualization is the top level, above esteem."],takeaway:"Esteem needs = achievement, respect, recognition."}
 ]},
{id:"ps-7a-hunger-sex",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Motivation",categoryCode:"7A",idea:"Specific motivations: hunger & sex",
 questions:[
  {tag:"Hypothalamus & hunger",stem:"The brain region that regulates hunger and satiety \u2014 integrating signals about energy needs \u2014 is the:",choices:["Cerebellum","Hypothalamus","Occipital lobe","Hippocampus"],answer:1,rationale:"The <b>hypothalamus</b> regulates hunger and satiety.",why:["The cerebellum coordinates movement.","Correct. The hypothalamus regulates hunger and satiety (and other homeostatic drives).","The occipital lobe processes vision.","The hippocampus handles memory."],takeaway:"Hunger/satiety = hypothalamus."},
  {tag:"Lateral vs. ventromedial hypothalamus",stem:"Within the hypothalamus, the lateral region acts as a hunger 'on' switch, while the ventromedial region acts as the:",choices:["Second hunger 'on' switch","Thirst center only","Temperature regulator only","Satiety 'off' switch (signals fullness / stop eating)"],answer:3,rationale:"<b>Lateral hypothalamus</b> = hunger 'on'; <b>ventromedial hypothalamus</b> = satiety 'off.'",why:["The ventromedial region signals satiety, not more hunger.","It regulates satiety, not only thirst.","It signals fullness, distinct from temperature regulation.","Correct. Lateral hypothalamus = hunger ('eat'); ventromedial hypothalamus = satiety ('stop'). Damage to the ventromedial region can cause overeating."],takeaway:"Lateral hypothalamus = hunger (on). Ventromedial = satiety (off)."},
  {tag:"Leptin & ghrelin",stem:"Two appetite hormones work in opposition: one from fat cells suppresses appetite, the other from the stomach stimulates it. These are, respectively:",choices:["Leptin (suppresses appetite) and ghrelin (stimulates appetite)","Ghrelin (suppresses) and leptin (stimulates)","Insulin (suppresses) and cortisol (stimulates)","Melatonin (suppresses) and gustducin (stimulates)"],answer:0,rationale:"<b>Leptin</b> (fat) suppresses appetite; <b>ghrelin</b> (stomach) stimulates it. Mnemonic: <b>G</b>hrelin = <b>G</b>o eat.",why:["Correct. Leptin (from adipose tissue) reduces appetite; ghrelin (from the stomach) increases it.","Reversed \u2014 leptin suppresses, ghrelin stimulates.","Insulin/cortisol aren't the leptin/ghrelin appetite pair.","Melatonin and gustducin aren't appetite hormones."],takeaway:"Leptin (fat) = suppress appetite. Ghrelin (stomach) = stimulate appetite (Go eat)."},
  {tag:"Set-point theory",stem:"The idea that the body defends a relatively stable weight by adjusting hunger and metabolism when weight drifts from that level is:",choices:["Drive-reduction theory","Incentive theory","Set-point theory","The overjustification effect"],answer:2,rationale:"<b>Set-point theory</b>: the body defends a stable weight by adjusting hunger and metabolism.",why:["Drive-reduction is a broad motivation theory, not the weight set-point specifically.","Incentive theory concerns external rewards.","Correct. Set-point theory: the body has a 'thermostat' for weight and adjusts hunger/metabolism to defend it.","The overjustification effect concerns intrinsic motivation."],takeaway:"Set-point theory = body defends a stable weight (adjusts hunger/metabolism)."},
  {tag:"Sexual motivation",stem:"Sexual motivation is best described as influenced by:",choices:["Purely biological hormones with no cultural influence","Both biological factors (e.g., sex hormones) and sociocultural factors","Purely learned cultural norms with no biology","Neither biology nor environment"],answer:1,rationale:"Sexual motivation is <b>biopsychosocial</b>: biological (hormones) + sociocultural factors.",why:["Culture clearly shapes sexual behavior alongside biology.","Correct. Sexual motivation reflects both biology (hormones like testosterone/estrogen) and sociocultural learning \u2014 like hunger, it's biopsychosocial.","Biology (hormones) contributes alongside culture.","Both biology and environment influence it."],takeaway:"Sexual motivation = biology (hormones) + sociocultural factors."}
 ]},
{id:"ps-7c-attitude-components",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Attitudes",categoryCode:"7C",idea:"Components & structure of attitudes",
 questions:[
  {tag:"ABC model of attitudes",stem:"Attitudes are commonly described as having three components (the ABC model):",choices:["Arousal, Behavior, and Consequence","Affective (feelings), Behavioral (actions/tendencies), and Cognitive (beliefs)","Attention, Balance, and Cognition","Approach, Bias, and Conditioning"],answer:1,rationale:"Attitudes (ABC): <b>Affective</b> (feelings), <b>Behavioral</b> (actions), <b>Cognitive</b> (beliefs).",why:["Those aren't the three attitude components.","Correct. The ABC model: Affective (emotional), Behavioral (action tendency), Cognitive (belief/thought) components.","Those aren't the ABC attitude components.","Those aren't the ABC attitude components."],takeaway:"Attitude ABC: Affective (feelings), Behavioral (actions), Cognitive (beliefs)."},
  {tag:"Affective component",stem:"Feeling anxious at the sight of a spider reflects which component of the attitude toward spiders?",choices:["Cognitive component","Behavioral component","Arousal component","Affective (emotional) component"],answer:3,rationale:"The <b>affective</b> component = the feelings/emotions in an attitude.",why:["The cognitive component is beliefs/thoughts, not feelings.","The behavioral component is action tendencies.","'Arousal' isn't one of the three attitude components.","Correct. The affective component is the emotional/feeling aspect of an attitude."],takeaway:"Affective component = feelings/emotions."},
  {tag:"Cognitive component",stem:"Believing that 'spiders are dangerous' reflects which component of an attitude?",choices:["Cognitive (belief) component","Affective component","Behavioral component","Peripheral component"],answer:0,rationale:"The <b>cognitive</b> component = the beliefs/thoughts in an attitude.",why:["Correct. The cognitive component is the thoughts/beliefs that make up an attitude.","The affective component is feelings, not beliefs.","The behavioral component is action tendencies.","'Peripheral' is a persuasion route, not an attitude component."],takeaway:"Cognitive component = beliefs/thoughts."},
  {tag:"Behavioral component",stem:"Avoiding a room because a spider is in it reflects which component of an attitude?",choices:["Cognitive component","Affective component","Behavioral (action) component","Central component"],answer:2,rationale:"The <b>behavioral</b> component = how an attitude shows up in actions.",why:["The cognitive component is beliefs, not actions.","The affective component is feelings, not actions.","Correct. The behavioral component is how an attitude influences actions or action tendencies.","'Central' is a persuasion route, not an attitude component."],takeaway:"Behavioral component = actions/action tendencies."}
 ]},
{id:"ps-7c-attitude-behavior",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Attitudes",categoryCode:"7C",idea:"Attitudes & behavior",
 questions:[
  {tag:"When attitudes predict behavior",stem:"Attitudes best predict behavior when the attitude is:",choices:["Weak and vague","Strong, specific, stable, and easily accessible, and when situational pressures are weak","Held under strong social pressure to act otherwise","Never expressed"],answer:1,rationale:"Attitudes predict behavior best when <b>strong, specific, stable, accessible</b>, and situational pressure is low.",why:["Weak, vague attitudes poorly predict behavior.","Correct. Attitude\u2013behavior consistency is highest when attitudes are strong, specific, stable, accessible, and external pressures are low.","Strong situational pressure overrides attitudes.","Accessible, expressed attitudes predict behavior better than dormant ones."],takeaway:"Attitudes predict behavior when strong/specific/stable/accessible + low situational pressure."},
  {tag:"Behavior influences attitude",stem:"A large body of research shows the reverse also holds: our behavior shapes our attitudes. A classic demonstration is:",choices:["The Yerkes-Dodson law","The set-point mechanism","Sensory adaptation","The foot-in-the-door phenomenon (agreeing to a small request increases compliance with a larger one)"],answer:3,rationale:"Behavior shapes attitude \u2014 e.g., the <b>foot-in-the-door</b> phenomenon (small request \u2192 later larger compliance).",why:["Yerkes-Dodson relates arousal to performance, not behavior\u2192attitude.","The set-point mechanism is about weight regulation.","Sensory adaptation is a receptor-level process.","Correct. Foot-in-the-door: complying with a small request makes people more likely to agree to a larger one \u2014 behavior shifting attitude/self-image."],takeaway:"Foot-in-the-door = agree to small request \u2192 more likely to agree to a bigger one."},
  {tag:"Role-playing & attitudes",stem:"Zimbardo's prison study and related research show that adopting a social ROLE can:",choices:["Change a person's attitudes and behavior to fit the role","Have no effect on attitudes","Only affect attitudes if paid","Permanently fix attitudes against change"],answer:0,rationale:"Adopting a <b>social role</b> can reshape attitudes and behavior to match the role (Zimbardo).",why:["Correct. Playing a role (guard/prisoner) led people to internalize attitudes consistent with it \u2014 behavior shaping attitude.","Role-playing demonstrably shifts attitudes and behavior.","The effect doesn't require payment.","It shows attitudes are malleable, not fixed."],takeaway:"Playing a role can change your attitudes to fit it (Zimbardo)."},
  {tag:"Self-perception theory",stem:"Bem's self-perception theory proposes that, when our attitudes are weak or ambiguous, we infer our attitudes by:",choices:["Consulting our unconscious drives","Following biological set points","Observing our own behavior (as an outside observer would)","Reducing physiological arousal"],answer:2,rationale:"<b>Self-perception theory</b> (Bem): we infer weak/ambiguous attitudes by observing our own behavior.",why:["It relies on observed behavior, not unconscious drives.","Set points concern weight, not attitude inference.","Correct. Self-perception theory: we infer our attitudes from our own behavior when internal cues are weak \u2014 'I must like it, since I keep doing it.'","Arousal reduction is drive-reduction, not attitude inference."],takeaway:"Self-perception theory = infer your attitude from your own behavior."},
  {tag:"Attitude strength & accessibility",stem:"An attitude that comes to mind quickly and automatically \u2014 and therefore strongly guides behavior \u2014 is described as highly:",choices:["Peripheral","Accessible","Extrinsic","Deficiency-based"],answer:1,rationale:"Highly <b>accessible</b> attitudes (quick to mind) more strongly guide behavior.",why:["'Peripheral' is a persuasion route, not attitude accessibility.","Correct. Accessibility \u2014 how readily an attitude is activated \u2014 increases its influence on behavior.","'Extrinsic' describes a motivation source, not attitude accessibility.","'Deficiency-based' refers to Maslow's needs, not attitudes."],takeaway:"Accessible attitude = comes to mind fast \u2192 stronger effect on behavior."}
 ]},
{id:"ps-7c-cognitive-dissonance",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Attitudes",categoryCode:"7C",idea:"Cognitive dissonance",
 questions:[
  {tag:"Cognitive dissonance",stem:"Festinger's cognitive dissonance theory holds that we feel psychological discomfort when:",choices:["Our behavior perfectly matches our beliefs","We hold two conflicting cognitions, or act in a way that contradicts our attitudes","We are rewarded for a behavior we enjoy","We are under-aroused"],answer:1,rationale:"<b>Cognitive dissonance</b> = discomfort from inconsistency between attitudes and behavior (or conflicting beliefs).",why:["Consistency between belief and behavior produces no dissonance.","Correct. Cognitive dissonance is the discomfort from inconsistency between attitudes and behavior (or between two beliefs), which motivates us to reduce it.","That describes the overjustification setup, not dissonance itself.","Under-arousal relates to arousal theory, not dissonance."],takeaway:"Cognitive dissonance = discomfort when attitude and behavior clash."},
  {tag:"Reducing dissonance",stem:"To reduce cognitive dissonance, people commonly:",choices:["Deliberately increase the inconsistency","Do nothing, since dissonance is comfortable","Reduce all physiological arousal","Change an attitude, change the behavior, or add justifying cognitions"],answer:3,rationale:"Reduce dissonance by <b>changing the attitude, changing the behavior, or adding justifications</b>.",why:["People reduce, not increase, the inconsistency.","Dissonance is uncomfortable and motivates change.","Dissonance reduction is cognitive, not simply arousal reduction.","Correct. Dissonance is reduced by changing the attitude, changing the behavior, or rationalizing (adding justifications/trivializing)."],takeaway:"Reduce dissonance: change attitude, change behavior, or rationalize."},
  {tag:"Insufficient justification",stem:"In Festinger & Carlsmith's study, participants paid only $1 to say a boring task was fun later rated it as MORE enjoyable than those paid $20. This is the:",choices:["Insufficient-justification effect","Overjustification effect","Foot-in-the-door effect","Halo effect"],answer:0,rationale:"<b>Insufficient justification</b>: too little external reason for a counter-attitudinal act \u2192 people change their attitude to reduce dissonance ($1 > $20).",why:["Correct. With too little external justification ($1) to explain the lie, participants reduced dissonance by changing their actual attitude \u2014 the insufficient-justification effect.","The overjustification effect is about rewards undermining intrinsic motivation, a different phenomenon.","Foot-in-the-door is a compliance technique.","The halo effect is a social-perception bias."],takeaway:"Insufficient justification = little external reason to act against attitude \u2192 change the attitude."},
  {tag:"Effort justification",stem:"People who undergo a harsh, effortful initiation to join a group tend to value the group MORE. This dissonance-based phenomenon is:",choices:["The mere-exposure effect","Negative reinforcement","Effort justification","Stimulus generalization"],answer:2,rationale:"<b>Effort justification</b>: the more effort/suffering to attain something, the more we value it (to reduce dissonance).",why:["The mere-exposure effect is increased liking from familiarity, not effort.","Negative reinforcement is an operant concept.","Correct. Effort justification: to reduce dissonance about wasted effort, people inflate the value of what they suffered for.","Stimulus generalization is a classical-conditioning concept."],takeaway:"Effort justification = suffer more for something \u2192 value it more."},
  {tag:"Free choice & dissonance",stem:"After making a difficult choice between two attractive options, people tend to reduce dissonance by:",choices:["Regretting the choice and switching immediately","Upgrading their view of the chosen option and downgrading the rejected one","Rating both options as identical","Forgetting they made a choice"],answer:1,rationale:"After a hard choice, dissonance is reduced by <b>valuing the chosen option more</b> and the rejected one less.",why:["The typical pattern is justification of the choice, not immediate reversal.","Correct. Post-decision dissonance is reduced by enhancing the chosen option and devaluing the rejected one (spreading of alternatives).","People spread the options apart in value, not equalize them.","People remember and justify the choice."],takeaway:"Post-choice: upgrade the chosen option, downgrade the rejected one (reduce dissonance)."}
 ]},
{id:"ps-7c-persuasion",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Attitudes",categoryCode:"7C",idea:"Persuasion & the elaboration likelihood model",
 questions:[
  {tag:"Elaboration Likelihood Model",stem:"The Elaboration Likelihood Model describes two routes to persuasion:",choices:["The affective route and the behavioral route","The central route (thoughtful processing of argument quality) and the peripheral route (superficial cues)","The primary route and the secondary route","The intrinsic route and the extrinsic route"],answer:1,rationale:"ELM routes: <b>central</b> (argument quality, deep processing) and <b>peripheral</b> (surface cues).",why:["Those aren't the ELM routes.","Correct. ELM: the central route processes the substance/quality of arguments; the peripheral route relies on surface cues (attractiveness, credibility, number of arguments).","Those aren't the ELM routes.","Those aren't the ELM routes."],takeaway:"ELM: central route (argument quality) vs. peripheral route (surface cues)."},
  {tag:"Central route",stem:"Persuasion via the central route occurs when the audience is motivated and able to think carefully, and it depends on:",choices:["The attractiveness of the speaker","The sheer number of arguments regardless of quality","Background music and mood only","The strength and quality of the arguments \u2014 producing durable attitude change"],answer:3,rationale:"<b>Central route</b> = deep processing of argument quality \u2192 durable, resistant attitude change.",why:["Speaker attractiveness is a peripheral cue.","Argument count regardless of quality is a peripheral cue.","Mood/music are peripheral cues.","Correct. Central-route persuasion hinges on argument quality and yields more lasting, resistant attitude change."],takeaway:"Central route = argument quality (deep processing) \u2192 lasting change."},
  {tag:"Peripheral route",stem:"Being persuaded by a spokesperson's attractiveness or celebrity status, rather than by the argument itself, is the:",choices:["Peripheral route to persuasion","Central route to persuasion","Cognitive dissonance route","Drive-reduction route"],answer:0,rationale:"<b>Peripheral route</b> = persuasion by surface cues (attractiveness, credibility) \u2192 weaker, temporary change.",why:["Correct. The peripheral route relies on superficial cues (attractiveness, credibility, emotion) and tends to produce weaker, temporary change.","The central route depends on argument quality, not surface cues.","Cognitive dissonance is a different mechanism of attitude change.","Drive-reduction is a motivation theory, not a persuasion route."],takeaway:"Peripheral route = surface cues (attractiveness) \u2192 weaker/temporary change."},
  {tag:"Which route when",stem:"The central route is more likely to be used when the audience is:",choices:["Distracted, tired, or uninterested","Persuaded only by the speaker's looks","Motivated and able to process the message carefully","Unable to understand any of the content"],answer:2,rationale:"The <b>central route</b> is used when the audience is motivated AND able to process carefully; otherwise the peripheral route dominates.",why:["Distraction/low interest pushes people toward the peripheral route.","Reliance on looks is peripheral processing.","Correct. When motivation and ability to process are high, people take the central route; when low, they default to peripheral cues.","Inability to process leads to peripheral, not central, persuasion."],takeaway:"Central route when motivated + able to process. Otherwise peripheral."},
  {tag:"Persuasion factors",stem:"Classic persuasion research identifies three broad sets of factors: the source, the message, and the:",choices:["Weather","Audience (characteristics of the recipient)","Physical location only","Reinforcement schedule"],answer:1,rationale:"Persuasion factors: <b>source</b> (who), <b>message</b> (what), <b>audience</b> (to whom).",why:["Weather isn't a core persuasion factor.","Correct. Persuasion depends on the source (who), the message (what), and the audience (to whom).","Location alone isn't one of the classic three factors.","Reinforcement schedules are an operant-conditioning concept."],takeaway:"Persuasion = source (who) + message (what) + audience (to whom)."}
 ]},
{id:"ps-7a-psychoanalytic",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Personality",categoryCode:"7A",idea:"Psychoanalytic theory (Freud)",
 questions:[
  {tag:"Id, ego, superego",stem:"In Freud's structural model, the three parts of personality are the id (primal drives), the superego (moral conscience), and the ______, which mediates between them and reality.",choices:["Persona","Archetype","Ego","Libido"],answer:2,rationale:"Freud's structures: <b>id</b> (drives, pleasure), <b>superego</b> (morality), <b>ego</b> (reality mediator).",why:["The persona is a Jungian concept, not Freud's structural model.","Archetypes are Jungian, not part of the id/ego/superego model.","Correct. The ego is the reality-oriented mediator balancing the id's demands, the superego's morality, and external reality.","Libido is psychic/sexual energy, not a structure."],takeaway:"id = drives, superego = morality, ego = reality mediator."},
  {tag:"Pleasure vs. reality principle",stem:"The id operates on the ______ principle (immediate gratification), while the ego operates on the ______ principle.",choices:["Pleasure; reality","Reality; pleasure","Moral; pleasure","Death; life"],answer:0,rationale:"<b>Id</b> = pleasure principle (immediate gratification); <b>ego</b> = reality principle (delays it).",why:["Correct. The id seeks immediate gratification (pleasure principle); the ego delays gratification to fit reality (reality principle).","Reversed \u2014 the id is pleasure, the ego is reality.","The superego is the moral component; the id runs on the pleasure principle.","Death/life drives are a different distinction (Thanatos/Eros)."],takeaway:"Id = pleasure principle. Ego = reality principle."},
  {tag:"Levels of consciousness",stem:"Freud divided the mind into the conscious, the preconscious, and the ______ \u2014 the reservoir of hidden thoughts and drives outside awareness.",choices:["Subconscious collective","Sensorimotor level","Peripheral route","Unconscious"],answer:3,rationale:"Freud's levels: <b>conscious</b>, <b>preconscious</b> (retrievable), <b>unconscious</b> (hidden drives).",why:["Freud used 'unconscious,' not a 'collective subconscious' (the collective unconscious is Jung's).","Sensorimotor is a Piagetian stage, not a level of consciousness.","Peripheral route is a persuasion concept.","Correct. The unconscious holds drives/memories outside awareness; the preconscious is retrievable; the conscious is current awareness."],takeaway:"Freud: conscious, preconscious, unconscious (hidden drives)."},
  {tag:"Eros vs. Thanatos",stem:"Freud proposed two basic drives: Eros (the life drive) and Thanatos, the:",choices:["Reality drive","Death drive (aggression, destruction)","Hunger drive","Attachment drive"],answer:1,rationale:"Freud's drives: <b>Eros</b> (life) and <b>Thanatos</b> (death/aggression).",why:["There is no separate 'reality drive'; the ego uses the reality principle.","Correct. Thanatos is the death drive (aggressive/destructive instincts); Eros is the life/sexual drive.","Hunger is a physiological drive, not Thanatos.","Attachment is a developmental concept, not Freud's death drive."],takeaway:"Eros = life drive. Thanatos = death drive (aggression)."},
  {tag:"Superego",stem:"The moral component of personality \u2014 the internalized ideals and conscience that judge behavior \u2014 is the:",choices:["Id","Ego","Superego","Unconscious"],answer:2,rationale:"The <b>superego</b> = internalized morality/conscience (produces guilt).",why:["The id is the primal drive component, not morality.","The ego is the reality mediator, not the moral judge.","Correct. The superego embodies internalized morality and ideals, producing guilt when violated.","The unconscious is a level of awareness, not the moral structure."],takeaway:"Superego = morality/conscience."}
 ]},
{id:"ps-7a-defense-mechanisms",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Personality",categoryCode:"7A",idea:"Defense mechanisms",
 questions:[
  {tag:"Repression",stem:"The ego defense mechanism of unconsciously pushing anxiety-provoking thoughts or memories out of awareness is:",choices:["Projection","Sublimation","Repression","Regression"],answer:2,rationale:"<b>Repression</b> = unconsciously blocking anxiety-provoking thoughts from awareness.",why:["Projection attributes one's own impulses to others.","Sublimation channels impulses into acceptable activities.","Correct. Repression banishes threatening material from consciousness \u2014 Freud considered it the basic defense underlying others.","Regression is retreating to an earlier developmental stage."],takeaway:"Repression = push threatening thoughts out of awareness."},
  {tag:"Projection",stem:"Attributing your own unacceptable feelings or impulses to someone else (a cheating spouse accusing their partner of cheating) is:",choices:["Projection","Displacement","Denial","Reaction formation"],answer:0,rationale:"<b>Projection</b> = attributing your own unacceptable impulses to someone else.",why:["Correct. Projection assigns one's own unacceptable impulses to another person.","Displacement redirects an impulse to a safer target, not to accusing others of it.","Denial refuses to accept reality.","Reaction formation expresses the opposite of one's true feelings."],takeaway:"Projection = 'it's not me, it's you' (attribute your impulse to another)."},
  {tag:"Displacement",stem:"Redirecting an impulse from a threatening target onto a safer one (yelling at your dog after your boss angers you) is:",choices:["Sublimation","Projection","Rationalization","Displacement"],answer:3,rationale:"<b>Displacement</b> = redirect an impulse from a threatening to a safer target.",why:["Sublimation channels the impulse into a socially valued activity, not a safer target.","Projection attributes the impulse to another person.","Rationalization invents acceptable reasons for behavior.","Correct. Displacement shifts an impulse from its real target to a less threatening substitute."],takeaway:"Displacement = take it out on a safer target."},
  {tag:"Sublimation",stem:"Channeling unacceptable impulses into a socially acceptable or productive activity (aggression \u2192 competitive sports) is the (relatively mature) defense of:",choices:["Regression","Sublimation","Denial","Displacement"],answer:1,rationale:"<b>Sublimation</b> = channel unacceptable impulses into socially valued activity (adaptive).",why:["Regression is retreating to earlier behavior.","Correct. Sublimation transforms unacceptable impulses into constructive, socially valued outlets \u2014 often considered adaptive.","Denial refuses to acknowledge reality.","Displacement redirects to a safer target but not necessarily a productive one."],takeaway:"Sublimation = channel impulses into productive outlets (mature defense)."},
  {tag:"Reaction formation",stem:"Expressing feelings or behaviors OPPOSITE to one's true (anxiety-provoking) impulses \u2014 treating someone you dislike with exaggerated kindness \u2014 is:",choices:["Rationalization","Projection","Reaction formation","Sublimation"],answer:2,rationale:"<b>Reaction formation</b> = behaving as the OPPOSITE of your true (unacceptable) feelings.",why:["Rationalization justifies behavior with acceptable reasons.","Projection attributes the impulse to another person.","Correct. Reaction formation converts an unacceptable impulse into its opposite in awareness and behavior.","Sublimation channels the impulse productively, not into its opposite."],takeaway:"Reaction formation = act the opposite of your real impulse."},
  {tag:"Rationalization vs. regression",stem:"Inventing a logical-sounding but false justification for behavior is ______; reverting to childlike behavior under stress is ______.",choices:["Rationalization; regression","Regression; rationalization","Denial; projection","Sublimation; displacement"],answer:0,rationale:"<b>Rationalization</b> = false but plausible justification; <b>regression</b> = retreat to childlike behavior under stress.",why:["Correct. Rationalization = self-justifying explanations; regression = retreating to an earlier developmental stage under stress.","Reversed \u2014 rationalization is the justification, regression is the retreat.","Denial/projection are different mechanisms.","Sublimation/displacement are different mechanisms."],takeaway:"Rationalization = justify with false reasons. Regression = revert to childish behavior."}
 ]},
{id:"ps-7a-psychosexual",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Personality",categoryCode:"7A",idea:"Freud's psychosexual stages",
 questions:[
  {tag:"Psychosexual stages order",stem:"Freud's psychosexual stages, in order, are:",choices:["Anal \u2192 oral \u2192 genital \u2192 phallic \u2192 latency","Oral \u2192 phallic \u2192 anal \u2192 genital \u2192 latency","Oral \u2192 anal \u2192 phallic \u2192 latency \u2192 genital","Genital \u2192 latency \u2192 phallic \u2192 anal \u2192 oral"],answer:2,rationale:"Freud's stages: <b>oral \u2192 anal \u2192 phallic \u2192 latency \u2192 genital</b>.",why:["Oral comes first, not anal in that arrangement.","Anal precedes phallic in Freud's order.","Correct. The order is oral, anal, phallic, latency, genital (mnemonic: Old Age Pensioners Love Grapes).","That's the reverse order."],takeaway:"Psychosexual: oral, anal, phallic, latency, genital."},
  {tag:"Fixation",stem:"In Freudian theory, when a conflict at a psychosexual stage is unresolved, a person may develop a lasting ______ \u2014 a preoccupation with that stage's mode of gratification.",choices:["Fixation","Archetype","Reinforcer","Schema"],answer:0,rationale:"<b>Fixation</b> = lingering preoccupation from an unresolved conflict at a psychosexual stage.",why:["Correct. Fixation is a persistent focus tied to an unresolved psychosexual-stage conflict.","Archetypes are Jungian, not Freudian fixations.","A reinforcer is an operant-conditioning term.","A schema is a cognitive framework, not a psychosexual fixation."],takeaway:"Fixation = stuck at a stage from an unresolved conflict."},
  {tag:"Phallic stage / Oedipus complex",stem:"The psychosexual stage in which Freud placed the Oedipus complex \u2014 a child's unconscious desire for the opposite-sex parent \u2014 is the:",choices:["Oral stage","Anal stage","Latency stage","Phallic stage"],answer:3,rationale:"The <b>phallic stage</b> is where Freud placed the Oedipus/Electra complex.",why:["The oral stage centers on the mouth (feeding), earlier than the phallic conflict.","The anal stage centers on toilet training.","During latency, sexual feelings are dormant.","Correct. The Oedipus (and Electra) complex occurs in the phallic stage (~3\u20136 years)."],takeaway:"Phallic stage = Oedipus/Electra complex (~3\u20136 yrs)."},
  {tag:"Oral stage",stem:"A Freudian theorist would link excessive smoking or overeating in adulthood to a fixation at which stage?",choices:["Genital stage","Oral stage","Latency stage","Phallic stage"],answer:1,rationale:"<b>Oral fixation</b> (oral stage) is classically linked to smoking/overeating.",why:["The genital stage is mature adult sexuality, not oral habits.","Correct. Oral fixation (from conflict at the oral stage, focused on the mouth) is classically tied to habits like smoking or overeating.","Latency is a dormant period.","The phallic stage centers on the Oedipus complex, not oral habits."],takeaway:"Oral fixation \u2192 smoking, overeating (oral stage)."}
 ]},
{id:"ps-7a-humanistic",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Personality",categoryCode:"7A",idea:"Humanistic theory of personality",
 questions:[
  {tag:"Humanistic theory",stem:"Humanistic theories of personality (Rogers, Maslow) emphasize:",choices:["Unconscious conflicts and repressed drives","Reinforcement and punishment histories","Free will, personal growth, and the drive toward self-actualization","Inherited trait dimensions"],answer:2,rationale:"<b>Humanistic theory</b> emphasizes free will, growth, and self-actualization (Rogers, Maslow).",why:["Unconscious conflicts are the psychoanalytic emphasis.","Reinforcement histories are the behaviorist emphasis.","Correct. Humanistic theory stresses conscious growth, self-concept, and reaching one's potential (self-actualization).","Inherited traits are the trait/biological emphasis."],takeaway:"Humanistic = free will + growth + self-actualization."},
  {tag:"Unconditional positive regard",stem:"Carl Rogers argued healthy self-development requires ______ \u2014 acceptance and support of a person regardless of their behavior.",choices:["Unconditional positive regard","Conditions of worth","Reciprocal determinism","Cognitive dissonance"],answer:0,rationale:"<b>Unconditional positive regard</b> (Rogers) = full acceptance supporting healthy self-development.",why:["Correct. Unconditional positive regard is Rogers's term for full acceptance that fosters a healthy self-concept.","Conditions of worth are the opposite \u2014 acceptance contingent on meeting standards.","Reciprocal determinism is Bandura's concept.","Cognitive dissonance is an attitude-consistency concept."],takeaway:"Unconditional positive regard = accept the person regardless of behavior (Rogers)."},
  {tag:"Congruence",stem:"In Rogers's theory, alignment between one's self-concept (ideal self) and actual experience produces ______; a large gap produces incongruence and anxiety.",choices:["Fixation","Sublimation","Deindividuation","Congruence"],answer:3,rationale:"<b>Congruence</b> = match between self-concept and experience (Rogers); incongruence \u2192 anxiety.",why:["Fixation is a Freudian concept.","Sublimation is a defense mechanism.","Deindividuation is a group-behavior concept.","Correct. Congruence is the match between self-concept and real experience; a mismatch (incongruence) causes distress."],takeaway:"Congruence = self-concept matches reality (Rogers)."},
  {tag:"Self-concept",stem:"The organized set of beliefs and perceptions we hold about ourselves \u2014 central to humanistic theories \u2014 is the:",choices:["Superego","Self-concept","Locus of control","Archetype"],answer:1,rationale:"The <b>self-concept</b> = your organized beliefs/perceptions about yourself.",why:["The superego is a Freudian moral structure.","Correct. The self-concept is one's overall self-image, a core humanistic construct.","Locus of control is a social-cognitive construct.","Archetypes are Jungian."],takeaway:"Self-concept = your overall self-image."}
 ]},
{id:"ps-7a-trait-theory",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Personality",categoryCode:"7A",idea:"Trait theory & the Big Five",
 questions:[
  {tag:"Big Five (OCEAN)",stem:"The five-factor model of personality is captured by the acronym OCEAN:",choices:["Optimism, Control, Empathy, Ambition, Neuroticism","Openness, Creativity, Extraversion, Aggression, Nurturance","Openness, Conscientiousness, Extraversion, Agreeableness, Neuroticism","Order, Cognition, Emotion, Attention, Novelty"],answer:2,rationale:"Big Five (<b>OCEAN</b>): Openness, Conscientiousness, Extraversion, Agreeableness, Neuroticism.",why:["Those aren't the Big Five factors.","Creativity, aggression, and nurturance aren't Big Five factors.","Correct. The Big Five: Openness, Conscientiousness, Extraversion, Agreeableness, Neuroticism.","Those aren't the Big Five factors."],takeaway:"Big Five = OCEAN: Openness, Conscientiousness, Extraversion, Agreeableness, Neuroticism."},
  {tag:"Trait theory",stem:"Trait theories of personality describe people in terms of:",choices:["Stable, measurable dimensions on which individuals differ","Unresolved unconscious conflicts","Reinforcement and punishment histories","Levels of self-actualization"],answer:0,rationale:"<b>Trait theory</b> = personality as stable, measurable dimensions on which people differ.",why:["Correct. Trait theory characterizes personality as enduring dimensions (traits) that vary across people.","Unconscious conflicts are the psychoanalytic focus.","Reinforcement histories are the behaviorist focus.","Self-actualization is the humanistic focus."],takeaway:"Trait theory = stable measurable dimensions (traits)."},
  {tag:"Neuroticism",stem:"In the Big Five, the tendency toward anxiety, moodiness, and emotional instability is:",choices:["Conscientiousness","Agreeableness","Openness","Neuroticism"],answer:3,rationale:"<b>Neuroticism</b> = anxiety, moodiness, emotional instability.",why:["Conscientiousness reflects organization and self-discipline.","Agreeableness reflects warmth and cooperation.","Openness reflects curiosity and imagination.","Correct. Neuroticism captures emotional instability, anxiety, and negative affect."],takeaway:"Neuroticism = emotional instability/anxiety."},
  {tag:"Eysenck's dimensions",stem:"Hans Eysenck reduced personality to a small number of biologically based dimensions, notably extraversion\u2013introversion and:",choices:["Self-actualization","Neuroticism (emotional stability)","Locus of control","Openness alone"],answer:1,rationale:"<b>Eysenck</b>: extraversion\u2013introversion and neuroticism (plus psychoticism), biologically based.",why:["Self-actualization is a humanistic concept, not an Eysenck dimension.","Correct. Eysenck emphasized extraversion\u2013introversion and neuroticism (later adding psychoticism) as biologically rooted dimensions.","Locus of control is a social-cognitive concept.","Openness is a Big Five factor, not central to Eysenck's model."],takeaway:"Eysenck = extraversion/introversion + neuroticism (biological dimensions)."}
 ]},
{id:"ps-7a-social-cognitive",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Personality",categoryCode:"7A",idea:"Social-cognitive & biological personality",
 questions:[
  {tag:"Reciprocal determinism",stem:"Bandura's social-cognitive theory proposes that personality arises from the mutual interaction of:",choices:["Id, ego, and superego","Only genetic inheritance","Behavior, personal/cognitive factors, and the environment","Only reinforcement schedules"],answer:2,rationale:"<b>Reciprocal determinism</b> (Bandura): behavior \u2194 personal/cognitive factors \u2194 environment interact.",why:["That's Freud's structural model, not Bandura's.","Bandura emphasizes interaction, not genes alone.","Correct. Reciprocal determinism: behavior, personal factors (thoughts, traits), and environment continuously influence one another.","Reinforcement alone is the strict behaviorist view; Bandura adds cognition and environment interplay."],takeaway:"Reciprocal determinism = behavior, person, and environment interact (Bandura)."},
  {tag:"Self-efficacy",stem:"Bandura's term for one's belief in their own ability to succeed at a specific task is:",choices:["Self-efficacy","Self-esteem","Locus of control","Self-concept"],answer:0,rationale:"<b>Self-efficacy</b> = belief in your ability to succeed at a specific task (Bandura).",why:["Correct. Self-efficacy is a task-specific belief in one's capability to perform.","Self-esteem is global self-worth, not task-specific competence belief.","Locus of control concerns whether outcomes feel internally or externally controlled.","Self-concept is one's overall self-image."],takeaway:"Self-efficacy = belief you can do a specific task."},
  {tag:"Locus of control",stem:"Rotter's concept describing whether people attribute outcomes to their own actions (internal) or to luck/fate/others (external) is:",choices:["Self-efficacy","Reciprocal determinism","Learned helplessness","Locus of control"],answer:3,rationale:"<b>Locus of control</b> (Rotter): internal (my actions) vs. external (luck/fate) control of outcomes.",why:["Self-efficacy is task-specific capability belief, not the internal/external attribution dimension.","Reciprocal determinism is Bandura's interaction model.","Learned helplessness is the belief that nothing one does matters.","Correct. Locus of control is the degree to which people feel outcomes are internally vs. externally controlled."],takeaway:"Locus of control = internal (me) vs. external (luck/fate)."},
  {tag:"Temperament",stem:"The biologically based, early-appearing individual differences in emotional reactivity and self-regulation (evident in infancy) are called:",choices:["Self-concept","Temperament","Fixation","Cognitive dissonance"],answer:1,rationale:"<b>Temperament</b> = biologically based, early-appearing emotional/behavioral style.",why:["Self-concept develops later and is learned/experiential.","Correct. Temperament is the inborn, biologically rooted basis of personality visible from infancy.","Fixation is a Freudian concept.","Cognitive dissonance is an attitude-consistency concept."],takeaway:"Temperament = inborn emotional/behavioral style (from infancy)."}
 ]},
{id:"ps-7a-defining-disorders",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Psychological disorders",categoryCode:"7A",idea:"Defining & classifying disorders",
 questions:[
  {tag:"The 4 D's",stem:"A common framework for judging whether behavior is disordered uses the '4 D's':",choices:["Denial, dependence, decay, and delusion","Deviance, distress, dysfunction, and danger","Drive, drift, delay, and decline","Discrimination, dissonance, drift, and doubt"],answer:1,rationale:"The <b>4 D's</b>: deviance, distress, dysfunction, danger.",why:["Those aren't the 4 D's of abnormality.","Correct. The 4 D's \u2014 deviance, distress, dysfunction (impairment), and danger \u2014 help evaluate whether behavior is pathological.","Those aren't the criteria for disorder.","Those aren't the 4 D's."],takeaway:"Disorder criteria (4 D's): deviance, distress, dysfunction, danger."},
  {tag:"DSM",stem:"In the United States, mental disorders are classified and diagnosed using the:",choices:["MMSE","MCAT","GAS scale","DSM (Diagnostic and Statistical Manual of Mental Disorders)"],answer:3,rationale:"The <b>DSM</b> is the standard U.S. manual for classifying/diagnosing mental disorders.",why:["The MMSE is a cognitive screening test, not a classification manual.","The MCAT is an admissions exam.","GAS is Selye's stress model, not a diagnostic manual.","Correct. The DSM (published by the American Psychiatric Association) is the standard U.S. classification of mental disorders."],takeaway:"DSM = U.S. manual for diagnosing mental disorders."},
  {tag:"Biomedical vs. biopsychosocial",stem:"The model attributing disorders to interacting biological, psychological, AND social factors \u2014 rather than to biology alone \u2014 is the:",choices:["Biopsychosocial model","Strictly biomedical model","Purely behaviorist model","Purely psychoanalytic model"],answer:0,rationale:"The <b>biopsychosocial model</b> = disorders arise from biological + psychological + social factors interacting.",why:["Correct. The biopsychosocial model integrates biological, psychological, and social/cultural contributors to disorder.","The biomedical model attributes disorder to biology alone.","The behaviorist model emphasizes learning only.","The psychoanalytic model emphasizes unconscious conflict only."],takeaway:"Biopsychosocial = biology + psychology + social factors together."}
 ]},
{id:"ps-7a-anxiety-ocd",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Psychological disorders",categoryCode:"7A",idea:"Anxiety disorders & OCD",
 questions:[
  {tag:"Generalized anxiety disorder",stem:"Persistent, excessive, free-floating worry about many things \u2014 not tied to a specific object \u2014 characterizes:",choices:["A specific phobia","Generalized anxiety disorder (GAD)","Panic disorder","Obsessive-compulsive disorder"],answer:1,rationale:"<b>GAD</b> = persistent, free-floating worry not tied to a specific object.",why:["A specific phobia is fear of a particular object/situation, not free-floating.","Correct. GAD involves chronic, diffuse ('free-floating') anxiety not focused on one specific trigger.","Panic disorder centers on discrete panic attacks.","OCD involves obsessions and compulsions specifically."],takeaway:"GAD = chronic free-floating worry (not object-specific)."},
  {tag:"Panic disorder",stem:"Recurrent, unexpected episodes of intense fear with physical symptoms (racing heart, chest pain, sense of doom) \u2014 panic attacks \u2014 define:",choices:["A specific phobia","Generalized anxiety disorder","Social anxiety disorder","Panic disorder"],answer:3,rationale:"<b>Panic disorder</b> = recurrent unexpected panic attacks (racing heart, doom).",why:["A phobia is triggered by a specific object/situation, not unexpected attacks.","GAD is chronic diffuse worry, not discrete attacks.","Social anxiety is fear of social scrutiny specifically.","Correct. Panic disorder features recurrent unexpected panic attacks and worry about future attacks."],takeaway:"Panic disorder = recurrent unexpected panic attacks."},
  {tag:"Phobia",stem:"An intense, irrational, persistent fear of a specific object or situation (spiders, heights) that the person avoids is a:",choices:["Specific phobia","Panic disorder","Obsession","Compulsion"],answer:0,rationale:"<b>Specific phobia</b> = intense irrational fear of a particular object/situation.",why:["Correct. A specific phobia is a marked, excessive fear of a particular object or situation.","Panic disorder involves unexpected attacks, not a specific feared object.","An obsession is an intrusive thought (OCD), not a phobia.","A compulsion is a repetitive behavior (OCD)."],takeaway:"Phobia = intense irrational fear of a specific object/situation."},
  {tag:"OCD: obsessions vs. compulsions",stem:"In OCD, intrusive unwanted thoughts are ______ and the repetitive behaviors performed to relieve the resulting anxiety are ______.",choices:["Compulsions; obsessions","Delusions; hallucinations","Obsessions; compulsions","Manic; depressive"],answer:2,rationale:"OCD: <b>obsessions</b> = intrusive thoughts; <b>compulsions</b> = repetitive relieving behaviors.",why:["Reversed \u2014 obsessions are the thoughts, compulsions the behaviors.","Delusions/hallucinations are psychotic symptoms, not OCD.","Correct. Obsessions are intrusive thoughts; compulsions are the repetitive acts done to reduce the anxiety they cause.","Manic/depressive describe mood-disorder states."],takeaway:"OCD: obsessions = thoughts, compulsions = repetitive behaviors."}
 ]},
{id:"ps-7a-mood-disorders",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Psychological disorders",categoryCode:"7A",idea:"Depressive & bipolar disorders",
 questions:[
  {tag:"Major depressive disorder",stem:"Two or more weeks of depressed mood or loss of interest/pleasure (anhedonia), plus symptoms like sleep, appetite, and energy changes, defines:",choices:["Bipolar I disorder","Major depressive disorder (MDD)","Generalized anxiety disorder","Schizophrenia"],answer:1,rationale:"<b>MDD</b> = \u22652 weeks of depressed mood/anhedonia + associated symptoms.",why:["Bipolar I requires a manic episode, not just depression.","Correct. MDD requires a sustained (\u22652-week) depressive episode with anhedonia and associated symptoms.","GAD is an anxiety disorder, not a mood disorder.","Schizophrenia is a psychotic disorder."],takeaway:"MDD = 2+ weeks depressed mood/anhedonia + symptoms."},
  {tag:"Mania",stem:"A distinct period of abnormally elevated or irritable mood with inflated self-esteem, decreased need for sleep, and risky behavior is a ______ episode.",choices:["Depressive","Dissociative","Psychotic (only)","Manic"],answer:3,rationale:"A <b>manic episode</b> = elevated/irritable mood, grandiosity, \u2193sleep need, risky behavior.",why:["A depressive episode is low mood, the opposite pole.","A dissociative episode involves detachment/identity disruption.","Mania is a mood episode, though it can include psychotic features \u2014 it's not purely psychotic.","Correct. A manic episode features elevated/irritable mood, grandiosity, reduced sleep need, and impulsivity."],takeaway:"Mania = elevated mood, grandiosity, less sleep, risk-taking."},
  {tag:"Bipolar I vs. II",stem:"Bipolar I disorder requires at least one full ______ episode, whereas bipolar II involves hypomania plus major depression.",choices:["Manic","Depressive","Dissociative","Panic"],answer:0,rationale:"<b>Bipolar I</b> = at least one full manic episode; <b>bipolar II</b> = hypomania + major depression.",why:["Correct. Bipolar I requires at least one full manic episode; bipolar II has hypomania (milder) plus major depressive episodes.","Depression alone (without mania/hypomania) is MDD, not bipolar.","Dissociative episodes aren't part of the bipolar definition.","Panic episodes belong to panic disorder."],takeaway:"Bipolar I = full mania. Bipolar II = hypomania + depression."},
  {tag:"Monoamine hypothesis of depression",stem:"A leading biological account links depression to low activity of certain neurotransmitters, especially:",choices:["GABA and glutamate only","Acetylcholine only","Serotonin, norepinephrine, and dopamine (monoamines)","Excess dopamine only"],answer:2,rationale:"Depression's <b>monoamine hypothesis</b>: low serotonin/norepinephrine/dopamine.",why:["GABA/glutamate aren't the monoamine hypothesis's focus.","Acetylcholine isn't the primary depression neurotransmitter here.","Correct. The monoamine hypothesis ties depression to reduced serotonin, norepinephrine, and dopamine (SSRIs target serotonin).","Excess dopamine is linked to schizophrenia, not depression."],takeaway:"Depression = low monoamines (serotonin, norepinephrine, dopamine)."}
 ]},
{id:"ps-7a-schizophrenia",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Psychological disorders",categoryCode:"7A",idea:"Schizophrenia",
 questions:[
  {tag:"Positive symptoms",stem:"In schizophrenia, symptoms that ADD abnormal experiences \u2014 hallucinations, delusions, disorganized speech \u2014 are called:",choices:["Negative symptoms","Positive symptoms","Manic symptoms","Dissociative symptoms"],answer:1,rationale:"<b>Positive symptoms</b> of schizophrenia ADD experiences: hallucinations, delusions, disorganized speech.",why:["Negative symptoms are reductions (flat affect, avolition), not additions.","Correct. Positive symptoms are excesses/additions (hallucinations, delusions); negative symptoms are deficits.","Manic symptoms belong to bipolar disorder.","Dissociative symptoms involve detachment/identity disruption."],takeaway:"Positive symptoms = added (hallucinations, delusions). Negative = deficits."},
  {tag:"Negative symptoms",stem:"Symptoms of schizophrenia that reflect a LOSS or reduction of normal function \u2014 flat affect, social withdrawal, avolition \u2014 are:",choices:["Positive symptoms","Compulsions","Obsessions","Negative symptoms"],answer:3,rationale:"<b>Negative symptoms</b> = deficits: flat affect, withdrawal, avolition.",why:["Positive symptoms are additions (hallucinations/delusions).","Compulsions are OCD behaviors.","Obsessions are OCD intrusive thoughts.","Correct. Negative symptoms are deficits: blunted emotion, reduced speech, lack of motivation."],takeaway:"Negative symptoms = losses (flat affect, avolition, withdrawal)."},
  {tag:"Dopamine hypothesis",stem:"The classic biological explanation of schizophrenia's positive symptoms involves OVERactivity of which neurotransmitter?",choices:["Dopamine","Serotonin (deficiency)","GABA (excess)","Acetylcholine (deficiency)"],answer:0,rationale:"Schizophrenia's <b>dopamine hypothesis</b>: excess dopamine \u2192 positive symptoms (antipsychotics block dopamine).",why:["Correct. The dopamine hypothesis links schizophrenia's positive symptoms to excess dopamine activity (antipsychotics block dopamine receptors).","Low serotonin is linked to depression, not schizophrenia's core hypothesis.","GABA excess isn't the schizophrenia hypothesis.","Low acetylcholine is linked to Alzheimer's, not schizophrenia."],takeaway:"Schizophrenia = excess dopamine (dopamine hypothesis)."},
  {tag:"Delusion vs. hallucination",stem:"A false, fixed BELIEF (e.g., that one is being persecuted) is a ______; a false PERCEPTION (e.g., hearing voices) is a ______.",choices:["Hallucination; delusion","Obsession; compulsion","Delusion; hallucination","Positive; negative symptom"],answer:2,rationale:"<b>Delusion</b> = false belief; <b>hallucination</b> = false perception.",why:["Reversed \u2014 a false belief is a delusion, a false perception a hallucination.","Obsessions/compulsions are OCD features.","Correct. Delusions are false beliefs; hallucinations are false sensory perceptions.","Positive/negative describe symptom categories, not this belief/perception split."],takeaway:"Delusion = false belief. Hallucination = false perception."}
 ]},
{id:"ps-7a-other-disorders",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Psychological disorders",categoryCode:"7A",idea:"Dissociative, somatic & personality disorders",
 questions:[
  {tag:"Dissociative identity disorder",stem:"The presence of two or more distinct personality states with gaps in memory, often linked to severe trauma, is:",choices:["Schizophrenia","Dissociative identity disorder (DID)","Bipolar disorder","Borderline personality disorder"],answer:1,rationale:"<b>DID</b> = two or more distinct identity states + memory gaps (a dissociative, not psychotic, disorder).",why:["Schizophrenia is a psychotic disorder, not multiple identities \u2014 a common confusion.","Correct. DID involves distinct identity states and dissociative amnesia; it is NOT the same as schizophrenia ('split personality' \u2260 schizophrenia).","Bipolar disorder is a mood disorder.","Borderline PD involves instability of mood/relationships, not distinct identities."],takeaway:"DID = distinct identity states + amnesia (NOT schizophrenia)."},
  {tag:"Somatic symptom disorder",stem:"Distressing physical symptoms with disproportionate thoughts/anxiety about them \u2014 without a fully explanatory medical cause \u2014 characterize:",choices:["A specific phobia","A manic episode","A delusion","Somatic symptom disorder"],answer:3,rationale:"<b>Somatic symptom disorder</b> = excessive distress about physical symptoms without a full medical explanation.",why:["A phobia is fear of a specific object/situation.","A manic episode is a mood state.","A delusion is a fixed false belief (psychosis).","Correct. Somatic symptom disorders involve real distress about bodily symptoms out of proportion to any medical findings."],takeaway:"Somatic symptom disorder = outsized distress about bodily symptoms."},
  {tag:"Personality disorder clusters",stem:"DSM personality disorders are grouped into three clusters described as:",choices:["Cluster A (odd/eccentric), Cluster B (dramatic/erratic), Cluster C (anxious/fearful)","Positive, negative, and neutral","Manic, depressive, and mixed","Oral, anal, and phallic"],answer:0,rationale:"PD clusters: <b>A</b> odd/eccentric, <b>B</b> dramatic/erratic, <b>C</b> anxious/fearful.",why:["Correct. Cluster A = odd/eccentric (e.g., paranoid); B = dramatic/erratic (e.g., antisocial, borderline); C = anxious/fearful (e.g., avoidant).","Those describe schizophrenia symptoms, not PD clusters.","Those describe mood episodes, not PD clusters.","Those are Freudian psychosexual stages."],takeaway:"PD clusters: A = odd, B = dramatic, C = anxious."},
  {tag:"Antisocial personality disorder",stem:"A pervasive pattern of disregard for and violation of others' rights, lack of remorse, and deceitfulness (Cluster B) is:",choices:["Avoidant personality disorder","Dependent personality disorder","Antisocial personality disorder","Paranoid personality disorder"],answer:2,rationale:"<b>Antisocial personality disorder</b> (Cluster B) = disregard for others' rights, no remorse.",why:["Avoidant PD (Cluster C) involves social inhibition and fear of rejection.","Dependent PD (Cluster C) involves excessive need to be cared for.","Correct. Antisocial PD (Cluster B) features rights-violation, manipulation, and absence of remorse.","Paranoid PD (Cluster A) involves pervasive distrust."],takeaway:"Antisocial PD = violate others' rights, no remorse (Cluster B)."}
 ]},
{id:"ps-7a-neurotransmitters",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Biological bases",categoryCode:"7A",idea:"Neurotransmitters & their functions",
 questions:[
  {tag:"Acetylcholine",stem:"The neurotransmitter that activates skeletal muscle at the neuromuscular junction and is important for memory (depleted in Alzheimer's) is:",choices:["Dopamine","GABA","Serotonin","Acetylcholine (ACh)"],answer:3,rationale:"<b>Acetylcholine</b> = muscle activation (NMJ) + memory (low in Alzheimer's).",why:["Dopamine relates to reward and movement, not the NMJ.","GABA is the main inhibitory transmitter.","Serotonin regulates mood, sleep, and appetite.","Correct. ACh drives muscle contraction and supports learning/memory; its loss is linked to Alzheimer's."],takeaway:"ACh = muscle (NMJ) + memory (low in Alzheimer's)."},
  {tag:"Dopamine",stem:"The neurotransmitter central to reward and movement \u2014 low in Parkinson's, excessive in schizophrenia \u2014 is:",choices:["GABA","Dopamine","Acetylcholine","Endorphins"],answer:1,rationale:"<b>Dopamine</b> = reward + movement (low in Parkinson's, high in schizophrenia).",why:["GABA is the main inhibitory transmitter.","Correct. Dopamine governs reward/motivation and motor control; deficits \u2192 Parkinson's, excess \u2192 schizophrenia symptoms.","ACh drives muscle contraction and memory.","Endorphins are natural painkillers."],takeaway:"Dopamine = reward + movement. Low = Parkinson's, high = schizophrenia."},
  {tag:"GABA vs. glutamate",stem:"The brain's main INHIBITORY neurotransmitter is ______; the main EXCITATORY neurotransmitter is ______.",choices:["Glutamate; GABA","Serotonin; dopamine","GABA; glutamate","Acetylcholine; endorphins"],answer:2,rationale:"<b>GABA</b> = main inhibitory; <b>glutamate</b> = main excitatory transmitter.",why:["Reversed \u2014 GABA inhibits, glutamate excites.","Serotonin/dopamine aren't the main inhibitory/excitatory pair.","Correct. GABA is the primary inhibitory transmitter (calming); glutamate is the primary excitatory one.","ACh/endorphins aren't the inhibitory/excitatory pair."],takeaway:"GABA = inhibitory (calm). Glutamate = excitatory."},
  {tag:"Serotonin & norepinephrine",stem:"Mood, sleep, and appetite are strongly modulated by serotonin, while alertness and the fight-or-flight response involve:",choices:["Norepinephrine","GABA","Glutamate","Acetylcholine"],answer:0,rationale:"<b>Serotonin</b> = mood/sleep/appetite; <b>norepinephrine</b> = alertness/fight-or-flight.",why:["Correct. Norepinephrine drives arousal/alertness and sympathetic activation; serotonin regulates mood/sleep/appetite.","GABA is inhibitory/calming.","Glutamate is the main excitatory transmitter generally.","ACh governs muscle activation and memory."],takeaway:"Serotonin = mood/sleep. Norepinephrine = alertness/arousal."},
  {tag:"Endorphins",stem:"The body's natural opioid-like neurotransmitters that reduce pain and produce feelings of pleasure (e.g., 'runner's high') are:",choices:["GABA","Dopamine","Glutamate","Endorphins"],answer:3,rationale:"<b>Endorphins</b> = natural painkillers producing pleasure (runner's high).",why:["GABA is inhibitory but not the endogenous painkiller.","Dopamine mediates reward but isn't the opioid-like painkiller.","Glutamate is excitatory.","Correct. Endorphins are endogenous painkillers that also produce euphoria."],takeaway:"Endorphins = natural painkillers (runner's high)."}
 ]},
{id:"ps-7a-studying-brain",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Biological bases",categoryCode:"7A",idea:"Methods of studying the brain",
 questions:[
  {tag:"Lesion / ablation studies",stem:"Deliberately damaging or removing a brain region to observe the resulting functional deficit is the method of:",choices:["Functional MRI","EEG","PET scanning","Lesion (experimental ablation) studies"],answer:3,rationale:"<b>Lesion/ablation</b> studies = damage a region and observe the deficit to infer its function.",why:["fMRI images activity noninvasively via blood flow, without damage.","EEG records electrical activity, not lesions.","PET measures metabolic/receptor activity via tracers.","Correct. Lesion/ablation studies infer a region's function from the deficits produced by its damage."],takeaway:"Lesion studies = damage a region, see what breaks."},
  {tag:"EEG",stem:"The technique that records the brain's electrical activity via scalp electrodes \u2014 ideal for studying sleep stages and fast neural rhythms \u2014 is:",choices:["MRI","EEG (electroencephalography)","CT","PET"],answer:1,rationale:"<b>EEG</b> = records electrical activity (great temporal resolution; sleep stages).",why:["MRI shows structure, not real-time electrical activity.","Correct. EEG measures electrical activity with excellent temporal resolution (used for sleep-stage/wave analysis).","CT shows structure via X-rays.","PET shows metabolic activity via tracers."],takeaway:"EEG = brain electrical activity (temporal detail; sleep)."},
  {tag:"fMRI",stem:"The imaging method that tracks brain ACTIVITY by detecting changes in blood oxygenation/flow, with good spatial resolution, is:",choices:["Structural MRI","CT scan","fMRI (functional MRI)","EEG"],answer:2,rationale:"<b>fMRI</b> = maps activity via blood-oxygen (BOLD) changes; good spatial detail.",why:["Structural MRI shows anatomy, not function.","CT gives structural images via X-rays.","Correct. fMRI measures the BOLD signal (blood-oxygen-level-dependent) to map active regions during tasks.","EEG measures electrical activity, not blood flow."],takeaway:"fMRI = activity via blood flow/oxygen (BOLD)."},
  {tag:"CT vs. MRI",stem:"For a purely STRUCTURAL image, a CT scan uses ______, while MRI uses ______.",choices:["X-rays; magnetic fields","Magnetic fields; X-rays","Radioactive tracers; sound waves","Blood flow; electrical activity"],answer:0,rationale:"<b>CT</b> = X-rays; <b>MRI</b> = magnetic fields (both structural; MRI better soft tissue).",why:["Correct. CT builds structural images from X-rays; MRI uses strong magnetic fields (better soft-tissue detail).","Reversed \u2014 CT uses X-rays, MRI uses magnetic fields.","Tracers are PET; sound waves are ultrasound.","Those describe functional methods (fMRI/EEG), not CT/MRI structure."],takeaway:"CT = X-rays. MRI = magnetic fields (structural imaging)."}
 ]},
{id:"ps-7a-behavioral-genetics",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Biological bases",categoryCode:"7A",idea:"Behavioral genetics & heritability",
 questions:[
  {tag:"Twin studies logic",stem:"Behavioral geneticists use identical vs. fraternal twins to estimate genetic influence because identical twins share ______ of their genes and fraternal twins share about ______.",choices:["~50%; ~100%","~25%; ~75%","~100%; ~100%","~100%; ~50%"],answer:3,rationale:"Identical twins share ~100% of genes; fraternal twins ~50% \u2014 the basis of twin-study heritability estimates.",why:["Reversed \u2014 identical twins share ~100%, fraternal ~50%.","Those percentages are incorrect for twins.","Fraternal twins share ~50%, not 100%.","Correct. Identical (monozygotic) twins are ~100% genetically identical; fraternal (dizygotic) share ~50%, like ordinary siblings."],takeaway:"Identical twins ~100% genes; fraternal ~50%."},
  {tag:"Heritability",stem:"Heritability is best defined as:",choices:["The percentage of a trait caused by genes in one individual","The proportion of variation in a trait, within a population, attributable to genetic differences","Proof that a trait cannot change","The number of genes controlling a trait"],answer:1,rationale:"<b>Heritability</b> = the share of population variation in a trait due to genetic differences (not an individual %).",why:["Heritability is a population statistic, not an individual attribution.","Correct. Heritability describes variance across a POPULATION due to genes \u2014 not the genetic 'percentage' of any one person's trait.","High heritability doesn't mean a trait is unchangeable.","It's about variance explained, not a gene count."],takeaway:"Heritability = population trait variation due to genes (not per-person)."},
  {tag:"Gene\u2013environment interaction",stem:"The finding that a genetic predisposition may only produce a trait under certain environmental conditions describes:",choices:["Pure genetic determinism","Pure environmental determinism","Gene\u2013environment interaction","Heritability of 1.0"],answer:2,rationale:"<b>Gene\u2013environment interaction</b>: a gene's effect depends on the environment (they jointly shape traits).",why:["Genetic determinism ignores environmental moderation.","Environmental determinism ignores genetic contribution.","Correct. Gene\u2013environment interaction: genes and environment jointly shape outcomes; a genotype's effect can depend on the environment.","Heritability of 1.0 would mean all variation is genetic, ignoring interaction."],takeaway:"Gene\u00d7environment = genes and environment jointly shape traits."},
  {tag:"Temperament & heredity",stem:"Because temperament is evident in early infancy and stable, it is considered strong evidence for the ______ contribution to personality.",choices:["Genetic/biological","Purely environmental","Purely learned","Cultural-only"],answer:0,rationale:"Early, stable <b>temperament</b> is evidence for a genetic/biological contribution to personality.",why:["Correct. Early-appearing, stable temperament supports a genetic/biological basis for personality.","Its early appearance argues against a purely environmental origin.","It appears before extensive learning could shape it.","It's biologically rooted, not culturally determined."],takeaway:"Temperament (early, stable) = genetic contribution to personality."}
 ]},
{id:"ps-7a-development-repro",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Biological bases",categoryCode:"7A",idea:"Development: germ layers & reflexes",
 questions:[
  {tag:"Germ layer \u2192 nervous system",stem:"The nervous system (and skin's epidermis) develops from which primary germ layer?",choices:["Mesoderm","Endoderm","Trophoblast","Ectoderm"],answer:3,rationale:"<b>Ectoderm</b> \u2192 nervous system + epidermis (outer layer).",why:["Mesoderm forms muscle, bone, and the circulatory system.","Endoderm forms the gut lining and internal organ linings.","The trophoblast forms the placenta, not a germ layer derivative.","Correct. The ectoderm gives rise to the nervous system and epidermis (mnemonic: ectoderm = 'attract-o-derm,' outer/nervous)."],takeaway:"Ectoderm \u2192 nervous system + skin (epidermis)."},
  {tag:"Neonatal reflexes: rooting",stem:"A newborn turning its head toward a touch on the cheek and seeking to suck reflects the:",choices:["Moro (startle) reflex","Rooting reflex","Babinski reflex","Grasping reflex"],answer:1,rationale:"<b>Rooting reflex</b> = infant turns toward a cheek touch to feed.",why:["The Moro reflex is a startle response to sudden loss of support.","Correct. The rooting reflex orients the infant's mouth toward a cheek stimulus to aid feeding.","The Babinski reflex is toe fanning to a foot stroke.","The grasping (palmar) reflex is finger curling around an object."],takeaway:"Rooting reflex = turn toward cheek touch (feeding)."},
  {tag:"Moro reflex",stem:"A newborn suddenly flinging out its arms and then pulling them in when startled (e.g., by a loss of support) is the:",choices:["Rooting reflex","Grasping reflex","Moro (startle) reflex","Babinski reflex"],answer:2,rationale:"<b>Moro reflex</b> = startle: arms fling out then pull in.",why:["Rooting orients toward a cheek touch.","The grasping reflex curls fingers around an object.","Correct. The Moro reflex is the infant startle response to sudden movement or loss of support.","The Babinski reflex is toe fanning to a foot stroke."],takeaway:"Moro reflex = startle (arms out, then in)."},
  {tag:"Motor development principle",stem:"Motor development in infants generally proceeds in a ______ (head-to-toe) and ______ (center-outward) direction.",choices:["Cephalocaudal; proximodistal","Proximodistal; cephalocaudal","Distal-to-proximal; toe-to-head","Random; unpredictable"],answer:0,rationale:"Motor development: <b>cephalocaudal</b> (head\u2192toe) and <b>proximodistal</b> (center\u2192outward).",why:["Correct. Development proceeds cephalocaudal (head \u2192 toe) and proximodistal (trunk/center \u2192 extremities).","Reversed labels \u2014 head-to-toe is cephalocaudal, center-out is proximodistal.","Development is head-to-toe and center-out, not the reverse.","Motor development follows predictable directions, not randomness."],takeaway:"Motor development = cephalocaudal (head\u2192toe) + proximodistal (center\u2192out)."}
 ]},
{id:"ps-7a-endocrine",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Biological bases",categoryCode:"7A",idea:"The endocrine system & behavior",
 questions:[
  {tag:"Endocrine vs. nervous signaling",stem:"Compared with the nervous system, the endocrine system communicates via ______, producing effects that are generally:",choices:["Action potentials; faster and briefer","Hormones; faster and briefer","Neurotransmitters; instantaneous only","Hormones in the bloodstream; slower but longer-lasting"],answer:3,rationale:"<b>Endocrine</b> = hormones via blood \u2192 slower onset, longer-lasting (vs. fast, brief neural signals).",why:["Action potentials are the nervous system's fast, brief signals.","Hormonal effects are slower, not faster, than neural ones.","Neurotransmitters act at synapses (nervous system), not endocrine blood-borne signaling.","Correct. Endocrine signaling uses hormones carried in blood \u2014 slower onset but longer-lasting effects than fast neural signaling."],takeaway:"Endocrine = hormones in blood (slow, long-lasting). Nervous = fast, brief."},
  {tag:"Pituitary: the master gland",stem:"The endocrine gland that controls many other glands \u2014 itself directed by the hypothalamus \u2014 is the:",choices:["Adrenal gland","Pituitary gland","Thyroid gland","Pineal gland"],answer:1,rationale:"The <b>pituitary</b> = master gland (regulates other glands; controlled by the hypothalamus).",why:["The adrenal gland releases cortisol/adrenaline but isn't the master gland.","Correct. The pituitary ('master gland') regulates other endocrine glands and is controlled by the hypothalamus.","The thyroid regulates metabolism.","The pineal gland secretes melatonin."],takeaway:"Pituitary = master gland (run by the hypothalamus)."},
  {tag:"Adrenal glands",stem:"During stress, the adrenal glands release cortisol (from the cortex) and ______ (from the medulla) to mobilize the body.",choices:["Melatonin","Insulin","Epinephrine/norepinephrine","Thyroxine"],answer:2,rationale:"Adrenal glands: cortex \u2192 cortisol; medulla \u2192 <b>epinephrine/norepinephrine</b> (stress response).",why:["Melatonin comes from the pineal gland.","Insulin comes from the pancreas.","Correct. The adrenal medulla releases epinephrine/norepinephrine (fast); the cortex releases cortisol (slower) during stress.","Thyroxine comes from the thyroid."],takeaway:"Adrenals: cortex = cortisol, medulla = epinephrine/norepinephrine."},
  {tag:"Negative feedback",stem:"Most hormone systems are regulated by negative feedback, meaning that a hormone's effect:",choices:["Signals back to reduce further release, keeping levels within a set range","Amplifies its own further release without limit","Has no effect on its own secretion","Permanently shuts down the gland"],answer:0,rationale:"<b>Negative feedback</b>: a hormone's effect signals back to curb further release (homeostasis).",why:["Correct. Negative feedback: rising output inhibits further release, maintaining homeostasis (e.g., cortisol suppressing its own axis).","That's positive feedback, which is rarer (e.g., oxytocin in labor).","Hormone levels do feed back to regulate secretion.","Feedback modulates, not permanently shuts down, the gland."],takeaway:"Negative feedback = output inhibits further release (homeostasis)."}
 ]},
{id:"ps-7b-conformity",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Social processes",categoryCode:"7B",idea:"Conformity",
 questions:[
