  {tag:"Three canals, three planes",stem:"Each ear has three semicircular canals oriented roughly perpendicular to one another. The functional reason is to:",choices:["Amplify sound","Sense linear acceleration","Regenerate endolymph","Detect rotation in any plane (all three axes of head movement)"],answer:3,rationale:"The three semicircular canals sit in roughly <b>orthogonal planes</b>, so together they detect <b>rotational acceleration about any axis</b> \u2014 however the head turns, some canal registers it.",why:["Sound amplification is the middle ear/cochlea, not the canals.","Linear acceleration is the otolithic organs' job.","The canals don't 'regenerate' endolymph; the geometry is about sensing all rotational planes.","Correct. Three orthogonal canals let the system register rotation about any axis \u2014 nodding, shaking, tilting."],takeaway:"Three orthogonal canals per ear \u2192 rotation in any plane can be sensed (yaw, pitch, roll)."},
  {tag:"Motion sickness \u00b7 sensory conflict",stem:"Reading a book in a moving car often causes nausea. The leading explanation is that:",choices:["The otoliths have detached","The vestibular system senses motion while the eyes, fixed on the page, signal stillness \u2014 a sensory conflict","The cochlea is overstimulated","The semicircular canals have stopped working"],answer:1,rationale:"Motion sickness is best explained by <b>sensory conflict</b>: the vestibular organs sense the car's motion while the eyes, fixed on a page, signal stillness. The mismatch produces nausea.",why:["Otoliths don't detach; the problem is conflicting sensory information.","Correct. Motion sickness arises from a mismatch: the vestibular system reports movement, but vision reports a stationary page.","The cochlea (hearing) isn't the source of car sickness.","The canals are working fine \u2014 they're what report the motion the eyes don't."],takeaway:"Motion sickness = vestibular\u2013visual sensory conflict (inner ear says moving, eyes say still)."}
 ]},
{id:"ps-6a-signal-detection",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Sensory processing",categoryCode:"6A",idea:"Signal detection theory",
 questions:[
  {tag:"Outcome · false alarm",stem:`A radiologist reports a tumor on a scan that is in fact completely normal (no tumor present). In signal detection terms, this outcome is a:`,choices:["Hit","Miss","False alarm","Correct rejection"],answer:2,rationale:"A <b>false alarm</b> is responding 'signal present' when no signal actually exists (signal absent + 'yes').",why:["A hit is a 'yes' when the signal <i>is</i> present — but here no tumor was present.","A miss is a 'no' when the signal is present — but she responded 'yes.'","Correct. Signal absent (no tumor) + responded 'yes' = false alarm.","A correct rejection is a 'no' when no signal is present — she said 'yes,' so it isn't this."],takeaway:"Four outcomes: Hit = yes/present, Miss = no/present, False alarm = yes/absent, Correct rejection = no/absent."},
  {tag:"Outcome · miss",stem:`An airport screener fails to flag a bag that actually contains a prohibited item. This outcome is a:`,choices:["Miss","False alarm","Hit","Correct rejection"],answer:0,rationale:"A <b>miss</b> is responding 'no signal' when the signal is actually present (signal present + 'no').",why:["Correct. Signal present (prohibited item) + responded 'no' (didn't flag) = miss.","A false alarm is flagging a bag that's actually safe — the opposite.","A hit would be correctly flagging the dangerous bag; here it was missed.","A correct rejection is correctly not flagging a safe bag; this bag was dangerous."],takeaway:"Miss = the signal was there and you said no. In screening, misses are the dangerous errors."},
  {tag:"d′ · sensitivity",stem:`In signal detection theory, d′ reflects the separation between the signal and noise distributions. A larger d′ means:`,choices:["The observer has become more conservative","The signal is easier to distinguish from noise — greater sensitivity","The observer will make more false alarms","The decision criterion has shifted"],answer:1,rationale:"<b>d′ (sensitivity)</b> is the distance between the means of the noise and signal distributions. A bigger d′ means the two are farther apart and easier to tell apart — independent of the observer's decision strategy.",why:["That describes the criterion (c), not d′. d′ is independent of strategy.","Correct. Larger d′ = greater separation of signal and noise = easier discrimination (higher sensitivity).","False-alarm rate depends on the criterion, not d′.","Shifting the criterion is a change in c, not d′."],takeaway:"d′ = sensitivity (how separable signal is from noise). Bigger d′ = easier detection. It's separate from the criterion."},
  {tag:"Conservative vs. liberal criterion",stem:`An observer adopts a conservative strategy, saying "signal present" only when absolutely certain. Compared with a liberal strategy, this produces:`,choices:["More false alarms but fewer misses","More hits and more false alarms","No change in either error","Fewer false alarms but more misses"],answer:3,rationale:"A <b>conservative</b> criterion (say 'yes' only when very sure) minimizes <b>false alarms</b> but increases <b>misses</b>. A <b>liberal</b> criterion (say 'yes' readily) does the reverse. The criterion sets the trade-off between the two error types.",why:["That's the liberal pattern — a conservative criterion reduces false alarms.","Saying 'yes' rarely produces <i>fewer</i> hits and false alarms, not more.","Shifting the criterion trades one error type for the other, so both change.","Correct. A high (conservative) criterion means few false alarms but more misses."],takeaway:"Conservative criterion → fewer false alarms, more misses. Liberal → more hits/false alarms, fewer misses."},
  {tag:"Criterion vs. sensitivity",stem:`A radiologist is told that missing a tumor is far worse than a false alarm, so she starts flagging even faint, ambiguous spots. In signal detection terms, she has:`,choices:["Shifted her criterion to be more liberal, without changing her sensitivity (d′)","Increased her sensitivity (d′)","Decreased her sensitivity (d′)","Eliminated the possibility of a miss"],answer:0,rationale:"This is the central SDT insight: <b>sensitivity (d′)</b> and <b>decision criterion (c)</b> are separable. Rewards, costs, expectations, and motivation shift the <i>criterion</i> without changing how well the observer can actually discriminate signal from noise.",why:["Correct. Payoffs shifted her decision <i>criterion</i> (toward liberal); her perceptual sensitivity (d′) is unchanged.","Her ability to distinguish tumor from normal tissue (d′) hasn't improved — only her willingness to say 'yes.'","d′ isn't decreasing either; the change is in criterion, not sensitivity.","A liberal criterion reduces misses but doesn't eliminate them."],takeaway:"Payoffs/motivation move the CRITERION (bias), not d′. Detection = sensitivity + a separable decision criterion."},
  {tag:"Outcome · correct rejection",stem:`On a foggy night, a driver correctly decides not to brake when there is in fact no red light ahead. This correct "no signal" judgment is a:`,choices:["Miss","Correct rejection","Hit","False alarm"],answer:1,rationale:"A <b>correct rejection</b> is correctly responding 'no signal' when the signal is genuinely absent (signal absent + 'no').",why:["A miss is failing to respond to a signal that <i>is</i> present — but here there was no red light.","Correct. Signal absent (no red light) + responded 'no' (didn't brake) = correct rejection.","A hit is a correct 'yes' to a present signal; there was no signal here.","A false alarm is braking for a red light that isn't there — the opposite of what happened."],takeaway:"Correct rejection = nothing was there and you correctly said no. The 'good' outcome on the signal-absent side."},
  {tag:"Outcome \u00b7 hit",stem:"A sonar operator correctly reports \u201cenemy submarine present\u201d when there genuinely is one. In signal detection terms, this is a:",choices:["False alarm","Correct rejection","Hit","Miss"],answer:2,rationale:"A <b>hit</b> is correctly responding 'signal present' when the signal truly is present (present + 'yes').",why:["A false alarm is a 'yes' when nothing is there.","A correct rejection is a 'no' when nothing is there.","Correct. Signal present + responded 'yes' = hit.","A miss is a 'no' when the signal is present."],takeaway:"Hit = the signal was there and you correctly said yes \u2014 the good outcome on the signal-present side."},
  {tag:"What 'noise' is",stem:"In signal detection theory, \u201cnoise\u201d refers to:",choices:["Only loud sounds in the environment","The observer's decision criterion","The intensity of the true signal","Background stimulation and internal variability that can be mistaken for the signal"],answer:3,rationale:"<b>Noise</b> is the background activity \u2014 external stimulation plus internal (neural) variability \u2014 that is always present. Detection is telling a real <b>signal</b> apart from fluctuating noise.",why:["'Noise' is any interfering background, not just literal sound.","The criterion is the decision rule, not the background noise.","That describes the signal, not the noise it must be distinguished from.","Correct. Noise is the ever-present background (external and internal/neural) the signal must be told apart from."],takeaway:"Noise = the ever-present background (external + internal) the signal must be distinguished from."},
  {tag:"Liberal criterion",stem:"An anxious airport screener flags nearly every bag that looks even slightly unusual, rarely letting anything questionable pass. This liberal criterion will produce:",choices:["Many misses and few hits","Many hits but also many false alarms","Few hits and few false alarms","No false alarms at all"],answer:1,rationale:"A <b>liberal</b> criterion means saying 'signal present' on little evidence: it maximizes <b>hits</b> (few misses) at the cost of many <b>false alarms</b> \u2014 the mirror of a conservative criterion.",why:["Saying 'yes' readily produces <i>fewer</i> misses, not more.","Correct. A liberal criterion (say 'yes' readily) catches most real threats (hits) but flags many harmless bags (false alarms).","A liberal criterion increases both hits and false alarms.","Flagging readily guarantees <i>more</i> false alarms, not zero."],takeaway:"Liberal criterion \u2192 more hits and more false alarms, fewer misses. Conservative \u2192 the reverse."},
  {tag:"Training raises d\u2032",stem:"After months of training, a radiologist gets genuinely better at telling real tumors from normal tissue \u2014 her hit rate rises while her false-alarm rate falls. In signal detection terms, she has:",choices:["Adopted a more liberal criterion","Adopted a more conservative criterion","Increased her sensitivity (d\u2032)","Lowered her absolute threshold only"],answer:2,rationale:"When <b>both</b> hits rise and false alarms fall, the signal and noise distributions are better separated for the observer \u2014 a rise in <b>sensitivity (d\u2032)</b>. A pure criterion shift only trades one error for the other.",why:["A liberal criterion would raise hits but <i>also raise</i> false alarms, not lower them.","A conservative criterion would lower false alarms but <i>also lower</i> hits.","Correct. Raising hits while lowering false alarms means better discrimination \u2014 a higher d\u2032.","This is about discriminating signal from noise (d\u2032), not a simple detection-floor shift."],takeaway:"Criterion shift trades hits\u2194false alarms. Improving BOTH at once = a genuine rise in sensitivity (d\u2032), e.g., from training."}
 ]},
{id:"ps-6a-perception-processing",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Perception",categoryCode:"6A",idea:"Bottom-up vs. top-down processing",
 questions:[
  {tag:"Bottom-up \u00b7 data-driven",stem:"A person encounters a completely novel object they have never seen and builds a perception of it purely from its edges, colors, and shapes, with no prior expectation. This is:",choices:["Top-down processing","Bottom-up processing","A perceptual set","Deductive reasoning"],answer:1,rationale:"<b>Bottom-up processing</b> begins with the stimulus: perception is assembled from incoming sensory features, without preconceived constructs. Data-driven.",why:["Top-down processing relies on prior knowledge and expectation \u2014 absent here for a novel object.","Correct. Building perception from the raw stimulus features, with no prior expectation, is bottom-up (data-driven) processing.","A perceptual set is a readiness to perceive based on expectation \u2014 a top-down influence.","The stimulus-first build is a processing direction, not a form of logical reasoning."],takeaway:"Bottom-up = start with the stimulus, build perception from features. Data-driven, no prior expectation."},
  {tag:"Top-down \u00b7 Where's Waldo",stem:"Searching a crowded \u201cWhere\u2019s Waldo?\u201d page, you use your knowledge of Waldo\u2019s red-striped shirt and glasses to guide your search. This reliance on prior knowledge to direct perception is:",choices:["Bottom-up processing","Sensory adaptation","Top-down processing","Feature detection"],answer:2,rationale:"<b>Top-down processing</b> uses background knowledge, context, and expectation to shape perception \u2014 like using a mental template of Waldo to guide your search.",why:["Bottom-up would build perception from the raw image with no prior template.","Sensory adaptation is reduced response to a constant stimulus \u2014 unrelated to guided search.","Correct. Using stored knowledge and expectation to guide what you look for is top-down (concept-driven) processing.","Feature detection is the bottom-up analysis of basic features, not the knowledge-guided search described."],takeaway:"Top-down = prior knowledge/expectation guides perception (Where's Waldo, reading in context). Concept-driven."},
  {tag:"The core distinction",stem:"The key difference between bottom-up and top-down processing is that:",choices:["Bottom-up is data-driven (built from the stimulus), while top-down is concept-driven (guided by prior knowledge and expectation)","Bottom-up is concept-driven, while top-down is data-driven","Both begin with the observer's expectations","Neither makes any use of sensory input"],answer:0,rationale:"<b>Bottom-up = data-driven</b> (stimulus \u2192 perception). <b>Top-down = concept-driven</b> (knowledge/expectation \u2192 how the stimulus is interpreted).",why:["Correct. Bottom-up starts with the sensory data; top-down starts with concepts, knowledge, and expectations.","Reversed \u2014 bottom-up is data-driven and top-down is concept-driven.","Bottom-up specifically does <i>not</i> begin with expectation; it begins with the stimulus.","Both ultimately involve sensory input; they differ in how much prior knowledge guides its interpretation."],takeaway:"Bottom-up = data-driven (stimulus first). Top-down = concept-driven (knowledge first)."},
  {tag:"Illusory contours",stem:"In the Kanizsa illusion, viewers perceive the edges of a shape (such as a cube or triangle) that is not actually drawn, because the brain fills it in from context. This \u201cseeing what isn\u2019t there\u201d is an example of:",choices:["Bottom-up processing","Reaching the absolute threshold","Sensory transduction","Top-down processing"],answer:3,rationale:"The Kanizsa illusion is a classic <b>top-down</b> effect: expectation and context lead the brain to construct contours that aren't physically present \u2014 which is why top-down perception can be fooled.",why:["Pure bottom-up processing would register only the marks actually present, not the illusory edges.","The absolute threshold is about detecting a faint stimulus, not filling in missing contours.","Transduction is converting a stimulus into neural signals, not constructing an illusory shape.","Correct. Filling in edges that aren't in the stimulus, based on context, is top-down processing \u2014 and shows top-down can yield perceptions the raw data don't fully support."],takeaway:"Illusory contours (Kanizsa) = top-down filling-in. Top-down can produce perceptions the stimulus doesn't actually contain."},
  {tag:"Context resolves ambiguity",stem:"A sloppily written word is illegible on its own but easily read inside a full sentence, because the surrounding words create an expectation. This use of context to interpret ambiguous input is:",choices:["Bottom-up processing","Top-down processing","Rate coding","A difference threshold"],answer:1,rationale:"When <b>context and expectation</b> let you interpret otherwise ambiguous input, that's <b>top-down</b> processing \u2014 the same mechanism behind reading messy handwriting fluently in a sentence.",why:["Bottom-up would rely only on the ambiguous marks themselves, which were illegible in isolation.","Correct. Using surrounding context and expectation to interpret ambiguous input is top-down processing.","Rate coding is how intensity is signaled by firing frequency \u2014 unrelated.","A difference threshold is about telling two stimuli apart, not using context to read a word."],takeaway:"Context/expectation resolving ambiguous input = top-down processing."},
  {tag:"How they work together",stem:"Which statement about bottom-up and top-down processing is most accurate?",choices:["Everyday perception usually combines both \u2014 sensory input (bottom-up) is interpreted using prior knowledge (top-down)","Perception uses only one of the two at any time","Bottom-up processing is immune to all perceptual error","Top-down processing ignores the actual stimulus entirely"],answer:0,rationale:"Real perception is an <b>interaction</b>: bottom-up sensory data and top-down knowledge/expectation work together. Neither is used alone, and bottom-up isn't infallible.",why:["Correct. Normal perception integrates both: raw sensory data and knowledge-driven interpretation operate together.","The two typically operate together, not in isolation.","Bottom-up processing can still be fooled by ambiguous or degraded stimuli \u2014 it isn't error-proof.","Top-down processing shapes interpretation of the stimulus but doesn't ignore it."],takeaway:"Everyday perception = bottom-up + top-down together. Bottom-up isn't error-proof; top-down doesn't ignore the stimulus."}
 ]},
{id:"ps-6a-gestalt",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Perception",categoryCode:"6A",idea:"Gestalt principles of grouping",
 questions:[
  {tag:"The core idea",stem:"Watching a basketball game on television, you perceive a fluid, meaningful game rather than a grid of individual colored pixels. This tendency to perceive organized wholes rather than isolated parts is the central idea of:",choices:["Weber's law","Signal detection theory","Gestalt principles of perceptual grouping","Sensory adaptation"],answer:2,rationale:"The <b>Gestalt principles</b> describe how the mind organizes sensory parts into meaningful wholes \u2014 'the whole is greater than the sum of its parts.'",why:["Weber's law is about difference thresholds (JND), not perceptual grouping.","Signal detection theory concerns detecting a signal in noise, not organizing parts into wholes.","Correct. Gestalt psychology holds we perceive organized wholes \u2014 the whole is more than the sum of its parts.","Sensory adaptation is reduced response to a constant stimulus, unrelated to grouping."],takeaway:"Gestalt = we perceive organized wholes, not isolated parts. The grouping laws describe how."},
  {tag:"Similarity",stem:"A display of alternating columns of squares and circles is automatically seen as vertical columns rather than horizontal rows, because like items group together. This is the Gestalt principle of:",choices:["Similarity","Proximity","Closure","Common fate"],answer:0,rationale:"<b>Similarity</b>: we group elements that resemble one another (shape, color, size) \u2014 why like-columns are seen together.",why:["Correct. Grouping items that look alike (all squares, all circles) is similarity.","Proximity groups items by nearness in space, not by appearance.","Closure is filling in missing parts of a figure, not grouping like items.","Common fate groups items by shared motion, not by appearance."],takeaway:"Similarity = group by looking alike. (Proximity = nearness; common fate = motion.)"},
  {tag:"Proximity",stem:"Dots that are physically closer to one another are perceived as belonging to the same cluster, while dots farther apart seem to form separate groups. This is the principle of:",choices:["Similarity","Proximity","Continuity","Pr\u00e4gnanz"],answer:1,rationale:"<b>Proximity</b>: elements that are close together are grouped into the same unit.",why:["Similarity groups by appearance, not distance.","Correct. Grouping elements by how near they are in space is proximity.","Continuity concerns perceiving smooth continuous paths, not clustering by nearness.","Pr\u00e4gnanz is the preference for the simplest overall interpretation, not spatial clustering."],takeaway:"Proximity = group by nearness in space."},
  {tag:"Closure",stem:"Three angled shapes are arranged so that viewers 'see' a complete triangle even though no triangle is actually drawn \u2014 the mind fills in the missing edges. This is the Gestalt principle of:",choices:["Continuity","Symmetry","Proximity","Closure"],answer:3,rationale:"<b>Closure</b>: the mind fills in gaps to perceive a complete, whole object \u2014 e.g., 'seeing' a triangle whose edges aren't drawn.",why:["Continuity is perceiving lines as following the smoothest continuous path, not completing a figure.","Symmetry is perceiving balanced forms around a center, not filling gaps.","Proximity groups elements by nearness, not by completing an outline.","Correct. Filling in missing information to perceive a complete figure is closure."],takeaway:"Closure = fill in missing information to complete a figure (the illusory triangle)."},
  {tag:"Continuity",stem:"When two lines cross, we perceive each as a single continuous line following the smoothest path, rather than as four separate segments meeting at a point. This is the principle of:",choices:["Continuity (good continuation)","Closure","Similarity","Common fate"],answer:0,rationale:"<b>Continuity (good continuation)</b>: elements on a line or curve are perceived as following the smoothest, most continuous path.",why:["Correct. Perceiving elements as following the smoothest, most continuous path is continuity.","Closure completes missing parts of a figure; here nothing is missing \u2014 it's about smooth flow.","Similarity groups by appearance, not by smooth continuation.","Common fate groups by shared motion, not by continuous line."],takeaway:"Continuity = perceive the smoothest continuous path (crossing lines seen as two flowing lines)."},
  {tag:"Pr\u00e4gnanz",stem:"Shown a pattern of overlapping shapes, the brain interprets the Olympic logo as five simple interlocking rings rather than a set of complex irregular figures. This preference for the simplest, most stable interpretation is the law of:",choices:["Proximity","Common fate","Pr\u00e4gnanz (simplicity / good figure)","Past experience"],answer:2,rationale:"<b>Pr\u00e4gnanz</b> (law of good figure/simplicity): perception defaults to the simplest, most stable form \u2014 five clean rings rather than complex shapes.",why:["Proximity groups by nearness, not by choosing the simplest interpretation.","Common fate groups by shared motion.","Correct. The preference for the simplest, most orderly interpretation is Pr\u00e4gnanz.","Past experience uses prior learning; here it's about defaulting to the simplest form."],takeaway:"Pr\u00e4gnanz = we default to the simplest, most stable interpretation (Olympic rings)."},
  {tag:"Common fate",stem:"In a field of scattered, identical dots, those moving upward are perceived as one group and those moving downward as another. This grouping by shared motion is the law of:",choices:["Similarity","Common fate","Continuity","Closure"],answer:1,rationale:"<b>Common fate</b>: elements moving in the same direction are grouped together \u2014 even identical dots split into units by shared motion.",why:["Similarity groups by appearance \u2014 but here the dots are identical; only motion differs.","Correct. Grouping elements that move together in the same direction is common fate.","Continuity concerns smooth continuous paths, not shared movement.","Closure is completing a figure, not grouping by motion."],takeaway:"Common fate = group by shared motion/direction. (Similarity = group by appearance.)"},
  {tag:"Past experience",stem:"Two simple shapes placed side by side could be perceived as a single novel form or as two familiar letters; a fluent reader perceives the familiar letters. This influence of prior learning on grouping is the Gestalt law of:",choices:["Past experience","Pr\u00e4gnanz","Proximity","Common fate"],answer:0,rationale:"<b>Past experience</b>: familiar patterns learned over time influence how we group and interpret stimuli \u2014 a reader sees letters where a non-reader sees shapes.",why:["Correct. When prior learning shapes how elements are grouped, that's the law of past experience.","Pr\u00e4gnanz is about defaulting to the simplest form, not prior learning.","Proximity groups by spatial nearness, independent of experience.","Common fate groups by shared motion, not by learning."],takeaway:"Past experience = prior learning guides grouping/interpretation (seeing familiar letters)."},
  {tag:"Figure-ground",stem:"Looking at Rubin's famous image, a viewer sees either a white vase or two black faces in profile \u2014 but not both at once \u2014 depending on which region is taken as the object and which as the background. This is the Gestalt principle of:",choices:["Figure-ground organization","Closure","Similarity","Common fate"],answer:0,rationale:"<b>Figure-ground</b> organization separates a scene into a <b>figure</b> (the object) and the <b>ground</b> (background). Rubin's vase is reversible because either region can be taken as the figure.",why:["Correct. Segmenting a scene into a figure (object of focus) and a ground (background) is figure-ground; the vase/faces image is reversible because either region can be the figure.","Closure fills in missing parts of a figure, not object-vs-background segmentation.","Similarity groups items by appearance, not figure vs. ground.","Common fate groups by shared motion."],takeaway:"Figure-ground = separate the object (figure) from its background (ground). Rubin's vase = the classic reversible figure."},
  {tag:"Symmetry",stem:"Presented with a scattered set of brackets, viewers group them into symmetrical pairs balanced around a center, perceiving orderly units rather than random marks. This is the Gestalt principle of:",choices:["Proximity","Symmetry","Continuity","Past experience"],answer:1,rationale:"<b>Symmetry</b>: the mind perceives objects as symmetrical forms balanced around a center point, favoring orderly, balanced units.",why:["Proximity groups by nearness in space, not by symmetry.","Correct. Perceiving balanced, symmetrical forms organized around a center point is symmetry.","Continuity concerns smooth continuous paths, not balanced pairing.","Past experience uses prior learning, not symmetrical organization."],takeaway:"Symmetry = perceive balanced, symmetrical forms around a center."},
  {tag:"Contextual effects",stem:"The ambiguous middle character in \u201cA 13 C\u201d is read as the letter \u201cB,\u201d but the identical mark in \u201c12 13 14\u201d is read as the number \u201c13.\u201d The surrounding items change how the same stimulus is perceived. This influence is best described as:",choices:["The absolute threshold","Sensory adaptation","A contextual effect on perceptual organization","Rate coding"],answer:2,rationale:"<b>Contextual effects</b>: the surrounding context establishes how an ambiguous stimulus is organized \u2014 the same mark reads as 'B' among letters and '13' among numbers.",why:["The absolute threshold is about detecting a faint stimulus, not context-driven interpretation.","Sensory adaptation is reduced response to a constant stimulus.","Correct. Context \u2014 the surrounding stimuli \u2014 determines how an ambiguous item is organized and interpreted.","Rate coding is how intensity is signaled by firing frequency."],takeaway:"Contextual effects = surrounding context determines how an ambiguous stimulus is organized/interpreted (B vs 13)."}
 ]},
{id:"ps-6a-eye-anatomy",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Vision",categoryCode:"6A",idea:"Structure of the eye",
 questions:[
  {tag:"Path of light",stem:"Trace the path of light entering the eye. In order, light passes through the:",choices:["Lens \u2192 cornea \u2192 pupil \u2192 retina \u2192 vitreous humor","Pupil \u2192 cornea \u2192 lens \u2192 sclera \u2192 retina","Cornea \u2192 aqueous humor \u2192 pupil \u2192 lens \u2192 vitreous humor \u2192 retina","Retina \u2192 lens \u2192 cornea \u2192 aqueous humor \u2192 pupil"],answer:2,rationale:"Light path: <b>cornea \u2192 aqueous humor \u2192 pupil \u2192 lens \u2192 vitreous humor \u2192 retina</b>.",why:["The cornea \u2014 not the lens \u2014 is the first structure light reaches.","Light hits the cornea before the pupil, and the sclera is opaque (light doesn't pass through it).","Correct. Light enters the transparent cornea, crosses the aqueous humor, passes the pupil, is focused by the lens, traverses the vitreous humor, and lands on the retina.","This is reversed \u2014 the retina is the last structure, not the first."],takeaway:"Order of light: cornea \u2192 aqueous humor \u2192 pupil \u2192 lens \u2192 vitreous humor \u2192 retina."},
  {tag:"Cornea \u00b7 most refraction",stem:"Which structure is the first to bend (refract) incoming light and provides most of the eye's focusing power?",choices:["The lens","The cornea","The retina","The iris"],answer:1,rationale:"The <b>cornea</b> is the first structure light reaches and does most of the eye's (fixed) refraction. The lens then fine-tunes the focus.",why:["The lens fine-tunes focus (accommodation) but provides less of the total bending than the cornea.","Correct. The transparent cornea is the first structure light hits and supplies most of the eye's fixed refractive power; the lens fine-tunes focus.","The retina detects light; it doesn't bend it.","The iris controls pupil size; it doesn't refract light."],takeaway:"Cornea = first to bend light and most of the fixed refraction. Lens fine-tunes."},
  {tag:"Accommodation \u00b7 name",stem:"Unlike the cornea's fixed bending, the lens can change its focusing power to keep both near and far objects sharp. This adjustment is called:",choices:["Adaptation","Convergence","Transduction","Accommodation"],answer:3,rationale:"<b>Accommodation</b> is the lens changing shape (via the ciliary muscle and suspensory ligaments) to focus on near vs. far objects.",why:["Adaptation is reduced sensory response to a constant stimulus, not focusing.","Convergence is the eyes rotating inward for near objects \u2014 a depth cue, not lens focusing.","Transduction is converting light into a neural signal, not adjusting focus.","Correct. Accommodation is the lens changing shape to adjust focus for objects at different distances."],takeaway:"Accommodation = the lens changing shape to focus on near vs. far objects."},
  {tag:"Accommodation \u00b7 mechanism",stem:"To focus on a nearby object, the ciliary muscle contracts, loosening the suspensory ligaments and allowing the lens to become:",choices:["More rounded, increasing its focusing power","Flatter, decreasing its focusing power","Opaque","Larger, widening the pupil"],answer:0,rationale:"Near focus: the ciliary muscle <b>contracts</b> \u2192 suspensory ligaments loosen \u2192 the lens becomes <b>rounder</b> (more refractive power). Far focus is the reverse.",why:["Correct. For near vision, ciliary contraction slackens the ligaments, so the elastic lens bulges rounder and more powerful. For distant objects the reverse occurs.","A flatter lens is for <i>distant</i> vision (ciliary muscle relaxed, ligaments taut).","The lens becoming opaque describes a cataract, not accommodation.","Pupil size is set by the iris, not by lens shape."],takeaway:"Near: ciliary muscle CONTRACTS \u2192 ligaments loosen \u2192 lens ROUNDER (more power). Far: muscle relaxes, lens flattens."},
  {tag:"Iris & pupil",stem:"In bright light the pupil narrows; in dim light it widens. This change in pupil size is produced by:",choices:["The lens changing shape","The iris \u2014 a muscle that constricts or dilates the pupil","The cornea thickening","The retina adapting"],answer:1,rationale:"The <b>iris</b> is the muscle (and the source of eye color) that constricts or dilates the <b>pupil</b>, regulating how much light enters. Bright = constrict, dim = dilate.",why:["Lens shape change is accommodation (focus), not pupil size.","Correct. The iris is the pigmented muscle (which also gives eye color) that constricts or dilates to set pupil size and regulate light entry.","The cornea's shape is fixed; it doesn't regulate light entry by thickening.","Retinal adaptation adjusts sensitivity, but the pupil's size is set by the iris muscle."],takeaway:"Iris (muscle) sets pupil size \u2192 controls light entering. Bright = constrict, dim = dilate."},
  {tag:"Transduction at the retina",stem:"At the retina, incoming light is converted into electrochemical (neural) signals the brain can interpret. This conversion of a physical stimulus into a neural signal is called:",choices:["Accommodation","Sensory transduction","Refraction","Adaptation"],answer:1,rationale:"The retina's photoreceptors perform <b>transduction</b> \u2014 converting light (a physical stimulus) into electrochemical neural signals.",why:["Accommodation is the lens focusing; it doesn't create the neural signal.","Correct. Transduction is converting a physical stimulus (light) into an electrochemical neural signal \u2014 done by the retina's photoreceptors.","Refraction is bending light (cornea/lens), not converting it to a signal.","Adaptation is a change in responsiveness, not the initial conversion of light to signal."],takeaway:"Transduction = converting a physical stimulus (light) into a neural signal, at the retina's photoreceptors."},
  {tag:"Rods \u00b7 dim light",stem:"A person entering a dark room relies mainly on receptors that are highly sensitive to dim light but cannot distinguish color. These are the:",choices:["Rods","Cones","Ganglion cells","Bipolar cells"],answer:0,rationale:"<b>Rods</b> are highly sensitive to dim light and drive night vision, but give no color and low detail. <b>Cones</b> handle color and fine detail in bright light.",why:["Correct. Rods are highly light-sensitive and mediate dim-light (night) vision but don't detect color.","Cones handle color and fine detail in bright light \u2014 they're poor in the dark.","Ganglion cells carry output to the optic nerve; they aren't the dim-light photoreceptors.","Bipolar cells relay signals within the retina; they aren't photoreceptors."],takeaway:"Rods = dim light/night, no color, high sensitivity. Cones = color + fine detail in bright light."},
  {tag:"Fovea \u00b7 acuity",stem:"Which region of the retina contains only cones (no rods) and provides the sharpest, most detailed central vision?",choices:["The fovea","The optic disc (blind spot)","The choroid","The peripheral retina"],answer:0,rationale:"The <b>fovea</b> (center of the macula) is all cones, no rods, giving the sharpest central/detail vision. The periphery is rod-rich.",why:["Correct. The fovea, at the center of the macula, is packed exclusively with cones (no rods), giving the highest visual acuity.","The optic disc has no photoreceptors at all \u2014 it's the blind spot where the optic nerve exits.","The choroid is a vascular/pigmented layer, not a photoreceptor region.","The peripheral retina is rod-dominated \u2014 good for dim light and motion, poor for detail."],takeaway:"Fovea = all cones, no rods \u2192 sharpest central/detail vision. Periphery = rod-rich (dim light, motion)."},
  {tag:"Choroid \u00b7 function",stem:"The choroid is a pigmented, blood-vessel-rich layer behind the retina. Its two main functions are to:",choices:["Focus light onto the retina","Produce the aqueous humor","Nourish the retina and absorb stray light to prevent internal reflection","Transduce light into neural signals"],answer:2,rationale:"The <b>choroid</b> nourishes the outer retina (blood vessels) and its dark pigment <b>absorbs stray light</b> to prevent scattering. Some nocturnal animals instead have a reflective layer for better night vision.",why:["Focusing is done by the cornea and lens, not the choroid.","Aqueous humor is produced by the ciliary body, not the choroid.","Correct. The choroid supplies blood to the outer retina, and its dark pigment absorbs stray light, preventing internal scattering.","Transduction is the photoreceptors' job, not the choroid's."],takeaway:"Choroid = blood supply to retina + absorbs stray light (dark pigment). Reflective in some night animals."},
  {tag:"Aqueous vs. vitreous humor",stem:"Which correctly describes the two fluids of the eye?",choices:["Aqueous humor (watery, front chambers, nourishes cornea/lens); vitreous humor (jelly-like, main cavity, maintains eyeball shape)","Aqueous humor fills the main cavity; vitreous humor sits just in front of the lens","Both are jelly-like and fill the same chamber","Aqueous humor transduces light; vitreous humor bends light"],answer:0,rationale:"<b>Aqueous humor</b>: watery, in the front chambers, nourishes cornea/lens and maintains pressure. <b>Vitreous humor</b>: jelly-like, fills the large rear cavity, maintains the eyeball's shape.",why:["Correct. Aqueous humor is the watery fluid in the front chambers that nourishes the avascular cornea and lens; vitreous humor is the jelly-like fluid in the large rear cavity that maintains eyeball shape.","Reversed \u2014 the vitreous (jelly) fills the main rear cavity; the aqueous (watery) is in front.","They differ: aqueous is watery (front), vitreous is jelly-like (rear).","Neither fluid transduces or focuses light \u2014 those are the retina and cornea/lens."],takeaway:"Aqueous = watery, front, nourishes cornea/lens. Vitreous = jelly, back, maintains eyeball shape."}
 ]},
{id:"ps-6a-phototransduction",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Vision",categoryCode:"6A",idea:"Phototransduction & the visual pathway",
 questions:[
  {tag:"Retinal signal pathway",stem:"After light is transduced in the retina, the neural signal flows through the retina in which order before leaving the eye?",choices:["Ganglion cell \u2192 bipolar cell \u2192 photoreceptor \u2192 optic nerve","Bipolar cell \u2192 photoreceptor \u2192 ganglion cell \u2192 optic nerve","Photoreceptor (rod/cone) \u2192 bipolar cell \u2192 ganglion cell \u2192 optic nerve","Photoreceptor \u2192 ganglion cell \u2192 bipolar cell \u2192 optic nerve"],answer:2,rationale:"Retinal signal flow: <b>photoreceptor \u2192 bipolar cell \u2192 ganglion cell \u2192 optic nerve \u2192 brain</b>.",why:["Reversed \u2014 signals start in photoreceptors, not ganglion cells.","Bipolar cells are the middle relay, not the starting point.","Correct. Signals begin in the photoreceptors, pass to bipolar cells, then to ganglion cells, whose axons form the optic nerve.","Bipolar cells come before ganglion cells, not after."],takeaway:"Signal flow in the retina: photoreceptor \u2192 bipolar \u2192 ganglion \u2192 optic nerve \u2192 brain."},
  {tag:"Light turns the rod OFF",stem:"Counterintuitively, when light strikes a rod, the rod's immediate response is to:",choices:["Hyperpolarize \u2014 effectively turning 'off' and reducing its signaling","Depolarize and fire an action potential","Release more neurotransmitter than in darkness","Divide to produce new photoreceptors"],answer:0,rationale:"The counterintuitive core of phototransduction: in the <b>dark</b> the photoreceptor is depolarized ('on'); <b>light hyperpolarizes it</b>, turning it 'off' and reducing its signal.",why:["Correct. In the dark a rod is depolarized ('on'); light hyperpolarizes it, turning it 'off' and decreasing its neurotransmitter release.","Photoreceptors don't fire classic action potentials; light hyperpolarizes them rather than depolarizing.","Light decreases neurotransmitter release \u2014 rods release more in the dark, not in light.","Photoreceptors don't divide in response to light."],takeaway:"Light turns photoreceptors OFF (hyperpolarizes them); in the DARK they're 'on.' The famous counterintuitive fact."},
  {tag:"Bipolar cells relay",stem:"Which retinal cells relay signals from the photoreceptors onward to the ganglion cells?",choices:["Ganglion cells","Bipolar cells","Choroidal cells","Corneal cells"],answer:1,rationale:"<b>Bipolar cells</b> are the middle relay of the retina: they carry the photoreceptor signal to the ganglion cells.",why:["Ganglion cells are the next stage after bipolar cells, not the relay from photoreceptors.","Correct. Bipolar cells sit between the photoreceptors and ganglion cells, passing the signal along.","The choroid is a vascular/pigment layer, not part of the signal relay.","The cornea is a light-bending structure at the front of the eye, not a retinal relay."],takeaway:"Bipolar cells = the middle relay: photoreceptor \u2192 BIPOLAR \u2192 ganglion."},
  {tag:"Optic nerve origin",stem:"The optic nerve that carries visual information to the brain is formed by the axons of which retinal cells?",choices:["Bipolar cells","Rods","Cones","Ganglion cells"],answer:3,rationale:"The <b>ganglion cells'</b> axons converge and leave the eye as the <b>optic nerve</b> (exiting at the blind spot).",why:["Bipolar cells relay within the retina; their processes don't form the optic nerve.","Rods are photoreceptors, not the source of the optic nerve's axons.","Cones are photoreceptors, not the source of the optic nerve's axons.","Correct. Ganglion cell axons bundle together and exit the back of the eye as the optic nerve."],takeaway:"Ganglion cell axons = the optic nerve. They exit at the optic disc (blind spot)."},
  {tag:"The blind spot",stem:"The point where the optic nerve exits the retina contains no photoreceptors, producing a gap in the visual field called the:",choices:["Blind spot (optic disc)","Fovea","Macula","Choroid"],answer:0,rationale:"The <b>optic disc</b> \u2014 where the optic nerve exits \u2014 has no photoreceptors, creating the <b>blind spot</b>.",why:["Correct. Where the optic nerve leaves the eye there are no rods or cones \u2014 the blind spot (optic disc).","The fovea is the cone-packed region of sharpest vision, not a gap.","The macula is the cone-rich central retina, not the optic-nerve exit.","The choroid is the vascular layer behind the retina, not the blind spot."],takeaway:"Optic disc = blind spot: no photoreceptors where the optic nerve exits."},
  {tag:"Rod vs. cone numbers",stem:"The human retina contains roughly 120 million of one photoreceptor and 6\u20137 million of the other. These are, respectively:",choices:["Cones (~120 million) and rods (~6\u20137 million)","Rods (~120 million) and cones (~6\u20137 million)","Bipolar cells and ganglion cells","Rods and ganglion cells"],answer:1,rationale:"There are about <b>120 million rods</b> (dim light, periphery) and <b>6\u20137 million cones</b> (color, fovea).",why:["Reversed \u2014 rods are the ~120 million; cones are the ~6\u20137 million.","Correct. Rods (~120 million) vastly outnumber cones (~6\u20137 million), fitting their role in dim-light peripheral vision.","These are the photoreceptors' counts, not bipolar/ganglion cells.","The second figure refers to cones, not ganglion cells."],takeaway:"~120 million rods (dim light) vs. ~6\u20137 million cones (color). Rods massively outnumber cones."},
  {tag:"Cones cluster in the fovea",stem:"To read fine print or find Waldo in a crowded picture, you rely on the region of the retina where cones are most densely concentrated: the:",choices:["Fovea","Peripheral retina","Optic disc","Choroid"],answer:0,rationale:"Cones are concentrated in the <b>fovea</b>, providing the acuity for detail (reading, finding Waldo). The periphery is rod-dominated.",why:["Correct. Cones pack into the fovea, giving the high acuity needed for detail tasks; the periphery is rod-dominated.","The peripheral retina is rod-rich \u2014 good for dim light and motion, poor for fine detail.","The optic disc has no photoreceptors at all (the blind spot).","The choroid is a vascular layer, not a photoreceptor region."],takeaway:"Cones cluster in the fovea \u2192 detail/acuity. Periphery = rods (dim light, motion)."},
  {tag:"Transduction vs. transmission",stem:"In the eye, the conversion of light energy into an electrical (neural) signal by a photoreceptor is an example of:",choices:["Transmission","Transduction","Perception","Accommodation"],answer:1,rationale:"<b>Transduction</b> = converting a physical stimulus (light) into a neural signal. (Transmission = neuron\u2192neuron; perception = the conscious experience.)",why:["Transmission is one neuron electrically activating another, not converting light to a signal.","Correct. Transduction transforms a physical stimulus (light) into a neural signal \u2014 performed here by the photoreceptors.","Perception is the conscious experience of the processed signal, not the initial conversion.","Accommodation is the lens changing shape to focus, not signal conversion."],takeaway:"Transduction = physical stimulus \u2192 neural signal. Transmission = neuron\u2192neuron. Perception = conscious experience."}
 ]},
{id:"ps-6a-color-vision",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Vision",categoryCode:"6A",idea:"Color vision theories",
 questions:[
  {tag:"Wavelength \u2192 hue",stem:"Visible light is electromagnetic radiation, and the color (hue) we perceive corresponds most directly to the light's:",choices:["Wavelength","Amplitude","Speed","Phase"],answer:0,rationale:"<b>Wavelength \u2192 hue</b> (color); amplitude \u2192 brightness. Visible light spans roughly 400\u2013700 nm.",why:["Correct. Hue corresponds to wavelength (~400 nm violet/blue to ~700 nm red); amplitude corresponds to brightness.","Amplitude corresponds to brightness/intensity, not hue.","Light's speed is essentially constant in a given medium and doesn't set color.","Phase doesn't determine the perceived hue."],takeaway:"Wavelength = color/hue; amplitude = brightness. Visible range ~400\u2013700 nm."},
  {tag:"Ends of the visible spectrum",stem:"Within the visible spectrum, which pairing of wavelength and color is correct?",choices:["~400 nm = violet/blue (short wavelength); ~700 nm = red (long wavelength)","~400 nm = red; ~700 nm = violet","~400 nm = green; ~700 nm = blue","Wavelength has no relationship to color"],answer:0,rationale:"Short \u03bb (~400 nm) = violet/blue; long \u03bb (~700 nm) = red. ROYGBV runs from longest (red) to shortest (violet) wavelength.",why:["Correct. Short wavelengths (~400 nm) look violet/blue; long wavelengths (~700 nm) look red.","Reversed \u2014 red is the long-wavelength (~700 nm) end, violet the short (~400 nm).","Green sits in the middle of the spectrum, not at 400 nm; blue isn't at 700 nm.","Wavelength directly determines perceived hue."],takeaway:"Short \u03bb ~400nm = violet/blue; long \u03bb ~700nm = red. Red = longest visible wavelength, violet = shortest."},
  {tag:"Trichromatic theory",stem:"The trichromatic (Young\u2013Helmholtz) theory explains color vision by proposing that:",choices:["There are four cone types arranged in opposing pairs","Rods, not cones, detect color","There are three cone types (roughly red, green, and blue), and their combined activation yields all perceived colors","Each distinct color has its own dedicated photoreceptor"],answer:2,rationale:"<b>Trichromatic theory</b>: three cone types (red/green/blue) whose combined firing produces all colors. It operates at the receptor (cone) level.",why:["Opposing pairs describe opponent-process theory; trichromatic theory posits three cone types.","Cones \u2014 not rods \u2014 detect color; rods handle dim-light vision.","Correct. Three cone types tuned to long (red), medium (green), and short (blue) wavelengths combine to produce every perceived color.","Colors arise from combinations of just three cone types, not one receptor per color."],takeaway:"Trichromatic = 3 cone types (R/G/B); their combined firing makes all colors. Receptor-level."},
  {tag:"Afterimages \u00b7 opponent-process",stem:"After staring at a green image and then looking at a white wall, you briefly see a red afterimage. This is best explained by:",choices:["Trichromatic theory","Opponent-process theory \u2014 color is coded in opposing pairs (red\u2013green, blue\u2013yellow, black\u2013white)","Dark adaptation","The blind spot"],answer:1,rationale:"<b>Opponent-process theory</b>: colors are processed in opposing pairs. A green afterimage's complement (red) appears once the green response fatigues \u2014 which trichromatic theory can't explain.",why:["Trichromatic theory explains color mixing but not afterimages.","Correct. Fatiguing the 'green' side of the red\u2013green channel leaves the red response unopposed, producing a red afterimage.","Dark adaptation is regaining sensitivity in dim light, unrelated to color afterimages.","The blind spot is a gap with no photoreceptors, not the cause of afterimages."],takeaway:"Opponent-process = color in opposing pairs (red\u2013green, blue\u2013yellow, black\u2013white). Explains afterimages."},
  {tag:"No 'reddish-green'",stem:"According to opponent-process theory, why can a color be described as 'bluish-green' but never as 'reddish-green'?",choices:["Red and green are opponents in the same channel, so only one can be signaled at a time","Green is always brighter than red","The eye contains no green cones","Red and green have identical wavelengths"],answer:0,rationale:"Red\u2013green is a single opponent channel, so the two can't be signaled together (no 'reddish-green'); blue and green are different channels, so 'bluish-green' is fine.",why:["Correct. Red and green form one opponent channel \u2014 signaling one suppresses the other \u2014 so reddish-green can't be perceived, while blue and green (different channels) can blend.","Relative brightness isn't why reddish-green is impossible.","The eye does have green-sensitive (medium-wavelength) cones.","Red and green have different wavelengths."],takeaway:"Opponent pairs (red\u2013green, blue\u2013yellow) can't co-occur \u2192 no 'reddish-green.' Cross-channel blends (bluish-green) are fine."},
  {tag:"What trichromatic can't explain",stem:"Trichromatic theory neatly explains color mixing but struggles with color afterimages. Which theory accounts for those?",choices:["Opponent-process theory","Signal detection theory","Place theory","Gestalt theory"],answer:0,rationale:"Trichromatic theory explains mixing; <b>opponent-process</b> explains afterimages and the absence of reddish-green \u2014 each covers what the other can't.",why:["Correct. Afterimages (and the impossibility of reddish-green) are explained by opponent-process theory.","Signal detection theory is about detecting signals in noise, not color coding.","Place theory concerns pitch perception in hearing, not color.","Gestalt theory concerns perceptual grouping, not color afterimages."],takeaway:"Trichromatic explains mixing; opponent-process explains afterimages. They're complementary."},
  {tag:"Reconciling the two theories",stem:"Modern vision science regards the trichromatic and opponent-process theories as:",choices:["Both correct, operating at different stages \u2014 trichromatic at the cones, opponent-process in later neural processing","Mutually exclusive, with only one being true","Both disproven by newer research","Identical restatements of the same idea"],answer:0,rationale:"Not either/or: <b>trichromatic</b> processing happens at the cones, <b>opponent-process</b> coding happens in later neural stages. Together they explain color vision.",why:["Correct. Trichromatic processing occurs at the cone (receptor) level; opponent-process coding occurs downstream in ganglion cells and the brain. Together they explain color vision.","They're complementary, not mutually exclusive.","Both remain well-supported, describing different stages.","They describe different mechanisms at different stages, not the same idea."],takeaway:"Trichromatic (at the cones) + opponent-process (later neural stages) together explain color vision. Both are right."}
 ]},
{id:"ps-6a-cascade",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Vision",categoryCode:"6A",idea:"Phototransduction cascade (molecular)",
 questions:[
  {tag:"Retinal isomerization",stem:"When a photon strikes rhodopsin in a rod, the retinal molecule it contains switches from its 11-cis (bent) form to its all-trans (straight) form. This conformational change:",choices:["Directly opens the rod's sodium channels","Activates rhodopsin and triggers the phototransduction cascade","Immediately releases neurotransmitter from the rod","Regenerates fresh rhodopsin"],answer:1,rationale:"Light isomerizes <b>11-cis retinal \u2192 all-trans retinal</b>, changing rhodopsin's shape and kicking off the phototransduction cascade.",why:["The channels are gated by cGMP downstream, not opened directly by retinal's shape change.","Correct. Light isomerizes 11-cis retinal to all-trans, changing rhodopsin's shape and starting the cascade (activating transducin).","Light actually decreases neurotransmitter release; it isn't the immediate result of isomerization.","Regeneration of rhodopsin happens later, during recovery, not at activation."],takeaway:"Light bends retinal from 11-cis to all-trans \u2192 activates rhodopsin \u2192 starts the cascade."},
  {tag:"Cascade sequence",stem:"Which sequence correctly orders the phototransduction cascade after light activates rhodopsin?",choices:["Rhodopsin \u2192 transducin (G protein) \u2192 phosphodiesterase (PDE) \u2192 cGMP broken down","cGMP broken down \u2192 PDE \u2192 transducin \u2192 rhodopsin","Rhodopsin \u2192 PDE \u2192 transducin \u2192 cGMP made","Transducin \u2192 rhodopsin \u2192 cGMP \u2192 PDE"],answer:0,rationale:"Cascade order: <b>rhodopsin \u2192 transducin \u2192 PDE \u2192 cGMP hydrolyzed</b> (cGMP levels fall).",why:["Correct. Activated rhodopsin activates transducin, whose alpha subunit activates PDE, which hydrolyzes (breaks down) cGMP.","This is reversed \u2014 rhodopsin is the start, cGMP breakdown the end.","Transducin comes before PDE, and cGMP is broken down (not made).","Rhodopsin is activated first, before transducin."],takeaway:"Rhodopsin \u2192 transducin (G protein) \u2192 PDE \u2192 cGMP broken down."},
  {tag:"cGMP in the dark",stem:"In the dark, cGMP levels inside a rod are high. What does this cGMP do?",choices:["Keeps cGMP-gated Na\u207a channels open, so the rod stays depolarized ('on')","Closes the Na\u207a channels, hyperpolarizing the rod","Isomerizes retinal to all-trans","Regenerates rhodopsin"],answer:0,rationale:"In the <b>dark</b>: high cGMP holds Na\u207a channels open \u2192 rod depolarized ('on'), releasing glutamate (the 'dark current').",why:["Correct. High cGMP holds the Na\u207a channels open \u2192 Na\u207a influx \u2192 the rod is depolarized ('dark current'), releasing glutamate.","Closing channels/hyperpolarization happens in the light, when cGMP falls \u2014 the opposite.","Retinal isomerization is triggered by light, not by cGMP.","cGMP doesn't regenerate rhodopsin."],takeaway:"Dark = high cGMP \u2192 Na\u207a channels OPEN \u2192 rod depolarized ('on'), releasing glutamate."},
  {tag:"Light \u2192 hyperpolarization",stem:"When light activates the cascade and PDE lowers cGMP, the rod responds by:",choices:["Closing its Na\u207a channels, hyperpolarizing, and turning 'off'","Opening more Na\u207a channels and depolarizing","Firing a large action potential","Releasing more glutamate than in the dark"],answer:0,rationale:"Light \u2192 PDE lowers cGMP \u2192 Na\u207a channels <b>close</b> \u2192 rod <b>hyperpolarizes</b> ('off') \u2192 less glutamate.",why:["Correct. Less cGMP \u2192 Na\u207a channels close \u2192 less Na\u207a enters \u2192 the rod hyperpolarizes ('off') and releases less glutamate.","Channels close (not open) as cGMP falls; the rod hyperpolarizes.","Photoreceptors don't fire classic action potentials; they hyperpolarize gradually.","Light decreases glutamate release \u2014 more is released in the dark."],takeaway:"Light \u2192 cGMP falls \u2192 Na\u207a channels close \u2192 hyperpolarize ('off'). Dark is the reverse."},
  {tag:"Transducin",stem:"Transducin, which links activated rhodopsin to PDE in the cascade, is a:",choices:["An ion channel that lets Na\u207a into the rod","G protein made of alpha, beta, and gamma subunits, whose alpha subunit activates PDE","A neurotransmitter released onto bipolar cells","The photopigment itself"],answer:1,rationale:"<b>Transducin</b> is the G protein (alpha/beta/gamma) coupling rhodopsin to PDE \u2014 its alpha subunit activates PDE.",why:["Transducin is a signaling G protein, not an ion channel.","Correct. Transducin is a heterotrimeric G protein; light-activated rhodopsin frees its alpha subunit to activate PDE.","It's an intracellular G protein, not a neurotransmitter.","The photopigment is rhodopsin; transducin is downstream of it."],takeaway:"Transducin = G protein (alpha/beta/gamma). Its alpha subunit activates PDE."},
  {tag:"Rhodopsin vs. photopsin",stem:"Rhodopsin, the light-sensitive pigment of rods, is the protein opsin bound to retinal. The analogous pigment in cones is called:",choices:["Photopsin","Transducin","cGMP","Melanin"],answer:0,rationale:"Rods = <b>rhodopsin</b>; cones = <b>photopsin</b> (three types). Both are opsin + retinal.",why:["Correct. Rods use rhodopsin; cones use photopsins (three types, for color). Both are opsin + retinal.","Transducin is the G protein in the cascade, not the cone pigment.","cGMP is the second messenger, not a photopigment.","Melanin is a pigment in the choroid/iris, not the cone photopigment."],takeaway:"Rods use rhodopsin; cones use photopsin (3 types for color)."},
  {tag:"Photopic / scotopic / mesopic",stem:"Vision in very low light (e.g., a moonless night), mediated mainly by rods, is termed:",choices:["Scotopic vision","Photopic vision","Mesopic vision","Myopic vision"],answer:0,rationale:"<b>Scotopic</b> = very low light (rods); <b>photopic</b> = bright (cones); <b>mesopic</b> = dawn/dusk (both).",why:["Correct. Scotopic = very low light (rods); photopic = bright light (cones); mesopic = intermediate (dawn/dusk, both).","Photopic vision is bright-light, cone-driven vision.","Mesopic vision is dawn/dusk light, using both rods and cones.","Myopic means nearsighted \u2014 unrelated to light level."],takeaway:"Scotopic = dim (rods), photopic = bright (cones), mesopic = dawn/dusk (both)."},
  {tag:"Net effect on glutamate",stem:"Because light turns a photoreceptor 'off' (hyperpolarizes it), light causes the photoreceptor to release:",choices:["Less neurotransmitter (glutamate) than it does in darkness","More glutamate than in darkness","The same amount regardless of light","Glutamate only in bright light"],answer:0,rationale:"Light hyperpolarizes the photoreceptor \u2192 <b>less glutamate</b>. In the dark it's depolarized \u2192 more glutamate.",why:["Correct. Photoreceptors release glutamate steadily in the dark; light hyperpolarizes them, reducing release \u2014 the signal the retina reads.","Light decreases, not increases, glutamate release.","Release changes with light \u2014 more in dark, less in light.","Glutamate is released most in the dark, not in bright light."],takeaway:"Light \u2192 hyperpolarize \u2192 LESS glutamate. Dark \u2192 depolarized \u2192 MORE glutamate."}
 ]},
{id:"ps-6a-rods-cones",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Vision",categoryCode:"6A",idea:"Rods vs. cones & retinal distribution",
 questions:[
  {tag:"More rods than cones",stem:"The human retina has roughly 20 times more of one photoreceptor than the other. Which is more numerous, and what does it suit?",choices:["Rods (~120 million) \u2014 suited to dim-light, peripheral, black-and-white vision","Cones (~120 million) \u2014 suited to color and fine detail","They are present in equal numbers","Rods (~120 million) \u2014 suited to color vision"],answer:0,rationale:"~<b>120 million rods</b> (dim light, periphery, B/W) vs. ~<b>6 million cones</b> (color, detail, fovea) \u2014 about 20:1.",why:["Correct. Rods (~120 million) vastly outnumber cones (~6 million), fitting dim-light peripheral (black-and-white) vision.","Rods, not cones, are the ~120 million; cones number ~6 million.","They are not equal \u2014 rods outnumber cones ~20:1.","Rods handle dim-light black-and-white vision, not color."],takeaway:"~120M rods (dim/periphery/B&W) vs. ~6M cones (color/detail/fovea). Rods win ~20:1."},
  {tag:"Rod sensitivity",stem:"Rods are roughly 1000\u00d7 more sensitive to light than cones. This makes rods most important for:",choices:["Detecting whether any light is present, especially in dim conditions","Distinguishing fine colors","Resolving fine detail","Seeing in bright daylight"],answer:0,rationale:"Rods are ~1000\u00d7 more light-sensitive than cones \u2192 best for detecting faint light / dim-condition vision. Cones = color + detail.",why:["Correct. Rods' extreme sensitivity makes them the receptors for detecting faint light and dim-condition (night) vision.","Rods can't distinguish color \u2014 that's the cones' job.","Fine detail (acuity) is a cone strength, tied to the fovea.","Bright daylight is cone (photopic) vision; rods saturate in bright light."],takeaway:"Rods ~1000\u00d7 more sensitive \u2192 detect faint light (night, B&W). Cones = color + fine detail."},
  {tag:"Photopigments",stem:"Rods and cones use different photopigments. Rods contain rhodopsin; cones contain:",choices:["Photopsin","Rhodopsin as well","Transducin","Only retinal, with no opsin"],answer:0,rationale:"Rods = rhodopsin; cones = <b>photopsin</b> (three types for color). Both are opsin + retinal.",why:["Correct. Rods use rhodopsin; cones use photopsins (three types), each opsin bound to retinal.","Rhodopsin is specifically the rod pigment; cones use photopsin.","Transducin is the cascade G protein, not a photopigment.","Cone pigments are opsin (photopsin) bound to retinal, not retinal alone."],takeaway:"Rods = rhodopsin. Cones = photopsin (3 types)."},
  {tag:"Recovery time",stem:"After a bright flash, one photoreceptor type recovers and can fire again quickly, while the other is slow to reactivate. Which recovers faster?",choices:["Cones recover fast; rods recover slowly","Rods recover fast; cones recover slowly","Both recover equally fast","Neither ever recovers"],answer:0,rationale:"<b>Cones recover fast</b> (rapid re-firing, quick adaptation); <b>rods recover slowly</b> (need reactivation).",why:["Correct. Cones adapt and recover quickly (firing frequently); rods are slow to reactivate \u2014 part of why cones handle fast, bright, detailed vision.","Reversed \u2014 cones are the fast ones; rods are slow to recover.","They differ markedly: cones fast, rods slow.","Both recover; they just do so at very different rates."],takeaway:"Cones = fast recovery (bright, detail, motion). Rods = slow recovery."},
  {tag:"Cone types",stem:"Human color vision uses three cone types. Their approximate proportions in the retina are:",choices:["~60% red (long), ~30% green (medium), ~10% blue (short)","~33% each","~10% red, ~30% green, ~60% blue","~90% blue, ~10% red"],answer:0,rationale:"Three cone types: ~<b>60% red, ~30% green, ~10% blue</b>. Red-sensitive cones are most numerous, blue least.",why:["Correct. The three cone types are unevenly distributed \u2014 roughly 60% red, 30% green, 10% blue.","The three types are not equal in number.","Reversed \u2014 red cones are the most common, blue the least.","Blue cones are the least common (~10%), not the majority."],takeaway:"Cone proportions: ~60% red, ~30% green, ~10% blue."},
  {tag:"Distribution across the retina",stem:"Across the retina, rods and cones are distributed such that:",choices:["Cones are concentrated in the fovea; rods dominate the periphery","Rods are concentrated in the fovea; cones dominate the periphery","Both are spread uniformly everywhere","Rods are found only in the fovea"],answer:0,rationale:"Cones \u2192 concentrated in the <b>fovea</b> (detail/color). Rods \u2192 dominate the <b>periphery</b> (dim light, motion).",why:["Correct. Cones pack into the fovea (detail/color); rods dominate the periphery (dim light, motion).","Reversed \u2014 cones are foveal, rods peripheral.","Distribution is uneven, not uniform.","Rods are found mostly in the periphery, not the fovea."],takeaway:"Cones = fovea (detail/color). Rods = periphery (dim light, motion)."},
  {tag:"Why the fovea is sharpest",stem:"The fovea gives the sharpest vision partly because light there reaches the photoreceptors directly rather than passing through overlying neural layers. This is because the fovea is:",choices:["A pit (dimple) where the overlying cells and axons are displaced, so light hits the cones directly","Covered by an extra-thick layer of axons","Packed with rods rather than cones","The point where the optic nerve exits"],answer:0,rationale:"The fovea is a <b>pit</b> where overlying cells/axons are pushed aside, so light hits the cone-packed floor directly \u2192 sharpest vision. (At the periphery, light passes through axon layers first.)",why:["Correct. The fovea is a depression where inner retinal layers are pushed aside, so light strikes the densely packed cones with minimal scattering \u2014 maximal acuity.","The opposite \u2014 overlying layers are displaced at the fovea, not thickened.","The fovea is cone-packed, not rod-packed.","That describes the optic disc (blind spot), not the fovea."],takeaway:"Fovea = a dimple where light hits cones directly (no overlying axons) \u2192 highest acuity."},
  {tag:"Averted vision",stem:"An astronomer sees a very faint star more easily when looking slightly to the side of it rather than directly at it. This 'averted vision' works because:",choices:["Looking to the side places the star's image on the rod-rich periphery, which is far more light-sensitive than the cone-packed fovea","The fovea is the most light-sensitive region","Cones detect dim light better than rods","It moves the image onto the blind spot"],answer:0,rationale:"<b>Averted vision</b>: looking slightly away images a faint object on the rod-rich, highly sensitive periphery \u2014 the cone-packed fovea is poor in dim light.",why:["Correct. The fovea (cones) is poor in dim light; shifting the faint image onto the sensitive peripheral rods makes it easier to detect.","The fovea (cones) is actually poor in dim light \u2014 that's why you look away from it.","Rods, not cones, are the dim-light detectors.","Imaging onto the blind spot would make the star vanish, not appear."],takeaway:"Averted vision: look slightly away to use the rod-rich periphery for faint objects. Fovea (cones) is weak in dim light."}
 ]},
{id:"ps-6a-optic-chiasm",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Vision",categoryCode:"6A",idea:"Visual pathway & the optic chiasm",
 questions:[
  {tag:"Contralateral processing",stem:"Visual information from your right visual field is ultimately processed in which hemisphere of your brain?",choices:["The left hemisphere","The right hemisphere","Both hemispheres equally","Neither \u2014 it stays in the eye"],answer:0,rationale:"Each visual field projects to the <b>opposite</b> hemisphere: right field \u2192 left brain, left field \u2192 right brain.",why:["Correct. The right visual field projects to the left hemisphere (and the left field to the right hemisphere).","The right field goes to the LEFT hemisphere, not the right.","Each visual field is routed to one (contralateral) hemisphere, not both equally.","Visual information is processed in the brain, not the eye."],takeaway:"Right visual field \u2192 LEFT brain; left visual field \u2192 RIGHT brain (contralateral)."},
  {tag:"Naming the crossover",stem:"The structure where the optic nerves meet and some of their fibers cross to the opposite side of the brain is the:",choices:["Optic chiasm","Optic disc","Fovea","Corpus callosum"],answer:0,rationale:"The <b>optic chiasm</b> is where the optic nerves partially cross en route to the brain.",why:["Correct. The optic chiasm is where the optic nerves partially cross (decussate).","The optic disc is the blind spot where the nerve exits one eye, not the crossover.","The fovea is the cone-rich region of sharpest vision, not a crossing point.","The corpus callosum connects the two hemispheres, but isn't the visual crossover."],takeaway:"Optic chiasm = where optic nerve fibers partially cross."},
  {tag:"Which fibers cross",stem:"At the optic chiasm, which retinal fibers cross to the opposite side of the brain?",choices:["The nasal fibers cross; the temporal fibers do not","The temporal fibers cross; the nasal fibers do not","All fibers cross","No fibers cross"],answer:0,rationale:"At the chiasm, <b>nasal fibers cross</b>, <b>temporal fibers stay</b> \u2014 routing each visual field to the contralateral hemisphere.",why:["Correct. Nasal (medial) retinal fibers decussate at the chiasm; temporal (lateral) fibers stay on the same side.","Reversed \u2014 nasal fibers cross, temporal fibers stay ipsilateral.","Only the nasal fibers cross; the temporal ones don't.","The nasal fibers do cross \u2014 that's what routes each field to the opposite hemisphere."],takeaway:"Optic chiasm: nasal fibers CROSS, temporal fibers DON'T."},
  {tag:"Where the left field lands",stem:"Light from the left visual field falls on which parts of the two retinas?",choices:["The nasal retina of the left eye and the temporal retina of the right eye","The temporal retina of the left eye and the nasal retina of the right eye","The nasal retina of both eyes","The temporal retina of both eyes"],answer:0,rationale:"The inverting lens sends the <b>left</b> visual field to the <b>nasal</b> retina of the left eye and the <b>temporal</b> retina of the right eye \u2014 both then routed to the right hemisphere.",why:["Correct. Because the lens inverts the image, the left field projects to the nasal half of the left eye and the temporal half of the right eye.","Reversed for each eye \u2014 the left field hits nasal-left and temporal-right.","It hits nasal on the left eye but temporal (not nasal) on the right eye.","It hits temporal on the right eye but nasal (not temporal) on the left eye."],takeaway:"Left field \u2192 nasal retina (left eye) + temporal retina (right eye) \u2192 right hemisphere."},
  {tag:"Chiasm lesion \u00b7 pituitary tumor",stem:"A pituitary tumor presses on the center of the optic chiasm, damaging the crossing fibers. The patient will most likely lose:",choices:["Peripheral (temporal) vision in both eyes \u2014 bitemporal vision loss","All vision in the left eye only","Central vision in both eyes","No vision at all"],answer:0,rationale:"Midline chiasm damage hits the crossing <b>nasal fibers</b>, which carry the <b>temporal (peripheral) fields</b> \u2192 bitemporal hemianopia ('tunnel vision'). Classic pituitary tumor sign.",why:["Correct. The crossing (nasal) fibers carry the temporal visual fields; midline chiasm damage produces bitemporal hemianopia \u2014 the classic pituitary-tumor finding.","A single-eye total loss points to an optic-nerve lesion (before the chiasm), not the midline chiasm.","Central vision loss isn't the chiasm pattern; the crossing fibers carry peripheral (temporal) fields.","Damaging the crossing fibers does cause a specific field loss."],takeaway:"Midline chiasm lesion (pituitary tumor) \u2192 crossing nasal fibers hit \u2192 loss of both TEMPORAL fields (bitemporal hemianopia)."},
  {tag:"Crossed organization",stem:"The routing of each visual field to the opposite hemisphere is one example of the nervous system's general pattern of:",choices:["Contralateral organization \u2014 each hemisphere handles the opposite side","Ipsilateral organization \u2014 each hemisphere handles the same side","Random wiring with no side preference","Bilateral duplication of all input"],answer:0,rationale:"Vision (like motor control) is <b>contralateral</b>: each hemisphere handles the opposite side / opposite visual field.",why:["Correct. Like motor and much of somatosensation, vision is organized contralaterally \u2014 each hemisphere serves the opposite side.","Ipsilateral (same-side) is the opposite of how vision and motor control are organized.","The wiring is highly organized, not random.","Each field goes to one hemisphere, not duplicated to both."],takeaway:"Contralateral organization: each hemisphere handles the opposite side (vision, movement)."},
  {tag:"After the chiasm",stem:"After the partial crossing at the optic chiasm, the fibers continue as the optic tracts. Each optic tract therefore carries:",choices:["One entire visual field \u2014 e.g., the left tract carries the right visual field from both eyes","Information from one eye only","Both complete visual fields","No visual information"],answer:0,rationale:"After the chiasm, each <b>optic tract</b> carries the complete <b>contralateral visual field</b> (combining fibers from both eyes).",why:["Correct. Post-chiasm, each tract combines the right fibers from both eyes to carry the full contralateral visual field to that hemisphere.","Each tract carries input from both eyes (one visual field), not one eye.","Each tract carries one visual field (the contralateral one), not both.","The tracts carry the visual information onward to the brain."],takeaway:"Post-chiasm: each optic tract = one whole (opposite) visual field, from both eyes."}
 ]},
{id:"ps-6a-feature-detection",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Vision",categoryCode:"6A",idea:"Feature detection & parallel processing",
 questions:[
  {tag:"The three features",stem:"In feature detection, the visual system breaks an object down into which three key features to make sense of it?",choices:["Color, form (shape), and motion","Color, size, and distance","Brightness, hue, and contrast","Shape, smell, and sound"],answer:0,rationale:"Feature detection breaks an object into three features: <b>color, form, and motion</b>.",why:["Correct. The visual system analyzes color, form (shape/boundaries), and motion.","Size and distance are depth cues, not the three feature-detection channels.","These are all attributes of light/color, not the three feature channels.","Smell and sound aren't visual features."],takeaway:"Feature detection = color + form (shape) + motion."},
  {tag:"Parvocellular pathway",stem:"The parvocellular pathway has high spatial resolution and detects fine detail, shape/boundaries, and color, but cannot detect motion well. It is specialized for:",choices:["Form and color (stationary detail)","Motion","Dim-light detection","Sound localization"],answer:0,rationale:"<b>Parvocellular</b> = form, shape/boundaries, and color; high <b>spatial</b> resolution, poor motion. (Mnemonic: <i>Pink Pyramid</i> \u2192 Parvo/form.)",why:["Correct. The parvocellular ('P') pathway handles form/shape, boundaries, and color with high spatial resolution \u2014 but poor motion (temporal) resolution.","Motion is the magnocellular pathway's specialty, not parvocellular.","Dim-light detection is a rod/scotopic function, not the parvocellular pathway's role.","Sound is auditory, not visual."],takeaway:"Parvocellular = form + color, high SPATIAL resolution (detail), poor at motion."},
  {tag:"Magnocellular pathway",stem:"The magnocellular pathway has high temporal resolution but poor spatial resolution and no color. It is specialized for detecting:",choices:["Motion","Color","Fine shape detail","Static form"],answer:0,rationale:"<b>Magnocellular</b> = motion; high <b>temporal</b> resolution, poor spatial resolution, no color. (Mnemonic: <i>Motion \u2192 Magno</i>.)",why:["Correct. The magnocellular ('M') pathway detects motion with high temporal resolution, but is colorblind and low in spatial detail.","Color is handled by the parvocellular pathway.","Fine detail is a parvocellular (high spatial resolution) strength.","Static form is parvocellular; magnocellular is tuned to change/motion."],takeaway:"Magnocellular = motion, high TEMPORAL resolution, poor spatial detail, no color."},
  {tag:"Parvo vs. magno",stem:"Which correctly contrasts the two feature-detection pathways?",choices:["Parvocellular = high spatial resolution (detail, color); magnocellular = high temporal resolution (motion)","Parvocellular = motion; magnocellular = color and detail","Both have high spatial resolution","Both are specialized for motion"],answer:0,rationale:"<b>Parvo</b> = high spatial resolution (detail + color). <b>Magno</b> = high temporal resolution (motion).",why:["Correct. Parvocellular = spatial detail and color; magnocellular = temporal resolution and motion.","Reversed \u2014 parvo does detail/color, magno does motion.","Only parvocellular has high spatial resolution; magno is poor at it.","Only magnocellular is specialized for motion; parvo is for static detail."],takeaway:"Parvo = SPATIAL (form/color/detail). Magno = TEMPORAL (motion). Pink Pyramid = Parvo; Motion = Magno."},
  {tag:"Parallel processing",stem:"The brain analyzes an object's color, form, and motion simultaneously rather than one at a time. This simultaneous analysis is called:",choices:["Parallel processing","Serial processing","Bottom-up processing","Sensory transduction"],answer:0,rationale:"<b>Parallel processing</b>: the brain analyzes color, form, and motion <b>at the same time</b> (not one after another).",why:["Correct. Parallel processing is analyzing multiple features (color, form, motion) at the same time.","Serial processing would handle features one at a time \u2014 the opposite.","Bottom-up processing describes building perception from the stimulus, not simultaneity of feature channels.","Transduction is converting light into a neural signal, not simultaneous feature analysis."],takeaway:"Parallel processing = color, form, and motion analyzed simultaneously."},
  {tag:"Applied \u00b7 tracking motion",stem:"A goalkeeper tracking a fast-moving soccer ball relies most heavily on which visual pathway?",choices:["The magnocellular pathway (motion, high temporal resolution)","The parvocellular pathway (fine detail, color)","Neither pathway","The color pathway only"],answer:0,rationale:"Tracking fast motion \u2192 <b>magnocellular</b> pathway (high temporal resolution).",why:["Correct. Fast motion is the magnocellular pathway's job \u2014 high temporal resolution.","The parvocellular pathway handles static detail and color, not fast motion.","Tracking motion clearly uses a visual pathway \u2014 the magnocellular one.","Color detection isn't what's needed to track a moving ball's motion."],takeaway:"Fast motion \u2192 magnocellular pathway."},
