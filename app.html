  {tag:"Parvo vs. magno",stem:"Which correctly contrasts the two feature-detection pathways?",choices:["Parvocellular = high spatial resolution (detail, color); magnocellular = high temporal resolution (motion)","Parvocellular = motion; magnocellular = color and detail","Both have high spatial resolution","Both are specialized for motion"],answer:0,rationale:"<b>Parvo</b> = high spatial resolution (detail + color). <b>Magno</b> = high temporal resolution (motion).",why:["Correct. Parvocellular = spatial detail and color; magnocellular = temporal resolution and motion.","Reversed \u2014 parvo does detail/color, magno does motion.","Only parvocellular has high spatial resolution; magno is poor at it.","Only magnocellular is specialized for motion; parvo is for static detail."],takeaway:"Parvo = SPATIAL (form/color/detail). Magno = TEMPORAL (motion). Pink Pyramid = Parvo; Motion = Magno."},
  {tag:"Parallel processing",stem:"The brain analyzes an object's color, form, and motion simultaneously rather than one at a time. This simultaneous analysis is called:",choices:["Parallel processing","Serial processing","Bottom-up processing","Sensory transduction"],answer:0,rationale:"<b>Parallel processing</b>: the brain analyzes color, form, and motion <b>at the same time</b> (not one after another).",why:["Correct. Parallel processing is analyzing multiple features (color, form, motion) at the same time.","Serial processing would handle features one at a time \u2014 the opposite.","Bottom-up processing describes building perception from the stimulus, not simultaneity of feature channels.","Transduction is converting light into a neural signal, not simultaneous feature analysis."],takeaway:"Parallel processing = color, form, and motion analyzed simultaneously."},
  {tag:"Applied \u00b7 tracking motion",stem:"A goalkeeper tracking a fast-moving soccer ball relies most heavily on which visual pathway?",choices:["The magnocellular pathway (motion, high temporal resolution)","The parvocellular pathway (fine detail, color)","Neither pathway","The color pathway only"],answer:0,rationale:"Tracking fast motion \u2192 <b>magnocellular</b> pathway (high temporal resolution).",why:["Correct. Fast motion is the magnocellular pathway's job \u2014 high temporal resolution.","The parvocellular pathway handles static detail and color, not fast motion.","Tracking motion clearly uses a visual pathway \u2014 the magnocellular one.","Color detection isn't what's needed to track a moving ball's motion."],takeaway:"Fast motion \u2192 magnocellular pathway."},
  {tag:"Applied \u00b7 reading detail",stem:"Reading small print and distinguishing the precise shapes of letters relies most on which pathway?",choices:["The parvocellular pathway (fine detail, form, high spatial resolution)","The magnocellular pathway (motion)","The dim-light (rod) pathway","No pathway \u2014 it's automatic"],answer:0,rationale:"Fine detail and letter shape \u2192 <b>parvocellular</b> pathway (high spatial resolution).",why:["Correct. Fine spatial detail and form are parvocellular \u2014 high spatial resolution.","The magnocellular pathway is for motion, not fine static detail.","Reading fine print in normal light uses cones/parvocellular detail, not the dim-light rod system.","Reading recruits the parvocellular detail pathway."],takeaway:"Fine detail/shape \u2192 parvocellular pathway."}
 ]},
{id:"ps-6a-auditory-pathway",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Hearing",categoryCode:"6A",idea:"Auditory pathway & structure of the ear",
 questions:[
  {tag:"Outer ear \u00b7 pinna",stem:"Sound waves first reach the outer ear at which structure, which funnels them inward toward the auditory canal?",choices:["The tympanic membrane","The pinna (auricle)","The cochlea","The oval window"],answer:1,rationale:"Sound enters at the <b>pinna</b>, which funnels it into the auditory canal toward the eardrum.",why:["The tympanic membrane (eardrum) is reached after the auditory canal, not first.","Correct. The pinna is the visible outer ear that funnels sound into the auditory canal.","The cochlea is deep in the inner ear \u2014 the last stop, not the first.","The oval window is inside the middle/inner ear boundary, not the outer entry."],takeaway:"Sound path starts at the pinna (outer ear) \u2192 auditory canal \u2192 eardrum."},
  {tag:"Ossicle order",stem:"After the eardrum vibrates, three tiny bones transmit the vibration in which order?",choices:["Stapes \u2192 incus \u2192 malleus","Incus \u2192 malleus \u2192 stapes","Malleus \u2192 stapes \u2192 incus","Malleus \u2192 incus \u2192 stapes"],answer:3,rationale:"The ossicles vibrate in order: <b>malleus \u2192 incus \u2192 stapes</b> (MIS).",why:["Reversed \u2014 the malleus (attached to the eardrum) comes first, stapes last.","The malleus is first, not the incus.","The incus sits between the malleus and stapes, not last.","Correct. Malleus (hammer) \u2192 incus (anvil) \u2192 stapes (stirrup) \u2014 mnemonic MIS."],takeaway:"Ossicle order: Malleus \u2192 Incus \u2192 Stapes (MIS). The 3 smallest bones."},
  {tag:"The middle ear",stem:"The malleus, incus, and stapes \u2014 the three smallest bones in the body \u2014 are collectively called the ossicles and make up the:",choices:["Middle ear","Outer ear","Inner ear","Cochlea"],answer:0,rationale:"The three ossicles (malleus, incus, stapes) are the <b>middle ear</b>.",why:["Correct. The ossicles (malleus, incus, stapes) constitute the middle ear.","The outer ear runs from the pinna to the eardrum \u2014 no ossicles.","The inner ear is the cochlea and semicircular canals, not the ossicles.","The cochlea is an inner-ear structure, not the ossicles."],takeaway:"Ossicles = middle ear. Outer = pinna\u2192eardrum; inner = cochlea + semicircular canals."},
  {tag:"The eardrum",stem:"Sound funneled through the auditory canal strikes and vibrates which structure, setting the ossicles in motion?",choices:["The oval window","The basilar membrane","The tympanic membrane (eardrum)","The pinna"],answer:2,rationale:"The <b>tympanic membrane (eardrum)</b> vibrates from incoming sound and drives the ossicles.",why:["The oval window is driven later, by the stapes, not directly by the canal.","The basilar membrane is inside the cochlea, far downstream.","Correct. The tympanic membrane (eardrum) vibrates when sound reaches it, driving the malleus.","The pinna is the outer funnel, reached before the canal."],takeaway:"Auditory canal \u2192 tympanic membrane (eardrum) vibrates \u2192 ossicles."},
  {tag:"Oval window",stem:"The stapes transmits vibration into the fluid-filled cochlea by pushing on which membrane-covered opening?",choices:["The round window","The oval window","The tympanic membrane","The tectorial membrane"],answer:1,rationale:"The stapes vibrates the <b>oval window</b>, launching pressure waves through the cochlear fluid.",why:["The round window bulges out to relieve pressure; the stapes pushes the oval window.","Correct. The stapes presses on the oval window, sending pressure waves into the cochlear fluid.","The tympanic membrane is the eardrum, upstream of the ossicles.","The tectorial membrane is inside the organ of Corti, not where the stapes pushes."],takeaway:"Stapes \u2192 oval window \u2192 pressure waves in cochlear fluid."},
  {tag:"Round window",stem:"As pressure waves travel through the cochlea, the round window bulges outward. Its role is to:",choices:["Transduce sound into a neural signal","Amplify the incoming sound","Anchor the three ossicles","Relieve the pressure of the (incompressible) cochlear fluid, allowing the fluid to move"],answer:3,rationale:"The <b>round window</b> flexes outward to relieve pressure, allowing the incompressible cochlear fluid to move.",why:["Transduction is done by hair cells, not the round window.","Amplification is done by the ossicles/eardrum, not the round window.","The ossicles are anchored in the middle ear, not by the round window.","Correct. Since the cochlear fluid can't compress, the round window bulges out to accommodate the wave, letting fluid move."],takeaway:"Round window = pressure-relief valve so the incompressible cochlear fluid can move."},
  {tag:"Organ of Corti",stem:"Within the cochlea, the sound receptors that convert fluid vibration into neural signals are the hair cells of the:",choices:["Organ of Corti (on the basilar membrane)","Semicircular canals","Oval window","Tectorial membrane by itself"],answer:0,rationale:"The <b>organ of Corti</b> (on the basilar membrane) contains the hair cells that transduce sound into neural signals.",why:["Correct. The organ of Corti, sitting on the basilar membrane, holds the hair cells that transduce sound.","The semicircular canals are for balance (rotation), not hearing.","The oval window is a pressure entry point, not the receptor organ.","The tectorial membrane is one part of the organ of Corti, not the receptor by itself."],takeaway:"Hearing receptors = hair cells of the organ of Corti (on the basilar membrane)."},
  {tag:"Divisions of the ear",stem:"Which correctly matches an ear division to its components?",choices:["Middle ear = pinna and auditory canal","Outer ear = the three ossicles","Inner ear = cochlea and semicircular canals","Inner ear = the eardrum"],answer:2,rationale:"Outer = pinna\u2192eardrum; middle = ossicles; <b>inner = cochlea + semicircular canals</b>.",why:["The pinna and canal are the OUTER ear, not the middle.","The ossicles are the MIDDLE ear, not the outer.","Correct. The inner ear comprises the cochlea (hearing) and semicircular canals (balance).","The eardrum is the boundary of the outer/middle ear, not the inner ear."],takeaway:"Outer ear = pinna\u2192eardrum. Middle = ossicles. Inner = cochlea + semicircular canals."}
 ]},
{id:"ps-6a-cochlear-transduction",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Hearing",categoryCode:"6A",idea:"Cochlear transduction (hair cells)",
 questions:[
  {tag:"Stereocilia & tip links",stem:"In a cochlear hair cell, the fine projections (stereocilia) are joined near their tips by filaments called tip links. When the stereocilia bend, the tip links:",choices:["Release neurotransmitter directly onto the nerve","Stretch and pull open mechanically-gated ion channels","Regenerate the hair cell","Permanently block the channels"],answer:1,rationale:"Bending stereocilia stretches the <b>tip links</b>, mechanically opening ion channels \u2014 the first step of hearing transduction.",why:["Neurotransmitter release happens later, after depolarization \u2014 not directly by tip links.","Correct. Bending stretches the tip links, which mechanically pull open ion channels on the stereocilia.","Tip links don't regenerate the cell; they gate channels.","They open (not block) the channels when stretched."],takeaway:"Stereocilia bend \u2192 tip links stretch \u2192 mechanically-gated channels open."},
  {tag:"K\u207a flows IN",stem:"Cochlear hair cells sit in endolymph, an unusual fluid rich in K\u207a. When the channels open, K\u207a:",choices:["Flows out of the cell, hyperpolarizing it","Stays put; only Na\u207a moves","Is actively pumped out","Flows INTO the hair cell, depolarizing it"],answer:3,rationale:"The K\u207a-rich <b>endolymph</b> drives K\u207a <b>into</b> the hair cell when channels open, depolarizing it \u2014 unusual compared with typical neurons.",why:["In most neurons K\u207a leaving repolarizes/hyperpolarizes; here the unusual gradient drives K\u207a IN.","K\u207a is the key ion here, entering from the K\u207a-rich endolymph.","The channels let K\u207a in; it isn't pumped out during transduction.","Correct. Because endolymph is K\u207a-rich, opening the channels lets K\u207a flow INTO the cell, depolarizing it \u2014 opposite of a typical neuron."],takeaway:"Hair cells: endolymph is K\u207a-rich \u2192 K\u207a flows IN \u2192 depolarization (opposite of most neurons)."},
  {tag:"Then Ca\u00b2\u207a enters",stem:"After K\u207a entry depolarizes the hair cell, what happens next to trigger neurotransmitter release?",choices:["Voltage-gated Ca\u00b2\u207a channels open and Ca\u00b2\u207a enters the cell","K\u207a is pumped back out first","Na\u207a enters through rhodopsin","The cell hyperpolarizes and shuts down"],answer:0,rationale:"Depolarization \u2192 <b>voltage-gated Ca\u00b2\u207a channels open</b> \u2192 Ca\u00b2\u207a influx \u2192 neurotransmitter release.",why:["Correct. Depolarization opens voltage-gated Ca\u00b2\u207a channels; Ca\u00b2\u207a influx triggers neurotransmitter release.","Neurotransmitter release depends on Ca\u00b2\u207a entry, not K\u207a being pumped out first.","Rhodopsin is a visual pigment \u2014 irrelevant to hair cells.","Depolarization (not hyperpolarization) is what opens the Ca\u00b2\u207a channels."],takeaway:"K\u207a in \u2192 depolarize \u2192 Ca\u00b2\u207a in \u2192 neurotransmitter release."},
  {tag:"Spiral ganglion \u2192 auditory nerve",stem:"The hair cell's Ca\u00b2\u207a-triggered neurotransmitter release activates which neuron, whose axons form the auditory nerve?",choices:["The retinal ganglion cell","A bipolar cell of the retina","The spiral ganglion cell","A Golgi tendon organ"],answer:2,rationale:"Hair cells activate <b>spiral ganglion</b> neurons \u2192 their axons form the <b>auditory nerve</b> \u2192 brain.",why:["Retinal ganglion cells are in the eye, forming the optic nerve.","Retinal bipolar cells are in vision, not hearing.","Correct. Hair cells synapse onto spiral ganglion neurons, whose axons make up the auditory (cochlear) nerve.","Golgi tendon organs are proprioceptors in tendons, unrelated to hearing."],takeaway:"Hair cell \u2192 spiral ganglion cell \u2192 auditory nerve \u2192 brain."},
  {tag:"Order the steps",stem:"Put the cochlear transduction steps in order: (1) Ca\u00b2\u207a influx, (2) stereocilia bend, (3) K\u207a influx / depolarization, (4) neurotransmitter release to the auditory nerve.",choices:["3 \u2192 2 \u2192 1 \u2192 4","2 \u2192 3 \u2192 1 \u2192 4","2 \u2192 1 \u2192 3 \u2192 4","4 \u2192 1 \u2192 2 \u2192 3"],answer:1,rationale:"Order: <b>bend \u2192 K\u207a in (depolarize) \u2192 Ca\u00b2\u207a in \u2192 neurotransmitter release</b>.",why:["The stereocilia must bend before K\u207a can enter.","Correct. Stereocilia bend \u2192 K\u207a enters (depolarize) \u2192 Ca\u00b2\u207a enters \u2192 neurotransmitter release.","K\u207a entry/depolarization precedes Ca\u00b2\u207a entry, not the reverse.","Neurotransmitter release is the last step, not the first."],takeaway:"Hearing transduction: stereocilia bend \u2192 K\u207a in \u2192 Ca\u00b2\u207a in \u2192 transmitter release."},
  {tag:"Organ of Corti membranes",stem:"The hair cells that transduce sound sit within the organ of Corti, between which two structures?",choices:["The oval window and the round window","Two of the ossicles","The pinna and the eardrum","The basilar membrane and the tectorial membrane"],answer:3,rationale:"Hair cells sit between the <b>basilar membrane</b> (below) and <b>tectorial membrane</b> (above); their relative motion bends the stereocilia.",why:["The oval and round windows are pressure ports, not where hair cells sit.","The ossicles are middle-ear bones, not part of the organ of Corti.","The pinna and eardrum are outer/middle-ear structures.","Correct. Hair cells sit on the basilar membrane with their stereocilia contacting the tectorial membrane; relative movement bends them."],takeaway:"Organ of Corti: hair cells between basilar (below) and tectorial (above) membranes."},
  {tag:"Why it's unusual",stem:"Why is hair-cell depolarization by K\u207a influx considered unusual compared with a typical neuron?",choices:["In most neurons K\u207a leaving the cell repolarizes/hyperpolarizes it; here K\u207a enters and depolarizes","K\u207a never moves across neuronal membranes","It is exactly the same as in a typical neuron","Hair cells use only Na\u207a, never K\u207a"],answer:0,rationale:"Unusual: the K\u207a-rich endolymph makes K\u207a flow IN to depolarize the hair cell, whereas in most neurons K\u207a flowing OUT repolarizes.",why:["Correct. Normally K\u207a efflux repolarizes a neuron; the K\u207a-rich endolymph reverses the gradient so K\u207a influx depolarizes the hair cell.","K\u207a moves readily across neuronal membranes \u2014 that's central to signaling.","It's the opposite of a typical neuron, not the same.","Hair cells depend on K\u207a influx here, not Na\u207a only."],takeaway:"Hair cells depolarize via K\u207a IN (K\u207a-rich endolymph) \u2014 opposite of the usual K\u207a-out repolarization."}
 ]},
{id:"ps-6a-auditory-processing",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Hearing",categoryCode:"6A",idea:"Auditory processing: tonotopy & place theory",
 questions:[
  {tag:"Base vs. apex",stem:"High-frequency sounds maximally vibrate the basilar membrane at one end of the cochlea, low-frequency sounds at the other. Which is correct?",choices:["High frequencies at the apex; low frequencies at the base","High frequencies at the base (near the oval window); low frequencies at the apex","Both at the base","Both at the apex"],answer:1,rationale:"<b>Base</b> (stiff, narrow) = high frequencies; <b>apex</b> (wide, floppy) = low frequencies.",why:["Reversed \u2014 the base handles high frequencies, the apex low.","Correct. The stiff, narrow base responds to high frequencies; the floppy, wide apex responds to low frequencies (long-wavelength sounds travel farther to the apex).","High and low frequencies peak at different places, not both at the base.","They peak at different places, not both at the apex."],takeaway:"Cochlea tonotopy: base = high frequency, apex = low frequency."},
  {tag:"Place theory",stem:"The idea that we perceive a sound's pitch based on WHERE along the basilar membrane vibration peaks is called:",choices:["Frequency theory","Opponent-process theory","Signal detection theory","Place theory"],answer:3,rationale:"<b>Place theory</b>: pitch is coded by the <i>place</i> of peak vibration on the basilar membrane. Best for high frequencies.",why:["Frequency theory codes pitch by firing RATE, not location.","Opponent-process theory is about color vision.","Signal detection theory is about detecting signals in noise.","Correct. Place theory: pitch corresponds to the location of maximal basilar-membrane vibration."],takeaway:"Place theory = pitch by LOCATION of peak basilar-membrane vibration."},
  {tag:"Tonotopic mapping",stem:"The orderly mapping of sound frequencies to specific locations \u2014 along the basilar membrane and up into the auditory cortex \u2014 is called:",choices:["Tonotopic organization","Somatotopic organization","Retinotopic organization","Random organization"],answer:0,rationale:"<b>Tonotopic</b> organization: an orderly frequency-to-place map, preserved from the basilar membrane to the auditory cortex.",why:["Correct. Tonotopy is the frequency-to-place mapping preserved from cochlea to cortex.","Somatotopic maps the body surface (touch), not sound frequency.","Retinotopic maps the visual field, not sound.","The mapping is highly orderly, not random."],takeaway:"Tonotopy = orderly frequency\u2192place map, cochlea to cortex."},
  {tag:"Auditory cortex location",stem:"The primary auditory cortex, which receives this tonotopic input, is located in the:",choices:["Parietal lobe","Occipital lobe","Temporal lobe","Frontal lobe"],answer:2,rationale:"The primary <b>auditory cortex</b> is in the <b>temporal lobe</b>.",why:["The parietal lobe houses somatosensory cortex, not auditory.","The occipital lobe is visual cortex.","Correct. The primary auditory cortex sits in the temporal lobe (mnemonic: 'hear Time' \u2192 Temporal).","The frontal lobe handles motor/executive function, not primary hearing."],takeaway:"Primary auditory cortex = temporal lobe ('hear Time')."},
  {tag:"Place vs. frequency theory",stem:"Place theory explains high-frequency pitch well but struggles with very low frequencies. The theory that low-frequency pitch is coded by the RATE of neural firing matching the sound's frequency is:",choices:["Place theory","Frequency (temporal) theory","Trichromatic theory","Volley-only theory"],answer:1,rationale:"<b>Frequency (temporal) theory</b>: pitch coded by firing RATE \u2014 best for low frequencies. Place theory covers high frequencies; together they span the range.",why:["Place theory codes by location and struggles at low frequencies \u2014 the gap being filled here.","Correct. Frequency (temporal) theory codes low-frequency pitch by firing rate matching the sound frequency; place theory covers high frequencies.","Trichromatic theory is about color vision, not pitch.","The volley principle helps mid-range frequencies but isn't the named low-frequency rate theory."],takeaway:"Place theory (WHERE) = high freq; frequency theory (firing RATE) = low freq. Complementary."},
  {tag:"Cochlear implant \u00b7 purpose",stem:"A cochlear implant restores some hearing in sensorineural loss by:",choices:["Amplifying sound into the ear canal like a hearing aid","Replacing the eardrum","Regrowing the cochlea's hair cells","Bypassing damaged hair cells and directly stimulating the auditory nerve"],answer:3,rationale:"A <b>cochlear implant</b> bypasses damaged hair cells and stimulates the auditory nerve directly (requires an intact nerve). A hearing aid, by contrast, just amplifies sound.",why:["That describes a hearing aid; an implant bypasses the hair cells entirely.","Implants don't replace the eardrum; they stimulate the nerve.","Implants don't regrow hair cells; they substitute for them electrically.","Correct. Unlike a hearing aid (which amplifies sound), a cochlear implant bypasses damaged hair cells and electrically stimulates the auditory nerve directly."],takeaway:"Cochlear implant = bypass damaged hair cells, stimulate the auditory nerve directly. (Hearing aid = amplify sound.)"},
  {tag:"Cochlear implant \u00b7 signal chain",stem:"In a cochlear implant, the external microphone and speech processor pass information to an external transmitter, which sends it to an internal receiver/stimulator that then:",choices:["Sends electrical signals to electrodes in the cochlea, stimulating the auditory nerve","Vibrates the ossicles mechanically","Moves the eardrum back and forth","Amplifies air pressure in the canal"],answer:0,rationale:"Implant chain: mic \u2192 speech processor \u2192 transmitter (outside) \u2192 receiver/stimulator (inside) \u2192 <b>electrodes in cochlea \u2192 auditory nerve</b>.",why:["Correct. The internal stimulator drives electrodes threaded into the cochlea, electrically stimulating the auditory nerve.","The implant bypasses the ossicles rather than vibrating them.","It bypasses the eardrum entirely.","It doesn't amplify air pressure; it stimulates the nerve electrically."],takeaway:"Cochlear implant: mic \u2192 processor \u2192 transmitter \u2192 receiver/stimulator \u2192 cochlear electrodes \u2192 auditory nerve."},
  {tag:"Why we tell pitches apart",stem:"Humans hear roughly 20\u201320,000 Hz. Distinguishing a low-pitched drum from a high-pitched whistle depends most on:",choices:["All frequencies activating the same spot on the membrane","The pinna filtering out pitch","Different frequencies activating hair cells at different places along the basilar membrane","The number of ossicles involved"],answer:2,rationale:"We distinguish pitches because different frequencies peak at different <b>places</b> on the basilar membrane (tonotopy), preserved to the cortex.",why:["Different frequencies peak at different places, not the same spot.","The pinna funnels sound; it doesn't sort pitch.","Correct. Tonotopy \u2014 different frequencies peaking at different basilar-membrane locations \u2014 lets the brain distinguish pitches.","The ossicle count is fixed and doesn't encode pitch."],takeaway:"Pitch discrimination relies on tonotopy: frequency \u2192 place on the basilar membrane."}
 ]},
{id:"ps-6a-homunculus",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Somatosensation",categoryCode:"6A",idea:"Somatosensory homunculus",
 questions:[
  {tag:"What it is",stem:"The 'sensory homunculus' refers to:",choices:["A gland that secretes touch hormones","A topographic map of the body's surface represented across the somatosensory cortex","A single type of touch receptor","A reflex arc in the spinal cord"],answer:1,rationale:"The <b>sensory homunculus</b> is a topographic map of the body's surface across the somatosensory cortex.",why:["It's a cortical map, not a gland.","Correct. The sensory homunculus is a distorted body map laid out across the somatosensory cortex.","It's a whole cortical map, not one receptor type.","It's in the cortex, not a spinal reflex arc."],takeaway:"Sensory homunculus = a body map across the somatosensory cortex."},
  {tag:"Location",stem:"The somatosensory cortex containing the sensory homunculus is located in the:",choices:["Temporal lobe","Occipital lobe","Cerebellum","Parietal lobe (postcentral gyrus)"],answer:3,rationale:"The somatosensory cortex (sensory homunculus) is in the <b>postcentral gyrus of the parietal lobe</b>.",why:["The temporal lobe houses auditory cortex.","The occipital lobe is visual cortex.","The cerebellum coordinates movement/balance, not the somatosensory map.","Correct. The somatosensory cortex sits in the postcentral gyrus of the parietal lobe."],takeaway:"Sensory homunculus = postcentral gyrus, parietal lobe."},
  {tag:"Why it's distorted",stem:"The sensory homunculus is drawn with enormous hands and lips but a tiny torso. This distortion reflects that:",choices:["Body areas with more sensory receptors (greater sensitivity) occupy proportionally more cortex","Physically larger body parts always get more cortex","The map is drawn to true physical scale","Sensitivity is uniform across the body"],answer:0,rationale:"The homunculus is distorted because cortical space tracks <b>receptor density/sensitivity</b>, not body size \u2014 hands, lips, and face are magnified.",why:["Correct. Cortical area is allotted by receptor density/sensitivity, so hands, lips, and face dominate the map.","It's sensitivity/receptor density, not physical size, that determines cortical area.","The map is deliberately distorted, not to scale.","Sensitivity varies widely \u2014 that's why the map is distorted."],takeaway:"Homunculus distortion: more cortex for more sensitive areas (hands, lips, face), not bigger body parts."},
  {tag:"Somatotopic organization",stem:"Adjacent regions of the body tend to map to adjacent regions of the sensory cortex. This orderly body-to-cortex mapping is described as:",choices:["Tonotopic organization","Retinotopic organization","Somatotopic organization","Disorganized/random"],answer:2,rationale:"<b>Somatotopic</b> organization: the body surface maps in an orderly way onto the sensory cortex.",why:["Tonotopic maps sound frequency, not body surface.","Retinotopic maps the visual field.","Correct. Somatotopy is the orderly body-surface-to-cortex mapping.","The mapping is orderly, not random."],takeaway:"Somatotopy = orderly body\u2192cortex map (touch). (Tonotopy = sound; retinotopy = vision.)"},
  {tag:"Sensory vs. motor homunculus",stem:"The sensory homunculus lies in the postcentral gyrus (parietal lobe). A parallel MOTOR homunculus lies just across the central sulcus in the:",choices:["Occipital lobe","Precentral gyrus of the frontal lobe","Temporal lobe","Same postcentral gyrus"],answer:1,rationale:"Sensory homunculus = <b>postcentral</b> gyrus (parietal); motor homunculus = <b>precentral</b> gyrus (frontal), across the central sulcus.",why:["The occipital lobe is visual, with no motor homunculus.","Correct. The motor homunculus occupies the precentral gyrus of the frontal lobe, just anterior to the sensory strip.","The temporal lobe is auditory, not motor.","The motor map is in the precentral gyrus, not the postcentral (sensory) one."],takeaway:"Sensory = postcentral gyrus (parietal). Motor = precentral gyrus (frontal)."}
 ]},
{id:"ps-6a-proprioception",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Somatosensation",categoryCode:"6A",idea:"Proprioception & kinesthesia",
 questions:[
  {tag:"Proprioception",stem:"Walking across a dark room and touching your nose with your eyes closed relies on your sense of body position, called:",choices:["Kinesthesia","Proprioception","Nociception","Audition"],answer:1,rationale:"<b>Proprioception</b> = the sense of where the body/limbs are positioned in space (works with eyes closed).",why:["Kinesthesia is the sense of body movement, more than static position.","Correct. Proprioception is the sense of the body's position in space.","Nociception is pain.","Audition is hearing."],takeaway:"Proprioception = sense of body POSITION in space."},
  {tag:"Muscle spindle",stem:"Proprioceptive signals about muscle stretch and length come largely from receptors called:",choices:["Cochlear hair cells","Rods","Pacinian corpuscles (skin pressure)","Muscle spindles"],answer:3,rationale:"<b>Muscle spindles</b> (stretch receptors in muscle) supply proprioceptive information about muscle length.",why:["Cochlear hair cells are for hearing.","Rods are photoreceptors for dim-light vision.","Pacinian corpuscles detect skin pressure/vibration, not muscle stretch.","Correct. Muscle spindles are stretch receptors within muscle that report length/stretch for proprioception."],takeaway:"Muscle spindles = stretch receptors in muscle \u2192 proprioception (limb position)."},
  {tag:"Kinesthesia",stem:"The sense concerned specifically with the MOVEMENT of the body and limbs \u2014 more behavioral, refined through learning \u2014 is:",choices:["Kinesthesia","Proprioception (static position)","Equilibrioception","Gustation"],answer:0,rationale:"<b>Kinesthesia</b> = the sense of body/limb <b>movement</b> \u2014 more behavioral and learned than proprioception.",why:["Correct. Kinesthesia is the sense of body/limb movement (mnemonic: Kinetics = movement).","Proprioception emphasizes position; kinesthesia emphasizes movement.","Equilibrioception is the sense of balance (vestibular).","Gustation is taste."],takeaway:"Kinesthesia = sense of body MOVEMENT (learned, behavioral)."},
  {tag:"Proprioception vs. kinesthesia",stem:"Which best distinguishes proprioception from kinesthesia?",choices:["Proprioception = movement; kinesthesia = position","They are identical terms","Proprioception = sense of body POSITION (cognitive/subconscious); kinesthesia = sense of MOVEMENT (behavioral)","Proprioception is a form of hearing"],answer:2,rationale:"Proprioception = <b>position</b> (cognitive); kinesthesia = <b>movement</b> (behavioral). Both track the body in space.",why:["Reversed \u2014 proprioception is position, kinesthesia is movement.","They overlap but aren't identical: position vs. movement.","Correct. Proprioception emphasizes static position (cognitive), kinesthesia emphasizes movement (behavioral) \u2014 both tell you where your body is in space.","Proprioception is a body-position sense, not hearing."],takeaway:"Proprioception = POSITION (cognitive). Kinesthesia = MOVEMENT (behavioral)."},
  {tag:"Applied \u00b7 holding a pose",stem:"A gymnast holding a still, balanced pose with eyes closed is relying most on:",choices:["Kinesthesia (movement sense)","Proprioception (position sense)","Audition","Place theory"],answer:1,rationale:"Holding a still pose = knowing where your body is = <b>proprioception</b>.",why:["Kinesthesia is about movement; the pose is held still.","Correct. A static, balanced pose is about knowing body position \u2014 proprioception.","Audition is hearing, not body position.","Place theory concerns pitch perception in hearing."],takeaway:"Static balanced pose \u2192 proprioception (position)."},
  {tag:"Applied \u00b7 refining a swing",stem:"A batter adjusting the path of a swing to connect with a pitch \u2014 'if I move this way, I'll hit it' \u2014 draws on:",choices:["Proprioception only (static position)","Nociception","The vestibular otoliths alone","Kinesthesia (the learned sense of body movement)"],answer:3,rationale:"Refining a learned movement toward a goal = <b>kinesthesia</b> (behavioral movement sense).",why:["Static position sense (proprioception) doesn't capture the learned, adjusted movement.","Nociception is pain, unrelated.","The otoliths sense head linear acceleration, not a learned swing.","Correct. Refining a learned movement to accomplish a task is kinesthesia \u2014 the behavioral movement sense."],takeaway:"Adjusting a learned movement to hit a target \u2192 kinesthesia (movement)."}
 ]},
{id:"ps-6a-pain-temperature",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Somatosensation",categoryCode:"6A",idea:"Pain & temperature (nociception)",
 questions:[
  {tag:"Nociception & thermoception",stem:"The ability to sense pain and the ability to sense temperature are called, respectively:",choices:["Thermoception and nociception","Proprioception and nociception","Nociception and thermoception","Mechanoreception and nociception"],answer:2,rationale:"<b>Nociception</b> = pain; <b>thermoception</b> = temperature. Both are comparatively slow.",why:["Reversed \u2014 pain is nociception, temperature is thermoception.","Proprioception is body position, not pain.","Correct. Pain = nociception; temperature = thermoception. Both are relatively slow senses.","Mechanoreception is pressure/touch, not temperature."],takeaway:"Pain = nociception; temperature = thermoception (both slow)."},
  {tag:"The TrpV1 receptor",stem:"Which receptor detects heat and is also activated by painful stimuli and by capsaicin (the compound in chili peppers)?",choices:["The TrpV1 receptor","The TrkB receptor","A muscle spindle","A Pacinian corpuscle"],answer:0,rationale:"<b>TrpV1</b> detects heat and painful stimuli; capsaicin binds it (why chili feels hot). Heat causes a conformational change that activates the cell.",why:["Correct. TrpV1 senses heat and noxious stimuli, and capsaicin binds it \u2014 which is why chili peppers feel 'hot.'","TrkB is a neurotrophin receptor (BDNF), unrelated to heat/pain sensing.","Muscle spindles sense stretch (proprioception), not heat/pain.","Pacinian corpuscles sense pressure/vibration, not heat."],takeaway:"TrpV1 = heat + pain receptor; capsaicin binds it (why peppers feel hot)."},
  {tag:"Why chili feels hot",stem:"Capsaicin from chili peppers makes your mouth feel like it is burning because it:",choices:["Physically raises the temperature of your tongue","Damages the taste buds","Activates cold receptors","Binds the TrpV1 receptor and triggers the same response as actual heat"],answer:3,rationale:"Capsaicin binds <b>TrpV1</b> and triggers the heat/pain response without any real temperature change \u2014 the tongue only feels like it's burning.",why:["Capsaicin doesn't actually heat the tissue; it hijacks the heat receptor.","It creates a burning sensation via TrpV1, not by damaging taste buds.","It activates the heat receptor (TrpV1), not cold receptors.","Correct. Capsaicin binds TrpV1 \u2014 the heat receptor \u2014 so the brain interprets it as burning heat, though no real temperature change occurs."],takeaway:"Capsaicin binds TrpV1 (the heat receptor) \u2192 'burning' feeling with no real heat."},
  {tag:"Nerve fiber types",stem:"Pain and temperature travel on three fiber types. Which correctly ranks conduction speed?",choices:["C > A-delta > A-beta","A-beta (fast, thick, myelinated) > A-delta (medium) > C (slow, unmyelinated)","A-delta > A-beta > C","All three conduct at the same speed"],answer:1,rationale:"Speed: <b>A-beta > A-delta > C</b>. Thicker + more myelin = faster conduction.",why:["Reversed \u2014 unmyelinated C fibers are slowest, not fastest.","Correct. A-beta fibers are thick and myelinated (fastest); A-delta are thinner with less myelin; C fibers are thin and unmyelinated (slowest).","A-beta (thick, myelinated) is faster than A-delta.","They differ greatly in speed based on diameter and myelination."],takeaway:"Fiber speed: A-beta (fast, myelinated) > A-delta > C (slow, unmyelinated)."},
  {tag:"C fibers",stem:"The slow, lingering, dull quality of pain that persists after an injury is carried mainly by:",choices:["A-beta fibers (thick, myelinated)","Muscle spindles","C fibers (small diameter, unmyelinated)","Cochlear hair cells"],answer:2,rationale:"<b>C fibers</b> (unmyelinated, slow) carry the dull, lingering pain that lingers after the initial sharp sensation.",why:["A-beta fibers are fast and carry touch/pressure, not lingering pain.","Muscle spindles are proprioceptors, not pain fibers.","Correct. Unmyelinated C fibers conduct slowly, producing the dull, lingering 'second' pain.","Cochlear hair cells are for hearing."],takeaway:"C fibers = slow, unmyelinated \u2192 dull, lingering pain."},
  {tag:"Myelin & speed",stem:"A-beta fibers conduct faster than C fibers largely because A-beta fibers are:",choices:["Thicker and myelinated, giving less resistance and higher conduction velocity","Thinner and unmyelinated","Located only in the brain","Chemical rather than electrical"],answer:0,rationale:"Myelination + larger diameter \u2192 faster conduction. A-beta (thick, myelinated) beats C (thin, unmyelinated).",why:["Correct. Myelination and larger diameter speed conduction (saltatory conduction, lower resistance).","That describes C fibers \u2014 the slow ones.","These are peripheral sensory fibers, not brain-only.","Nerve conduction is electrical; myelin speeds it."],takeaway:"More myelin + bigger diameter = faster conduction (A-beta fast, C slow)."},
  {tag:"Gate control theory",stem:"Rubbing a bumped elbow makes the pain feel better. The gate control theory of pain explains this by proposing that:",choices:["Rubbing physically removes the injury","Pain signals travel faster than touch signals","The brain cannot process two sensations at once","Non-painful input can 'close the gate,' blocking pain signals from reaching the brain"],answer:3,rationale:"<b>Gate control theory</b> (Melzack & Wall): non-painful input closes the 'gate' to pain signals in the spinal cord \u2014 'fast blocks slow' (why rubbing helps).",why:["Rubbing doesn't remove the injury; it modulates the pain signal.","Fast touch (A-beta) input is what closes the gate to slower pain \u2014 but the mechanism is gating, not a race the pain wins.","The brain can process multiple sensations; the effect is spinal gating.","Correct. Melzack and Wall's gate control theory: large-fiber (non-painful) input closes the spinal 'gate' to small-fiber pain input \u2014 'fast blocks slow.'"],takeaway:"Gate control theory: non-painful input closes the gate to pain ('fast blocks slow')."},
  {tag:"Sensory vs. affective pain",stem:"Pain has two components: one describing its intensity and location, the other its emotional unpleasantness. These are, respectively:",choices:["The affective component and the sensory component","The sensory component and the affective component","The nociceptive and the proprioceptive components","The fast and slow components"],answer:1,rationale:"Pain's <b>sensory</b> component = intensity/location; <b>affective</b> component = the emotional unpleasantness.",why:["Reversed \u2014 sensory = intensity, affective = emotion.","Correct. The sensory component encodes intensity/location; the affective component is the emotional experience of pain.","Proprioception is body position, unrelated to pain's emotional aspect.","Fast/slow refer to fiber conduction, not the sensory vs. emotional split."],takeaway:"Pain: sensory component (intensity) + affective component (emotion)."}
 ]},
{id:"ps-6a-olfaction",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Chemoreception",categoryCode:"6A",idea:"Olfaction (smell)",
 questions:[
  {tag:"Olfactory epithelium",stem:"The smell receptors (olfactory sensory neurons) that detect odor molecules are located in the:",choices:["Basilar membrane of the cochlea","Taste buds of the tongue","Olfactory epithelium, high in the nasal cavity","Retina"],answer:2,rationale:"Smell receptors are the olfactory sensory neurons of the <b>olfactory epithelium</b> in the upper nose.",why:["The basilar membrane is for hearing.","Taste buds are for gustation, not smell.","Correct. Olfactory sensory neurons sit in the olfactory epithelium lining the upper nasal cavity.","The retina is for vision."],takeaway:"Smell receptors = olfactory sensory neurons in the olfactory epithelium (upper nose)."},
  {tag:"Cribriform plate",stem:"The thin bone (perforated by small holes) that separates the olfactory epithelium from the brain and lets olfactory axons pass through is the:",choices:["Cribriform plate","Tectorial membrane","Basilar membrane","Oval window"],answer:0,rationale:"The <b>cribriform plate</b> is the perforated bone through which olfactory axons pass to the olfactory bulb.",why:["Correct. Olfactory neuron axons pass through the holes in the cribriform plate to reach the olfactory bulb.","The tectorial membrane is in the cochlea (hearing).","The basilar membrane is in the cochlea (hearing).","The oval window is in the middle/inner ear (hearing)."],takeaway:"Cribriform plate = perforated bone; olfactory axons pass through it to the olfactory bulb."},
  {tag:"Glomerulus",stem:"In the olfactory bulb, all olfactory neurons carrying the SAME receptor type converge onto a single structure called a:",choices:["Papilla","Cochlea","Semicircular canal","Glomerulus"],answer:3,rationale:"A <b>glomerulus</b> pools all olfactory neurons of one receptor type, synapsing onto mitral/tufted cells \u2014 organizing smell before it reaches the brain.",why:["Papillae are tongue structures for taste.","The cochlea is for hearing.","Semicircular canals are for balance.","Correct. A glomerulus is the convergence point where neurons sensitive to the same odorant meet and synapse onto mitral/tufted cells."],takeaway:"Glomerulus = convergence point for olfactory neurons of the same receptor type \u2192 mitral/tufted cells."},
  {tag:"One receptor per neuron",stem:"A key feature of olfactory coding is that each olfactory sensory neuron:",choices:["Expresses all receptor types at once","Expresses one receptor type, so it responds to essentially one class of molecule","Detects color, not odor","Fires only during sleep"],answer:1,rationale:"Each olfactory neuron expresses <b>one</b> receptor type; combinations across glomeruli encode different smells.",why:["Each neuron expresses one receptor type, not all of them.","Correct. Each olfactory neuron carries one receptor type; the pattern across many neurons/glomeruli encodes the smell.","Olfactory neurons detect odor molecules, not color.","They fire in response to odorants, not tied to sleep."],takeaway:"One receptor type per olfactory neuron; the population pattern codes the odor."},
  {tag:"Transduction \u00b7 GPCR",stem:"When an odor molecule binds an olfactory receptor, the receptor acts as a GPCR: a G protein dissociates and triggers a cascade that:",choices:["Directly bends stereocilia","Hyperpolarizes the neuron to silence it","Opens ion channels, depolarizing the neuron and generating an action potential","Regenerates rhodopsin"],answer:2,rationale:"Olfactory transduction: odorant \u2192 <b>GPCR</b> \u2192 G-protein cascade \u2192 ion channels open \u2192 depolarization \u2192 AP.",why:["Stereocilia bending is hair-cell (hearing/balance) transduction, not smell.","Olfactory transduction depolarizes (excites) the neuron, not silences it.","Correct. Odorant \u2192 GPCR \u2192 G-protein cascade \u2192 ion channels open \u2192 depolarization \u2192 action potential to the olfactory bulb.","Rhodopsin is a visual pigment, unrelated to smell."],takeaway:"Smell transduction = odorant \u2192 GPCR \u2192 cascade \u2192 depolarization \u2192 AP."},
  {tag:"Bypasses the thalamus",stem:"Unlike vision, hearing, and touch, the sense of smell is unusual in that its signals:",choices:["Reach the cortex and amygdala without first synapsing in the thalamus (and are largely ipsilateral)","Are always processed contralaterally","Must pass through the thalamus first","Never reach the cortex"],answer:0,rationale:"Smell is the exception: it <b>bypasses the thalamus</b>, going straight to piriform cortex and the amygdala, and is largely ipsilateral (vision/hearing/touch are contralateral).",why:["Correct. Olfaction is the classic exception: it bypasses the thalamus, projecting directly to olfactory (piriform) cortex and the amygdala, and is largely ipsilateral.","Vision/hearing/touch are contralateral; smell is largely ipsilateral \u2014 the opposite.","Smell famously does NOT relay through the thalamus first.","Olfactory signals do reach the cortex \u2014 just without a thalamic relay."],takeaway:"Olfaction bypasses the thalamus (direct to cortex/amygdala) and is ipsilateral \u2014 a classic distinctive fact."},
  {tag:"Olfactory pathway",stem:"From the olfactory bulb, smell information travels next to the amygdala and which cortical area, before reaching the orbitofrontal cortex?",choices:["The primary visual cortex","The basilar membrane","The cerebellum","The piriform (primary olfactory) cortex"],answer:3,rationale:"Olfactory pathway: bulb \u2192 <b>piriform cortex</b> + amygdala \u2192 orbitofrontal cortex.",why:["The visual cortex processes sight, not smell.","The basilar membrane is a cochlear (hearing) structure.","The cerebellum coordinates movement, not olfactory processing.","Correct. The pathway runs olfactory bulb \u2192 piriform cortex + amygdala \u2192 orbitofrontal cortex."],takeaway:"Smell pathway: olfactory bulb \u2192 piriform cortex + amygdala \u2192 orbitofrontal cortex."},
  {tag:"Theories of olfaction",stem:"The theory that odor molecules are recognized because their SHAPE fits a receptor like a lock and key is the:",choices:["Vibrational theory","Steric (shape) theory","Place theory","Gate control theory"],answer:1,rationale:"<b>Steric/shape theory</b> = odorants fit receptors by shape (lock-and-key). Vibrational theory = odor from vibrational frequency; labeled-line = each receptor wired to a specific odor.",why:["Vibrational theory attributes odor to vibrational frequency, not shape.","Correct. Steric/shape theory: odorants fit receptors by molecular shape (lock-and-key). The vibrational theory instead attributes odor to a molecule's vibrational frequency.","Place theory is about pitch perception in hearing.","Gate control theory is about pain."],takeaway:"Steric/shape theory = lock-and-key by molecular shape. (Vibrational = by frequency.)"},
  {tag:"Anosmia",stem:"A person who has completely lost the ability to smell (for example, after a head injury damaging the olfactory nerves) has:",choices:["Ageusia","Presbyopia","Anosmia","Tinnitus"],answer:2,rationale:"<b>Anosmia</b> = inability to smell (aNOSEmia). It also blunts flavor, since smell contributes to taste.",why:["Ageusia is loss of taste, not smell.","Presbyopia is age-related farsightedness (vision).","Correct. Anosmia is the inability to perceive smell (mnemonic: aNOSEmia).","Tinnitus is ringing in the ears (hearing)."],takeaway:"Anosmia = loss of smell (aNOSEmia). Also why a cold dulls flavor."}
 ]},
{id:"ps-6a-gustation",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Chemoreception",categoryCode:"6A",idea:"Gustation (taste)",
 questions:[
  {tag:"The five tastes",stem:"The five basic taste qualities the gustatory system detects are:",choices:["Sweet, sour, salty, bitter, and spicy","Sweet, salty, sour, bitter, and cold","Sweet, sour, salty, bitter, and umami","Sweet, salty, bitter, spicy, and metallic"],answer:2,rationale:"Five basic tastes: <b>sweet, sour, salty, bitter, umami</b>. (Spicy is pain/heat, not a taste.)",why:["'Spicy' is a pain/heat sensation (TrpV1), not a basic taste.","'Cold' is temperature, not a taste; umami is the fifth taste.","Correct. The five basic tastes are sweet, sour, salty, bitter, and umami (savory/glutamate).","Spicy and metallic aren't among the five basic tastes; umami is."],takeaway:"Five tastes: sweet, sour, salty, bitter, umami. Spicy = pain (TrpV1), not a taste."},
  {tag:"Umami",stem:"The fifth basic taste, umami, corresponds to the detection of:",choices:["Glutamate (savory amino-acid taste)","Table sugar","Hydrogen ions","Fat molecules"],answer:0,rationale:"<b>Umami</b> = the savory taste of <b>glutamate</b>.",why:["Correct. Umami is the savory taste of glutamate (e.g., in meats, broth, MSG).","Sugar is sweet, not umami.","Hydrogen ions produce sour taste.","Fat is not one of the five basic taste qualities."],takeaway:"Umami = glutamate (savory)."},
  {tag:"Taste buds & papillae",stem:"Taste receptor cells are clustered into taste buds, which are housed within bumps on the tongue called:",choices:["Glomeruli","Ossicles","Dermatomes","Papillae"],answer:3,rationale:"Taste buds are housed in <b>papillae</b> \u2014 fungiform (tip/sides), foliate (sides/back), circumvallate (back).",why:["Glomeruli are olfactory bulb structures.","Ossicles are middle-ear bones.","Dermatomes are skin regions mapped to spinal nerves.","Correct. Taste buds sit within papillae (fungiform, foliate, circumvallate)."],takeaway:"Taste buds live in papillae (fungiform, foliate, circumvallate)."},
  {tag:"Filiform papillae",stem:"One type of papilla covers much of the tongue's center but contains NO taste buds \u2014 which is why the tongue's center tastes little. These are the:",choices:["Circumvallate papillae","Filiform papillae","Fungiform papillae","Foliate papillae"],answer:1,rationale:"<b>Filiform papillae</b> have NO taste buds (texture only) \u2014 why the tongue's center tastes little.",why:["Circumvallate papillae (back) do contain taste buds.","Correct. Filiform papillae provide texture/grip but have no taste buds; the tongue's center has mainly these.","Fungiform papillae (tip/sides) contain taste buds.","Foliate papillae (sides/back) contain taste buds."],takeaway:"Filiform papillae = no taste buds (texture). The other three types carry taste buds."},
  {tag:"The 'tongue map' myth",stem:"The old idea that specific tastes are confined to separate zones of the tongue (a 'tongue map') is:",choices:["Correct and well-established","True only for bitter taste","A myth \u2014 each taste can be detected across the whole tongue wherever taste buds exist","True only for infants"],answer:2,rationale:"The <b>tongue map is a myth</b>: taste buds throughout the tongue can detect all five tastes.",why:["It's a debunked myth, not established fact.","All tastes can be detected wherever taste buds are, not just bitter in one zone.","Correct. Each taste bud can detect all five tastes; the tongue-map of exclusive zones is a debunked myth.","The whole-tongue detection holds generally, not just for infants."],takeaway:"Tongue map = myth. Any taste bud can detect all five tastes."},
  {tag:"GPCR tastes",stem:"Sweet, bitter, and umami tastes are transduced through metabotropic receptors \u2014 specifically:",choices:["GPCRs (which activate the G protein gustducin)","Voltage-gated Na\u207a channels","Mechanically-gated tip-link channels","Rhodopsin"],answer:0,rationale:"Sweet, bitter, umami \u2192 <b>GPCRs</b> (via gustducin). Salty and sour \u2192 ion channels.",why:["Correct. Sweet, bitter, and umami use GPCRs coupled to gustducin; salty and sour instead use ion channels.","Na\u207a channels transduce salty taste, not sweet/bitter/umami.","Tip-link channels are for hearing (hair cells).","Rhodopsin is a visual pigment."],takeaway:"Sweet/bitter/umami = GPCR (gustducin). Salty/sour = ion channels."},
  {tag:"Ion-channel tastes",stem:"Salty and sour tastes are transduced not by GPCRs but by ion channels. Specifically, salty is sensed when:",choices:["Glutamate binds a GPCR","Light isomerizes retinal","K\u207a leaves the cell to hyperpolarize it","Na\u207a ions enter the cell through channels, depolarizing it"],answer:3,rationale:"Salty = <b>Na\u207a</b> entering through channels \u2192 depolarization; sour = <b>H\u207a</b> acting on channels. Both use ion channels, not GPCRs.",why:["Glutamate/GPCR is umami, not salty.","Retinal isomerization is vision.","Salty depolarizes via Na\u207a entry, not K\u207a-driven hyperpolarization.","Correct. Salt (NaCl) provides Na\u207a that flows through channels into the taste cell, depolarizing it. Sour is sensed via H\u207a acting on channels."],takeaway:"Salty = Na\u207a in (channel); sour = H\u207a (channel). GPCR tastes = sweet/bitter/umami."},
  {tag:"Cranial nerves of taste",stem:"Taste from the anterior two-thirds of the tongue is carried by which cranial nerve (via the chorda tympani)?",choices:["The glossopharyngeal nerve (CN IX)","The facial nerve (CN VII)","The optic nerve (CN II)","The vagus nerve (CN X) alone"],answer:1,rationale:"Anterior 2/3 taste \u2192 <b>facial nerve (VII)</b> via chorda tympani; posterior 1/3 \u2192 glossopharyngeal (IX); throat \u2192 vagus (X).",why:["The glossopharyngeal (IX) carries the posterior 1/3, not the anterior 2/3.","Correct. Anterior 2/3 taste \u2192 facial nerve (VII, chorda tympani); posterior 1/3 \u2192 glossopharyngeal (IX); throat/epiglottis \u2192 vagus (X).","The optic nerve is for vision.","The vagus (X) carries taste from the throat region, not the anterior tongue."],takeaway:"Taste nerves: anterior 2/3 = facial (VII); posterior 1/3 = glossopharyngeal (IX); throat = vagus (X)."},
  {tag:"Gustducin",stem:"The G protein that mediates sweet, bitter, and umami taste transduction is called:",choices:["Transducin","Rhodopsin","Gustducin","Gustatory hair cell"],answer:2,rationale:"<b>Gustducin</b> = the taste G protein for sweet/bitter/umami (the gustatory analog of vision's transducin).",why:["Transducin is the visual G protein (phototransduction).","Rhodopsin is the rod photopigment.","Correct. Gustducin is the taste G protein (analogous to transducin in vision), coupling sweet/bitter/umami GPCRs to their cascade.","There are no hair cells in taste; that's hearing/balance."],takeaway:"Gustducin = taste G protein (sweet/bitter/umami GPCRs)."}
 ]},
{id:"ps-6a-pheromones",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Chemoreception",categoryCode:"6A",idea:"Pheromones & the vomeronasal system",
 questions:[
  {tag:"What a pheromone is",stem:"A pheromone is best defined as:",choices:["A chemical released to communicate with a different species","A hormone that acts only inside one's own body","A chemical signal released by one member of a species that triggers an innate response in another member of the SAME species","A learned scent association"],answer:2,rationale:"A <b>pheromone</b> is a chemical signal released by one animal that triggers an innate response in another member of the <b>same species</b>.",why:["Pheromones act within a species, not between different species.","Pheromones are released externally to signal others, unlike internal hormones.","Correct. Pheromones are chemical signals used for communication within a species, eliciting innate (unlearned) responses.","The response is innate, not a learned association."],takeaway:"Pheromone = within-species chemical signal \u2192 innate response (mating, aggression, communication)."},
  {tag:"The vomeronasal organ",stem:"In many animals, pheromones are detected by a specialized structure separate from the main olfactory epithelium, called the:",choices:["Vomeronasal organ (accessory olfactory system)","Cochlea","Organ of Corti","Fovea"],answer:0,rationale:"The <b>vomeronasal organ</b> (accessory olfactory system) detects pheromones, separate from the main smell pathway.",why:["Correct. The vomeronasal organ, part of the accessory olfactory system, detects pheromones.","The cochlea is for hearing.","The organ of Corti is the hearing receptor organ.","The fovea is the high-acuity spot of the retina."],takeaway:"Pheromones \u2192 vomeronasal organ (accessory olfactory system)."},
  {tag:"Pheromone pathway \u2192 amygdala",stem:"In the accessory olfactory system, pheromone signals pass from the accessory olfactory bulb, via mitral/tufted cells, to which emotion-related brain region?",choices:["The cerebellum","The occipital cortex","The cochlear nucleus","The amygdala"],answer:3,rationale:"Pheromone signals reach the <b>amygdala</b> (emotion, aggression, mating) \u2014 fitting pheromones' role in innate social behavior.",why:["The cerebellum coordinates movement.","The occipital cortex processes vision.","The cochlear nucleus is an auditory relay.","Correct. Pheromone signals project to the amygdala, which handles emotion, aggression, and mating behavior."],takeaway:"Pheromone pathway \u2192 accessory olfactory bulb \u2192 amygdala (emotion/mating/aggression)."},
  {tag:"Innate response",stem:"Pheromone-triggered behaviors (e.g., mating or territorial responses in animals) are described as innate, meaning they are:",choices:["Carefully learned over a lifetime","Unlearned and automatic, not acquired through experience","Under full conscious control","Unique to each individual"],answer:1,rationale:"Pheromone responses are <b>innate</b> \u2014 unlearned, automatic, species-typical behaviors.",why:["Innate means unlearned \u2014 the opposite of carefully learned.","Correct. Innate responses are hardwired and automatic rather than learned.","Innate pheromone responses are largely automatic, not deliberate.","They're species-typical, not unique to each individual."],takeaway:"Pheromone responses = innate (unlearned, automatic)."},
  {tag:"Humans & pheromones",stem:"Compared with many animals, humans rely very little on pheromones. A key anatomical reason is that humans:",choices:["Lack any olfactory system at all","Have far more pheromone receptors than other animals","Have a vestigial vomeronasal organ but no functional accessory olfactory bulb","Detect pheromones through the cochlea"],answer:2,rationale:"Humans have a vestigial vomeronasal organ but <b>no functional accessory olfactory bulb</b> \u2014 so we rely very little on pheromones.",why:["Humans have a full main olfactory system for ordinary smell.","Humans have fewer, not more, functional pheromone structures.","Correct. Humans have a (vestigial) vomeronasal organ but lack a functional accessory olfactory bulb, so pheromone signaling is minimal.","The cochlea is for hearing, not chemical signals."],takeaway:"Humans: vomeronasal organ present but no functional accessory olfactory bulb \u2192 minimal pheromone reliance."},
  {tag:"Transduction",stem:"Like ordinary smell, pheromone detection in the vomeronasal system works by a molecule binding a receptor that is a:",choices:["GPCR, whose activation depolarizes the cell and sends a signal to the brain","Voltage-gated Na\u207a channel opened by light","Mechanically-gated channel bent by sound","Photopigment bleached by light"],answer:0,rationale:"Pheromone transduction uses a <b>GPCR</b> \u2192 depolarization \u2192 signal to the brain, like ordinary olfaction.",why:["Correct. Pheromone binding activates a GPCR \u2192 cascade \u2192 depolarization \u2192 signal to the brain (via the accessory olfactory bulb).","Light-gated channels are for vision, not chemical signals.","Mechanical gating is for hearing/balance hair cells.","Photopigment bleaching is a visual process."],takeaway:"Pheromone detection = GPCR \u2192 depolarization \u2192 brain (via accessory olfactory bulb)."}
 ]},
{id:"ps-7a-consciousness",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Consciousness",categoryCode:"7A",idea:"States of consciousness & EEG waves",
 questions:[
  {tag:"Consciousness defined",stem:"In psychology, consciousness is best described as:",choices:["The complete absence of brain activity","Awareness of oneself and one's environment","A single fixed state that never varies","Only the dreaming state"],answer:1,rationale:"<b>Consciousness</b> = awareness of self and environment, spanning levels from full alertness to sleep.",why:["Consciousness involves active awareness, not absence of brain activity.","Correct. Consciousness is awareness of self and environment, and it exists at varying levels (alertness \u2192 sleep).","It ranges across levels (alertness, drowsiness, sleep), not a single fixed state.","Dreaming is one altered state; consciousness is broader."],takeaway:"Consciousness = awareness of self + environment, at varying levels."},
  {tag:"Beta waves",stem:"A person who is awake, alert, and actively concentrating shows which EEG wave, the fastest of the four?",choices:["Alpha waves (8\u201313 Hz)","Theta waves (4\u20137 Hz)","Delta waves (0.5\u20133 Hz)","Beta waves (12\u201330 Hz)"],answer:3,rationale:"<b>Beta</b> (12\u201330 Hz, fastest) = awake and concentrating. Too much sustained beta \u2192 stress/anxiety.",why:["Alpha waves appear in relaxed/daydreaming wakefulness, slower than beta.","Theta waves appear in drowsiness/light sleep.","Delta waves appear in deep sleep.","Correct. Beta waves (highest frequency) dominate alert, concentrated wakefulness."],takeaway:"Beta = fastest, awake + concentrating. (Alpha=relaxed, theta=drowsy/light sleep, delta=deep sleep.)"},
  {tag:"Alpha waves",stem:"When you are awake but relaxed \u2014 daydreaming or with eyes closed \u2014 your EEG shows mostly:",choices:["Alpha waves (8\u201313 Hz)","Beta waves","Delta waves","No measurable waves"],answer:0,rationale:"<b>Alpha</b> (8\u201313 Hz) = awake but relaxed / daydreaming. Slower than beta.",why:["Correct. Alpha waves mark a relaxed, awake (daydreaming) state \u2014 slower than beta.","Beta is for active concentration, not relaxed daydreaming.","Delta is deep sleep, not relaxed wakefulness.","The brain always produces measurable activity when alive."],takeaway:"Alpha = relaxed, awake, daydreaming (slower than beta)."},
  {tag:"Delta waves",stem:"The slowest, highest-amplitude EEG waves, seen in deep (slow-wave) sleep and coma, are:",choices:["Theta waves","Alpha waves","Delta waves (0.5\u20133 Hz)","Beta waves"],answer:2,rationale:"<b>Delta</b> (0.5\u20133 Hz, slowest) = deep (slow-wave) sleep and coma.",why:["Theta waves appear in drowsiness and light sleep (N1), faster than delta.","Alpha is relaxed wakefulness.","Correct. Delta waves (slowest) dominate deep sleep (N3) and coma.","Beta is alert concentration."],takeaway:"Delta = slowest waves, deep sleep/coma. Ordering (fast\u2192slow): beta > alpha > theta > delta."},
  {tag:"Wave frequency order",stem:"Ordered from HIGHEST to LOWEST frequency, the four main EEG waves are:",choices:["Delta > theta > alpha > beta","Beta > alpha > theta > delta","Alpha > beta > delta > theta","Theta > delta > beta > alpha"],answer:1,rationale:"Frequency order (fast\u2192slow): <b>Beta > Alpha > Theta > Delta</b> \u2014 mapping alert \u2192 relaxed \u2192 drowsy \u2192 deep sleep.",why:["That's lowest-to-highest \u2014 reversed.","Correct. Beta (fastest, alert) > alpha (relaxed) > theta (drowsy/light sleep) > delta (deep sleep).","Beta is faster than alpha; delta is slower than theta.","This ordering is scrambled."],takeaway:"Fast\u2192slow: Beta > Alpha > Theta > Delta (alert\u2192relaxed\u2192drowsy\u2192deep sleep)."},
  {tag:"Theta waves",stem:"Right as you drift off to sleep or during light sleep and drowsiness, the EEG is dominated by:",choices:["Beta waves","Delta waves","Alpha waves only","Theta waves (4\u20137 Hz)"],answer:3,rationale:"<b>Theta</b> (4\u20137 Hz) = drowsiness and light sleep (N1) \u2014 slower than alpha, faster than delta.",why:["Beta is alert concentration, not drowsiness.","Delta is deep sleep, slower than theta.","Alpha is relaxed wakefulness; drifting into sleep shifts toward theta.","Correct. Theta waves mark drowsiness and light sleep (Stage N1)."],takeaway:"Theta = drowsy / light sleep (N1)."}
 ]},
{id:"ps-7a-sleep-stages",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Consciousness",categoryCode:"7A",idea:"Sleep stages (NREM & REM)",
 questions:[
  {tag:"NREM vs. REM",stem:"Sleep is divided into two broad types. The three stages N1, N2, and N3 are categorized as:",choices:["REM sleep","Non-REM (NREM) sleep","Paradoxical sleep","Waking alertness"],answer:1,rationale:"Sleep stages: <b>NREM</b> (N1, N2, N3) plus <b>REM</b>. N1\u2013N3 are the non-REM stages.",why:["REM is the distinct stage where most dreaming occurs, separate from N1\u2013N3.","Correct. N1\u2013N3 are the non-REM stages; REM is the separate fourth stage.","Paradoxical sleep is another name for REM, not N1\u2013N3.","These are sleep stages, not wakefulness."],takeaway:"N1\u2013N3 = NREM; REM is the separate stage (most dreaming)."},
  {tag:"N1 \u00b7 theta",stem:"The lightest stage of sleep, N1, is dominated by which EEG waves and may include hypnagogic hallucinations and hypnic jerks?",choices:["Delta waves","Beta waves","Sleep spindles","Theta waves"],answer:3,rationale:"<b>N1</b> = lightest sleep, <b>theta</b> waves; hypnagogic hallucinations and hypnic jerks occur here.",why:["Delta waves characterize N3 (deep sleep), not N1.","Beta waves are alert wakefulness.","Sleep spindles are a hallmark of N2, not N1.","Correct. N1 (light sleep) shows theta waves, with hypnagogic hallucinations and hypnic (falling) jerks."],takeaway:"N1 = light sleep, theta waves (hypnagogic hallucinations, hypnic jerks)."},
  {tag:"N2 \u00b7 spindles & K-complexes",stem:"Stage N2 sleep is specifically identified on an EEG by two features:",choices:["Sleep spindles and K-complexes","Delta waves and REM bursts","Beta waves and eye movements","Alpha waves and hypnic jerks"],answer:0,rationale:"<b>N2</b> is marked by <b>sleep spindles</b> (help maintain sleep through noise) and <b>K-complexes</b> (memory consolidation, suppress arousal).",why:["Correct. N2 shows sleep spindles (bursts of activity) and K-complexes, important for memory consolidation and staying asleep.","Delta waves define N3; REM bursts define REM.","Beta and eye movements aren't the N2 signature.","Alpha is relaxed wakefulness; hypnic jerks are N1."],takeaway:"N2 = sleep spindles + K-complexes."},
  {tag:"N3 \u00b7 delta / slow-wave",stem:"The deepest, hardest-to-wake stage \u2014 slow-wave sleep, important for declarative memory consolidation \u2014 is:",choices:["N1, dominated by theta waves","REM, with beta-like activity","N3, dominated by delta waves","N2, dominated by sleep spindles"],answer:2,rationale:"<b>N3</b> = deepest, slow-wave sleep, <b>delta</b> waves; hardest to wake; declarative memory consolidation.",why:["N1 is the lightest stage (theta), not the deepest.","REM has beta-like activity but the body is paralyzed \u2014 not slow-wave deep sleep.","Correct. N3 (slow-wave sleep) shows delta waves; it's the deepest stage and key for declarative memory consolidation.","N2 has spindles but isn't the deepest slow-wave stage."],takeaway:"N3 = deep slow-wave sleep, delta waves, declarative memory."},
  {tag:"REM \u00b7 paradoxical sleep",stem:"REM sleep is called 'paradoxical sleep' because:",choices:["The body is active while the brain is silent","The brain is active (awake-like waves) while the body's voluntary muscles are paralyzed","Both brain and body are completely inactive","It only occurs during daytime naps"],answer:1,rationale:"REM = <b>paradoxical sleep</b>: active, awake-like brain but paralyzed muscles. Most vivid dreaming and episodic-memory formation occur here.",why:["It's the reverse \u2014 brain active, body paralyzed.","Correct. In REM the brain shows active, awake-like activity, yet the skeletal muscles are paralyzed (atonia) \u2014 hence 'paradoxical.'","The brain is highly active in REM, not inactive.","REM occurs in normal nighttime sleep cycles, not only naps."],takeaway:"REM = paradoxical sleep: brain active, body paralyzed. Most dreaming + episodic memory."},
  {tag:"REM memory role",stem:"REM sleep is especially associated with:",choices:["Declarative memory consolidation only (a slow-wave role)","Complete absence of brain activity","Muscle-building and physical repair only","Formation of episodic memories and processing of emotional experiences"],answer:3,rationale:"<b>REM</b> \u2014 episodic memory formation and emotional processing. (Slow-wave N3 \u2014 declarative memory.)",why:["Declarative consolidation is more a slow-wave (N3) function.","REM brain activity is high, not absent.","REM's cognitive/emotional roles are the emphasis here, not physical repair.","Correct. REM is linked to episodic memory formation and emotional processing (N3/slow-wave is more tied to declarative consolidation)."],takeaway:"REM = episodic memory + emotional processing. N3 = declarative memory."},
  {tag:"Cycle length & order",stem:"A full sleep cycle repeats roughly every 90 minutes, 4\u20135 times a night. Early in the night, the progression through the cycle goes:",choices:["N1 \u2192 N2 \u2192 N3 \u2192 N2 \u2192 REM","REM \u2192 N3 \u2192 N2 \u2192 N1","N3 \u2192 N2 \u2192 N1 \u2192 REM","N1 \u2192 REM \u2192 N2 \u2192 N3"],answer:0,rationale:"Each ~90-min cycle: <b>N1 \u2192 N2 \u2192 N3 \u2192 N2 \u2192 REM</b>, repeating 4\u20135 times. N3 dominates early night; REM lengthens toward morning.",why:["Correct. A cycle descends N1\u2192N2\u2192N3, ascends back to N2, then enters REM, about every 90 minutes.","That's roughly reversed \u2014 you start in light N1, not REM.","You begin in light sleep (N1), then deepen \u2014 not start at N3.","REM comes after the NREM descent/ascent, not right after N1."],takeaway:"Cycle (~90 min): N1\u2192N2\u2192N3\u2192N2\u2192REM, x4\u20135/night. More N3 early, more REM later."}
 ]},
{id:"ps-7a-circadian",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Consciousness",categoryCode:"7A",idea:"Circadian rhythms",
 questions:[
  {tag:"Circadian rhythm defined",stem:"The roughly 24-hour internal cycle that governs sleepiness, alertness, body temperature, and other functions is called the:",choices:["Ultradian rhythm","Circadian rhythm","Sleep spindle","Refractory period"],answer:1,rationale:"The <b>circadian rhythm</b> is the ~24-hour cycle regulating sleep/wake, temperature, and alertness.",why:["Ultradian rhythms are shorter than 24 hours (e.g., the ~90-min sleep cycle).","Correct. The circadian rhythm is the ~24-hour internal biological clock.","Sleep spindles are an N2 EEG feature, not a rhythm.","The refractory period is a neuron's recovery phase."],takeaway:"Circadian rhythm = ~24-hour internal clock (sleep/wake, temperature)."},
  {tag:"Melatonin",stem:"The hormone that rises in darkness to promote sleepiness and helps regulate the circadian rhythm is:",choices:["Cortisol","Ghrelin","Gustducin","Melatonin"],answer:3,rationale:"<b>Melatonin</b> (from the pineal gland) rises in darkness to promote sleep and regulate the circadian clock.",why:["Cortisol rises with stress and in the morning to promote wakefulness.","Ghrelin is the hunger hormone.","Gustducin is a taste G protein.","Correct. Melatonin, secreted by the pineal gland, rises in darkness and signals sleep."],takeaway:"Melatonin = sleep hormone from the pineal gland; rises in darkness."},
  {tag:"Pineal gland",stem:"Melatonin is produced and released by which structure?",choices:["The pineal gland","The pituitary gland","The adrenal cortex","The cochlea"],answer:0,rationale:"The <b>pineal gland</b> produces melatonin.",why:["Correct. The pineal gland secretes melatonin.","The pituitary secretes many hormones but not melatonin.","The adrenal cortex secretes cortisol and aldosterone.","The cochlea is a hearing organ."],takeaway:"Melatonin comes from the pineal gland."},
  {tag:"Light as the cue",stem:"The most powerful external cue that entrains (resets) the circadian rhythm each day is:",choices:["Ambient temperature only","Meal size","Light (especially daylight)","Blood pressure"],answer:2,rationale:"<b>Light</b> is the dominant external cue (zeitgeber) that resets the circadian clock daily \u2014 even artificial light shifts it.",why:["Temperature has minor effects; light is the master cue.","Meals can weakly influence rhythms but aren't the dominant cue.","Correct. Light is the dominant zeitgeber ('time-giver') that synchronizes the circadian clock; even artificial light affects it.","Blood pressure is a downstream physiological variable, not the entraining cue."],takeaway:"Light = the master cue that resets the circadian clock (even artificial light)."},
  {tag:"Age & chronotype",stem:"Your notes mention that sleep timing shifts with age. Which pattern is typical?",choices:["Everyone's timing is identical regardless of age","Younger people tend toward 'night owl' timing; older adults tend to sleep and wake earlier","Older adults become extreme night owls","Timing is set permanently at birth and never changes"],answer:1,rationale:"Chronotype shifts with age: teens/young adults skew late ('night owls'); older adults shift earlier.",why:["Chronotype varies systematically with age, not identical for all.","Correct. Adolescents/young adults skew later ('night owls'); older adults tend to shift earlier.","Older adults trend earlier, not toward extreme late nights.","Circadian timing shifts across the lifespan; it isn't fixed at birth."],takeaway:"Age shifts sleep timing: young = night owls; older adults = earlier to bed/rise."}
 ]},
{id:"ps-7a-dreaming",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Consciousness",categoryCode:"7A",idea:"Dreaming & dream theories",
 questions:[
  {tag:"When vivid dreams occur",stem:"The vivid, memorable dreams people usually recall occur mostly during:",choices:["N3 slow-wave sleep","REM sleep","N1 light sleep","Wakefulness"],answer:1,rationale:"Vivid, memorable dreams occur mainly in <b>REM</b> sleep; NREM dreams are less memorable.",why:["N3 dreams, if any, are less vivid and rarely recalled.","Correct. Most vivid, memorable dreaming occurs in REM (NREM dreams are typically less memorable).","N1 has brief hypnagogic imagery, not full memorable dreams.","Dreaming is a sleep phenomenon, not wakefulness."],takeaway:"Vivid/memorable dreams = REM sleep."},
  {tag:"Prefrontal cortex in dreams",stem:"Dreams often defy logic partly because, during REM sleep, activity in the ______ is decreased.",choices:["Amygdala (emotion)","Occipital cortex (vision)","Cerebellum (coordination)","Prefrontal cortex (logic/reasoning)"],answer:3,rationale:"Decreased <b>prefrontal cortex</b> activity in REM reduces logical checking \u2014 why dreams can defy logic and still feel normal.",why:["The amygdala is often quite active in REM, adding emotional intensity.","Visual imagery in dreams involves visual areas, not reduced logic.","The cerebellum coordinates movement, not dream logic.","Correct. Reduced prefrontal activity during REM lessens logical monitoring, so dreams can seem bizarre yet feel normal."],takeaway:"REM: prefrontal (logic) activity down \u2192 dreams defy logic yet feel normal."},
  {tag:"Freud \u00b7 manifest vs. latent",stem:"In Freud's theory of dreams, the literal storyline you remember is the ______, while the hidden symbolic meaning is the ______.",choices:["Manifest content; latent content","Latent content; manifest content","Activation; synthesis","Slow-wave; paradoxical"],answer:0,rationale:"Freud: <b>manifest content</b> = the remembered surface story; <b>latent content</b> = the hidden symbolic meaning (unconscious wishes).",why:["Correct. Manifest content = the surface story; latent content = the hidden wishes/meaning Freud believed underlie it.","Reversed \u2014 manifest is the surface story, latent is the hidden meaning.","Activation/synthesis belong to a different (neurobiological) theory.","Those are sleep-stage terms, not Freud's dream constructs."],takeaway:"Freud: manifest = surface story; latent = hidden meaning."},
  {tag:"Activation-synthesis",stem:"The Activation-Synthesis hypothesis proposes that dreams are:",choices:["Encoded messages from the unconscious that must be decoded","Accurate rehearsals of the next day's events","The cortex's attempt to make sense ('synthesis') of random neural signals ('activation') from the brainstem","Produced only when the brainstem is inactive"],answer:2,rationale:"<b>Activation-synthesis</b>: brainstem <b>activation</b> (random signals) + cortical <b>synthesis</b> (making a story) \u2014 dreams may lack hidden meaning.",why:["That's Freud's view; activation-synthesis instead sees dreams as arising from random signals.","The hypothesis doesn't claim dreams predict future events.","Correct. Brainstem activation generates random signals; the cortex synthesizes them into a narrative \u2014 so dreams may have no hidden meaning.","It requires brainstem ACTIVATION, not inactivity."],takeaway:"Activation-synthesis: brainstem = activation (random signals); cortex = synthesis (story). Maybe no hidden meaning."},
  {tag:"Evolutionary theories",stem:"Which is an example of an evolutionary/biological account of why we dream?",choices:["Dreams are encrypted unconscious wishes","Threat simulation \u2014 rehearsing responses to danger to prepare for the real world","Dreams are random noise with no function","Dreams replay the exact day's events verbatim"],answer:1,rationale:"Evolutionary accounts: dreams may serve adaptive functions like <b>threat simulation</b> and problem solving.",why:["That's Freud's psychodynamic view, not an evolutionary one.","Correct. Evolutionary accounts propose adaptive functions such as threat simulation and problem solving.","'Random noise' is the activation-synthesis stance, not an adaptive evolutionary claim.","Verbatim replay isn't the evolutionary threat-simulation idea."],takeaway:"Evolutionary view: dreams = threat simulation / problem solving (adaptive rehearsal)."},
  {tag:"Memory consolidation",stem:"A widely supported cognitive account of sleep and dreaming is that it helps:",choices:["Erase all memories formed that day","Prevent the brain from ever forming memories","Replace long-term memory with short-term memory","Consolidate memories and integrate new learning"],answer:3,rationale:"A well-supported role of sleep/dreaming is <b>memory consolidation</b> \u2014 learners who sleep retain more.",why:["Sleep consolidates rather than erases memories.","Sleep supports, not prevents, memory formation.","It strengthens long-term storage, not replaces it with short-term.","Correct. Sleep (and associated dreaming) supports memory consolidation \u2014 people who sleep after learning retain more."],takeaway:"Sleep/dreaming consolidates memory (sleep after learning \u2192 better retention)."}
 ]},
{id:"ps-7a-sleep-disorders",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Consciousness",categoryCode:"7A",idea:"Sleep disorders",
 questions:[
  {tag:"Insomnia",stem:"Persistent difficulty falling asleep or staying asleep defines:",choices:["Narcolepsy","Insomnia","Sleep apnea","Somnambulism"],answer:1,rationale:"<b>Insomnia</b> = persistent trouble falling or staying asleep. (Overusing sleep meds \u2192 tolerance/dependence.)",why:["Narcolepsy is uncontrollable sleep attacks, not trouble sleeping.","Correct. Insomnia is chronic trouble initiating or maintaining sleep.","Sleep apnea is breathing interruptions during sleep.","Somnambulism is sleepwalking."],takeaway:"Insomnia = chronic trouble falling/staying asleep."},
