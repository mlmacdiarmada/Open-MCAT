  {tag:"Narcolepsy",stem:"A disorder marked by uncontrollable sleep attacks \u2014 sometimes going straight into REM \u2014 linked to loss of an alertness neurotransmitter, is:",choices:["Insomnia","Sleep apnea","Night terrors","Narcolepsy"],answer:3,rationale:"<b>Narcolepsy</b> = sudden uncontrollable sleep attacks (often into REM), linked to loss of an alertness neurotransmitter (orexin).",why:["Insomnia is the opposite \u2014 too little sleep, not sudden sleep attacks.","Sleep apnea involves breathing stoppages, not sleep attacks.","Night terrors are arousal episodes in deep sleep, not sleep attacks.","Correct. Narcolepsy causes sudden, uncontrollable sleep episodes, often entering REM directly; linked to loss of orexin/hypocretin."],takeaway:"Narcolepsy = uncontrollable sleep attacks, often straight into REM."},
  {tag:"Sleep apnea",stem:"A person who repeatedly stops breathing during sleep, briefly wakes to gasp, and often feels unrefreshed (with loud snoring) likely has:",choices:["Sleep apnea","Narcolepsy","Insomnia","REM sleep behavior disorder"],answer:0,rationale:"<b>Sleep apnea</b> = repeated breathing stoppages during sleep \u2192 gasping arousals, snoring, daytime fatigue (often reducing deep N3 sleep).",why:["Correct. Sleep apnea involves repeated breathing stoppages and micro-awakenings; snoring and daytime fatigue are common signs.","Narcolepsy is sleep attacks, not breathing stoppages.","Insomnia is difficulty sleeping, not breathing interruptions.","RBD involves acting out dreams, not breathing stoppages."],takeaway:"Sleep apnea = repeated breathing stops in sleep \u2192 gasping, snoring, fatigue."},
  {tag:"Sleepwalking \u00b7 which stage",stem:"Sleepwalking and sleep-talking (somnambulism) occur mostly during which stage \u2014 which is also why they're more common in children?",choices:["REM sleep","N1 light sleep","N3 (deep slow-wave sleep)","Full wakefulness"],answer:2,rationale:"<b>Sleepwalking/talking</b> occur in <b>N3</b> (deep slow-wave) sleep \u2014 more common in children (more N3). In REM, muscle paralysis prevents it.",why:["In REM the body is paralyzed, so complex walking generally can't occur.","N1 is light sleep, not where sleepwalking typically originates.","Correct. Sleepwalking/talking arise from N3 (slow-wave) sleep; children have more N3, so it's more common in them.","By definition it happens during sleep, not wakefulness."],takeaway:"Sleepwalking = N3 (slow-wave), not REM. More common in kids (more N3)."},
  {tag:"Sleep deprivation effects",stem:"Chronic sleep deprivation is associated with all of the following EXCEPT:",choices:["More accidents and impaired attention","Improved reaction time and sharper attention","Increased obesity risk (raised cortisol and ghrelin)","Poorer memory and irritability"],answer:1,rationale:"Sleep deprivation impairs attention, memory, and mood, and raises accident and obesity risk \u2014 it does <b>not</b> improve performance.",why:["Deprivation increases accidents and impairs attention \u2014 a true effect.","Correct \u2014 as the EXCEPTION. Sleep deprivation WORSENS reaction time and attention; it doesn't improve them.","It raises cortisol and hunger hormones, increasing obesity risk \u2014 true.","It worsens memory and mood \u2014 true."],takeaway:"Sleep deprivation \u2192 worse attention/memory/mood, more accidents, obesity risk. 'Sleep debt' can be partly repaid."}
 ]},
{id:"ps-7a-hypnosis-meditation",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Consciousness",categoryCode:"7A",idea:"Hypnosis & meditation",
 questions:[
  {tag:"Hypnosis \u00b7 what it is",stem:"Hypnosis is best described as:",choices:["A form of deep sleep with delta waves","An induced state of heightened suggestibility and focused, relaxed attention","A naturally occurring state that arises without any induction","A permanent alteration of the brain"],answer:1,rationale:"<b>Hypnosis</b> = an <b>induced</b> state of focused attention and heightened suggestibility (awake but relaxed; more alpha waves).",why:["Hypnotized people are awake and relaxed (alpha), not in delta-wave deep sleep.","Correct. Hypnosis is an induced state of focused attention and increased suggestibility (more alpha waves \u2014 awake but relaxed).","It's an INDUCED state, not spontaneous.","Its effects are temporary, not permanent."],takeaway:"Hypnosis = induced state, focused attention + high suggestibility (alpha waves)."},
  {tag:"Hypnosis \u00b7 false memories",stem:"A documented risk of using hypnosis to 'retrieve' memories is that it can:",choices:["Perfectly restore forgotten memories with total accuracy","Permanently erase all autobiographical memory","Replace alpha waves with delta waves","Create false memories that incorporate the hypnotist's expectations"],answer:3,rationale:"Hypnosis makes memory malleable \u2014 it can <b>create false memories</b> shaped by the hypnotist's expectations, so it's unreliable for recall.",why:["Hypnosis does not reliably recover accurate memories \u2014 that's the danger.","It doesn't erase all autobiographical memory.","Hypnosis is associated with alpha (relaxed wakefulness), not a shift to delta.","Correct. Under hypnosis memory is malleable; suggestion can implant false memories shaped by the hypnotist's cues."],takeaway:"Hypnosis can implant FALSE memories (memory is malleable under suggestion)."},
  {tag:"Theories of hypnosis",stem:"Two competing explanations of hypnosis are dissociation theory and social influence theory. Social influence theory holds that hypnotized people:",choices:["Act out the social role expected of them, like absorbed actors","Undergo a genuine split in consciousness","Enter delta-wave deep sleep","Lose all brain activity"],answer:0,rationale:"<b>Social influence theory</b>: hypnotized people enact an expected social role. <b>Dissociation theory</b>: hypnosis is a genuine split (extreme divided consciousness).",why:["Correct. Social influence theory: hypnotic behavior reflects playing an expected social role. (Dissociation theory instead posits a real split in awareness.)","That describes dissociation theory, the competing account.","Hypnosis is awake/relaxed (alpha), not delta deep sleep.","Brain activity continues normally under hypnosis."],takeaway:"Hypnosis theories: dissociation (split consciousness) vs. social influence (playing a role)."},
  {tag:"Meditation defined",stem:"Meditation is best described as:",choices:["A disorder that prevents focused attention","A stage of NREM sleep","Training to self-regulate attention and awareness","An involuntary reflex"],answer:2,rationale:"<b>Meditation</b> = training to self-regulate attention and awareness (focused or open-monitoring).",why:["It enhances, rather than prevents, attentional control.","Meditation is a waking practice, not a sleep stage.","Correct. Meditation is deliberate training of attention/awareness \u2014 focused (e.g., on breathing) or open/unfocused.","It's a deliberate practice, not an involuntary reflex."],takeaway:"Meditation = deliberate training of attention/awareness."},
  {tag:"Meditation \u00b7 brain waves",stem:"Light meditation and relaxed hypnosis share an EEG signature of an awake-but-relaxed state, namely increased:",choices:["Delta waves of deep sleep","Alpha waves (with more theta in deep meditation by experts)","Beta waves of intense concentration only","No change from ordinary wakefulness"],answer:1,rationale:"Light meditation/hypnosis \u2192 more <b>alpha</b> (awake but relaxed); deep meditation in experts \u2192 more <b>theta</b>.",why:["Delta marks deep sleep, not relaxed meditation.","Correct. Light meditation and hypnosis show increased alpha (awake, relaxed); experienced meditators show more theta in deep meditation.","Beta is intense concentration; meditation is relaxed alpha (deep: theta).","There is a measurable shift toward alpha/theta, not 'no change.'"],takeaway:"Meditation/hypnosis = more alpha (relaxed-awake); deep meditation (experts) = more theta."}
 ]},
{id:"ps-7c-depressants",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Drugs & consciousness",categoryCode:"7C",idea:"Psychoactive drugs: depressants",
 questions:[
  {tag:"Three drug categories",stem:"Psychoactive drugs are commonly grouped into three main categories:",choices:["Depressants, opiates, and vitamins","Stimulants, antibiotics, and sedatives","Hallucinogens, antibiotics, and steroids","Depressants, stimulants, and hallucinogens"],answer:3,rationale:"Three main psychoactive categories: <b>depressants, stimulants, hallucinogens</b> (opiates/opioids often a separate class).",why:["Vitamins aren't a psychoactive drug category.","Antibiotics aren't psychoactive drugs.","Antibiotics and steroids aren't the psychoactive categories.","Correct. The three main categories of psychoactive drugs are depressants, stimulants, and hallucinogens (with opiates/opioids often treated as a distinct related class)."],takeaway:"Psychoactive drug categories: depressants, stimulants, hallucinogens."},
  {tag:"What depressants do",stem:"Depressants (like alcohol) affect the CNS by:",choices:["Increasing arousal, heart rate, and alertness","Lowering CNS activity \u2014 decreasing arousal, heart rate, BP, and reaction/processing time","Causing vivid hallucinations as their primary effect","Having no effect on the nervous system"],answer:1,rationale:"<b>Depressants</b> lower CNS activity \u2192 decreased arousal, heart rate, BP, and reaction/processing time (you act and think slowly).",why:["That describes stimulants, the opposite of depressants.","Correct. Depressants slow the CNS: reduced arousal, heart rate, blood pressure, and processing speed.","Distorted perception is the hallmark of hallucinogens, not depressants.","Depressants clearly act on the CNS."],takeaway:"Depressants = lower CNS activity (slower HR/BP/processing). Alcohol is the most common."},
  {tag:"Alcohol \u00b7 dose-dependent vessels",stem:"Alcohol has a dose-dependent effect on blood vessels. At low doses it acts as a ______, and at high doses as a ______.",choices:["Vasoconstrictor; vasodilator","Stimulant; hallucinogen","Vasodilator; vasoconstrictor","Depressant; stimulant"],answer:2,rationale:"Alcohol: <b>vasodilate at low dose, vasoconstrict at high dose</b> \u2014 and it's a CNS depressant throughout.",why:["Reversed \u2014 low dose dilates, high dose constricts.","Alcohol is a depressant, not a stimulant/hallucinogen.","Correct. Alcohol vasodilates at low doses and vasoconstricts at high doses.","Alcohol is a depressant at all doses; the vessel effect is dilate\u2192constrict."],takeaway:"Alcohol: low dose = vasodilate; high dose = vasoconstrict (and always a depressant)."},
  {tag:"GABA mechanism",stem:"Most depressants \u2014 including alcohol, barbiturates, and benzodiazepines \u2014 calm the CNS largely by enhancing the activity of which inhibitory neurotransmitter?",choices:["GABA (via chloride channels)","Dopamine","Glutamate","Acetylcholine"],answer:0,rationale:"Depressants enhance <b>GABA</b> (inhibitory): opening Cl\u207b channels hyperpolarizes neurons, calming the CNS.",why:["Correct. Depressants boost GABA, the main inhibitory neurotransmitter, opening Cl\u207b channels and making neurons more negative (less likely to fire).","Dopamine is tied to reward/stimulants, not the inhibitory depressant mechanism.","Glutamate is the main EXCITATORY transmitter \u2014 the opposite of what depressants enhance.","Acetylcholine is where nicotine acts, not the general depressant mechanism."],takeaway:"Depressants work by boosting GABA (inhibitory) \u2192 Cl\u207b in \u2192 neurons less likely to fire."},
  {tag:"Barbiturates vs. benzodiazepines",stem:"Compared with barbiturates, benzodiazepines ('benzos') are far more commonly prescribed today mainly because they:",choices:["Are stimulants rather than depressants","Do not affect GABA at all","Cause hallucinations instead of sedation","Have a safer side-effect profile (barbiturates carry high overdose risk, worse with alcohol)"],answer:3,rationale:"Barbiturates and benzos both enhance GABA, but <b>barbiturates</b> are far more dangerous (overdose, lethal with alcohol) \u2014 so benzos are now preferred.",why:["Both are depressants, not stimulants.","Both act on the GABA system.","Both are sedating depressants, not hallucinogens.","Correct. Both enhance GABA, but barbiturates have a narrow safety margin (overdose, deadly with alcohol), so benzodiazepines largely replaced them."],takeaway:"Benzos preferred over barbiturates: same GABA action, but barbiturates are far more dangerous (overdose, deadly with alcohol)."},
  {tag:"Alcohol & REM",stem:"One documented effect of alcohol on sleep is that it:",choices:["Increases REM sleep and improves memory","Disrupts the REM cycle, reducing REM sleep (impairing memory/new synapse formation)","Has no effect on sleep architecture","Eliminates deep slow-wave sleep entirely and nothing else"],answer:1,rationale:"Alcohol <b>disrupts/reduces REM sleep</b>, impairing memory consolidation and new synapse formation.",why:["Alcohol reduces, not increases, REM sleep.","Correct. Alcohol disrupts and suppresses REM sleep, impairing memory consolidation and new synapse formation.","It clearly alters sleep architecture (REM disruption).","Its notable effect here is REM disruption, not solely eliminating slow-wave sleep."],takeaway:"Alcohol disrupts REM sleep \u2192 impaired memory/synapse formation."}
 ]},
{id:"ps-7c-stimulants",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Drugs & consciousness",categoryCode:"7C",idea:"Psychoactive drugs: stimulants",
 questions:[
  {tag:"What stimulants do",stem:"Stimulants (caffeine, nicotine, cocaine, amphetamines) affect the body by:",choices:["Slowing the CNS and lowering heart rate","Primarily causing hallucinations","Acting only on endorphin receptors","Exciting the CNS \u2014 increasing heart rate, BP, alertness, and energy"],answer:3,rationale:"<b>Stimulants</b> excite the CNS \u2192 \u2191 heart rate, BP, alertness, energy.",why:["That's depressants \u2014 the opposite of stimulants.","Hallucinations are the hallucinogen hallmark, not stimulants.","Endorphin receptors are the opiate mechanism, not stimulants.","Correct. Stimulants excite the CNS: raised heart rate, blood pressure, alertness, and energy."],takeaway:"Stimulants = excite CNS (\u2191HR, \u2191BP, alertness). Depressants are the opposite."},
  {tag:"Cocaine mechanism",stem:"Cocaine produces its stimulant effect primarily by:",choices:["Enhancing GABA activity","Blocking dopamine reuptake, so dopamine stays in the synapse longer","Binding endorphin receptors","Blocking acetylcholine receptors"],answer:1,rationale:"<b>Cocaine blocks dopamine reuptake</b> \u2192 dopamine lingers in the synapse \u2192 intense stimulation (and a hard crash as supply depletes).",why:["Enhancing GABA is a depressant mechanism.","Correct. Cocaine blocks the dopamine transporter (reuptake), prolonging dopamine signaling in the synapse.","Endorphin receptors are the opiate mechanism.","Cocaine's key action is on dopamine reuptake, not blocking acetylcholine."],takeaway:"Cocaine = blocks dopamine reuptake (dopamine stays in synapse)."},
  {tag:"Amphetamines mechanism",stem:"Amphetamines increase dopamine signaling by a mechanism that differs from cocaine: they:",choices:["Only enhance GABA","Bind endorphin receptors","Both block dopamine reuptake AND stimulate its release from the presynaptic neuron","Act solely on acetylcholine receptors"],answer:2,rationale:"<b>Amphetamines</b> both block dopamine reuptake and stimulate its release \u2014 a dual mechanism (cocaine only blocks reuptake).",why:["GABA enhancement is a depressant action.","Endorphin binding is the opiate mechanism.","Correct. Amphetamines block reuptake and actively drive dopamine release \u2014 a dual action beyond cocaine's reuptake block alone.","Amphetamines primarily affect dopamine, not acetylcholine."],takeaway:"Amphetamines = block dopamine reuptake + trigger release (cocaine only blocks reuptake)."},
  {tag:"Caffeine mechanism",stem:"Caffeine promotes wakefulness largely by:",choices:["Blocking adenosine receptors (and inhibiting the enzyme that breaks down cAMP)","Enhancing GABA activity","Blocking dopamine reuptake like cocaine","Binding endorphin receptors"],answer:0,rationale:"<b>Caffeine blocks adenosine receptors</b> (adenosine makes you sleepy) and inhibits cAMP breakdown \u2192 increased alertness.",why:["Correct. Caffeine is an adenosine-receptor antagonist (adenosine promotes sleep), and it also inhibits phosphodiesterase, raising cAMP.","Enhancing GABA would be sedating \u2014 the opposite of caffeine.","Cocaine blocks dopamine reuptake; caffeine's main action is on adenosine.","Endorphin binding is the opiate mechanism."],takeaway:"Caffeine = adenosine-receptor blocker (adenosine promotes sleep) \u2192 wakefulness."},
  {tag:"Nicotine mechanism",stem:"Nicotine acts as a CNS stimulant by binding which receptor?",choices:["Dopamine transporters directly","GABA-A receptors","Endorphin receptors","Acetylcholine (nicotinic) receptors"],answer:3,rationale:"<b>Nicotine</b> is an agonist at nicotinic <b>acetylcholine</b> receptors \u2014 a stimulant that raises HR/BP and can suppress appetite.",why:["Nicotine acts at ACh receptors; it doesn't primarily block dopamine transporters like cocaine.","GABA-A is the depressant target.","Endorphin receptors are the opiate target.","Correct. Nicotine is an agonist at nicotinic acetylcholine receptors; it raises heart rate/BP and (indirectly) dopamine, and can suppress appetite."],takeaway:"Nicotine = acetylcholine (nicotinic) receptor agonist; stimulant."},
  {tag:"Alcohol + stimulant danger",stem:"Drinking coffee (a stimulant) after alcohol (a depressant) is risky because:",choices:["The stimulant fully reverses the alcohol's effects","They are functionally opposite but don't cancel out \u2014 you become an alert drunk, not sober","The two combine into a hallucinogen","Caffeine metabolizes the alcohol instantly"],answer:1,rationale:"Stimulant + depressant don't cancel: caffeine masks alcohol's sedation but you're still impaired \u2014 an 'alert drunk.'",why:["It masks sedation but doesn't reverse intoxication or lower BAC.","Correct. A stimulant masks the sedation but doesn't lower blood alcohol \u2014 you feel alert while still impaired ('alert drunk'), which is dangerous.","Mixing them doesn't create a hallucinogen.","Caffeine doesn't clear alcohol from the body."],takeaway:"Coffee after alcohol \u2192 'alert drunk': masks sedation, doesn't reduce impairment."},
  {tag:"Amphetamine tolerance",stem:"Long-term amphetamine (e.g., meth) use can lower a user's ability to feel normal levels of pleasure because:",choices:["Amphetamines permanently add dopamine receptors","Dopamine is unaffected by chronic use","The brain down-regulates dopamine to adjust to repeated intense highs","The drug converts dopamine into GABA"],answer:2,rationale:"Chronic amphetamine use \u2192 the brain <b>down-regulates dopamine</b> to compensate for repeated highs \u2192 anhedonia (normal pleasures feel flat).",why:["Chronic use down-regulates, not adds, dopamine responsiveness.","Dopamine signaling is strongly affected by chronic amphetamine use.","Correct. Chronic overstimulation leads the brain to reduce its dopamine responsiveness, so normal experiences feel less rewarding.","Amphetamines don't convert dopamine into GABA."],takeaway:"Chronic amphetamines \u2192 brain down-regulates dopamine \u2192 hard to feel normal pleasure."}
 ]},
{id:"ps-7c-hallucinogens",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Drugs & consciousness",categoryCode:"7C",idea:"Psychoactive drugs: hallucinogens",
 questions:[
  {tag:"What hallucinogens do",stem:"Hallucinogens (LSD, psilocybin, mescaline, PCP) primarily produce:",choices:["Sedation and lowered heart rate","Increased alertness and energy as their main effect","Pain relief by acting on endorphin receptors","Distorted perceptions and heightened, altered sensations \u2014 based on reality but different from it"],answer:3,rationale:"<b>Hallucinogens</b> distort perception and heighten sensation \u2014 perceptions are based on reality but altered.",why:["Sedation is a depressant effect.","Increased energy is a stimulant effect.","Endorphin-based pain relief is the opiate mechanism.","Correct. Hallucinogens distort perception and heighten/alter sensation and emotion, often with a sense of connectedness and mood swings."],takeaway:"Hallucinogens = distorted perception + heightened/altered sensation and emotion."},
  {tag:"Serotonin mechanism",stem:"Classic hallucinogens like LSD and psilocybin exert their effects mainly by modifying which neurotransmitter system?",choices:["GABA","Serotonin \u2014 especially the 5-HT2 receptor family","Endorphins","Acetylcholine only"],answer:1,rationale:"Classic hallucinogens (LSD, psilocybin) modify <b>serotonin</b>, especially the <b>5-HT2</b> receptor family.",why:["GABA is the depressant target.","Correct. LSD and psilocybin act on serotonin, particularly 5-HT2A receptors.","Endorphins are the opiate target.","Acetylcholine isn't the primary target of classic serotonergic hallucinogens."],takeaway:"LSD/psilocybin = serotonin (5-HT2) agonists."},
  {tag:"Pupil effect",stem:"A physical sign commonly produced by hallucinogens is:",choices:["Constriction of the pupils (miosis)","Complete loss of vision","Dilation of the pupils (mydriasis)","No change in the eyes"],answer:2,rationale:"Hallucinogens commonly cause <b>pupil dilation (mydriasis)</b>. (Opioids, by contrast, cause pinpoint pupils.)",why:["Pupil constriction (miosis) is characteristic of opioids, not hallucinogens.","Hallucinogens distort vision but don't cause blindness.","Correct. Hallucinogens typically cause pupil dilation (mydriasis).","There is a notable ocular sign \u2014 dilation."],takeaway:"Hallucinogens \u2192 dilated pupils (mydriasis). Opioids \u2192 constricted (miosis)."},
  {tag:"MDMA / Ecstasy",stem:"MDMA (Ecstasy/Molly) is unusual because it acts as:",choices:["A blend of stimulant and hallucinogen \u2014 boosting dopamine and serotonin, causing euphoria and connectedness","A pure depressant that only sedates","An opioid that binds endorphin receptors","A drug with no effect on serotonin"],answer:0,rationale:"<b>MDMA</b> = stimulant + hallucinogen: raises dopamine and serotonin (euphoria, connectedness). Heavy use can damage serotonin neurons \u2192 later depressed mood.",why:["Correct. MDMA has combined stimulant and hallucinogen properties, raising dopamine and serotonin; heavy use can damage serotonin neurons (later low mood).","MDMA is stimulating/euphoric, not a pure sedative.","It isn't an endorphin-receptor opioid.","MDMA strongly affects serotonin \u2014 that's central to its action and its risks."],takeaway:"MDMA = stimulant + hallucinogen (\u2191dopamine + \u2191serotonin). Can deplete/damage serotonin \u2192 low mood after."},
  {tag:"Cannabis classification",stem:"Cannabis (marijuana), whose active chemical is THC, is difficult to classify because it can act as:",choices:["Strictly a pure stimulant","Strictly a pure opioid","A drug with no psychoactive effect","A hallucinogen and also, depending on use, a depressant or stimulant \u2014 a mix of all"],answer:3,rationale:"<b>Cannabis</b> (THC) is a mild hallucinogen that can also act as a depressant or stimulant \u2014 a mix. THC heightens sensory sensitivity and impairs short-term memory/coordination.",why:["It isn't a pure stimulant; it spans categories.","It's not an opioid.","THC is clearly psychoactive.","Correct. Cannabis is a mild hallucinogen that can also show depressant and stimulant properties; THC heightens sensitivity to sounds, tastes, and smells and can impair memory/coordination."],takeaway:"Cannabis (THC) = mild hallucinogen + depressant/stimulant mix. Heightens senses, impairs memory/coordination."},
  {tag:"THC mechanism",stem:"THC produces its effects by acting on which system?",choices:["The endorphin system, like opioids","The anandamide (endocannabinoid) system","The adenosine system, like caffeine","The GABA system, like alcohol"],answer:1,rationale:"<b>THC</b> works on the <b>anandamide (endocannabinoid)</b> system.",why:["Endorphin receptors are the opioid target, not THC's.","Correct. THC acts on the endocannabinoid system \u2014 it works on anandamide (endogenous cannabinoid) receptors.","Adenosine receptors are caffeine's target.","GABA is alcohol's main target."],takeaway:"THC acts on the anandamide/endocannabinoid system."}
 ]},
{id:"ps-7c-opioids",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Drugs & consciousness",categoryCode:"7C",idea:"Opiates & opioids",
 questions:[
  {tag:"Opiates vs. opioids",stem:"The terms 'opiate' and 'opioid' are distinguished as:",choices:["Opiates are synthetic; opioids are natural","Both terms mean stimulants","Neither affects the nervous system","Opiates are natural (e.g., morphine, codeine); opioids are synthetic/semi-synthetic (e.g., oxycodone, heroin)"],answer:3,rationale:"<b>Opiates</b> = natural (morphine, codeine); <b>opioids</b> = synthetic/semi-synthetic (oxycodone, heroin). Mnemonic: T = Tree = naTural.",why:["Reversed \u2014 opiates are natural, opioids synthetic.","Both are depressant-like CNS agents, not stimulants.","Both strongly affect the CNS.","Correct. Opiates are naturally derived (morphine, codeine); opioids are synthetic or semi-synthetic (oxycodone, hydrocodone, heroin)."],takeaway:"Opiates = natural (morphine, codeine). Opioids = synthetic (oxycodone, heroin)."},
  {tag:"Endorphin receptors",stem:"Opiates and opioids relieve pain and produce euphoria by mimicking the body's own painkillers, binding to:",choices:["GABA-A receptors","Endorphin (opioid) receptors","Dopamine transporters","Nicotinic acetylcholine receptors"],answer:1,rationale:"Opioids bind <b>endorphin (opioid) receptors</b>, mimicking natural endorphins \u2192 pain relief + euphoria.",why:["GABA-A is the depressant (alcohol/benzo) target.","Correct. Opioids bind endorphin (opioid) receptors, mimicking the body's natural endorphins to reduce pain perception.","Dopamine transporters are cocaine's target.","Nicotinic ACh receptors are nicotine's target."],takeaway:"Opioids act on endorphin receptors (mimic the body's own painkillers)."},
  {tag:"Not technically depressants",stem:"Although opioids resemble depressants (they slow CNS function, lower HR/BP, and induce relaxation), they are NOT classified as classic depressants because they:",choices:["Actually excite the CNS like stimulants","Cause vivid hallucinations","Work through a different mechanism \u2014 endorphin receptors rather than the GABA system","Have no effect on pain"],answer:2,rationale:"Opioids act like depressants (slow CNS, \u2193HR/BP) but via <b>endorphin receptors</b>, not GABA \u2014 so they're a distinct class.",why:["Opioids slow the CNS; they don't excite it like stimulants.","Pain relief and sedation, not hallucination, are their hallmark.","Correct. Opioids act like depressants at the level of effects but through endorphin receptors, whereas classic depressants enhance GABA \u2014 a different neurochemical mechanism.","Opioids are potent analgesics \u2014 they strongly reduce pain."],takeaway:"Opioids resemble depressants in effect but act on endorphin receptors (not GABA) \u2014 distinct class."},
  {tag:"Opioid overdose",stem:"The most common cause of death in an opioid overdose is:",choices:["Respiratory failure (breathing is suppressed)","A hallucinogenic seizure","A hypertensive stroke from stimulation","Liver rupture"],answer:0,rationale:"Opioid overdose kills mainly by <b>respiratory failure</b> \u2014 suppressed breathing (with pinpoint pupils as a classic sign).",why:["Correct. Opioids depress the brainstem respiratory centers; overdose typically kills by stopping breathing.","Opioids don't cause hallucinogenic seizures as the fatal mechanism.","Opioids lower (not raise) HR/BP; death is from respiratory depression.","The lethal mechanism is respiratory, not liver rupture."],takeaway:"Opioid overdose \u2192 death by respiratory failure (breathing suppressed)."},
  {tag:"Pupil sign",stem:"A hallmark physical sign of opioid use/overdose, useful for distinguishing it from hallucinogen use, is:",choices:["Dilated pupils (mydriasis)","Bright red eyes only","No pupil change","Pinpoint (constricted) pupils \u2014 miosis"],answer:3,rationale:"Opioids \u2192 <b>pinpoint pupils (miosis)</b>. Hallucinogens/stimulants \u2192 dilation (mydriasis). A quick differentiator.",why:["Dilation (mydriasis) is seen with hallucinogens and many stimulants, not opioids.","Red eyes are more associated with cannabis, not the defining opioid sign.","Opioids notably constrict the pupils.","Correct. Opioids cause pinpoint pupils (miosis) \u2014 the opposite of the pupil dilation seen with hallucinogens/stimulants."],takeaway:"Opioids = pinpoint pupils (miosis). Hallucinogens/stimulants = dilated (mydriasis)."}
 ]},
{id:"ps-7c-dependence",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Drugs & consciousness",categoryCode:"7C",idea:"Dependence, homeostasis & routes of entry",
 questions:[
  {tag:"Drug tolerance",stem:"Needing progressively larger doses of a drug to achieve the same effect is called:",choices:["Withdrawal","Potentiation","Reuptake","Tolerance"],answer:3,rationale:"<b>Tolerance</b> = needing higher doses over time for the same effect (the body adapts).",why:["Withdrawal is the aversive state when a drug is stopped, not the dose-escalation itself.","Potentiation is enhancement of an effect, not tolerance.","Reuptake is neurotransmitter reabsorption, unrelated to tolerance.","Correct. Tolerance is the reduced response to a drug over repeated use, requiring higher doses for the same effect."],takeaway:"Tolerance = need more drug for the same effect."},
  {tag:"Homeostatic counter-response",stem:"When a regular user takes a stimulant that raises heart rate, the body learns to lower heart rate in anticipation. This homeostatic counter-response means that:",choices:["The drug stops working entirely and forever","In the same familiar setting, this compensation blunts the high; in a NEW setting it may be absent, raising overdose risk","The body speeds the heart even more to match","Environmental cues have no role in drug response"],answer:1,rationale:"The body mounts a conditioned <b>homeostatic counter-response</b> cued by the usual setting. In a NEW setting that counter-response is missing, so the same dose can overdose you.",why:["The drug still works; the body partially opposes it via homeostasis.","Correct. Conditioned compensatory responses are cued by the usual environment; in a novel setting the body isn't 'prepared,' so the same dose hits harder \u2014 a known overdose mechanism.","The body opposes the drug's effect (lowering HR), it doesn't amplify it.","Environmental cues are central \u2014 they trigger the anticipatory response."],takeaway:"Homeostasis opposes the drug (cued by setting). Same dose in a NEW place \u2192 no counter-response \u2192 overdose risk."},
  {tag:"Route & addictive potential",stem:"In general, how does the route of administration relate to a drug's addictive potential?",choices:["Slower routes are always more addictive","The route has no effect on addictiveness","Faster routes (reaching the brain quicker) tend to have higher addictive potential","Only oral routes cause addiction"],answer:2,rationale:"<b>Faster route \u2192 higher addictive potential</b> (rapid brain delivery = stronger, more reinforcing high).",why:["Slower routes are generally LESS addictive, not more.","Route strongly affects addictive potential.","Correct. The faster a drug reaches the brain, the more addictive it tends to be (rapid, intense reward).","Multiple routes can drive addiction; faster ones more so."],takeaway:"Faster route of entry = more addictive (quicker to the brain)."},
  {tag:"Route speed order",stem:"Ordering common routes from generally SLOWEST to FASTEST onset:",choices:["Oral \u2192 inhalation \u2192 intravenous injection","Intravenous injection \u2192 inhalation \u2192 oral","Inhalation \u2192 oral \u2192 injection","Oral \u2192 injection \u2192 inhalation"],answer:0,rationale:"Onset speed: <b>oral (slowest) \u2192 inhalation \u2192 IV injection (fastest)</b>. Faster onset = more dangerous and more addictive.",why:["Correct. Oral is slowest (through the GI tract, ~half hour); inhalation is fast (straight to the brain); IV injection is fastest (seconds).","That's fastest-to-slowest \u2014 reversed.","Oral is the slowest, not in the middle here.","Injection (IV) is faster than inhalation, so this ordering is off."],takeaway:"Slow\u2192fast: oral \u2192 inhalation \u2192 IV injection. Faster = more addictive/dangerous."},
  {tag:"Intramuscular use",stem:"Intramuscular injection (a needle into muscle) is used for things like the EpiPen and many vaccines because it:",choices:["Is the single fastest route of all","Bypasses the bloodstream entirely","Is how most abused drugs are taken","Delivers the drug into the bloodstream relatively slowly and steadily (slower than IV)"],answer:3,rationale:"<b>Intramuscular</b> injection releases into the bloodstream relatively slowly/steadily (slower than IV) \u2014 hence EpiPens and vaccines.",why:["Intravenous, not intramuscular, is the fastest route.","It delivers into the bloodstream, just more gradually.","Most abused drugs are taken IV or inhaled, not intramuscular.","Correct. Intramuscular delivery is slower than intravenous \u2014 useful for steady release (vaccines) or accessible emergency dosing (EpiPen in the thigh)."],takeaway:"Intramuscular = slower, steadier than IV. Used for EpiPens, vaccines. (IV is the fastest route.)"}
 ]},
{id:"ps-7c-reward-pathway",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Drugs & consciousness",categoryCode:"7C",idea:"The reward pathway (dopamine)",
 questions:[
  {tag:"The reward neurotransmitter",stem:"The primary neurotransmitter of the brain's reward pathway \u2014 released in response to food, sex, social connection, and addictive drugs \u2014 is:",choices:["GABA","Acetylcholine","Dopamine","Melatonin"],answer:2,rationale:"<b>Dopamine</b> is the reward pathway's key neurotransmitter \u2014 drugs that raise it more strongly are more addictive.",why:["GABA is the main inhibitory transmitter (depressant target), not the reward signal.","Acetylcholine is involved in muscle/attention, not the core reward signal.","Correct. Dopamine is the key reward-pathway neurotransmitter, signaling 'that was good, do it again.'","Melatonin regulates sleep, not reward."],takeaway:"Reward pathway neurotransmitter = dopamine."},
  {tag:"Where dopamine originates",stem:"Reward-pathway dopamine is produced in a midbrain structure called the:",choices:["Ventral tegmental area (VTA)","Pineal gland","Cochlea","Cerebellum"],answer:0,rationale:"Reward dopamine originates in the <b>ventral tegmental area (VTA)</b> of the midbrain.",why:["Correct. The VTA (ventral tegmental area) in the midbrain is the origin of reward-pathway dopamine.","The pineal gland makes melatonin, not reward dopamine.","The cochlea is a hearing organ.","The cerebellum coordinates movement, not reward dopamine."],takeaway:"Dopamine for reward starts in the VTA (midbrain)."},
  {tag:"The mesolimbic pathway",stem:"The dopamine circuit running from the VTA to the nucleus accumbens, amygdala, and hippocampus is known as the:",choices:["Corticospinal tract","Optic tract","Auditory pathway","Mesolimbic pathway"],answer:3,rationale:"The <b>mesolimbic pathway</b> = VTA \u2192 nucleus accumbens, amygdala, hippocampus (plus prefrontal cortex) \u2014 the reward circuit.",why:["The corticospinal tract is a motor pathway.","The optic tract carries vision.","The auditory pathway carries hearing.","Correct. The VTA \u2192 nucleus accumbens/amygdala/hippocampus circuit is the mesolimbic ('reward') pathway."],takeaway:"Mesolimbic pathway = VTA \u2192 nucleus accumbens/amygdala/hippocampus (reward)."},
  {tag:"Nucleus accumbens",stem:"Within the reward pathway, the nucleus accumbens is best understood as the region most associated with:",choices:["Long-term declarative memory storage","Reward and motivation ('do it again')","Regulating body temperature","Transducing sound into signals"],answer:1,rationale:"The <b>nucleus accumbens</b> is the reward/motivation hub of the mesolimbic pathway.",why:["Declarative memory is more the hippocampus/cortex.","Correct. The nucleus accumbens is central to reward and motivation \u2014 the 'let's do that again' signal.","Temperature regulation is a hypothalamic function.","Sound transduction is the cochlea's job."],takeaway:"Nucleus accumbens = reward/motivation center of the mesolimbic pathway."},
  {tag:"Roles in the circuit",stem:"In the reward pathway, the hippocampus contributes by:",choices:["Producing dopamine for the whole circuit","Constricting the pupils","Encoding the context/memory of the rewarding experience (where, who, when)","Regulating breathing rate"],answer:2,rationale:"In the reward circuit: <b>hippocampus</b> = context/memory, amygdala = emotion, prefrontal cortex = attention/planning.",why:["Dopamine is produced in the VTA, not the hippocampus.","Pupil control is autonomic, not a hippocampal reward function.","Correct. The hippocampus records the context of a reward (place, people, cues) so it can be sought again; the amygdala tags the emotion; the prefrontal cortex directs attention.","Breathing rate is a brainstem function."],takeaway:"Reward circuit roles: hippocampus (context/memory), amygdala (emotion), PFC (attention)."},
  {tag:"Addictiveness",stem:"According to the reward-pathway model, drugs that are MORE addictive tend to be those that:",choices:["Activate the dopamine reward circuit more strongly","Activate the reward circuit less","Have no effect on dopamine","Only affect the cerebellum"],answer:0,rationale:"Drugs that <b>activate the dopamine reward circuit more strongly</b> tend to be more addictive.",why:["Correct. The more strongly a drug drives reward-pathway dopamine, the more addictive it tends to be.","Weaker reward activation means lower addictive potential.","Addictive drugs strongly affect dopamine.","Addiction centers on the mesolimbic dopamine circuit, not the cerebellum."],takeaway:"More reward-circuit (dopamine) activation \u2192 more addictive."},
  {tag:"Serotonin & satiation",stem:"Your notes point out that as reward-pathway dopamine rises, serotonin falls. Because serotonin contributes to satiation, this drop means the person:",choices:["Feels fully satisfied and stops seeking","Loses all sense of reward","Cannot form new memories","Feels less satisfied/content, and is driven to keep seeking more"],answer:3,rationale:"Rising dopamine + falling <b>serotonin</b> (which aids satiation) \u2192 less contentment \u2192 keep seeking more reward.",why:["Falling serotonin reduces satiation, so satisfaction decreases, not increases.","Reward (dopamine) is elevated, not lost.","Memory formation isn't the point here \u2014 it's reduced satiation.","Correct. Lower serotonin reduces the sense of satiation, so the person keeps pursuing the reward \u2014 fueling the cycle."],takeaway:"Dopamine up, serotonin (satiation) down \u2192 less satisfied \u2192 keep seeking more."},
  {tag:"Animal models of addiction",stem:"In classic self-administration experiments, rats that could press a lever for IV cocaine would:",choices:["Avoid the lever after the first dose","Rapidly learn to press the lever, seek the drug, and escalate the dose if allowed \u2014 even ignoring harm","Show no interest in the drug","Only press for food, never the drug"],answer:1,rationale:"Rats self-administer cocaine, escalate dosing, and keep seeking it despite harm \u2014 the reward pathway overriding rational avoidance. Evidence of a biological basis of addiction.",why:["They seek the drug, not avoid it.","Correct. Rats readily self-administer cocaine, escalate dosing, and (once addicted) keep taking the drug even when it's paired with sickness \u2014 evidence of a biological reward mechanism.","They show strong interest \u2014 that's the point of the model.","They will work for the drug itself, not only food."],takeaway:"Self-administration model: rats work for cocaine, escalate, and ignore harm once addicted."},
  {tag:"Nature + nurture",stem:"Your notes note that addiction risk has both a genetic component and an environmental one. This means:",choices:["Only genes matter; environment is irrelevant","Only environment matters; genes are irrelevant","Both inherited vulnerability and one's environment/choices influence addiction risk","Neither genes nor environment affects risk"],answer:2,rationale:"Addiction risk = <b>genetic vulnerability + environment/choices</b> (nature and nurture together).",why:["Environment matters too, not genes alone.","Genes matter too, not environment alone.","Correct. Addiction risk is influenced by both genetic predisposition (family history) and environment/choices.","Both genes and environment clearly affect risk."],takeaway:"Addiction risk = genes + environment (both contribute)."}
 ]},
{id:"ps-7c-tolerance-withdrawal",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Drugs & consciousness",categoryCode:"7C",idea:"Tolerance & withdrawal",
 questions:[
  {tag:"Tolerance",stem:"Tolerance to a drug means that, over repeated use, a person:",choices:["Needs a smaller dose for the same effect","Becomes permanently immune to the drug","Needs a larger dose to achieve the same effect (decreased sensitivity)","Experiences stronger effects from the same dose"],answer:2,rationale:"<b>Tolerance</b> = decreased sensitivity with exposure \u2192 a rightward shift in the dose-response curve (need more for the same effect).",why:["That would be sensitization, the opposite of tolerance.","Tolerance isn't permanent immunity; it can reverse with abstinence.","Correct. Tolerance is decreased sensitivity from exposure \u2014 a rightward shift of the dose-response curve, requiring more drug for the same effect.","Increased effect from the same dose is the opposite of tolerance."],takeaway:"Tolerance = need more drug for the same effect (dose-response curve shifts right)."},
  {tag:"Tolerance mechanism",stem:"At the cellular level, tolerance to a drug like cocaine develops in part because chronic overstimulation leads the neuron to:",choices:["Down-regulate (reduce) its receptors, so the same dose produces less effect","Grow many extra receptors, increasing the effect","Produce more of its own dopamine","Stop transmitting signals permanently"],answer:0,rationale:"Tolerance mechanism: chronic overstimulation \u2192 the neuron <b>down-regulates receptors</b> \u2192 the same dose does less.",why:["Correct. Persistent high signaling causes the postsynaptic neuron to reduce receptor number/sensitivity, so the same drug amount produces a smaller high.","Receptor up-regulation would increase, not decrease, the effect.","The neuron adapts by reducing receptors, not by boosting its own dopamine.","Signaling continues; the cell just becomes less responsive."],takeaway:"Tolerance: receptors down-regulate after chronic overstimulation \u2192 weaker effect per dose."},
  {tag:"Cross-tolerance",stem:"Cross-tolerance describes a situation where:",choices:["A drug becomes more effective after using a different drug","Two drugs always cancel each other out","A drug loses all effect after a single use","Tolerance to one drug reduces responsiveness to a different drug that shares a common CNS mechanism"],answer:3,rationale:"<b>Cross-tolerance</b>: tolerance to one drug lowers responsiveness to another with a shared CNS target (e.g., alcohol \u2194 benzodiazepines).",why:["Cross-tolerance reduces, not increases, a drug's effect.","It's about shared tolerance, not cancellation.","It develops with repeated exposure, not one use.","Correct. Cross-tolerance is reduced efficacy of a novel drug because tolerance developed to another drug acting on the same target (e.g., alcohol and benzodiazepines)."],takeaway:"Cross-tolerance = tolerance to one drug reduces response to another with the same mechanism."},
  {tag:"Withdrawal",stem:"After building tolerance, a person who stops the drug experiences withdrawal, which typically involves:",choices:["Symptoms identical to the drug's high","Symptoms opposite to the drug's effects (e.g., depressed mood and anxiety after a stimulant crash)","No symptoms whatsoever","Permanent euphoria"],answer:1,rationale:"<b>Withdrawal</b> = symptoms opposite the drug's effects (stimulant crash \u2192 low mood/anxiety as dopamine drops).",why:["Withdrawal opposes the high; it doesn't reproduce it.","Correct. Withdrawal usually produces effects opposite to the drug's (a stimulant's crash brings low mood/anxiety as dopamine drops).","Withdrawal is defined by its (often distressing) symptoms.","Withdrawal is aversive, not euphoric."],takeaway:"Withdrawal = opposite of the drug's effects (crash, low mood, anxiety)."},
  {tag:"Sign of addiction",stem:"A key sign that use has progressed to addiction is when a person:",choices:["Uses the drug only occasionally for fun","Feels euphoric from a single small dose","Needs the drug just to feel 'normal' again, not to feel euphoric","Has never developed tolerance"],answer:2,rationale:"A hallmark of addiction: needing the drug to feel <b>normal</b> (stave off withdrawal), not to feel high.",why:["Occasional recreational use isn't the addiction hallmark described.","Easy euphoria suggests low tolerance, not established addiction.","Correct. Once tolerance and dependence set in, the drug is needed to feel normal (avoid withdrawal) rather than to get high \u2014 a hallmark of addiction.","Addiction typically involves tolerance, not its absence."],takeaway:"Addiction sign: using the drug to feel normal (avoid withdrawal), not to get high."},
  {tag:"Recovery of the reward system",stem:"Your notes offer a hopeful point about the reward system after quitting: with time and effort,",choices:["The brain can adapt back and the reward system can begin functioning at a normal level again","The reward system is permanently destroyed","Tolerance can never decrease","Dopamine neurons never recover at all"],answer:0,rationale:"With sustained abstinence and effort, the <b>reward system can recover</b> toward normal functioning.",why:["Correct. Given abstinence and effort, the reward system can recalibrate toward normal functioning over time.","The damage isn't necessarily permanent; recovery is possible.","Tolerance can decrease with abstinence.","Recovery of reward-system function is possible over time."],takeaway:"Reward system can recover to normal with time/abstinence (not necessarily permanent)."}
 ]},
{id:"ps-7c-substance-use-disorders",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Drugs & consciousness",categoryCode:"7C",idea:"Substance use disorders",
 questions:[
  {tag:"Intoxication vs. withdrawal",stem:"Two contrasting processes are considered when a drug enters and leaves the body. Intoxication is the effect while the drug is present; withdrawal is:",choices:["The effect while the drug is still in the body","A synonym for intoxication","The set of symptoms that appear after stopping prolonged use","The route by which a drug enters"],answer:2,rationale:"<b>Intoxication</b> = effects while the drug is present; <b>withdrawal</b> = symptoms after stopping prolonged use.",why:["That's intoxication, not withdrawal.","They are opposite processes, not synonyms.","Correct. Intoxication = effects while the drug acts; withdrawal = symptoms after stopping prolonged use.","That's a route of administration, not withdrawal."],takeaway:"Intoxication = drug in the body (its effects). Withdrawal = symptoms after stopping."},
  {tag:"What defines a substance use disorder",stem:"A substance use disorder is diagnosed not simply by using a drug, but when use:",choices:["Causes real impairment in functioning at work, school, or home","Occurs even once","Produces any pleasure at all","Involves a legal substance"],answer:0,rationale:"A <b>substance use disorder</b> = use causing genuine impairment in life functioning (work, school, home), not mere use.",why:["Correct. A substance use disorder involves a problematic pattern causing significant impairment \u2014 not everyone who uses develops one.","A single use doesn't define a disorder.","Pleasure alone isn't the criterion.","Legality isn't what defines the disorder."],takeaway:"SUD = use causing real impairment in functioning (not just any use)."},
  {tag:"Recognizing a SUD",stem:"Which pattern would most suggest a substance use disorder rather than casual use?",choices:["Trying a substance once at a party","Enjoying a single drink with dinner","Stopping easily whenever desired","Using increasing amounts, strong cravings, failed attempts to cut back, and neglected obligations"],answer:3,rationale:"SUD signs: <b>escalating amounts, cravings, failed cutbacks, and neglected work/home/school obligations</b>.",why:["A one-time trial isn't a disorder.","A single drink isn't the pattern of a disorder.","Easy cessation argues against a disorder.","Correct. Escalating use, cravings, inability to cut back, and neglected responsibilities are classic SUD indicators."],takeaway:"SUD markers: more use, cravings, can't cut back, neglecting obligations."},
  {tag:"Post-acute withdrawal (PAWS)",stem:"Beyond the acute (physical) phase, many people experience a longer post-acute phase (PAWS). It is best described as:",choices:["Intense physical symptoms only, lasting a few hours","Fewer physical symptoms but more emotional/psychological ones (mood swings, irritability) that come in waves","A complete absence of any symptoms","Permanent, unchanging symptoms with no relief"],answer:1,rationale:"<b>Post-acute withdrawal (PAWS)</b>: fewer physical, more emotional/psychological symptoms, arriving in waves over an extended period \u2014 a relapse risk.",why:["The acute phase is the intense physical one; PAWS is more emotional.","Correct. Post-acute withdrawal features more emotional/psychological symptoms (mood swings, low energy) that come and go in episodes over an extended period.","PAWS involves ongoing episodic symptoms, not their absence.","PAWS symptoms come in waves, not a permanent unchanging state."],takeaway:"PAWS = emotional/psychological withdrawal in waves (mood swings, irritability), a relapse trigger."},
  {tag:"Alcohol withdrawal danger",stem:"Unlike many drugs, abrupt alcohol withdrawal can be medically dangerous because it can cause:",choices:["Only mild, harmless drowsiness","Immediate permanent memory loss","Seizures (and delirium), which can be life-threatening \u2014 often treated with benzodiazepines","No symptoms at all"],answer:2,rationale:"<b>Alcohol withdrawal</b> can cause seizures and delirium (potentially fatal), treated with benzodiazepines; symptoms peak ~2\u20133 days.",why:["Alcohol withdrawal can be severe, not merely mild drowsiness.","The danger is seizures/delirium, not immediate permanent amnesia.","Correct. Alcohol withdrawal can produce seizures and delirium tremens, potentially fatal; benzodiazepines are used to manage it (peak symptoms ~2\u20133 days).","It produces significant, sometimes dangerous symptoms."],takeaway:"Alcohol withdrawal can be deadly (seizures/delirium) \u2192 treated with benzodiazepines."},
  {tag:"Substance-induced disorders",stem:"A person develops psychosis (paranoia, hearing voices) that is directly caused by their drug use. This is an example of a:",choices:["Substance-induced disorder","Substance use disorder by definition","Purely genetic condition unrelated to the drug","Withdrawal seizure"],answer:0,rationale:"<b>Substance-induced disorders</b> = conditions (mania, depression, psychosis, anxiety) caused by a substance \u2014 distinct from the use disorder itself.",why:["Correct. Substance-induced disorders are conditions (mood disorders, psychosis, anxiety) caused by a substance.","A substance USE disorder is about the problematic use pattern; this is a substance-INDUCED condition.","It's caused by the drug, not unrelated genetics.","Psychosis here is substance-induced, not a withdrawal seizure."],takeaway:"Substance-induced disorder = a condition (e.g., psychosis) caused by the drug."},
  {tag:"The caffeine exception",stem:"Your notes highlight one common drug for which a formal substance-use disorder is not recognized:",choices:["Alcohol","Nicotine","Cocaine","Caffeine"],answer:3,rationale:"<b>Caffeine</b> is the common drug for which no formal substance-use disorder is recognized (though intoxication/withdrawal exist).",why:["Alcohol use disorder is well recognized.","Tobacco/nicotine use disorder is recognized.","Cocaine (stimulant) use disorder is recognized.","Correct. Per the notes (and DSM-5), caffeine has recognized intoxication/withdrawal but no official caffeine use disorder \u2014 the exception among common drugs."],takeaway:"Caffeine = the exception: no formal substance-use disorder (intoxication/withdrawal do exist)."}
 ]},
{id:"ps-7c-treatments",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Drugs & consciousness",categoryCode:"7C",idea:"Treatments for drug dependence",
 questions:[
  {tag:"Detoxification",stem:"The initial treatment step of separating the person from the drug and managing the body's withdrawal is called:",choices:["Relapse","Tolerance","Detoxification (detox)","Intoxication"],answer:2,rationale:"<b>Detoxification (detox)</b> = separating the person from the drug and managing withdrawal (sometimes with medication).",why:["Relapse is a return to use, not the treatment step.","Tolerance is a physiological adaptation, not a treatment.","Correct. Detoxification is the process of clearing the drug and managing withdrawal, sometimes requiring medication.","Intoxication is the drug's active effect, not detox."],takeaway:"Detox = clearing the drug + managing withdrawal (first treatment step)."},
  {tag:"Methadone",stem:"Methadone helps treat opioid addiction because it:",choices:["Is a longer-acting opioid agonist that occupies the receptors, dampening the high and easing withdrawal/cravings","Blocks all opioid receptors so opioids can't bind","Is a stimulant that counteracts the opioid","Has no effect on opioid receptors"],answer:0,rationale:"<b>Methadone</b> = long-acting opioid agonist; it fills the receptors slowly, dampening the high and easing withdrawal/cravings.",why:["Correct. Methadone activates opioid receptors slowly and long, so a person can't get the high from other opioids (receptors are occupied) while cravings and withdrawal are reduced.","Methadone is an agonist (activates receptors), not a pure blocker.","Methadone is an opioid agonist, not a stimulant.","It works precisely by acting on opioid receptors."],takeaway:"Methadone = slow, long-acting opioid agonist \u2192 occupies receptors, dampens high, eases withdrawal."},
  {tag:"Nicotine replacement",stem:"Nicotine patches and gum help people quit smoking by:",choices:["Delivering high, rapid nicotine spikes like a cigarette","Blocking all acetylcholine receptors","Adding tar and smoke without nicotine","Delivering low, steady levels of nicotine to reduce cravings and withdrawal"],answer:3,rationale:"<b>Nicotine replacement</b> (patch/gum) gives low, steady nicotine to blunt cravings/withdrawal without the rapid, addictive spikes of smoking.",why:["Patches avoid the rapid spikes that drive addiction; they're steady and low.","They supply nicotine rather than block ACh receptors entirely.","The point is nicotine without the smoke/tar, not tar without nicotine.","Correct. Replacement therapy supplies low, steady nicotine (no smoke) to ease cravings/withdrawal while the behavior is unlearned."],takeaway:"Nicotine replacement = low, steady nicotine \u2192 fewer cravings/withdrawal (no addictive spikes)."},
  {tag:"Cognitive behavioral therapy",stem:"In treating addiction, cognitive behavioral therapy (CBT) works mainly by:",choices:["Replacing the drug with a medication only","Helping people recognize problematic thought/behavior patterns and build coping strategies (durable after therapy)","Requiring hospitalization in all cases","Using hypnosis to erase cravings instantly"],answer:1,rationale:"<b>CBT</b> addresses the thoughts/behaviors behind addiction \u2014 recognizing triggers and building coping strategies that endure after treatment.",why:["CBT is psychological, distinct from medication substitution.","Correct. CBT targets the cognitive and behavioral components of addiction \u2014 spotting triggers, building coping skills that last beyond therapy.","CBT is often outpatient; hospitalization isn't required.","CBT builds skills over time; it isn't instant hypnosis."],takeaway:"CBT = recognize triggers + build lasting coping skills (psychological treatment)."},
  {tag:"Motivational interviewing",stem:"Motivational interviewing is a focused, goal-directed approach that primarily aims to:",choices:["Force compliance through external pressure","Deliver medication in place of therapy","Help the patient find their own intrinsic motivation to change","Diagnose the biological cause of addiction"],answer:2,rationale:"<b>Motivational interviewing</b> = helping patients find their own intrinsic motivation to change (a doorway to further treatment).",why:["It works through intrinsic motivation, not external force.","It's a counseling approach, not medication.","Correct. Motivational interviewing helps patients discover internal motivation to change, often as a doorway into further treatment.","Its aim is motivation to change, not biological diagnosis."],takeaway:"Motivational interviewing = build the patient's own (intrinsic) motivation to change."},
  {tag:"Group meetings & 12-step",stem:"AA (Alcoholics Anonymous) and NA (Narcotics Anonymous) are examples of:",choices:["Peer support groups using a 12-step program of recovery","Inpatient hospital detox units","Prescription medication programs","Diagnostic laboratory tests"],answer:0,rationale:"AA/NA = peer <b>12-step support groups</b> (acceptance, surrender, active involvement) supporting recovery.",why:["Correct. AA/NA are peer-led 12-step support groups (acceptance, surrender to a higher power, active involvement) that aid recovery.","They are community support groups, not hospital detox units.","They aren't medication programs.","They're support meetings, not lab tests."],takeaway:"AA/NA = 12-step peer support groups for recovery."},
  {tag:"Relapse triggers",stem:"Encountering the people, places, and paraphernalia once associated with drug use raises relapse risk. This is a key reason:",choices:["Relapse is impossible once detox is complete","Environmental cues have no effect on recovery","Only the drug's chemistry, never context, matters","CBT teaches people to anticipate and cope with these environmental cues"],answer:3,rationale:"Environmental cues (people, places, objects) trigger relapse \u2014 why <b>CBT</b> trains people to anticipate and cope with them.",why:["Relapse remains possible after detox, especially with cue exposure.","Environmental cues strongly influence relapse.","Context and cues matter a great deal, alongside chemistry.","Correct. Conditioned environmental cues (old friends, settings, objects) can trigger cravings and relapse \u2014 so CBT builds strategies to anticipate and handle them."],takeaway:"Relapse triggers = conditioned cues (people/places/objects). CBT builds coping for them."}
 ]},
{id:"ps-7b-attention-types",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Attention & memory",categoryCode:"7B",idea:"Attention: types & phenomena",
 questions:[
  {tag:"Divided attention",stem:"Trying to watch TV and study at the same time, you notice performance on both suffers. This reflects that:",choices:["Attention is unlimited and easily split","Attention is a limited resource, so dividing it across two demanding tasks impairs both","The two tasks merge into one","Selective attention has been eliminated"],answer:1,rationale:"<b>Divided attention</b>: attention is a limited resource, so two demanding tasks at once impair each other.",why:["Attention is limited, not unlimited \u2014 that's the whole point.","Correct. Divided attention splits a limited resource; two attention-demanding tasks done at once degrade performance (often via task-switching).","The tasks don't merge; you switch/split between them.","This is about dividing attention, not eliminating selective attention."],takeaway:"Divided attention = splitting a LIMITED resource across tasks \u2192 performance drops."},
  {tag:"Selective attention",stem:"Watching TV while a roommate talks, you 'tune in' the show and filter out the conversation, shifting focus at will. This is:",choices:["Divided attention","Inattentional blindness","Neglect syndrome","Selective attention"],answer:3,rationale:"<b>Selective attention</b> = focusing on one stimulus while filtering out competing ones (you choose what to 'illuminate').",why:["Divided attention is attending to two tasks at once, not filtering to one.","Inattentional blindness is failing to notice an unexpected object, not the act of focusing.","Neglect syndrome is a brain-damage-related loss of attention to one side.","Correct. Selective attention is focusing on one stimulus while filtering out others."],takeaway:"Selective attention = focus on one thing, filter out the rest."},
  {tag:"Inattentional blindness",stem:"Absorbed in counting basketball passes, viewers famously fail to notice a person in a gorilla suit walk through. This failure to see an unexpected object in plain sight is:",choices:["Inattentional blindness","Change blindness","Neglect syndrome","A retinal defect"],answer:0,rationale:"<b>Inattentional blindness</b> = missing an unexpected object in plain sight because attention is elsewhere (a psychological lapse, not a sensory defect).",why:["Correct. Inattentional blindness is failing to perceive an unexpected but visible object because attention is elsewhere \u2014 an attentional lapse, not a sensory defect.","Change blindness is failing to notice a CHANGE between two views, not missing an object present now.","Neglect is caused by brain damage; this is a normal attentional lapse.","It's an attention lapse, not a defect of the retina/eyes."],takeaway:"Inattentional blindness = miss something in plain sight because attention is elsewhere."},
  {tag:"Change blindness",stem:"In a study, a stranger asking directions is swapped for a different person mid-conversation, and many people don't notice. This failure to detect a change between two moments is:",choices:["Inattentional blindness","Attentional capture","Change blindness","Covert orienting"],answer:2,rationale:"<b>Change blindness</b> = failing to notice a change from a previous state (e.g., the swapped stranger). Distinct from inattentional blindness.",why:["Inattentional blindness is missing an unexpected object present now, not a change over time.","Attentional capture is when something automatically grabs attention.","Correct. Change blindness is failing to notice a change from a previous state \u2014 subtly different from inattentional blindness (missing something present now).","Covert orienting is shifting attention without moving the eyes."],takeaway:"Change blindness = miss a CHANGE between two moments. (Inattentional = miss an object present now.)"},
  {tag:"Covert vs. overt orienting",stem:"Shifting the 'spotlight' of your attention to something in your peripheral vision WITHOUT moving your eyes or head is called:",choices:["Overt orienting","Covert orienting","Attentional capture","Divided attention"],answer:1,rationale:"<b>Covert orienting</b> = shift attention without moving; <b>overt orienting</b> = physically turn toward the stimulus.",why:["Overt orienting involves physically turning the eyes/body toward the stimulus.","Correct. Covert orienting shifts attention without eye/body movement; overt orienting physically turns toward the stimulus.","Attentional capture is automatic grabbing of attention, not the covert shift itself.","Divided attention is splitting attention across tasks."],takeaway:"Covert orienting = shift attention without moving. Overt = physically turn toward it."},
  {tag:"Neglect syndrome",stem:"After brain damage (often right parietal), a patient ignores everything on their left side \u2014 eating only the right half of a plate. This is:",choices:["Inattentional blindness","Change blindness","The cocktail party effect","Neglect syndrome (hemispatial neglect)"],answer:3,rationale:"<b>Neglect syndrome</b> = brain damage causing loss/change in the spatial dimension of attention (ignoring one side of space).",why:["Inattentional blindness is a normal attentional lapse, not caused by brain damage.","Change blindness is failing to detect a change, not ignoring a whole side of space.","The cocktail party effect concerns hearing one's name in noise.","Correct. Neglect syndrome is a brain-damage-caused loss of the spatial dimension of attention (typically one side)."],takeaway:"Neglect syndrome = brain damage \u2192 ignore one side of space (spatial attention loss)."},
  {tag:"Attentional capture",stem:"A sudden flash of movement in the corner of your eye automatically pulls your attention toward it, interrupting what you were doing. This is:",choices:["Attentional capture","Directed attention","Executive attention","Change blindness"],answer:0,rationale:"<b>Attentional capture</b> = attention automatically drawn by a salient stimulus (e.g., sudden motion) \u2014 bottom-up.",why:["Correct. Attentional capture is attention being automatically drawn by a salient stimulus (motion, sudden onset) \u2014 a bottom-up pull.","Directed attention is voluntary, sustained focus, not an automatic pull.","Executive attention involves goal-directed control and conflict monitoring.","Change blindness is failing to notice a change."],takeaway:"Attentional capture = a salient stimulus automatically grabs attention (bottom-up)."}
 ]},
{id:"ps-7b-selective-cues",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Attention & memory",categoryCode:"7B",idea:"Selective attention: cues & cocktail party",
 questions:[
  {tag:"Exogenous cues",stem:"Bright colors and sudden loud noises grab your attention automatically, producing a 'pop-out' effect. These are examples of:",choices:["Endogenous (internal) cues \u2014 top-down","Exogenous (external) cues \u2014 bottom-up","Change blindness","Overt orienting only"],answer:1,rationale:"<b>Exogenous cues</b> = external, salient stimuli (bright color, loud noise) that capture attention automatically (bottom-up 'pop-out').",why:["Endogenous cues require internal knowledge/intention (top-down) \u2014 the opposite.","Correct. Exogenous cues are external, salient stimuli that capture attention automatically (bottom-up).","Change blindness is a failure to notice change, not a cue type.","Orienting can be overt or covert; this is about the cue's source, not the movement."],takeaway:"Exogenous cues = external/salient, grab attention automatically (bottom-up)."},
  {tag:"Endogenous cues",stem:"An arrow you must interpret ('follow where it points') directs your attention only because you understand its meaning and intend to follow it. This is an:",choices:["Exogenous (external) cue \u2014 bottom-up","Attentional capture","Inattentional blindness","Endogenous (internal) cue \u2014 top-down"],answer:3,rationale:"<b>Endogenous cues</b> = require internal knowledge/intention to interpret and follow (top-down), like an arrow you choose to follow.",why:["Exogenous cues capture attention automatically without needing interpretation.","Attentional capture is automatic (bottom-up), unlike the interpreted arrow.","Inattentional blindness is a perceptual failure, not a cue type.","Correct. Endogenous cues rely on internal knowledge and intention to guide attention (top-down)."],takeaway:"Endogenous cues = internal/interpreted, follow by intention (top-down)."},
  {tag:"Cocktail party effect",stem:"At a loud party focused on one conversation, you instantly notice when someone across the room says YOUR name. This is the:",choices:["Cocktail party effect","Exogenous pop-out effect","Change blindness","Neglect syndrome"],answer:0,rationale:"<b>Cocktail party effect</b>: focusing on one voice in a crowd while still catching your own name in an unattended conversation (meaning draws attention).",why:["Correct. The cocktail party effect is the ability to focus on one voice in a crowd, yet still detect a personally salient stimulus (your name) in the unattended stream.","Pop-out is about salient external features generally; this specifically involves the meaning of your own name.","Change blindness is missing a change, not detecting your name.","Neglect syndrome is a brain-damage spatial attention loss."],takeaway:"Cocktail party effect = focus on one voice, but your NAME in another still grabs you."},
  {tag:"Bottom-up vs. top-down attention",stem:"Which correctly pairs the attention drivers?",choices:["Exogenous = top-down; endogenous = bottom-up","Both are purely bottom-up","Exogenous cues are driven bottom-up (by the stimulus); endogenous cues are driven top-down (by knowledge/intention)","Both are purely top-down"],answer:2,rationale:"<b>Exogenous</b> = bottom-up (stimulus grabs you); <b>endogenous</b> = top-down (you direct attention via knowledge/intention).",why:["Reversed \u2014 exogenous is bottom-up, endogenous top-down.","Endogenous cues are top-down, not bottom-up.","Correct. Exogenous = bottom-up (stimulus-driven); endogenous = top-down (knowledge/goal-driven).","Exogenous cues are bottom-up, not top-down."],takeaway:"Exogenous = bottom-up (stimulus). Endogenous = top-down (intention)."}
 ]},
{id:"ps-7b-attention-theories",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Attention & memory",categoryCode:"7B",idea:"Theories of selective attention",
 questions:[
  {tag:"Broadbent's early selection",stem:"Broadbent's early selection theory proposes that unattended information is filtered out:",choices:["Late \u2014 only after meaning has been assigned","Early \u2014 based on basic physical characteristics, before meaning is processed","Never \u2014 all information reaches consciousness","Randomly, with no filter at all"],answer:1,rationale:"<b>Broadbent (early selection)</b>: the filter acts early, on physical characteristics, before meaning \u2014 sensory register \u2192 filter \u2192 perception.",why:["Late selection (Deutsch & Deutsch) filters after meaning; that's a different theory.","Correct. Broadbent's filter selects early, using physical features (pitch, loudness), so unattended input is blocked before semantic processing.","Broadbent posits a filter, so not everything reaches consciousness.","Broadbent's filter is based on physical characteristics, not random."],takeaway:"Broadbent = EARLY selection (filter on physical features, before meaning)."},
  {tag:"Broadbent's limitation",stem:"A problem for Broadbent's strict early-filter theory is that people sometimes DO notice meaningful unattended input \u2014 as shown by:",choices:["The pop-out of bright colors","Change blindness","Overt orienting","The cocktail party effect (hearing your own name in an unattended conversation)"],answer:3,rationale:"The <b>cocktail party effect</b> challenges Broadbent: meaningful unattended info (your name) is sometimes noticed, so the filter can't be purely early/physical.",why:["Bright-color pop-out is consistent with early physical filtering, not a challenge to it.","Change blindness is about missing changes, not a challenge to early selection.","Overt orienting is a movement of attention, not evidence against early filtering.","Correct. The cocktail party effect shows meaningful unattended information (your name) can break through, which a strict early filter can't easily explain."],takeaway:"Cocktail party effect challenges Broadbent (meaningful unattended info gets through)."},
  {tag:"Deutsch & Deutsch late selection",stem:"Deutsch & Deutsch's late selection theory differs from Broadbent's by proposing that the selective filter operates:",choices:["After perceptual processing \u2014 everything is processed for meaning, then filtered for awareness","Before any perceptual processing","At the sensory register only","Not at all"],answer:0,rationale:"<b>Deutsch & Deutsch (late selection)</b>: everything is processed for meaning first; the filter selects for awareness AFTER perception.",why:["Correct. Late selection moves the filter AFTER perception: all input is analyzed for meaning, then selection determines what reaches conscious awareness.","That's Broadbent's early selection, not Deutsch & Deutsch.","Their filter is after perception, not at the sensory register.","They do posit a filter \u2014 just a late one."],takeaway:"Deutsch & Deutsch = LATE selection (process meaning first, filter after)."},
  {tag:"Treisman's attenuation",stem:"Treisman's attenuation theory offers a middle ground by proposing that unattended information is:",choices:["Completely blocked with no leakage","Amplified above attended information","Weakened (attenuated) rather than completely filtered out \u2014 so salient items can still get through","Never processed for physical features"],answer:2,rationale:"<b>Treisman (attenuation)</b>: unattended input is turned DOWN, not off \u2014 so salient/meaningful items can still get through (explains the cocktail party effect). Mnemonic: Treisman is SHARP as a T \u2014 attenuate, then perceive.",why:["That's Broadbent's strict filter; Treisman allows leakage.","Unattended info is weakened, not amplified above attended info.","Correct. Treisman replaced the all-or-none filter with an attenuator that turns down (but doesn't eliminate) unattended input, so meaningful items (your name) can still break through.","Physical features are still processed; attenuation acts on the unattended channel."],takeaway:"Treisman = attenuation: weaken (not block) unattended info \u2192 salient items still get through."},
  {tag:"Ordering the filters",stem:"Across the three theories, where the selective filter sits relative to perceptual processing is:",choices:["All three place the filter after perception","Broadbent = before perception; Treisman = attenuate then perceive; Deutsch & Deutsch = after perception","All three place the filter before perception","None of them involve a filter"],answer:1,rationale:"Filter placement: <b>Broadbent early</b> (pre-perception) \u2192 <b>Treisman</b> attenuate-then-perceive \u2192 <b>Deutsch & Deutsch late</b> (post-perception).",why:["Only Deutsch & Deutsch is fully post-perceptual.","Correct. Broadbent filters early (pre-perceptual), Treisman attenuates then perceives, and Deutsch & Deutsch filter late (post-perceptual).","Only Broadbent is fully pre-perceptual.","All three involve a filtering/attenuating mechanism."],takeaway:"Filter timing: Broadbent (early) < Treisman (attenuate) < Deutsch & Deutsch (late)."}
 ]},
{id:"ps-7b-multitasking",section:"Psychological, Social & Biological Foundations of Behavior",sectionCode:"P/S",category:"Attention & memory",categoryCode:"7B",idea:"Multitasking & the spotlight model",
 questions:[
  {tag:"Spotlight model",stem:"The spotlight model of attention describes selective attention as:",choices:["An unlimited floodlight that processes everything at once","A movable 'spotlight' that illuminates a small portion of available sensory information at a time","A permanent fixed focus that cannot move","A store that holds all sensory input indefinitely"],answer:1,rationale:"<b>Spotlight model</b>: attention is a movable beam illuminating a small portion of sensory input at a time (we can't process it all).",why:["Attention is limited, not an all-processing floodlight.","Correct. The spotlight model: attention illuminates a limited region of input and can be moved around, since we can't consciously process all information.","The spotlight moves; it isn't fixed.","That describes memory storage, not the attention spotlight."],takeaway:"Spotlight model = a movable beam highlighting a small slice of input at a time."},
  {tag:"Multitasking is switching",stem:"Research on 'multitasking' (e.g., texting while driving) generally shows that it is:",choices:["More efficient than single-tasking","True simultaneous processing with no cost","Harmless for simple tasks only, with no accident risk","Really rapid task-switching, and less efficient than doing one task at a time"],answer:3,rationale:"'Multitasking' is mostly <b>rapid task-switching</b> \u2014 less efficient than single-tasking (and dangerous while driving).",why:["Multitasking is generally LESS efficient than focusing on one task.","There is a real switching cost, not cost-free simultaneity.","Texting while driving carries a well-documented high crash risk.","Correct. Most 'multitasking' is switching the attentional spotlight back and forth, which is less efficient and (for driving) linked to more accidents."],takeaway:"Multitasking = task-switching, not true parallel processing. Less efficient; risky when driving."},
  {tag:"Automatic vs. controlled",stem:"A task you have practiced so much that it needs little attention (like an experienced driver on a familiar road) is described as:",choices:["Automatic \u2014 it runs with little attentional demand","Controlled \u2014 it demands full attention","Impossible to perform while distracted","Always harder than a novel task"],answer:0,rationale:"<b>Automatic</b> processing (well-practiced) needs little attention; <b>controlled</b> processing (novel/complex) demands focus.",why:["Correct. Automatic processes result from extensive practice and need little attention; controlled processes (novel/complex tasks) demand focused attention.","Controlled processing describes novel/effortful tasks, not the well-practiced one.","Automatic tasks can tolerate some divided attention, unlike controlled ones.","A practiced automatic task is easier, not harder, than a novel one."],takeaway:"Automatic = practiced, low attention. Controlled = novel/complex, high attention."},
  {tag:"Task similarity & difficulty",stem:"It is hardest to multitask two activities when they are:",choices:["Dissimilar and easy","Both fully automatic","Similar (drawing on the same resources) and difficult","Performed in silence"],answer:2,rationale:"Multitasking is hardest when tasks are <b>similar</b> (same resources) and <b>difficult</b>; easier when dissimilar, easy, or automatic.",why:["Dissimilar, easy tasks are the EASIEST to combine, not the hardest.","Two automatic tasks are easier to combine, not harder.","Correct. Multitasking suffers most when tasks are similar (competing for the same resources) and difficult; dissimilar, easy, or automatic tasks combine more readily.","Silence isn't the determining factor \u2014 similarity and difficulty are."],takeaway:"Hardest to multitask: similar + difficult tasks. Easier: dissimilar, easy, or automatic."}
 ]},
